    let _ssiChart = null;
    let _rain24Chart = null;
    function drawSsiGauge(ssi, color){
      const cv = document.getElementById('ssiGauge');
      if(!cv || !window.Chart) return;
      if(_ssiChart){ try{_ssiChart.destroy()}catch(e){} _ssiChart=null; }
      const frac = Math.max(0, Math.min(1, ssi/3));
      _ssiChart = new Chart(cv, {
        type:'doughnut',
        data:{ datasets:[{
          data:[1,1,1,1],
          backgroundColor:[RC.Low, RC.Medium, RC.High, RC['Very High']],  // green → yellow → orange → red
          borderWidth:0, circumference:180, rotation:-90
        }]},
        options:{ responsive:true, maintainAspectRatio:false, cutout:'68%',
          plugins:{legend:{display:false}, tooltip:{enabled:false}}, animation:false },
        plugins:[{
          id:'ssiNeedle',
          afterDatasetsDraw(chart){
            const a=chart.chartArea; if(!a) return;
            const cx=(a.left+a.right)/2, cy=a.bottom, R=(a.right-a.left)/2*0.96;
            const ang=Math.PI*frac;  // high SSI (safe) → points left (green)
            const ctx=chart.ctx;
            ctx.save();
            ctx.strokeStyle='#e5e7eb'; ctx.lineWidth=2.5; ctx.lineCap='round';
            ctx.beginPath(); ctx.moveTo(cx,cy);
            ctx.lineTo(cx+R*Math.cos(ang), cy-R*Math.sin(ang)); ctx.stroke();
            ctx.fillStyle='#e5e7eb'; ctx.beginPath(); ctx.arc(cx,cy,3.5,0,Math.PI*2); ctx.fill();
            ctx.restore();
          }
        }]
      });
    }

    function fillOverview(m, st){
      // KPI — Overall Status driven by EWS (single source of truth) with fallback
      const ews = DATA.ews;
      const overallEl = document.getElementById('kOverall');
      const ACTION_EN = {
        HIJAU:'All monitored parameters within normal range',
        KUNING:'Caution — increase monitoring frequency',
        JINGGA:'Warning — verify in field, prepare evacuation route',
        MERAH:'Danger — evacuate immediately, activate emergency procedure'
      };
      if(ews && ews.status){
        overallEl.textContent = EWS_LABELS[ews.status] || ews.status;
        overallEl.style.color = EWS_COLORS[ews.status] || st.c;
        let sub = ACTION_EN[ews.status] || st.sub;
        if(ews.monitoring_degraded) sub += ' · Data incomplete, relying on remaining sensors';
        document.getElementById('kOverallSub').textContent = sub;
      } else {
        overallEl.textContent = st.t;
        overallEl.style.color = st.c;
        document.getElementById('kOverallSub').textContent = st.sub;
      }

      // Slope Stability Index gauge
      const ssiEl = document.getElementById('kSsi');
      if(ssiEl){ ssiEl.textContent = m.ssi.toFixed(2); ssiEl.style.color = m.ssiLabel.c; }
      const ssiLblEl = document.getElementById('kSsiLbl');
      if(ssiLblEl){ ssiLblEl.textContent = m.ssiLabel.t; ssiLblEl.style.color = m.ssiLabel.c; }
      drawSsiGauge(m.ssi, m.ssiLabel.c);

      // Total Risk Level: total locations + Low/Medium/High/Very High breakdown
      const trTotal = m.insRows.length;
      const kRiskTotalEl = document.getElementById('kRiskTotal');
      if(kRiskTotalEl) kRiskTotalEl.textContent = trTotal || '—';
      const kRiskBd = document.getElementById('kRiskBreakdown');
      if(kRiskBd){
        kRiskBd.innerHTML = [
          ['Low', m.inspByRisk['Low']||0, RC.Low],
          ['Medium', m.inspByRisk['Medium']||0, RC.Medium],
          ['High', m.inspByRisk['High']||0, RC.High],
          ['Very High', m.inspByRisk['Very High']||0, RC['Very High']],
        ].map(r=>`<div class="row"><span><span class="dot" style="--c:${r[2]}"></span> ${r[0]}</span><b>${r[1]} (${trTotal?Math.round(r[1]/trTotal*100):0}%)</b></div>`).join('');
      }

      // Alerts KPI from EWS per-device levels (fallback to extensometer-derived)
      const pdev = (ews && ews.per_device) || [];
      let cMerah, cJingga, cKuning;
      if(pdev.length){
        cMerah = pdev.filter(d=>d.trigger_level==='MERAH').length;
        cJingga = pdev.filter(d=>d.trigger_level==='JINGGA').length;
        cKuning = pdev.filter(d=>d.trigger_level==='KUNING').length;
      } else {
        cMerah = m.critical; cJingga = m.warn; cKuning = m.watch;
      }
      const setTxt=(id,v)=>{const e=document.getElementById(id); if(e) e.textContent=v;};
      setTxt('kCriticalN', cMerah);
      setTxt('kWarnN', cJingga);
      setTxt('kWatchN', cKuning);
      // Hover tooltip: which instruments are actually in alert (by area name)
      const alCard=document.getElementById('kAlertCard');
      if(alCard){
        const triggered=pdev.filter(d=>d.trigger_level && d.trigger_level!=='HIJAU')
          .map(d=>`${instLocLabel(d.name)}: ${EWS_LABELS[d.trigger_level]||d.trigger_level}${d.velocity_mm_day!=null?` · ${fmt(d.velocity_mm_day,2)} mm/day`:''}`);
        alCard.title = triggered.length ? ('Active alerts:\n'+triggered.join('\n')) : 'No instruments in alert — all within limits';
      }

      document.getElementById('kActive').textContent = `${m.instOnline} / ${m.instTotal}`;
      document.getElementById('kActiveSub').textContent = (m.instTotal?`updated ${agoEn(m.newest)}`:'—');

      const rh = DATA.rainHours||{};
      document.getElementById('rh1').textContent  = (rh.hours_today!=null?rh.hours_today:'—')+' h';
      document.getElementById('rh7').textContent  = (rh.hours_7d!=null?rh.hours_7d:'—')+' h';
      document.getElementById('rh30').textContent = (rh.hours_30d!=null?rh.hours_30d:'—')+' h';
      document.getElementById('rhM').textContent  = (rh.hours_month!=null?rh.hours_month:'—')+' h';

      const q0=(DATA.eq||[])[0]; const pgaEl=document.getElementById('kPga'), pgaSub=document.getElementById('kPgaSub');
      const p0=q0?latestPga(q0):null;
      if(p0){ pgaEl.textContent=p0.g.toFixed(3)+' g'; pgaEl.style.color=p0.color;
        pgaSub.innerHTML=`${esc(p0.tarp)} · ${esc(p0.site)} ${p0.epi}km<br>M${esc(String(q0.magnitude))} · ${esc(shortWil(q0.wilayah))}`;
      } else { pgaEl.textContent='—'; pgaEl.style.color=''; pgaSub.textContent='No earthquake data'; }

      const kLocEl = document.getElementById('kLocTotal');
      if(kLocEl) kLocEl.textContent = (m.insRows.length) || '—';

      // Tabel inspeksi — DATA REAL per lokasi (poin 2): inspeksi terbaru tiap
      // lokasi (risk_final + skor) + trend vs inspeksi sebelumnya di lokasi itu.
      const locName = {}; (DATA.locs||[]).forEach(l=>{ locName[l.id] = l.name || l.area_code || ('Lokasi '+l.id); });
      const riskRank = {'Very High':4,'High':3,'Medium':2,'Low':1,'Very Low':0};
      const riskColor = (r)=> r==='Very High'?RC['Very High'] : r==='High'?RC.High : r==='Medium'?RC.Medium : RC.Low;
      const byLoc = {}; (DATA.insp||[]).forEach(d=>{ (byLoc[d.location_id]=byLoc[d.location_id]||[]).push(d); });
      const trEl = (tr)=> tr>0?`<span class="trend-up">↑</span>` : tr<0?`<span class="trend-dn">↓</span>` : `<span class="trend-st">→</span>`;
      const inspRows = (m.insRows||[]).slice()
        .sort((a,b)=>(riskRank[b.risk_final]||0)-(riskRank[a.risk_final]||0)).slice(0,8);
      const inspTblEl = document.getElementById('inspTbl');
      if(inspTblEl) inspTblEl.innerHTML = inspRows.length ? inspRows.map(r=>{
        const list = byLoc[r.location_id]||[];      // ordered date desc
        const prev = list[1];
        const tr = prev ? ((riskRank[r.risk_final]||0) - (riskRank[prev.risk_final]||0)) : 0;
        return `<tr>
          <td>${esc(locName[r.location_id]||('Lokasi '+r.location_id))}</td>
          <td><span style="color:${riskColor(r.risk_final)};font-weight:900">${esc(r.risk_final||'—')}</span></td>
          <td>${r.total_score!=null?r.total_score:'—'}</td>
          <td style="text-align:right">${trEl(tr)}</td>
        </tr>`;
      }).join('') : `<tr><td colspan="4" style="color:#94a3b8">Belum ada data inspeksi</td></tr>`;

      // Instrument health (per DEVICE, shared windows from compute()). Status
      // reflects whether each device reported within its type's freshness window;
      // the data age is shown so a lagging batch instrument isn't read as broken.
      const sensors = DATA.sensors||[];
      const HEALTH_TYPES = [
        {k:'AWS / Rainfall',  kind:'weather',      ic:'☁'},
        {k:'Extensometer',    kind:'extensometer', ic:'📏'},
        {k:'Inclinometer',    kind:'inclinometer', ic:'∠'},
        {k:'VWP / Piezometer',kind:'piezometer',   ic:'◎'},
      ];
      const dh = m.devHealth || {};
      const health = HEALTH_TYPES.map(t=>{
        const h = dh[t.kind] || {total:new Set(), online:new Set(), newest:null};
        const total = h.total.size, online = h.online.size, down = total - online;
        const status = total===0 ? 'No data' : down===0 ? 'Active' : online===0 ? 'No recent data' : 'Partial';
        const col = total===0 ? '#94a3b8' : down===0 ? RC.Low : online===0 ? RC.High : RC.Medium;
        return {k:t.k, ic:t.ic, online, total, down, status, col, age: h.newest?agoEn(h.newest):'—'};
      });
      const instHealthEl = document.getElementById('instHealth');
      if(instHealthEl) instHealthEl.innerHTML = health.map(h=>`
        <div class="inst">
          <span class="inst-ico">${h.ic}</span>
          <div class="nm">${esc(h.k)}</div>
          <div class="v">${h.online}/${h.total}</div>
          <div class="s" style="color:${h.col}" title="Last data ${esc(h.age)}">● ${esc(h.status)} · ${esc(h.age)}</div>
        </div>`).join('');

      // Parameter monitoring latest (ambil yang tersedia; lainnya placeholder)
      const extAny = sensors.find(s=>s.kind==='extensometer' && s.latest_value!=null);
      const rainAny = sensors.find(s=>s.kind==='weather' && (s.sensor_type_name||'').toLowerCase().includes('rain'));
      const tempAny = sensors.find(s=>s.kind==='weather' && (s.sensor_type_name||'').toLowerCase().includes('temperature'));

      const extLvl = extAny ? extStatus(extAny) : 'Low';
      const extCol = RC[extLvl] || RC.Low;
      const extTrend = m.extTriggered.length ? '<span class="trend-up">↗</span>' : '<span class="trend-st">→</span>';

      const rainVal = (DATA.rain && DATA.rain.rain_total_today_mm!=null) ? `${fmt(DATA.rain.rain_total_today_mm,1)} mm/day` : (rainAny?`${fmt(rainAny.latest_value,1)} ${rainAny.unit||''}`:'—');
      const rainTrend = DATA.rain && DATA.rain.is_raining ? '<span class="trend-up">↗</span>' : '<span class="trend-st">→</span>';

      // Inclinometer: max cumulative displacement from EWS per-device
      const incDevs = ((ews && ews.per_device) || []).filter(d=>d.category==='inclinometer' && d.qc==='VALID');
      const incTop = incDevs.slice().sort((a,b)=>Math.abs(b.cumulative_mm||0)-Math.abs(a.cumulative_mm||0))[0];
      const incVal = incTop ? `${fmt(incTop.cumulative_mm,2)} mm` : '—';
      const incSt  = incTop ? (incTop.trigger_level==='HIJAU'?'Normal':incTop.trigger_level) : '—';
      const incCol = incTop ? (EWS_COLORS[incTop.trigger_level]||RC.Low) : '#94a3b8';

      // VWP: latest pore pressure (kPa) across channels
      let vwpVal='—', vwpSt='—', vwpCol='#94a3b8';
      try{
        const vwpProc = processVwp(DATA.vwp7||[]); let lp=null, lts='';
        for(const dev of Object.values(vwpProc)){
          for(const rows of Object.values(dev.channels||{})){
            const last = rows[rows.length-1];
            if(last && String(last.ts)>lts){ lts=String(last.ts); lp=last.value; }
          }
        }
        if(lp!=null){ vwpVal=`${fmt(lp,1)} kPa`; vwpSt='Normal'; vwpCol=RC.Low; }
      }catch(e){}

      const rowsParam = [
        {p:'Displacement (Extensometer)', v: extAny?`${fmt(extAny.latest_value,2)} ${extAny.unit||'mm'}`:'—', st: extAny?extLvl:'—', c: extCol, tr: extTrend},
        {p:'Displacement (Inklinometer, kum.)', v: incVal, st: incSt, c: incCol, tr:'<span class="trend-st">→</span>'},
        {p:'Pore Pressure (VWP)', v: vwpVal, st: vwpSt, c: vwpCol, tr:'<span class="trend-st">→</span>'},
        {p:'Rainfall (AWS)', v: rainVal, st: (DATA.rain && DATA.rain.is_raining)?'Hujan':'Normal', c: (DATA.rain && DATA.rain.is_raining)?RC.High:RC.Low, tr: rainTrend},
        {p:'Temperature (AWS)', v: tempAny?`${fmt(tempAny.latest_value,1)} ${tempAny.unit||'°C'}`:'—', st:'Normal', c:RC.Low, tr:'<span class="trend-st">→</span>'},
      ];
      const paramTblEl = document.getElementById('paramTbl');
      if(paramTblEl) paramTblEl.innerHTML = rowsParam.map(r=>`
        <tr>
          <td>${esc(r.p)}</td>
          <td>${esc(r.v)}</td>
          <td><span style="color:${r.c};font-weight:950">${esc(r.st)}</span></td>
          <td style="text-align:right">${r.tr}</td>
        </tr>`).join('');

      const latestAlerts = [];
      // Data-outage alerts use the SAME thresholds as the online/health count, so
      // an instrument that trips the alert is also shown offline (and vice-versa).
      Object.entries(INST_FRESH).forEach(([kind,max])=>{
        const h = (m.devHealth||{})[kind]; if(!h || !h.newest) return;
        const mins = (Date.now()-new Date(h.newest).getTime())/60000;
        if(mins > max){
          const severe = mins > max*6;
          latestAlerts.push({
            ttl: `⚠ ${INST_FRESH_LBL[kind]} — no data`,
            lvl: severe?'High':'Medium', lvlC: severe?RC.High:RC.Medium,
            c: severe?RC.High:RC.Medium,
            msg: `No reading for ${agoEn(h.newest).replace(' ago','')} — possible device/network outage`,
            tm: new Date(h.newest).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})
          });
        }
      });
      // EWS trigger crossings (point 5): every UP/DOWN crossing per instrument
      (DATA.ewsAlerts||[]).forEach(a=>{
        const up = a.direction==='UP';
        const c = EWS_COLORS[a.to_level] || RC.Low;
        const lvLbl = EWS_LABELS[a.to_level] || a.to_level;
        const nm = instLocLabel(a.device_name||a.external_device_id||'');
        const toLbl = EWS_LABELS[a.to_level] || a.to_level;
        const fromLbl = EWS_LABELS[a.from_level] || a.from_level;
        const vd = a.velocity_mm_day!=null ? `${fmt(a.velocity_mm_day,2)} mm/day` : '';
        const vr = a.velocity_ratio!=null ? ` · VR ${fmt(a.velocity_ratio,2)}` : '';
        latestAlerts.push({
          ttl: `${nm} ${up?'▲ up':'▼ down'}`,
          lvl: toLbl, lvlC: c,
          c: c,
          msg: `${fromLbl} → ${toLbl} · ${vd}${vr}`,
          tm: a.evaluated_at ? new Date(a.evaluated_at).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '—'
        });
      });
      m.extTriggered.slice(0,6).forEach(s=>{
        const lvl = extStatus(s);
        const c = RC[lvl] || RC.Low;
        latestAlerts.push({
          ttl: `${s.sensor_name||'Extensometer'} (${s.external_device_id||''})`,
          lvl: lvl, lvlC: c,
          c: c,
          msg: `Value ${fmt(s.latest_value,2)} ${s.unit||'mm'} · threshold exceeded`,
          tm: s.latest_ts ? new Date(s.latest_ts).toLocaleString('id-ID') : '—'
        });
      });
      m.inspTriggered.slice(0,4).forEach(r=>{
        latestAlerts.push({
          ttl: `Inspection — ${(DATA.locs||[]).find(l=>l.id===r.location_id)?.name || ('location '+r.location_id)}`,
          lvl: r.risk_final||'—', lvlC: riskColor(r.risk_final),
          c: (r.risk_final==='Very High')?RC['Very High']:RC.High,
          msg: `Inspection risk · score ${r.total_score||0}`,
          tm: r.inspection_date ? new Date(r.inspection_date).toLocaleString('id-ID') : '—'
        });
      });
      const listEl = document.getElementById('latestAlerts');
      listEl.innerHTML = (latestAlerts.length?latestAlerts:([{
        ttl:'No active alerts', lvl:'Low', lvlC:RC.Low, c:'#94a3b8', msg:'All parameters within safe limits', tm:'—'
      }])).slice(0,8).map(a=>`
        <div class="alert" style="--c:${a.c}">
          <div class="a1">
            <div class="ttl">${esc(a.ttl)}</div>
            <span class="risk-pill" style="--rc:${a.lvlC||'#94a3b8'}">● ${esc(a.lvl||'—')}</span>
          </div>
          <div class="a2">${esc(a.msg)}</div>
          <div class="tm">${esc(a.tm)}</div>
        </div>`).join('');
    }

    function buildMap(m){
      const el = document.getElementById('map');
      if(!el) return;

      // Re-init bila container di-render ulang (root.innerHTML ditulis ulang tiap render → node #map lama hilang)
      if(map && map.getContainer() !== el){ try{ map.remove(); }catch(e){} map=null; overlays=null; }

      if(!map){
        // Bahodopi site — center on WOC (primary monitoring area) at zoom 15.
        // Aerial native tiles are zoom 14–19, so we bias toward the upper end so
        // the worker's high-res imagery is always within the loaded range.
        const BAHODOPI_CENTER = [-2.74, 122.014];
        const BAHODOPI_BOUNDS = L.latLngBounds([-2.752, 121.999], [-2.728, 122.029]);
        map = L.map('map', {
          scrollWheelZoom:true, zoomControl:true,
          minZoom:12, maxZoom:22,
          zoomSnap:0.5, zoomDelta:0.5
        });
        // Place zoom control on the right so it doesn't overlap legend (bottom-left)
        map.zoomControl.setPosition('topright');

        // Basemap: ArcGIS satellite (fallback OSM) as wide-zoom base
        const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19, attribution:'Esri World Imagery' });
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19, attribution:'OpenStreetMap' });
        // Aerial PT Vale — high-res imagery for Bahodopi site.
        // The worker's tile coverage is sparse, so we keep aerial OFF at
        // default zoom and only attach it when the user zooms in past
        // AERIAL_THRESHOLD. That way the dashboard opens with a clean
        // satellite view of Bahodopi and aerial only loads on demand.
        const AERIAL_THRESHOLD = 17;
        const aerial = L.tileLayer('https://young-mouse-1ee2.fahmihidyah.workers.dev/{z}/{x}/{y}.jpg', {
          minZoom:1, maxZoom:22, minNativeZoom:16, maxNativeZoom:19, tms:false,
          opacity:1, zIndex:400, errorTileUrl:'',
          attribution:'Aerial PT Vale Bahodopi 2026'
        });
        let satFailed = false;
        sat.on('tileerror', ()=>{ if(!satFailed){ satFailed = true; try{ map.removeLayer(sat); }catch(e){} osm.addTo(map); } });
        // Suppress aerial 404 spam — coverage is intentionally partial.
        aerial.on('tileerror', (e)=>{ try{ e.tile.style.display='none'; }catch(_){} });
        sat.addTo(map);
        // Site map (aerial) stays ON at all zooms; tiles only render where the
        // worker has coverage, the Esri satellite shows through elsewhere.
        aerial.addTo(map);
        map.setView(BAHODOPI_CENTER, 13);

        overlays = {
          halo: L.layerGroup().addTo(map),
          instruments: L.layerGroup().addTo(map),
          inspections: L.layerGroup().addTo(map),
          riskAreas: L.layerGroup().addTo(map),
        };
        // Layer control collapsed by default → only a small icon, doesn't cover the map
        L.control.layers({
          'Satellite (Esri)': sat,
          'Road map (OSM)': osm,
        }, {
          'Site map': aerial,
          'Instrument': overlays.instruments,
          'Inspection': overlays.inspections,
          'Risk Area': overlays.riskAreas,
          'Risk Halo': overlays.halo,
        }, { collapsed:true, position:'topright' }).addTo(map);

        // Remember bounds for fallback when no points are loaded
        map.__bahodopiBounds = BAHODOPI_BOUNDS;
      }

      Object.values(overlays).forEach(g=>g.clearLayers());

      // Inspection latest per location
      const latestIns = {};
      (DATA.insp||[]).forEach(d=>{ if(!latestIns[d.location_id]) latestIns[d.location_id]=d; });
      const locMap = {}; (DATA.locs||[]).forEach(l=>locMap[l.id]=l);

      const points = [];

      // ── Instrument markers from surveyed coordinates (v_instrument_points) ──
      // Symbology encodes INSTRUMENT TYPE; colour encodes RISK level.
      const pdev = (DATA.ews&&DATA.ews.per_device)||[];
      const engLvl = lv => EWS_LABELS[lv] || 'Low';
      const worstOf = arr => arr.reduce((mx,d)=> riskScoreFromLevel(engLvl(d.trigger_level)) > riskScoreFromLevel(mx) ? engLvl(d.trigger_level) : mx, 'Low');
      // Per-type glyph (vector arrow for inclinometer per request) + size.
      const SYMB = {
        inclinometer:{g:'➤',s:20,t:'Inclinometer'},
        extensometer:{g:'◆',s:17,t:'Extensometer'},
        prism:{g:'▲',s:13,t:'Prism'},
        rts:{g:'★',s:17,t:'Robotic Total Station'},
        piezometer:{g:'⬣',s:16,t:'VWP / Piezometer'},
      };
      const _seenLL = {}; // nudge co-located instruments (e.g. two strings in one borehole)
      (DATA.points||[]).forEach(p=>{
        let lat=+p.lat, lng=+p.lng;
        if(!isFinite(lat) || !isFinite(lng)) return;
        const key = lat.toFixed(6)+','+lng.toFixed(6);
        const n = (_seenLL[key] = (_seenLL[key]||0) + 1) - 1;
        if(n>0){ const ang=n*2.39996; lng += Math.cos(ang)*0.00004; lat += Math.sin(ang)*0.00004; }
        const cat = p.category;
        const sym = SYMB[cat] || {g:'●',s:14,t:cat};
        // Risk: extensometer via its device EWS; inclinometer via worst inclinometer
        // EWS level; survey-only instruments (prism/rts) have no automated EWS.
        let lvl=null;
        const ext = p.device_external_id;
        if(cat==='extensometer'){
          const ms = pdev.filter(d=>d.category==='extensometer' && String(d.name||'').toLowerCase().includes(String(p.remark||'').toLowerCase()));
          lvl = ms.length ? worstOf(ms) : 'Low';
        } else if(ext){
          // Any telemetered (device-linked) instrument — inclinometer & VWP. Use its
          // own EWS device risk when present; VWP has no velocity EWS yet, so a live
          // device with no trigger defaults to Low (green), consistent with inclino.
          const ms = pdev.filter(d=>String(d.name||'').includes(String(ext)));
          lvl = ms.length ? worstOf(ms) : 'Low';
        }
        const hasRisk = lvl!=null;
        const col = hasRisk ? (RC[lvl]||RC.Low) : '#94a3b8';
        points.push([lat,lng]);
        if(lvl==='High' || lvl==='Very High'){
          L.circle([lat,lng], { radius:200, color:col, fillColor:col, fillOpacity:0.14, weight:1, className:'halo' })
            .addTo(overlays.halo);
        }
        const pin = L.divIcon({ className:'', html:`<div class="minst" style="color:${col};font-size:${sym.s}px">${sym.g}</div>`, iconSize:[sym.s,sym.s], iconAnchor:[sym.s/2,sym.s/2] });
        const riskTxt = hasRisk ? `<br>Risk: <span style="color:${col};font-weight:900">${esc(lvl)}</span>` : `<br><span style="color:#94a3b8">Survey instrument — no automated EWS</span>`;
        L.marker([lat,lng], { icon: pin })
          .bindPopup(`<b>${esc(p.name||sym.t)}</b><br><span style="color:#9fb3cf">${esc(sym.t)}</span>${riskTxt}`)
          .addTo(overlays.instruments);
      });

      Object.values(latestIns).forEach(r=>{
        const l = locMap[r.location_id];
        const ll = l && locLatLng(l);
        if(!ll) return;
        const lvl = r.risk_final || 'Low';
        const col = RC[lvl] || RC.Low;
        points.push([ll.lat,ll.lng]);
        if(lvl==='High' || lvl==='Very High'){
          L.circle([ll.lat,ll.lng], { radius:260, color:col, fillColor:col, fillOpacity:0.12, weight:1, className:'halo' })
            .addTo(overlays.halo);
        }
        const pin = L.divIcon({ className:'', html:`<div class="marker-pin" style="border-color:${col}">I</div>`, iconSize:[22,22], iconAnchor:[11,11] });
        L.marker([ll.lat,ll.lng], { icon: pin })
          .bindPopup(`<b>${esc(l.name||('Lokasi '+r.location_id))}</b><br>Risiko: <span style="color:${col};font-weight:950">${esc(lvl)}</span><br>Skor: <b>${r.total_score||0}</b>`)
          .addTo(overlays.inspections);
      });

      // Approved risk-area polygons (dari checklist inspeksi, hanya yang sudah divalidasi/approved)
      (DATA.riskAreas||[]).forEach(ra=>{
        const gj = ra.polygon_geojson;
        if(!gj || !gj.geometry) return;
        const col = ra.risk_color || RC[ra.risk_level] || RC.Low;
        let layer;
        try{ layer = L.geoJSON(gj, { style:{ color:col, weight:2, fillColor:col, fillOpacity:0.22, dashArray:'4 3' } }); }
        catch(e){ return; }
        const dt = ra.inspection_date ? esc(String(ra.inspection_date).slice(0,10)) : '-';
        layer.bindPopup(`<b>Risk Area — ${esc(ra.location_name||('Lokasi '+(ra.location_id||'')))}</b><br>`+
          `Level: <span style="color:${col};font-weight:950">${esc(ra.risk_level||'-')}</span>`+
          (ra.tarp_level?` · TARP LV${esc(ra.tarp_level)}`:'')+`<br>`+
          `Skor: <b>${esc(ra.score_total!=null?ra.score_total:'-')}</b><br>`+
          `Inspektur: ${esc(ra.inspector||'-')}<br>Tanggal: ${dt}`);
        layer.addTo(overlays.riskAreas);
        try{ (gj.geometry.coordinates[0]||[]).forEach(c=>points.push([c[1],c[0]])); }catch(e){}
      });

      // Initial view stays at the Bahodopi-area satellite shot we set at
      // map creation. fitBounds only kicks in if data points exist AND the
      // user hasn't already moved the view (zoom > 13 means they interacted).
      // Aerial auto-toggles via the zoomend listener installed above.
      if(points.length && !map._hasInitialView){
        try{
          // Only fit to points within the greater-Bahodopi region so a stray
          // or invalid coordinate (e.g. [0,0]) can't pull the view off-site.
          const region = L.latLngBounds([-2.80,121.95],[-2.68,122.08]);
          const valid = points.filter(p=> p && isFinite(p[0]) && isFinite(p[1]) && region.contains(p));
          if(valid.length){
            map.fitBounds(L.latLngBounds(valid).pad(0.2), { maxZoom:15 });
          }
          // else: keep the Bahodopi center/zoom set at map creation
        } catch(e){ /* keep current view */ }
      }
      map._hasInitialView = true;
      [60,250,600,1200].forEach(d=>setTimeout(()=>{ try{ map.invalidateSize(); }catch(e){} }, d));
      if(!window.__mapResizeBound){ window.__mapResizeBound=true; window.addEventListener('resize',()=>{ try{ map && map.invalidateSize(); }catch(e){} }); }
    }

    function donut(canvasId, valuePct, col){
      const cv = document.getElementById(canvasId);
      if(!cv || !window.Chart) return null;
      return new Chart(cv, {
        type:'doughnut',
        data:{ datasets:[{
          data:[valuePct, Math.max(0,100-valuePct)],
          backgroundColor:[col, 'rgba(148,163,184,.12)'],
          borderWidth:0,
          cutout:'72%',
        }]},
        options:{
          responsive:true,
          maintainAspectRatio:false,
          plugins:{ legend:{display:false}, tooltip:{enabled:false} }
        }
      });
    }

    function drawCharts(m, st){
      // Cleanup
      Object.values(charts).forEach(c=>{ try{ c.destroy(); }catch(e){} });
      charts = {};

      // Risk donut: location risk composition (Low/Medium/High/Very High)
      const rdCv = document.getElementById('riskDonut');
      if(rdCv && window.Chart){
        charts.risk = new Chart(rdCv, {
          type:'doughnut',
          data:{ datasets:[{
            data:[ m.inspByRisk['Low']||0, m.inspByRisk['Medium']||0, m.inspByRisk['High']||0, m.inspByRisk['Very High']||0 ],
            backgroundColor:[RC.Low, RC.Medium, RC.High, RC['Very High']],
            borderWidth:0, cutout:'72%'
          }]},
          options:{ responsive:true, maintainAspectRatio:false, plugins:{legend:{display:false}, tooltip:{enabled:false}}, animation:false }
        });
      }

      // Risk summary donut (composition)
      const cv1 = document.getElementById('riskSummaryDonut');
      if(cv1 && window.Chart){
        charts.riskSummary = new Chart(cv1,{
          type:'doughnut',
          data:{
            labels:['High','Medium','Low'],
            datasets:[{
              data:[
                (m.inspByRisk['Very High']||0) + (m.inspByRisk['High']||0),
                (m.inspByRisk['Medium']||0),
                (m.inspByRisk['Low']||0),
              ],
              backgroundColor:[RC.High, RC.Medium, RC.Low],
              borderWidth:0,
              cutout:'68%',
            }]
          },
          options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} } }
        });
      }

      // Spark charts (7 days)
      // Pass raw rows — sparkLine() will buildSpark() internally. Wrapping
      // it here in buildSpark() returned {ts,vals} and then crashed inside
      // sparkLine when it tried to .filter() on that object.
      // Bottom instrument cards: sparkline + latest value + delta vs ~yesterday
      const fillInstCard = (canvasId, rows, color, valId, deltaId, unit, isRain)=>{
        sparkLine(canvasId, rows, color, ()=>{}, isRain);
        const s = buildSpark(rows||[]);
        const latest = s.vals.length ? s.vals[s.vals.length-1] : null;
        const vEl = document.getElementById(valId);
        if(vEl) vEl.textContent = latest==null ? '—' : `${fmt(latest,2)} ${unit}`;
        let delta = null;
        if(s.ts.length){
          const lastT = new Date(s.ts[s.ts.length-1]).getTime();
          for(let i=s.ts.length-1;i>=0;i--){
            if(lastT - new Date(s.ts[i]).getTime() >= 20*3600*1000){ delta = latest - s.vals[i]; break; }
          }
        }
        const dEl = document.getElementById(deltaId);
        if(dEl){
          if(isRain){
            // Rain has no meaningful "vs yesterday" level — the latest reading is
            // an instantaneous per-minute rate. Show the 24h accumulation instead
            // so this card ties to the Rainfall (24H) chart above.
            const r24 = ((DATA.rain24)||[]).filter(r=>(r.sensor_name||'').includes('RainFall Hourly'));
            const tot = r24.reduce((s,r)=>s+(+r.value||0),0);
            dEl.innerHTML = `<span style="color:#9fb3cf">24h total: <b style="color:#38bdf8">${fmt(tot,1)} mm</b></span>`;
          } else if(delta==null){
            dEl.innerHTML = `<span style="color:#94a3b8">— vs yesterday</span>`;
          } else if(Math.abs(delta)<0.005){
            dEl.innerHTML = `<span style="color:#94a3b8">→ no change vs yesterday</span>`;
          } else {
            dEl.innerHTML = `<span style="color:${delta>0?RC.High:RC.Low}">${delta>0?'▲':'▼'} ${fmt(Math.abs(delta),2)} ${unit}</span> <span style="color:#94a3b8">vs yesterday</span>`;
          }
        }
      };

      const extRows = (DATA.ext7||[]).filter(r=>r && r.external_device_id && r.sensor_name);
      fillInstCard('sparkExt', extRows, '#a78bfa', 'bExtVal', 'bExtDelta', 'mm', false);

      // Top displacement from the DB single-source series (A-axis), pick the most-moved node
      let incRows = [];
      try{
        const byDev={};
        (DATA.incTop||[]).forEach(r=>{ if(r.axis!=='A') return; const id=String(r.external_device_id);
          (byDev[id]=byDev[id]||[]).push({ts:r.ts, value:+r.value}); });
        let best=null, bestAbs=-1;
        for(const id of Object.keys(byDev)){
          const s=byDev[id].slice().sort((a,b)=>new Date(a.ts)-new Date(b.ts)); if(!s.length) continue;
          const la=Math.abs(s[s.length-1].value||0);
          if(la>bestAbs){ bestAbs=la; best=s; }
        }
        if(best) incRows = best;
      }catch(e){}
      fillInstCard('sparkIp', incRows, '#f59e0b', 'bIncVal', 'bIncDelta', 'mm', false);

      let vwpRows = [];
      try{
        const vwpProc = processVwp(DATA.vwp7||[]);
        for(const dev of Object.values(vwpProc)){
          for(const rws of Object.values(dev.channels||{})){ if(rws && rws.length){ vwpRows = rws.map(r=>({ts:r.ts, value:r.value})); break; } }
          if(vwpRows.length) break;
        }
      }catch(e){}
      fillInstCard('sparkVwp', vwpRows, '#22c55e', 'bVwpVal', 'bVwpDelta', 'kPa', false);

      const rain = (DATA.wx7||[]).filter(r=>(r.sensor_name||'').toLowerCase().includes('rainfall minute'));
      fillInstCard('sparkRain', rain, '#38bdf8', 'bRainVal', 'bRainDelta', 'mm/min', true);


      // Spiking-instrument badge: fastest-moving device per category from EWS.
      // Shows the instrument LOCATION name + clear up/down/stable direction.
      const fillSpike = (elId, cat)=>{
        const el = document.getElementById(elId); if(!el) return;
        const devs = ((DATA.ews&&DATA.ews.per_device)||[]).filter(d=>d.category===cat);
        if(!devs.length){ el.innerHTML=''; return; }
        // Only VALID devices have a trustworthy velocity. If every device is
        // ABSTAIN (readings older than the QC window) velocity is forced to 0 —
        // show that honestly instead of a misleading "stable 0.00".
        const valid = devs.filter(d=>d.qc==='VALID');
        if(!valid.length){
          el.innerHTML = `<span style="font-size:10px;color:#94a3b8" title="Latest readings are older than the EWS QC window, so velocity can't be computed yet (data lagging).">⏳ awaiting fresh data</span>`;
          return;
        }
        const rank = {MERAH:4,JINGGA:3,KUNING:2,HIJAU:1};
        const t = valid.reduce((a,b)=>{
          const ra=rank[a.trigger_level||'HIJAU'], rb=rank[b.trigger_level||'HIJAU'];
          if(rb!==ra) return rb>ra?b:a;
          return (Math.abs(b.velocity_mm_day||0)>Math.abs(a.velocity_mm_day||0))?b:a;
        });
        const lv = t.trigger_level||'HIJAU';
        const c = EWS_COLORS[lv]||'#94a3b8';
        const nm = instLocLabel(t.name);
        const v = +t.velocity_mm_day||0;
        const dir = v>0.05 ? {a:'▲',w:'rising'} : v<-0.05 ? {a:'▼',w:'falling'} : {a:'→',w:'stable'};
        const rate = fmt(Math.abs(v),2)+' mm/day';
        const lvlTxt = EWS_LABELS[lv]||lv;
        const tip = `Most-active ${cat}: ${nm} — ${dir.w} ${rate} (${lvlTxt})`;
        el.innerHTML = (lv==='HIJAU')
          ? `<span style="font-size:10px;color:#94a3b8" title="${esc(tip)}">${dir.a} ${esc(nm)} · ${dir.w} ${esc(rate)}</span>`
          : `<span style="font-size:10px;font-weight:700;color:${c}" title="${esc(tip)}">⚠ ${esc(nm)} · ${esc(lvlTxt)} · ${dir.a} ${dir.w} ${esc(rate)}</span>`;
      };
      fillSpike('spikeExt','extensometer');
      fillSpike('spikeInc','inclinometer');

      // Rainfall (24H) bar chart (point 6)
      (function(){
        const cv = document.getElementById('rain24Chart'); if(!cv || !window.Chart) return;
        const rows = ((DATA.rain24)||[]).filter(r=>(r.sensor_name||'').includes('RainFall Hourly'))
                       .sort((a,b)=>String(a.ts).localeCompare(String(b.ts)));
        const labels = rows.map(r=>new Date(r.ts).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}));
        const vals = rows.map(r=>+r.value||0);
        const total = vals.reduce((s,v)=>s+v,0);
        const mx = vals.reduce((m,v)=>Math.max(m,v),0);
        const lab = mx>50?{t:'Extreme',c:RC['Very High']} : mx>30?{t:'Heavy',c:RC.High}
                  : mx>10?{t:'Moderate',c:RC.Medium} : mx>0?{t:'Light',c:'#38bdf8'} : {t:'Dry',c:'#94a3b8'};
        const tEl=document.getElementById('rain24Total'); if(tEl) tEl.textContent = total.toFixed(1)+' mm';
        const lEl=document.getElementById('rain24Lbl'); if(lEl){ lEl.textContent = lab.t; lEl.style.color = lab.c; }
        if(_rain24Chart){ try{_rain24Chart.destroy()}catch(e){} _rain24Chart=null; }
        _rain24Chart = new Chart(cv, {
          type:'bar',
          data:{ labels, datasets:[{ data:vals, backgroundColor:'#38bdf8', borderRadius:2, barPercentage:0.95, categoryPercentage:0.96 }] },
          options:{ responsive:true, maintainAspectRatio:false, animation:false,
            plugins:{ legend:{display:false}, tooltip:{callbacks:{label:c=>' '+c.parsed.y.toFixed(1)+' mm'}} },
            scales:{ x:{ticks:{maxTicksLimit:8,color:'#9fb3cf',font:{size:8}},grid:{display:false}},
                     y:{beginAtZero:true,ticks:{color:'#9fb3cf',font:{size:8}},grid:{color:'rgba(148,163,184,.08)'}} } }
        });
      })();
    }

    function buildSpark(rows, predicate){
      const r = (rows||[]).filter(x=>x&&x.ts&&isFinite(+x.value));
      if(predicate) r.filter(predicate);
      // ambil 1 seri representatif (nilai median per timestamp)
      const byT = {};
      r.forEach(x=>{ (byT[x.ts]=byT[x.ts]||[]).push(+x.value); });
      const ts = Object.keys(byT).sort();
      const vals = ts.map(t=>{
        const arr = byT[t].sort((a,b)=>a-b);
        return arr[Math.floor(arr.length/2)];
      });
      return { ts, vals };
    }

    function sparkLine(canvasId, rows, color, setLabel, isRain=false){
      const cv = document.getElementById(canvasId);
      if(!cv || !window.Chart) return;
      const s = buildSpark(rows);
      const labels = s.ts.map(t=>new Date(t).toLocaleDateString('en-US',{month:'short',day:'2-digit'}));
      const vals = s.vals;
      const latest = vals.length ? vals[vals.length-1] : null;
      setLabel(latest==null ? '—' : (isRain ? `${fmt(latest,2)} mm/min` : `${fmt(latest,2)}`));

      charts['spark_'+canvasId] = new Chart(cv,{
        type:'line',
        data:{ labels, datasets:[{
          data:vals,
          borderColor:color,
          backgroundColor:color,
          borderWidth:1.6,
          pointRadius:0,
          tension:.28,
          fill:false,
        }]},
        options:{
          responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{display:false}, tooltip:{enabled:false} },
          scales:{
            x:{ display:false },
            y:{ display:false }
          }
        }
      });
    }

    function exportDashboard(){
      // sederhana: cetak halaman (user bisa save as PDF)
      window.print();
    }

    function setView(v){ STATE.view=v; closeSidebar(); if(needsRealtime()) subscribeRealtime(); else unsubscribeRealtime(); loadAll(); }

    // ── Dashboard carousel (auto 20s + manual) ──
    const DASHBOARDS = [
      {view:'overview', name:'Executive'},
      {view:'trends',   name:'Monitoring'},
      {view:'inspection', name:'Inspection'},
    ];
    let _carouselTimer = null;
    function carouselIdx(){ const i = DASHBOARDS.findIndex(d=>d.view===STATE.view); return i<0?0:i; }
    function carouselGo(delta){ const i=(carouselIdx()+delta+DASHBOARDS.length)%DASHBOARDS.length; carouselTouch(); setView(DASHBOARDS[i].view); }
    function carouselTouch(){ /* manual nav resets the 20s timer so it doesn't jump right after */ if(STATE.carouselOn) carouselArm(); }
    function carouselToggle(){ STATE.carouselOn = !STATE.carouselOn; carouselArm(); updateCarouselUI(); }
    function carouselArm(){
      if(_carouselTimer){ clearInterval(_carouselTimer); _carouselTimer=null; }
      if(STATE.carouselOn){
        _carouselTimer = setInterval(()=>{
          if(document.hidden) return;
          if(DASHBOARDS.some(d=>d.view===STATE.view)) carouselGo(1);
        }, 20000);
      }
    }
    function updateCarouselUI(){
      const idx = carouselIdx();
      const dots = document.getElementById('carDots');
      if(dots) dots.innerHTML = DASHBOARDS.map((d,i)=>`<span class="cdot${i===idx?' on':''}" title="${esc(d.name)}" onclick="setView('${d.view}')"></span>`).join('');
      const btn = document.getElementById('carToggle'); if(btn) btn.textContent = STATE.carouselOn?'⏸':'▶';
      const nm = document.getElementById('carName'); if(nm) nm.textContent = (DASHBOARDS[idx]||{}).name||'';
    }
    window.carouselGo=carouselGo; window.carouselToggle=carouselToggle;

    function toggleSidebar(){ const s=document.querySelector('.sidebar'), sc=document.querySelector('.scrim'); if(s) s.classList.toggle('open'); if(sc) sc.classList.toggle('show', !!(s&&s.classList.contains('open'))); }
    function closeSidebar(){ const s=document.querySelector('.sidebar'), sc=document.querySelector('.scrim'); if(s) s.classList.remove('open'); if(sc) sc.classList.remove('show'); }
    window.setView=setView;
    window.toggleSidebar=toggleSidebar;
    window.renderExt=renderExt;
    window.renderAwsRaw=renderAwsRaw;
    window.exportTable=exportTable;
    window.loadAll=loadAll;
    window.exportDashboard=exportDashboard;

    (async()=>{
      const ok = await GMS.guard({ mount:'#root' });
      if(!ok) return;
      await loadAll();
      subscribeEws();
      // Live wall-clock: tick every second so the header time is true real-time.
      updateClock();
      setInterval(updateClock, 1000);
      // Egress saver: only poll when tab is visible; refresh immediately when user returns.
      // In live mode poll every 30s; otherwise every 2 min.
      setInterval(()=>{
        if(!GMS.isOnline() || document.hidden) return;
        if(needsRealtime()) loadAll().catch(()=>{});
      }, 30000);
      setInterval(()=>{
        if(!GMS.isOnline() || document.hidden) return;
        if(!needsRealtime()) loadAll().catch(()=>{});
      }, 120000);
      document.addEventListener('visibilitychange',()=>{ if(!document.hidden && GMS.isOnline()) loadAll().catch(()=>{}); });
    })();
  </script>
</body>
