<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1f3a">
<link rel="manifest" href="manifest.json">
<title>Monitoring Terintegrasi — Bahodopi</title>
<link rel="stylesheet" href="common.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="common.js"></script>
<style>
  .wrap{max-width:1180px;}
  .grid-kpi{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px;}
  @media(min-width:760px){.grid-kpi{grid-template-columns:repeat(4,1fr);}}
  .kpi{border-radius:14px;padding:14px 16px;color:#fff;}
  .kpi .v{font-size:30px;font-weight:800;line-height:1;}
  .kpi .l{font-size:11px;opacity:.92;margin-top:5px;}
  .kpi .s{font-size:11px;opacity:.85;}
  .sec-h{font-size:12px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--txt2);margin:22px 0 10px;display:flex;align-items:center;gap:8px;}
  .sec-h .ln{flex:1;height:1px;background:var(--line);}
  .cards{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;}
  @media(min-width:620px){.cards{grid-template-columns:repeat(3,1fr);}}
  @media(min-width:920px){.cards{grid-template-columns:repeat(4,1fr);}}
  .card{background:#fff;border:1px solid var(--line);border-radius:13px;padding:13px;border-top:3px solid var(--c,#94a3b8);}
  .card .ic{font-size:18px;}
  .card .nm{font-size:11px;color:var(--mut);font-weight:600;margin-top:2px;}
  .card .val{font-size:24px;font-weight:800;margin-top:6px;}
  .card .val small{font-size:12px;font-weight:600;color:var(--mut);}
  .card .sub{font-size:10px;color:var(--mut2);margin-top:3px;}
  .ext .card{border-top-color:#ea580c;}
  .spark{margin-top:6px;}
  .lrow{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid var(--line);border-radius:11px;background:#fff;margin-bottom:7px;text-decoration:none;color:var(--txt);}
  .lrow .bar{width:5px;height:32px;border-radius:3px;background:var(--c);}
  .stale{color:#dc2626;font-weight:700;}
  .twocol{display:grid;grid-template-columns:1fr;gap:16px;}
  @media(min-width:860px){.twocol{grid-template-columns:1fr 1fr;}}
</style>
</head>
<body>
<div id="hdr"></div>
<div id="app" class="wrap"><div class="center"><div class="spin"></div></div></div>
<script>
"use strict";
const sb=GMS.sb,$=GMS.$,esc=GMS.esc;
const RC={Low:'#16a34a',Medium:'#d97706',High:'#ea580c','Very High':'#dc2626'};
const TARP_LV={1:'Low',2:'Medium',3:'High',4:'Very High'};
const EEWS_C={LV1:'#16a34a',LV2:'#d97706',LV3:'#ea580c',LV4:'#dc2626'};

function ago(ts){ if(!ts) return '—'; const m=Math.round((Date.now()-new Date(ts).getTime())/60000);
  if(m<1) return 'baru saja'; if(m<60) return m+' mnt lalu'; const h=Math.floor(m/60); if(h<24) return h+' jam lalu'; return Math.floor(h/24)+' hr lalu'; }
function isStale(ts,maxMin){ return !ts || (Date.now()-new Date(ts).getTime())/60000 > (maxMin||15); }

// inline sparkline svg
function spark(vals,color){ if(!vals||vals.length<2) return '';
  const w=120,h=30,min=Math.min(...vals),max=Math.max(...vals),rng=(max-min)||1;
  const pts=vals.map((v,i)=>`${(i/(vals.length-1)*w).toFixed(1)},${(h-((v-min)/rng)*h).toFixed(1)}`).join(' ');
  return `<svg class="spark" width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline fill="none" stroke="${color}" stroke-width="1.6" points="${pts}"/></svg>`; }

// AWS weather display config
const WX={
  'AIO Temperature':{ic:'🌡️',c:'#ef4444',lab:'Suhu'},
  'AIO Humidity':{ic:'💧',c:'#0ea5e9',lab:'Kelembapan'},
  'AIO Atmosphere':{ic:'🧭',c:'#6366f1',lab:'Tekanan Udara'},
  'AIO Wind Speed':{ic:'💨',c:'#14b8a6',lab:'Kec. Angin'},
  'AIO Wind Direction':{ic:'🧭',c:'#8b5cf6',lab:'Arah Angin'},
  'AIO Radiation':{ic:'☀️',c:'#f59e0b',lab:'Radiasi'},
  'Misole Rainfall Minute':{ic:'🌧️',c:'#2563eb',lab:'Hujan/menit'},
  'Misole Rainfall Hour':{ic:'🌧️',c:'#1d4ed8',lab:'Hujan/jam'},
};
function fmtVal(s){
  let v=s.latest_value, unit=s.unit;
  if(v==null) return {v:'—',unit:''};
  // koreksi Atmosphere: API label hPa tapi nilainya kPa
  if(s.sensor_type_name==='AIO Atmosphere'){ return {v:(v).toFixed(2), unit:'kPa', extra:'≈ '+(v*10).toFixed(0)+' hPa'}; }
  if(s.sensor_type_name==='AIO Wind Direction'){ const dirs=['U','TL','T','TG','S','BD','B','BL']; const d=dirs[Math.round(v/45)%8]; return {v:v.toFixed(0), unit:'°', extra:d}; }
  const dec = Math.abs(v)>=100?0:(Math.abs(v)>=10?1:2);
  return {v:Number(v).toFixed(dec), unit:unit||''};
}

async function load(){
  const since = new Date(Date.now()-6*3600*1000).toISOString();
  const [sensorsRes, extRes, inspRes, locRes, eqRes] = await Promise.all([
    sb.from('v_instrument_sensors').select('*'),
    sb.from('v_instrument_readings').select('sensor_name,external_device_id,ts,value').eq('kind','extensometer').gte('ts',since).order('ts',{ascending:true}),
    sb.from('inspections').select('id,location_id,inspection_date,inspector,risk_final,tarp_level,total_score,approval_status').order('inspection_date',{ascending:false}),
    sb.from('locations').select('id,name,area_code'),
    sb.from('earthquakes').select('id,magnitude,wilayah,kedalaman,tanggal,status').order('tanggal',{ascending:false}).limit(6),
  ]);
  const sensors=sensorsRes.data||[], ext=extRes.data||[], insp=inspRes.data||[], locs=locRes.data||[], eqs=eqRes.data||[];

  // ---- KPI ----
  const locMap={}; locs.forEach(l=>locMap[l.id]=l);
  const latestIns={}; insp.forEach(d=>{ if(!latestIns[d.location_id]) latestIns[d.location_id]=d; });
  const insRows=Object.values(latestIns);
  const cnt={Low:0,Medium:0,High:0,'Very High':0}; let maxT=0;
  insRows.forEach(r=>{ cnt[r.risk_final]=(cnt[r.risk_final]||0)+1; maxT=Math.max(maxT,r.tarp_level||0); });
  const insLv=TARP_LV[maxT]||'Low';
  const eqLast=eqs[0];
  const eqTarp=eqLast?eqLast.status:'-';
  const extSensors=sensors.filter(s=>s.kind==='extensometer');
  const wxSensors=sensors.filter(s=>s.kind==='weather');
  const newestSensorTs=sensors.reduce((mx,s)=> s.latest_ts&&(!mx||s.latest_ts>mx)?s.latest_ts:mx, null);

  const html=[];
  html.push('<div class="grid-kpi">'+
    kpi(EEWS_C[eqTarp]||'#475569', eqLast?('M '+eqLast.magnitude):'—', 'EEWS · Gempa terbaru', eqLast?(esc((eqLast.wilayah||'').slice(0,28))+' · '+ago(eqLast.tanggal)):'tidak ada data')+
    kpi(RC[insLv]||'#16a34a', 'T'+(maxT||'–'), 'Inspeksi · TARP tertinggi', insRows.length+' lokasi terpantau')+
    kpi('#0891b2', String(extSensors.length), 'Extensometer aktif', 'displacement (mm)')+
    kpi('#0d9488', String(wxSensors.length), 'Sensor AWS aktif', 'cuaca / hidrologi')+
  '</div>');
  html.push('<div class="row" style="justify-content:space-between;margin-bottom:4px"><div style="font-size:11px;color:var(--mut)">Instrumen update: '+(newestSensorTs?ago(newestSensorTs):'—')+(isStale(newestSensorTs,15)?' <span class="stale">(perlu dicek)</span>':'')+'</div><button class="btn" style="padding:6px 11px" onclick="load()">&#8635;</button></div>');

  // ---- EXTENSOMETER ----
  const extSeries={}; ext.forEach(r=>{ const k=r.external_device_id+'·'+r.sensor_name; (extSeries[k]=extSeries[k]||[]).push(r.value); });
  html.push('<div class="sec-h">📏 Extensometer (Displacement)<span class="ln"></span></div>');
  if(extSensors.length){
    html.push('<div class="cards ext">'+extSensors.map(s=>{ const k=s.external_device_id+'·'+s.sensor_name; const series=extSeries[k]||[];
      const f=fmtVal(s);
      return '<div class="card"><div class="row" style="justify-content:space-between"><span class="ic">📏</span>'+
        '<span class="sub">dev '+esc(s.external_device_id)+'</span></div>'+
        '<div class="nm">'+esc(s.sensor_name)+'</div>'+
        '<div class="val">'+f.v+' <small>'+f.unit+'</small></div>'+
        spark(series,'#ea580c')+
        '<div class="sub">'+(s.latest_ts?ago(s.latest_ts):'—')+'</div></div>';
    }).join('')+'</div>');
  } else html.push('<div style="color:var(--mut);font-size:13px">Belum ada data extensometer.</div>');

  // ---- AWS WEATHER ----
  html.push('<div class="sec-h">🌦️ AWS / Cuaca (Vaisala)<span class="ln"></span></div>');
  if(wxSensors.length){
    const order=['AIO Temperature','AIO Humidity','AIO Atmosphere','Misole Rainfall Minute','Misole Rainfall Hour','AIO Wind Speed','AIO Wind Direction','AIO Radiation'];
    const sorted=wxSensors.slice().sort((a,b)=>order.indexOf(a.sensor_type_name)-order.indexOf(b.sensor_type_name));
    html.push('<div class="cards">'+sorted.map(s=>{ const wx=WX[s.sensor_type_name]||{ic:'📟',c:'#64748b',lab:s.sensor_type_name}; const f=fmtVal(s);
      return '<div class="card" style="--c:'+wx.c+'"><div class="row" style="justify-content:space-between"><span class="ic">'+wx.ic+'</span><span class="sub">dev '+esc(s.external_device_id)+'</span></div>'+
        '<div class="nm">'+esc(wx.lab)+'</div>'+
        '<div class="val" style="color:'+wx.c+'">'+f.v+' <small>'+f.unit+'</small></div>'+
        '<div class="sub">'+(f.extra?esc(f.extra)+' · ':'')+(s.latest_ts?ago(s.latest_ts):'—')+'</div></div>';
    }).join('')+'</div>');
  } else html.push('<div style="color:var(--mut);font-size:13px">Belum ada data AWS.</div>');

  // ---- INSPECTION RISK + EEWS LIST ----
  html.push('<div class="twocol" style="margin-top:8px">');
  // inspection
  const sortedIns=insRows.slice().sort((a,b)=>(b.total_score||0)-(a.total_score||0)).slice(0,6);
  html.push('<div><div class="sec-h">⛰️ Risiko Inspeksi<span class="ln"></span></div>'+
    '<div class="row" style="gap:6px;margin-bottom:8px">'+['Low','Medium','High','Very High'].map(k=>'<span class="pill '+k.replace(' ','')+'">'+k+' '+(cnt[k]||0)+'</span>').join('')+'</div>'+
    sortedIns.map(r=>{const l=locMap[r.location_id]||{};const col=RC[r.risk_final]||RC.Low;
      return '<a class="lrow" style="--c:'+col+'" href="report.html?type=inspeksi&id='+r.id+'"><div class="bar"></div><div style="flex:1"><div style="font-weight:700;font-size:13px">'+esc(l.name||('#'+r.location_id))+'</div><div class="sub">'+(r.inspection_date||'').slice(0,10)+' · '+esc(r.approval_status||'')+'</div></div><div style="text-align:right"><b style="color:'+col+'">'+(r.total_score||0)+'</b><div class="sub">TARP'+(r.tarp_level||0)+'</div></div></a>';
    }).join('')+'</div>');
  // eews list
  html.push('<div><div class="sec-h">⚡ Gempa Terkini (EEWS)<span class="ln"></span></div>'+
    eqs.map(e=>{const col=EEWS_C[e.status]||'#475569';
      return '<div class="lrow" style="--c:'+col+'"><div class="bar"></div><div style="flex:1"><div style="font-weight:700;font-size:13px">M '+e.magnitude+' · '+esc((e.wilayah||'').slice(0,30))+'</div><div class="sub">'+esc(e.kedalaman||'')+' · '+ago(e.tanggal)+'</div></div><span class="pill" style="color:'+col+';border:1px solid '+col+'33;background:'+col+'14">'+esc(e.status||'')+'</span></div>';
    }).join('')+'<a class="btn block" style="margin-top:6px;text-decoration:none" href="eews.html">Buka Dashboard EEWS →</a></div>');
  html.push('</div>');

  html.push('<p class="mono" style="font-size:10px;color:var(--mut2);text-align:center;margin-top:18px">Auto-refresh 5 mnt · diperbarui '+new Date().toLocaleTimeString('id-ID')+' · IGP Morowali · PT Vale</p>');

  $("app").innerHTML=html.join('');
}
function kpi(color,v,l,s){ return '<div class="kpi" style="background:'+color+'"><div class="v">'+esc(v)+'</div><div class="l">'+esc(l)+'</div><div class="s">'+esc(s)+'</div></div>'; }
window.load=load;

(async()=>{
  $("hdr").innerHTML=GMS.header("Monitoring Terintegrasi","Bahodopi Block 2 & 3",{net:true,back:true}); GMS.setNet();
  const p=await GMS.guard({mount:"#app"}); if(!p) return;
  await load();
  setInterval(()=>{ if(GMS.isOnline()) load().catch(()=>{}); }, 300000);
  window.addEventListener("online",GMS.setNet); window.addEventListener("offline",GMS.setNet);
})();
</script>
</body>
</html>
