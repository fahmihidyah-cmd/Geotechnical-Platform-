<html lang="id">
<head>
  <meta charset="UTF-8" />

  <meta name="theme-color" content="#071a2e" />
  <link rel="manifest" href="manifest.json" />
  <title>Geotechnical Monitoring — Executive Dashboard</title>

  <!-- Referensi font & token warna tetap mengikuti bundle yang Anda kirim -->
  <link rel="stylesheet" href="common.css" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>

      --bg0:#051426;
      --bg1:#04101f;
      --panel0:#0a2037;
      --panel1:#0b243f;
      --panel2:#0e2c4d;
      --stroke:rgba(148,163,184,.16);
      --stroke2:rgba(148,163,184,.12);
      --txt:#e5e7eb;
      --txt2:#f1f5f9;
      --mut:#94a3b8;
      --mut2:#a8b4c7;
      --blue:#3b82f6;
      --cyan:#22d3ee;
      --green:#22c55e;
      --yellow:#eab308;
      --orange:#f97316;
      --red:#ef4444;
      --shadow:0 14px 40px rgba(2,6,23,.35);

      /* Trigger symbology (sesuai diskusi) */
      --t-low: #22c55e;   /* hijau */
      --t-med: #eab308;   /* kuning */
      --t-high:#f97316;   /* oranye */
      --t-vh:  #ef4444;   /* merah */

    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      color:var(--txt);
      background:
        radial-gradient(1000px 520px at 16% 0%, rgba(59,130,246,.18), rgba(0,0,0,0) 60%),
        radial-gradient(820px 520px at 80% 8%, rgba(34,197,94,.12), rgba(0,0,0,0) 55%),
        linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 100%);
      overflow:hidden; /* target 1 layar laptop */

    .app{display:flex;height:100vh;width:100vw}
    .sidebar{
      width:238px;flex:0 0 238px;
      background:linear-gradient(180deg, rgba(8,26,45,.98) 0%, rgba(5,18,32,.98) 100%);
      border-right:1px solid rgba(148,163,184,.10);
      padding:14px 12px;
      display:flex;flex-direction:column;gap:14px;
    }
    .brand{
      display:flex;align-items:center;gap:10px;
      padding:10px 10px;border-radius:14px;
      background:rgba(2,6,23,.20);
      border:1px solid rgba(148,163,184,.12);
    }
    .logo{
      width:36px;height:36px;border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(59,130,246,.18);border:1px solid rgba(59,130,246,.35);
      color:#bfdbfe;font-weight:900;
    }
    .brand b{font-size:12px;letter-spacing:.06em}
    .brand small{display:block;color:var(--mut);font-size:10px;margin-top:2px}

    .nav{display:flex;flex-direction:column;gap:4px}
    .nav button{
      width:100%;border:none;background:transparent;
      color:#b8c7de;cursor:pointer;
      padding:10px 10px;border-radius:12px;
      display:flex;align-items:center;gap:10px;
      font-size:12px;font-weight:700;
    }
    .nav button:hover{background:rgba(255,255,255,.05)}
    .nav button.act{
      background:linear-gradient(180deg, rgba(59,130,246,.18), rgba(59,130,246,.10));
      border:1px solid rgba(59,130,246,.25);
      color:var(--txt2);
    }
    .ico{
      width:26px;height:26px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(148,163,184,.10);
      border:1px solid rgba(148,163,184,.12);
      color:#cbd5e1;font-size:12px;
      flex:0 0 auto;
    }
    .nav button.act .ico{background:rgba(59,130,246,.18);border-color:rgba(59,130,246,.25);color:#bfdbfe}

    .side-foot{
      margin-top:auto;
      padding:10px;border-radius:14px;
      background:rgba(2,6,23,.18);
      border:1px solid rgba(148,163,184,.12);

    .side-foot .kv b{color:var(--txt2)}
    .side-foot .btn{

    .topbar .spacer{margin-left:auto}

    .tbl{

    .instruments{
      display:grid;
      grid-template-columns:repeat(5,1fr);

    .inst{
      padding:10px 10px;border-radius:14px;

    .inst .nm{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#9fb3cf;font-weight:900}
    .inst .v{font-size:14px;font-weight:950}
    .inst .s{font-size:11px;color:var(--mut2)}

    .two-stack{display:grid;grid-template-rows: 0.52fr 0.48fr;gap:10px;min-height:0}
    .alerts-stack{display:grid;grid-template-rows: 0.46fr 0.54fr;gap:10px;min-height:0}

    .sparks{
      display:grid;grid-template-columns:repeat(2,1fr);
      gap:10px;

      overflow:auto;
      padding-right:4px;
    }
    .alert{
      padding:10px 10px;border-radius:14px;
      background:rgba(2,6,23,.18);
      border:1px solid rgba(148,163,184,.12);
      min-width:0;

    .alert .a1{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .alert .ttl{font-weight:950}
    .alert .sev{font-size:11px;font-weight:950;color:var(--c)}

    .alert .tm{margin-top:7px;font-size:10.5px;color:#9fb3cf}

    /* Compact for laptop */
    @media (max-height: 820px) and (min-width: 1100px){
      .topbar{height:52px}
      .page{padding:10px}

    .marker-pin{
      width:22px;height:22px;border-radius:999px;
      display:flex;align-items:center;justify-content:center;

      border:2px solid #fff;
      box-shadow:0 10px 20px rgba(2,6,23,.45);
      color:#fff;font-weight:950;font-size:11px;

    .halo{filter:drop-shadow(0 12px 20px rgba(2,6,23,.5))}

<body>
  <div id="root">
    <div class="center" style="min-height:100vh"><div class="spin"></div></div>
  </div>

  <script>
    "use strict";
    const sb = GMS.sb, esc = GMS.esc;

    const RC = { Low:getCss('--t-low'), Medium:getCss('--t-med'), High:getCss('--t-high'), 'Very High':getCss('--t-vh') };
    const EEWS_C = { LV1:RC.Low, LV2:RC.Medium, LV3:RC.High, LV4:RC['Very High'] };

    const STATE = { view:'overview' };
    let DATA = {};
    let map = null;
    let overlays = null;
    let charts = {};

    function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
    function num(x){ const n = parseFloat(x); return isNaN(n) ? null : n; }
    function ago(ts){
      if(!ts) return '—';
      const m=Math.round((Date.now()-new Date(ts).getTime())/60000);
      if(m<1) return 'baru saja';
      if(m<60) return m+' mnt';
      const h=Math.floor(m/60);
      if(h<24) return h+' jam';
      return Math.floor(h/24)+' hr';
    }
    function stale(ts,mx){ return !ts || (Date.now()-new Date(ts).getTime())/60000 > (mx||15); }
    function fmt(n,dec){ const x=Number(n); if(!isFinite(x)) return '—'; return x.toFixed(dec ?? (Math.abs(x)>=100?0:Math.abs(x)>=10?1:2)); }

    function extStatus(s){
      const v = Math.abs(s.latest_value || 0);
      const th = s.thresholds || {};
      const rtc = num(th.rtc), rtw = num(th.rtw);
      if(rtc!=null && v>=rtc) return 'Very High';
      if(rtw!=null && v>=rtw) return 'High';
      return 'Low';
    }
    function riskScoreFromLevel(lvl){
      return ({Low:1, Medium:2, High:3, 'Very High':4}[lvl] || 1);
    }
    function riskLabelFromIndex(x){
      // dipakai seperti screenshot: Low/Moderate/High
      if(x>=70) return {t:'High', c:RC['Very High']};
      if(x>=40) return {t:'Moderate', c:RC.High};
      return {t:'Low', c:RC.Low};
    }

    function linearRegression(points){
      const pts = (points||[]).filter(p=>isFinite(p.x)&&isFinite(p.y));
      if(pts.length<2) return null;
      let n=pts.length, sx=0, sy=0, sxx=0, sxy=0;
      for(const p of pts){ sx+=p.x; sy+=p.y; sxx+=p.x*p.x; sxy+=p.x*p.y; }
      const den = (n*sxx - sx*sx);
      if(Math.abs(den) < 1e-12) return null;
      const b = (n*sxy - sx*sy) / den;
      const a = (sy - b*sx) / n;
      return {a,b};
    }

    function seriesStats(rows){
      const r=(rows||[]).filter(x=>x&&x.ts&&isFinite(+x.value)).map(x=>({t:new Date(x.ts).getTime(), v:+x.value})).sort((a,b)=>a.t-b.t);
      if(r.length<2) return {n:r.length, mmPerDay:null, delta:null, last:null};
      const reg = linearRegression(r.map(p=>({x:p.t,y:p.v})));
      const mmPerDay = reg ? reg.b * 86400000 : null;
      const delta = r[r.length-1].v - r[0].v;
      return { n:r.length, mmPerDay, delta, last:r[r.length-1] };
    }

    function parseRange(range){
      const h = { '24h':24, '7d':7*24, '30d':30*24 }[range] || 24;
      return new Date(Date.now()-h*3600*1000).toISOString();
    }

    async function loadAll(){
      const since24 = parseRange('24h');
      const since7d = parseRange('7d');

      const [sn,rain,insp,loc,eq,ext24,wx24,ext7,wx7] = await Promise.all([
        sb.from('v_instrument_sensors').select('*'),
        sb.from('v_rain_status').select('*'),
        sb.from('inspections').select('id,location_id,inspection_date,inspector,risk_final,tarp_level,total_score,approval_status').order('inspection_date',{ascending:false}),
        sb.from('locations').select('id,name,area_code,lat,lng,easting,northing'),
        sb.from('earthquakes').select('id,magnitude,wilayah,kedalaman,tanggal,status').order('tanggal',{ascending:false}).limit(8),
        sb.from('v_instrument_readings').select('sensor_name,external_device_id,ts,value').eq('kind','extensometer').gte('ts',since24).order('ts',{ascending:true}),
        sb.from('v_instrument_readings').select('sensor_name,ts,value').eq('kind','weather').gte('ts',since24).order('ts',{ascending:true}),
        sb.from('v_instrument_readings').select('sensor_name,external_device_id,ts,value').eq('kind','extensometer').gte('ts',since7d).order('ts',{ascending:true}),
        sb.from('v_instrument_readings').select('sensor_name,ts,value').eq('kind','weather').gte('ts',since7d).order('ts',{ascending:true}),
      ]);

      DATA = {
        sensors:sn.data||[],
        rain:(rain.data||[])[0]||{},
        insp:insp.data||[],
        locs:loc.data||[],
        eq:eq.data||[],
        ext24:ext24.data||[],
        wx24:wx24.data||[],
        ext7:ext7.data||[],
        wx7:wx7.data||[],
      };

      render();
    }

    function utm(e,n){
      const a=6378137,ec=0.00669438,k0=0.9996,x=e-500000,y=n-10000000,M=y/k0;
      const mu=M/(a*(1-ec/4-3*ec*ec/64)),e1=(1-Math.sqrt(1-ec))/(1+Math.sqrt(1-ec));
      const phi=mu+(3*e1/2-27*e1**3/32)*Math.sin(2*mu)+(21*e1**2/16-55*e1**4/32)*Math.sin(4*mu)+(151*e1**3/96)*Math.sin(6*mu);
      const N=a/Math.sqrt(1-ec*Math.sin(phi)**2),T=Math.tan(phi)**2,C=(ec/(1-ec))*Math.cos(phi)**2,R=a*(1-ec)/(1-ec*Math.sin(phi)**2)**1.5,D=x/(N*k0);
      const lat=phi-(N*Math.tan(phi)/R)*(D*D/2-(5+3*T+10*C-4*C*C-9*ec)*D**4/24);
      const lng=(123*Math.PI/180)+(D-(1+2*T+C)*D**3/6)/Math.cos(phi);
      return{lat:lat*180/Math.PI,lng:lng*180/Math.PI};
    }
    function locLatLng(l){
      if(l.lat && l.lng) return {lat:+l.lat, lng:+l.lng};
      if(l.easting && l.northing) return utm(+l.easting,+l.northing);
      return null;
    }

    function compute(){
      const sensors = DATA.sensors||[];
      const totalSensors = sensors.length;
      const onlineSensors = sensors.filter(s=>!stale(s.latest_ts,15)).length;
      const offlineSensors = totalSensors - onlineSensors;
      const newest = sensors.reduce((mx,s)=>s.latest_ts && (!mx||s.latest_ts>mx) ? s.latest_ts : mx, null);

      // inspections latest by location
      const latestIns = {};
      (DATA.insp||[]).forEach(d=>{ if(!latestIns[d.location_id]) latestIns[d.location_id]=d; });
      const insRows = Object.values(latestIns);

      const inspByRisk = { 'Very High':0, High:0, Medium:0, Low:0 };
      insRows.forEach(r=>{
        const k = (r.risk_final||'Low');
        inspByRisk[k] = (inspByRisk[k]||0) + 1;
      });

      const extTriggered = sensors.filter(s=>s.kind==='extensometer' && extStatus(s)!=='Low');
      const inspTriggered = insRows.filter(r=>r.risk_final==='High'||r.risk_final==='Very High');
      const totalAlerts = extTriggered.length + inspTriggered.length;

      // risk index (0-100) from inspection distribution
      const locCount = Math.max(insRows.length, 1);
      const raw = insRows.reduce((sum,r)=>sum + riskScoreFromLevel(r.risk_final||'Low'), 0);
      const riskIndex = Math.round((raw/(locCount*4))*100);
      const riskLabel = riskLabelFromIndex(riskIndex);

      // last inspection
      const lastInsp = (DATA.insp||[])[0] || null;

      // next inspection: placeholder +7d from last
      const nextInspDate = lastInsp && lastInsp.inspection_date ? new Date(new Date(lastInsp.inspection_date).getTime()+7*86400000) : null;

      // active instruments by type (unique device count)
      const kindMap = {};
      sensors.forEach(s=>{
        const k = s.kind || 'other';
        const id = String(s.external_device_id || s.sensor_id || s.sensor_name || Math.random());
        (kindMap[k]=kindMap[k]||new Set()).add(id);
      });
      const activeInstruments = onlineSensors; // tampil sebagai "X / X" seperti referensi

      // Alerts breakdown (watch/warning/critical)
      const warn = sensors.filter(s=>s.kind==='extensometer' && extStatus(s)==='High').length;
      const critical = sensors.filter(s=>s.kind==='extensometer' && extStatus(s)==='Very High').length;
      const watch = Math.max(0, totalAlerts - warn - critical);

      return {
        totalSensors, onlineSensors, offlineSensors, newest,
        insRows, inspByRisk,
        totalAlerts, extTriggered, inspTriggered,
        riskIndex, riskLabel,
        lastInsp, nextInspDate,
        activeInstruments, watch, warn, critical,
      };
    }

    function overallStatus(metrics){
      // Meniru gaya "NORMAL" seperti referensi
      if(metrics.critical>0 || metrics.riskIndex>=70) return {t:'WASPADA', c:RC['Very High'], sub:'Critical condition detected'};
      if(metrics.totalAlerts>0 || metrics.riskIndex>=40) return {t:'PERHATIAN', c:RC.High, sub:'Attention required on triggered points'};
      return {t:'NORMAL', c:RC.Low, sub:'All monitored parameters within normal range'};
    }

    // ====== Time-series + trendline (tab instrumen) ======
    function groupBySensor(rows){
      const g={};
      (rows||[]).forEach(r=>{ const k=(r.external_device_id?('dev '+r.external_device_id+' · '):'')+r.sensor_name; (g[k]=g[k]||[]).push(r); });
      return g;
    }
    function byName(rows, sub){
      const s=sub.toLowerCase();
      return (rows||[]).filter(r=>(r.sensor_name||'').toLowerCase().includes(s)).slice().sort((a,b)=>new Date(a.ts)-new Date(b.ts));
    }
    function multiSeries(seriesList){
      const tset=new Set();
      seriesList.forEach(s=>(s.rows||[]).forEach(r=>tset.add(r.ts)));
      const ts=[...tset].sort();
      const labels=ts.map(t=>new Date(t).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}));
      const datasets=seriesList.map(s=>{ const m={}; (s.rows||[]).forEach(r=>m[r.ts]=(isFinite(+r.value)?+r.value:null));
        return {label:s.name,data:ts.map(t=>m[t]??null),borderColor:s.color,backgroundColor:s.color,borderWidth:1.6,pointRadius:0,tension:.25,spanGaps:true,fill:false}; });
      return {labels,datasets};
    }
    function addTrend(ms,color){
      if(!ms.datasets.length) return;
      const d0=ms.datasets[0].data;
      const pts=d0.map((y,i)=>({x:i,y})).filter(p=>p.y!=null&&isFinite(p.y));
      const reg=linearRegression(pts); if(!reg) return;
      ms.datasets.push({label:'Trendline',data:d0.map((_,i)=>reg.a+reg.b*i),borderColor:color||'#fbbf24',borderDash:[6,4],borderWidth:1.5,pointRadius:0,fill:false,tension:0,order:99});
    }
    function tsChart(canvasId,ms,unit){
      const cv=document.getElementById(canvasId); if(!cv||!window.Chart) return;
      charts[canvasId]=new Chart(cv,{type:'line',data:{labels:ms.labels,datasets:ms.datasets},
        options:{responsive:true,maintainAspectRatio:false,animation:false,interaction:{mode:'index',intersect:false},
          plugins:{legend:{display:true,labels:{color:'#cbd5e1',font:{size:9},boxWidth:10,boxHeight:8}}},
          scales:{x:{ticks:{maxTicksLimit:6,color:'#9fb3cf',font:{size:8}},grid:{display:false}},
                  y:{ticks:{color:'#9fb3cf',font:{size:9}},grid:{color:'rgba(148,163,184,.10)'},title:{display:!!unit,text:unit||'',color:'#9fb3cf',font:{size:9}}}}}});
    }

    function drawInstrumentCharts(){

        const st=seriesStats(ext[k]); const el=document.getElementById('extrate_'+i);
        if(el&&st.mmPerDay!=null) el.textContent=(st.mmPerDay>=0?'+':'')+fmt(st.mmPerDay,3)+' mm/hari';
      });
      tsChart('awsRain', multiSeries([{name:'Hujan/menit (mm)',rows:byName(DATA.wx7,'rainfall minute'),color:'#38bdf8'},{name:'Hujan/jam (mm)',rows:byName(DATA.wx7,'rainfall hour'),color:'#1d4ed8'}]),'mm');

      tsChart('awsWR', multiSeries([{name:'Angin (m/s)',rows:byName(DATA.wx7,'wind speed'),color:'#22c55e'},{name:'Radiasi (W/m²)',rows:byName(DATA.wx7,'radiation'),color:'#f97316'}]));

    function fillOverview(m, st){
      // KPI
      const overallEl = document.getElementById('kOverall');
      overallEl.textContent = st.t;

      document.getElementById('kAlerts').textContent = m.totalAlerts;
      document.getElementById('kWarn').textContent = `${m.warn} Warning`;
      document.getElementById('kWatch').textContent = `${m.watch} Watch`;
      document.getElementById('kCritical').textContent = `${m.critical} Critical`;

      document.getElementById('kActive').textContent = `${m.onlineSensors} / ${m.totalSensors}`;
      document.getElementById('kActiveSub').textContent = (m.totalSensors?`${Math.round((m.onlineSensors/m.totalSensors)*100)}% Online`:'—');

      const last = m.lastInsp && m.lastInsp.inspection_date ? new Date(m.lastInsp.inspection_date) : null;
      document.getElementById('kLastInsp').textContent = last ? last.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}) : '—';
      document.getElementById('kLastInspSub').textContent = m.lastInsp ? `Routine inspection · ${m.lastInsp.inspector||'—'}` : 'Belum ada inspeksi';

      const nxt = m.nextInspDate;
      document.getElementById('kNextInsp').textContent = nxt ? nxt.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}) : '—';
      document.getElementById('kNextInspSub').textContent = nxt ? `Planned inspection` : '—';

      // Ringkasan risiko list (seperti referensi)
      const totalLoc = m.insRows.length;
      document.getElementById('kLocTotal').textContent = totalLoc || '—';
      const list = document.getElementById('riskSummaryList');
      const rows = [
        ['Risiko Tinggi', m.inspByRisk['Very High'] + m.inspByRisk['High'], RC.High],
        ['Risiko Sedang', m.inspByRisk['Medium']||0, RC.Medium],
        ['Risiko Rendah', m.inspByRisk['Low']||0, RC.Low],
      ];
      list.innerHTML = rows.map(r=>`
        <div class="row">
          <span><span class="dot" style="--c:${r[2]}"></span> ${esc(r[0])}</span>
          <b>${r[1]} (${totalLoc?Math.round((r[1]/totalLoc)*100):0}%)</b>
        </div>`).join('');

      // Tabel inspeksi (konten menyerupai referensi; angka diaproksimasi dari distribusi)
      const high = (m.inspByRisk['Very High']||0) + (m.inspByRisk['High']||0);
      const med = (m.inspByRisk['Medium']||0);
      const low = (m.inspByRisk['Low']||0);
      const approx = (v)=>Math.max(0, Math.round(v));
      const inspTpl = [
        {p:'Retakan / Deformasi Lereng', n: approx(high*1.1 + med*0.4), rk:'Tinggi', tr:'up'},
        {p:'Pergerakan Lereng', n: approx(high*0.8 + med*0.3), rk:'Tinggi', tr:'up'},
        {p:'Erosi (Surface)', n: approx(med*0.7 + low*0.2), rk:'Sedang', tr:'st'},
        {p:'Longsoran / Lereng', n: approx(high*0.6), rk:'Sedang', tr:'st'},
        {p:'Retakan Batu (Rockfall)', n: approx(med*0.4 + low*0.2), rk:'Sedang', tr:'st'},
        {p:'Kondisi Jalan Haul', n: approx(med*0.35 + low*0.2), rk:'Rendah', tr:'dn'},
        {p:'Drainase', n: approx(low*0.4), rk:'Rendah', tr:'dn'},
      ];
      const rkColor = (rk)=> rk==='Tinggi'?RC.High : rk==='Sedang'?RC.Medium : RC.Low;
      const trEl = (tr)=> tr==='up'?`<span class="trend-up">↑</span>`: tr==='dn'?`<span class="trend-dn">↓</span>`:`<span class="trend-st">→</span>`;
      document.getElementById('inspTbl').innerHTML = inspTpl.map(x=>`
        <tr>
          <td>${esc(x.p)}</td>
          <td>${x.n}</td>
          <td><span style="color:${rkColor(x.rk)};font-weight:950">${esc(x.rk)}</span></td>
          <td style="text-align:right">${trEl(x.tr)}</td>
        </tr>`).join('');

      // Instrument health (menyerupai referensi)
      const sensors = DATA.sensors||[];
      const uniq = (arr)=>[...new Set(arr)];
      const extDev = uniq(sensors.filter(s=>s.kind==='extensometer').map(s=>String(s.external_device_id||''))).filter(Boolean);
      const awsDev = uniq(sensors.filter(s=>s.kind==='weather').map(s=>String(s.external_device_id||'372'))).filter(Boolean);
      // Placeholder untuk RTS/IP/VWP jika belum tersambung
      const health = [
        {k:'AWS', v:`${awsDev.length||1} Station`, s:'Active', c:'rgba(34,211,238,.20)'},
        {k:'Extensometer', v:`${extDev.length||0} Points`, s:'Active', c:'rgba(59,130,246,.20)'},
        {k:'RTS', v:`0 Points`, s:'Inactive', c:'rgba(167,139,250,.20)'},
        {k:'IP (Pore Pressure)', v:`0 Points`, s:'Inactive', c:'rgba(251,146,60,.20)'},
        {k:'VWP (Soil Moisture)', v:`0 Points`, s:'Inactive', c:'rgba(34,197,94,.20)'},
      ];
      document.getElementById('instHealth').innerHTML = health.map(h=>`
        <div class="inst">
          <div class="nm">${esc(h.k)}</div>
          <div class="v">${esc(h.v)}</div>
          <div class="s">${esc(h.s)}</div>
        </div>`).join('');

      // Parameter monitoring latest (ambil yang tersedia; lainnya placeholder)
      const extAny = sensors.find(s=>s.kind==='extensometer' && s.latest_value!=null);
      const rainAny = sensors.find(s=>s.kind==='weather' && (s.sensor_type_name||'').toLowerCase().includes('rain'));
      const tempAny = sensors.find(s=>s.kind==='weather' && (s.sensor_type_name||'').toLowerCase().includes('temperature'));

      const extLvl = extAny ? extStatus(extAny) : 'Low';
      const extCol = RC[extLvl] || RC.Low;
      const extTrend = m.extTriggered.length ? '<span class="trend-up">↗</span>' : '<span class="trend-st">→</span>';

      const rainVal = (DATA.rain && DATA.rain.rain_total_today_mm!=null) ? `${fmt(DATA.rain.rain_total_today_mm,1)} mm/day` : (rainAny?`${fmt(rainAny.latest_value,1)} ${rainAny.unit||''}`:'—');
      const rainTrend = DATA.rain && DATA.rain.is_raining ? '<span class="trend-up">↗</span>' : '<span class="trend-st">→</span>';

      const rowsParam = [
        {p:'Displacement (Extensometer)', v: extAny?`${fmt(extAny.latest_value,2)} ${extAny.unit||'mm'}`:'—', st: extAny?extLvl:'—', c: extCol, tr: extTrend},
        {p:'Displacement (RTS)', v:'—', st:'—', c:'#94a3b8', tr:'<span class="trend-st">→</span>'},
        {p:'Pore Pressure (IP)', v:'—', st:'—', c:'#94a3b8', tr:'<span class="trend-st">→</span>'},
        {p:'Volumetric Water Content (VWP)', v:'—', st:'—', c:'#94a3b8', tr:'<span class="trend-st">→</span>'},
        {p:'Weather (Rainfall)', v: rainVal, st: (DATA.rain && DATA.rain.is_raining)?'Warning':'Normal', c: (DATA.rain && DATA.rain.is_raining)?RC.High:RC.Low, tr: rainTrend},
        {p:'Temperature (AWS)', v: tempAny?`${fmt(tempAny.latest_value,1)} ${tempAny.unit||'°C'}`:'—', st:'Normal', c:RC.Low, tr:'<span class="trend-st">→</span>'},
      ];
      document.getElementById('paramTbl').innerHTML = rowsParam.map(r=>`
        <tr>
          <td>${esc(r.p)}</td>
          <td>${esc(r.v)}</td>
          <td><span style="color:${r.c};font-weight:950">${esc(r.st)}</span></td>
          <td style="text-align:right">${r.tr}</td>
        </tr>`).join('');

      // Alert summary mini list & latest alerts
      document.getElementById('kAlertTotal').textContent = m.totalAlerts;
      const mini = document.getElementById('alertListMini');
      mini.innerHTML = [
        ['Warning', m.warn, RC.High],
        ['Watch', m.watch, RC.Medium],
        ['Critical', m.critical, RC['Very High']],
      ].map(x=>`
        <div class="row">
          <span><span class="dot" style="--c:${x[2]}"></span> ${x[0]}</span>
          <b>${x[1]}</b>
        </div>`).join('');

      const latestAlerts = [];
      m.extTriggered.slice(0,6).forEach(s=>{
        const lvl = extStatus(s);
        const c = RC[lvl] || RC.Low;
        latestAlerts.push({
          ttl: `${s.sensor_name||'Extensometer'} (${s.external_device_id||''})`,
          sev: lvl==='Very High'?'Critical':(lvl==='High'?'Warning':'Watch'),
          c: (lvl==='Very High')?RC['Very High']:(lvl==='High'?RC.High:RC.Medium),
          msg: `Nilai ${fmt(s.latest_value,2)} ${s.unit||'mm'} · melewati threshold`,
          tm: s.latest_ts ? new Date(s.latest_ts).toLocaleString('id-ID') : '—'
        });
      });
      m.inspTriggered.slice(0,4).forEach(r=>{
        latestAlerts.push({
          ttl: `Inspeksi lokasi ${r.location_id}`,
          sev: (r.risk_final==='Very High')?'Critical':'Warning',
          c: (r.risk_final==='Very High')?RC['Very High']:RC.High,
          msg: `Risiko ${r.risk_final||''} · skor ${r.total_score||0}`,
          tm: r.inspection_date ? new Date(r.inspection_date).toLocaleString('id-ID') : '—'
        });
      });
      const listEl = document.getElementById('latestAlerts');
      listEl.innerHTML = (latestAlerts.length?latestAlerts:([{
        ttl:'No active alerts', sev:'—', c:'#94a3b8', msg:'Semua parameter dalam batas aman', tm:'—'
      }])).slice(0,8).map(a=>`
        <div class="alert" style="--c:${a.c}">
          <div class="a1">
            <div class="ttl">${esc(a.ttl)}</div>
            <div class="sev">${esc(a.sev)}</div>
          </div>
          <div class="a2">${esc(a.msg)}</div>
          <div class="tm">${esc(a.tm)}</div>
        </div>`).join('');
    }

    function buildMap(m){
      const el = document.getElementById('map');
      if(!el) return;

      // Re-init bila container di-render ulang (root.innerHTML ditulis ulang tiap render → node #map lama hilang)
      if(map && map.getContainer() !== el){ try{ map.remove(); }catch(e){} map=null; overlays=null; }

      if(!map){
        map = L.map('map', { scrollWheelZoom:true, zoomControl:true });
        // Basemap: satelit ArcGIS (seperti referensi) + fallback OSM bila tile diblokir browser kantor
        const sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', { maxZoom: 19 });
        const osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 });
        let satFailed = false;
        sat.on('tileerror', ()=>{ if(!satFailed){ satFailed = true; try{ map.removeLayer(sat); }catch(e){} osm.addTo(map); } });
        sat.addTo(map);

        overlays = {
          halo: L.layerGroup().addTo(map),
          instruments: L.layerGroup().addTo(map),
          inspections: L.layerGroup().addTo(map),
        };
        L.control.layers(null, {
          'Instrument Symbols': overlays.instruments,
          'Inspection Symbols': overlays.inspections,
          'Risk Halo': overlays.halo,
        }, { collapsed:false }).addTo(map);
      }

      Object.values(overlays).forEach(g=>g.clearLayers());

      // Instrument markers by device (numbered pins)
      const sensors = DATA.sensors||[];
      const devs = {};
      sensors.forEach(s=>{
        if(s.lat && s.lng) devs[s.external_device_id] = {lat:+s.lat, lng:+s.lng, id:s.external_device_id};
      });

      // Inspection latest per location
      const latestIns = {};
      (DATA.insp||[]).forEach(d=>{ if(!latestIns[d.location_id]) latestIns[d.location_id]=d; });
      const locMap = {}; (DATA.locs||[]).forEach(l=>locMap[l.id]=l);

      const points = [];
      let idx = 1;

      Object.values(devs).forEach(d=>{
        const devSensors = sensors.filter(s=>s.external_device_id===d.id && s.kind==='extensometer');
        const lvl = devSensors.length ? devSensors.reduce((mx,s)=>{
          const ls = extStatus(s);
          return riskScoreFromLevel(ls) > riskScoreFromLevel(mx) ? ls : mx;
        }, 'Low') : 'Low';
        const col = RC[lvl] || RC.Low;

        points.push([d.lat,d.lng]);
        if(lvl==='High' || lvl==='Very High'){
          L.circle([d.lat,d.lng], { radius:220, color:col, fillColor:col, fillOpacity:0.14, weight:1, className:'halo' })
            .addTo(overlays.halo);
        }
        const pin = L.divIcon({ className:'', html:`<div class="marker-pin" style="border-color:${col}">${idx++}</div>`, iconSize:[22,22], iconAnchor:[11,11] });
        L.marker([d.lat,d.lng], { icon: pin })
          .bindPopup(`<b>Instrumen dev ${esc(d.id)}</b><br>Trigger: <span style="color:${col};font-weight:950">${esc(lvl)}</span>`)
          .addTo(overlays.instruments);
      });

      Object.values(latestIns).forEach(r=>{
        const l = locMap[r.location_id];
        const ll = l && locLatLng(l);
        if(!ll) return;
        const lvl = r.risk_final || 'Low';
        const col = RC[lvl] || RC.Low;
        points.push([ll.lat,ll.lng]);
        if(lvl==='High' || lvl==='Very High'){
          L.circle([ll.lat,ll.lng], { radius:260, color:col, fillColor:col, fillOpacity:0.12, weight:1, className:'halo' })
            .addTo(overlays.halo);
        }
        const pin = L.divIcon({ className:'', html:`<div class="marker-pin" style="border-color:${col}">I</div>`, iconSize:[22,22], iconAnchor:[11,11] });
        L.marker([ll.lat,ll.lng], { icon: pin })
          .bindPopup(`<b>${esc(l.name||('Lokasi '+r.location_id))}</b><br>Risiko: <span style="color:${col};font-weight:950">${esc(lvl)}</span><br>Skor: <b>${r.total_score||0}</b>`)
          .addTo(overlays.inspections);
      });

      if(points.length){
        try{ map.fitBounds(L.latLngBounds(points).pad(0.18)); }
        catch(e){ map.setView(points[0], 14); }
      } else {
        map.setView([-2.74,122.01], 13);
      }
      [60,250,600,1200].forEach(d=>setTimeout(()=>{ try{ map.invalidateSize(); }catch(e){} }, d));
      if(!window.__mapResizeBound){ window.__mapResizeBound=true; window.addEventListener('resize',()=>{ try{ map && map.invalidateSize(); }catch(e){} }); }
    }

    function donut(canvasId, valuePct, col){
      const cv = document.getElementById(canvasId);
      if(!cv || !window.Chart) return null;
      return new Chart(cv, {
        type:'doughnut',
        data:{ datasets:[{
          data:[valuePct, Math.max(0,100-valuePct)],
          backgroundColor:[col, 'rgba(148,163,184,.12)'],
          borderWidth:0,
          cutout:'72%',
        }]},
        options:{
          responsive:true,
          maintainAspectRatio:false,
          plugins:{ legend:{display:false}, tooltip:{enabled:false} }
        }
      });
    }

    function drawCharts(m, st){
      // Cleanup
      Object.values(charts).forEach(c=>{ try{ c.destroy(); }catch(e){} });
      charts = {};

      // Risk donut (index)
      charts.risk = donut('riskDonut', m.riskIndex, m.riskLabel.c);

      // Risk summary donut (composition)
      const cv1 = document.getElementById('riskSummaryDonut');
      if(cv1 && window.Chart){
        charts.riskSummary = new Chart(cv1,{
          type:'doughnut',
          data:{
            labels:['High','Medium','Low'],
            datasets:[{
              data:[
                (m.inspByRisk['Very High']||0) + (m.inspByRisk['High']||0),
                (m.inspByRisk['Medium']||0),
                (m.inspByRisk['Low']||0),
              ],
              backgroundColor:[RC.High, RC.Medium, RC.Low],
              borderWidth:0,
              cutout:'68%',
            }]
          },
          options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} } }
        });
      }

      // Risk trend (6 months) – bila data inspeksi belum historis per bulan, gunakan template visual
      const cv2 = document.getElementById('riskTrend');
      if(cv2 && window.Chart){
        const months = [];
        const now = new Date();
        for(let i=5;i>=0;i--){
          const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
          months.push(d.toLocaleString('en-US',{month:'short'}));
        }
        const base = Math.max(1, Math.round(m.insRows.length/4));
        const hi = months.map((_,i)=>Math.max(0, Math.round((m.inspByRisk['High']+m.inspByRisk['Very High']) * (0.75 + i*0.05))));
        const me = months.map((_,i)=>Math.max(0, Math.round((m.inspByRisk['Medium']||0) * (0.85 + i*0.03))));
        const lo = months.map((_,i)=>Math.max(0, Math.round((m.inspByRisk['Low']||0) * (0.95 - i*0.02))));
        charts.riskTrend = new Chart(cv2,{
          type:'bar',
          data:{
            labels:months,
            datasets:[
              {label:'High', data:hi.length?hi:months.map(()=>base), backgroundColor:RC.High, stack:'s'},
              {label:'Medium', data:me.length?me:months.map(()=>base), backgroundColor:RC.Medium, stack:'s'},
              {label:'Low', data:lo.length?lo:months.map(()=>base), backgroundColor:RC.Low, stack:'s'},
            ]
          },
          options:{
            responsive:true, maintainAspectRatio:false,
            plugins:{ legend:{display:false} },
            scales:{
              x:{ grid:{display:false}, ticks:{ color:'#cbd5e1', font:{size:10} } },
              y:{ grid:{ color:'rgba(148,163,184,.12)' }, ticks:{ display:false }, beginAtZero:true }
            }
          }
        });
      }

      // Alert donut
      const cv3 = document.getElementById('alertDonut');
      if(cv3 && window.Chart){
        charts.alert = new Chart(cv3,{
          type:'doughnut',
          data:{
            labels:['Warning','Watch','Critical'],
            datasets:[{
              data:[m.warn, m.watch, m.critical],
              backgroundColor:[RC.High, RC.Medium, RC['Very High']],
              borderWidth:0, cutout:'68%',
            }]
          },
          options:{ responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false} } }
        });
      }

      // Spark charts (7 days)
      sparkLine('sparkExt', buildSpark(DATA.ext7, (r)=>r.external_device_id && r.sensor_name), '#a78bfa', (v)=>document.getElementById('sparkExtVal').textContent = v);
      // Placeholder IP, VWP (no data)
      sparkLine('sparkIp', [], '#f59e0b', (v)=>document.getElementById('sparkIpVal').textContent = '—');
      sparkLine('sparkVwp', [], '#22c55e', (v)=>document.getElementById('sparkVwpVal').textContent = '—');
      // Rain spark from weather rainfall minute
      const rain = (DATA.wx7||[]).filter(r=>(r.sensor_name||'').toLowerCase().includes('rainfall minute'));
      sparkLine('sparkRain', rain, '#38bdf8', (v)=>document.getElementById('sparkRainVal').textContent = v, true);
    }

    function buildSpark(rows, predicate){
      const r = (rows||[]).filter(x=>x&&x.ts&&isFinite(+x.value));
      if(predicate) r.filter(predicate);
      // ambil 1 seri representatif (nilai median per timestamp)
      const byT = {};
      r.forEach(x=>{ (byT[x.ts]=byT[x.ts]||[]).push(+x.value); });
      const ts = Object.keys(byT).sort();
      const vals = ts.map(t=>{
        const arr = byT[t].sort((a,b)=>a-b);
        return arr[Math.floor(arr.length/2)];
      });
      return { ts, vals };
    }

    function sparkLine(canvasId, rows, color, setLabel, isRain=false){
      const cv = document.getElementById(canvasId);
      if(!cv || !window.Chart) return;
      const s = buildSpark(rows);
      const labels = s.ts.map(t=>new Date(t).toLocaleDateString('en-US',{month:'short',day:'2-digit'}));
      const vals = s.vals;
      const latest = vals.length ? vals[vals.length-1] : null;
      setLabel(latest==null ? '—' : (isRain ? `${fmt(latest,2)} mm/min` : `${fmt(latest,2)}`));

      charts['spark_'+canvasId] = new Chart(cv,{
        type:'line',
        data:{ labels, datasets:[{
          data:vals,
          borderColor:color,
          backgroundColor:color,
          borderWidth:1.6,
          pointRadius:0,
          tension:.28,
          fill:false,
        }]},
        options:{
          responsive:true, maintainAspectRatio:false,
          plugins:{ legend:{display:false}, tooltip:{enabled:false} },
          scales:{
            x:{ display:false },
            y:{ display:false }
          }
        }
      });
    }

    function exportDashboard(){
      // sederhana: cetak halaman (user bisa save as PDF)
      window.print();
    }

    function setView(v){ STATE.view=v; render(); }
    window.setView=setView;
    window.loadAll=loadAll;
    window.exportDashboard=exportDashboard;

    (async()=>{
      const ok = await GMS.guard({ mount:'#root' });
      if(!ok) return;
      await loadAll();
      setInterval(()=>{ if(GMS.isOnline()) loadAll().catch(()=>{}); }, 300000);
    })();
  </script>
