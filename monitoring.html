<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#071a2e" />
  <link rel="manifest" href="manifest.json" />
  <title>Geotechnical Monitoring — Executive Dashboard</title>

  <!-- Referensi font & token warna tetap mengikuti bundle yang Anda kirim -->
  <link rel="stylesheet" href="common.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="common.js"></script>

  <style>
    :root{
      --bg0:#051426;
      --bg1:#04101f;
      --panel0:#0a2037;
      --panel1:#0b243f;
      --panel2:#0e2c4d;
      --stroke:rgba(148,163,184,.16);
      --stroke2:rgba(148,163,184,.12);
      --txt:#e5e7eb;
      --txt2:#f1f5f9;
      --mut:#94a3b8;
      --mut2:#a8b4c7;
      --blue:#3b82f6;
      --cyan:#22d3ee;
      --green:#22c55e;
      --yellow:#eab308;
      --orange:#f97316;
      --red:#ef4444;
      --shadow:0 14px 40px rgba(2,6,23,.35);

      /* Trigger symbology (sesuai diskusi) */
      --t-low: #22c55e;   /* hijau */
      --t-med: #eab308;   /* kuning */
      --t-high:#f97316;   /* oranye */
      --t-vh:  #ef4444;   /* merah */
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      color:var(--txt);
      background:
        radial-gradient(1000px 520px at 16% 0%, rgba(59,130,246,.18), rgba(0,0,0,0) 60%),
        radial-gradient(820px 520px at 80% 8%, rgba(34,197,94,.12), rgba(0,0,0,0) 55%),
        linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 100%);
      overflow:hidden; /* target 1 layar laptop */
    }

    .app{display:flex;height:100vh;width:100vw}
    .sidebar{
      width:238px;flex:0 0 238px;
      background:linear-gradient(180deg, rgba(8,26,45,.98) 0%, rgba(5,18,32,.98) 100%);
      border-right:1px solid rgba(148,163,184,.10);
      padding:14px 12px;
      display:flex;flex-direction:column;gap:14px;
    }
    .brand{
      display:flex;align-items:center;gap:10px;
      padding:10px 10px;border-radius:14px;
      background:rgba(2,6,23,.20);
      border:1px solid rgba(148,163,184,.12);
    }
    .logo{
      width:36px;height:36px;border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(59,130,246,.18);border:1px solid rgba(59,130,246,.35);
      color:#bfdbfe;font-weight:900;
    }
    .brand b{font-size:12px;letter-spacing:.06em}
    .brand small{display:block;color:var(--mut);font-size:10px;margin-top:2px}

    .nav{display:flex;flex-direction:column;gap:4px}
    .nav button{
      width:100%;border:none;background:transparent;
      color:#b8c7de;cursor:pointer;
      padding:10px 10px;border-radius:12px;
      display:flex;align-items:center;gap:10px;
      font-size:12px;font-weight:700;
    }
    .nav button:hover{background:rgba(255,255,255,.05)}
    .nav button.act{
      background:linear-gradient(180deg, rgba(59,130,246,.18), rgba(59,130,246,.10));
      border:1px solid rgba(59,130,246,.25);
      color:var(--txt2);
    }
    .ico{
      width:26px;height:26px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(148,163,184,.10);
      border:1px solid rgba(148,163,184,.12);
      color:#cbd5e1;font-size:12px;
      flex:0 0 auto;
    }
    .nav button.act .ico{background:rgba(59,130,246,.18);border-color:rgba(59,130,246,.25);color:#bfdbfe}

    .side-foot{
      margin-top:auto;
      padding:10px;border-radius:14px;
      background:rgba(2,6,23,.18);
      border:1px solid rgba(148,163,184,.12);
      display:flex;flex-direction:column;gap:8px;
      font-size:11px;color:var(--mut2);
    }
    .side-foot .kv{display:flex;justify-content:space-between;gap:10px}
    .side-foot .kv b{color:var(--txt2)}
    .side-foot .btn{
      margin-top:6px;border:none;border-radius:12px;
      background:rgba(59,130,246,.92);
      color:#fff;font-weight:900;font-size:12px;
      padding:9px 10px;cursor:pointer;
    }
    .side-foot .btn:hover{filter:brightness(1.05)}

    .main{flex:1;min-width:0;display:flex;flex-direction:column}
    .topbar{
      height:54px;flex:0 0 54px;
      display:flex;align-items:center;gap:10px;
      padding:10px 14px;
      background:rgba(10,32,55,.75);
      border-bottom:1px solid rgba(148,163,184,.10);
      backdrop-filter:saturate(130%) blur(10px);
    }
    .topbar h1{margin:0;font-size:13px;font-weight:950;letter-spacing:.06em}
    .topbar .sub{font-size:11px;color:var(--mut);margin-left:8px}
    .topbar .spacer{margin-left:auto}
    .chip{
      display:inline-flex;align-items:center;gap:8px;
      padding:7px 10px;border-radius:999px;
      border:1px solid rgba(148,163,184,.14);
      background:rgba(2,6,23,.18);
      font-size:11px;color:var(--mut2);
    }
    .chip b{color:var(--txt2)}
    .btn-ghost{
      border:1px solid rgba(148,163,184,.14);
      background:rgba(2,6,23,.16);
      color:var(--txt2);
      padding:8px 10px;border-radius:12px;
      font-weight:900;font-size:12px;cursor:pointer;
    }
    .btn-ghost:hover{background:rgba(255,255,255,.05)}

    .page{
      flex:1;min-height:0;
      padding:12px;
      overflow:hidden; /* tetap 1 layar */
      display:flex;flex-direction:column;gap:10px;
    }
    .page.scroll{overflow:auto}

    .card{
      background:linear-gradient(180deg, rgba(14,44,77,.85), rgba(10,32,55,.85));
      border:1px solid var(--stroke);
      border-radius:16px;
      box-shadow:var(--shadow);
      min-width:0;
      position:relative;
    }
    /* Clickable card — used on Overview for drill-down into detail tabs */
    .card.clickable{cursor:pointer;transition:transform .12s ease, border-color .12s ease, box-shadow .12s ease}
    .card.clickable:hover{transform:translateY(-2px);border-color:rgba(59,130,246,.45);box-shadow:0 18px 36px rgba(2,8,20,.45)}
    .card.clickable::after{
      content:'';position:absolute;right:12px;top:12px;width:18px;height:18px;border-radius:50%;
      background:rgba(59,130,246,.18);border:1px solid rgba(59,130,246,.45);
      opacity:0;transition:opacity .12s ease;
    }
    .card.clickable:hover::after{opacity:1}
    .card.clickable .more-arrow{
      position:absolute;right:14px;top:13px;font-size:13px;line-height:1;color:#bfdbfe;
      opacity:.4;pointer-events:none;font-weight:900;transition:opacity .12s ease, transform .12s ease;z-index:1;
    }
    .card.clickable:hover .more-arrow{opacity:1;transform:translateX(2px)}
    .card-hd{
      padding:10px 12px 0;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    .card-hd .t{
      font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
      color:#9fb3cf;
      font-weight:900;
    }
    .card-hd .ic{
      width:28px;height:28px;border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(148,163,184,.10);
      border:1px solid rgba(148,163,184,.14);
      color:#cbd5e1;font-size:12px;
      flex:0 0 auto;
    }
    .card-bd{padding:10px 12px 12px;min-height:0}

    /* EWS Banner */
    .ews-banner{
      border:1.5px solid;border-radius:14px;
      padding:10px 14px;
      display:flex;align-items:center;justify-content:space-between;gap:14px;
      flex-wrap:wrap;
    }
    .ews-main{display:flex;align-items:center;gap:10px}
    .ews-dot{width:12px;height:12px;border-radius:50%;flex:0 0 12px;animation:pulse 2s infinite}
    .ews-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:900;color:var(--mut2)}
    .ews-status{font-size:18px;font-weight:950;letter-spacing:.04em}
    .ews-evak{
      font-size:10px;font-weight:900;letter-spacing:.08em;
      padding:3px 10px;border-radius:999px;
      background:rgba(239,68,68,.25);color:#ef4444;border:1px solid rgba(239,68,68,.5);
      animation:pulse 1.5s infinite;
    }
    .ews-sub{font-size:11px;color:var(--mut2);margin-top:2px}
    .ews-meta{font-size:10px;color:var(--mut);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
    .ews-devices{display:flex;gap:6px;flex-wrap:wrap}
    .ews-dev{
      display:flex;align-items:center;gap:4px;
      padding:4px 8px;border-radius:8px;
      background:rgba(2,6,23,.3);border:1px solid rgba(148,163,184,.12);
      font-size:10px;
    }
    .ews-dev-dot{width:6px;height:6px;border-radius:50%;flex:0 0 6px}
    .ews-dev-nm{color:var(--mut2);font-weight:700}
    .ews-dev-lv{font-weight:900;font-size:9px;letter-spacing:.06em}
    .ews-dev-v{color:var(--mut);font-size:9px}
    .ews-dev-vr{color:var(--mut);font-size:9px}

    .kpi-grid{
      display:grid;
      grid-template-columns:repeat(6, 1fr);
      gap:10px;
    }
    @media(max-width:1280px){
      .kpi-grid{grid-template-columns:repeat(3,1fr)}
      body{overflow:auto} /* fallback utk layar kecil */
      .page{overflow:visible}
    }

    .kpi-val{font-size:22px;font-weight:950;letter-spacing:.01em}
    .kpi-sub{font-size:11px;color:var(--mut2);margin-top:4px;line-height:1.25}
    .kpi-tag{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:var(--mut2)}
    .dot{width:8px;height:8px;border-radius:999px;background:var(--c);display:inline-block}

    .dash{
      flex:1;
      display:grid;
      grid-template-rows: 1fr 0.92fr;
      gap:10px;
      min-height:0;
    }
    .upper{
      display:grid;
      grid-template-columns: 1.55fr 1fr 1fr;
      gap:10px;
      min-height:0;
    }
    .lower{
      display:grid;
      grid-template-columns: 1.25fr 1fr 1fr;
      gap:10px;
      min-height:0;
    }

    /* Map */
    #map{flex:1;height:100%;min-height:260px;border-radius:14px;overflow:hidden}
    .map-wrap{height:100%;min-height:260px}
    .mapcard{display:flex;flex-direction:column}
    .mapcard > .card-bd{flex:1;min-height:260px;display:flex;flex-direction:column;position:relative}
    .legend{
      position:absolute;left:10px;bottom:10px;z-index:500;
      background:rgba(2,6,23,.62);
      border:1px solid rgba(148,163,184,.18);
      border-radius:10px;
      padding:6px 8px;
      font-size:10.5px;color:#cbd5e1;
      backdrop-filter: blur(10px);
      max-width:200px;
      transition:padding .15s ease, max-height .2s ease;
      overflow:hidden;
    }
    .legend.collapsed{padding:4px 6px;max-height:24px;}
    .legend .lg{
      font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#9fb3cf;font-weight:900;
      display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;user-select:none;
      margin-bottom:4px;
    }
    .legend.collapsed .lg{margin-bottom:0}
    .legend .lg .tg{font-size:10px;line-height:1;padding:0 3px;color:#9fb3cf}
    .legend .body{display:block}
    .legend.collapsed .body{display:none}
    .legend .it{display:flex;align-items:center;gap:7px;margin:2px 0}
    .legend .sw{width:10px;height:10px;border-radius:3px;background:var(--c);border:1px solid rgba(255,255,255,.16);flex:0 0 auto}

    /* Leaflet theming */
    .leaflet-control-zoom a{
      background:rgba(2,6,23,.55) !important;
      border:1px solid rgba(148,163,184,.18) !important;
      color:#e5e7eb !important;
    }
    .leaflet-control-layers{
      background:rgba(2,6,23,.55) !important;
      border:1px solid rgba(148,163,184,.18) !important;
      border-radius:14px !important;
      box-shadow:var(--shadow) !important;
      color:#e5e7eb !important;
      backdrop-filter: blur(10px);
    }
    .leaflet-control-layers label{font-size:12px}
    .leaflet-control-layers-expanded{padding:10px 10px 8px}
    .leaflet-control-attribution{display:none}

    /* Panels internal layout */
    .split{
      display:grid;
      grid-template-columns: 0.95fr 1fr;
      gap:10px;
      align-items:center;
    }
    .mini-list{display:flex;flex-direction:column;gap:7px}
    .mini-list .row{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:8px 10px;border-radius:12px;
      background:rgba(2,6,23,.18);
      border:1px solid rgba(148,163,184,.12);
      font-size:11px;color:var(--mut2);
    }
    .mini-list .row b{color:var(--txt2)}

    .tbl{
      width:100%;border-collapse:collapse;
      font-size:11.5px;
    }
    .tbl th,.tbl td{
      border-bottom:1px solid rgba(148,163,184,.10);
      padding:9px 8px;
      text-align:left;
      white-space:nowrap;
    }
    .tbl th{
      font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;
      color:#9fb3cf;
    }
    .tbl td:last-child,.tbl th:last-child{text-align:right}
    .trend-up{color:var(--green);font-weight:900}
    .trend-dn{color:var(--red);font-weight:900}
    .trend-st{color:#cbd5e1;font-weight:900}

    .instruments{
      display:grid;
      grid-template-columns:repeat(5,1fr);
      gap:8px;
    }
    .inst{
      padding:10px 10px;border-radius:14px;
      background:rgba(2,6,23,.18);
      border:1px solid rgba(148,163,184,.12);
      display:flex;flex-direction:column;gap:6px;
      min-width:0;
    }
    .inst .nm{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:#9fb3cf;font-weight:900}
    .inst .v{font-size:14px;font-weight:950}
    .inst .s{font-size:11px;color:var(--mut2)}

    .two-stack{display:grid;grid-template-rows: 0.52fr 0.48fr;gap:10px;min-height:0}
    .alerts-stack{display:grid;grid-template-rows: 0.46fr 0.54fr;gap:10px;min-height:0}

    .sparks{
      display:grid;grid-template-columns:repeat(2,1fr);
      gap:10px;
    }
    .spark{
      padding:10px 10px;border-radius:14px;
      background:rgba(2,6,23,.18);
      border:1px solid rgba(148,163,184,.12);
      min-width:0;
    }
    .spark .k{font-size:10px;color:#9fb3cf;letter-spacing:.12em;text-transform:uppercase;font-weight:900}
    .spark .v{margin-top:6px;font-size:13px;font-weight:950;color:var(--txt2)}
    .spark .cv{margin-top:10px;height:74px}

    .alert-list{
      margin-top:8px;
      display:flex;flex-direction:column;gap:8px;
      max-height:100%;
      overflow:auto;
      padding-right:4px;
    }
    .alert{
      padding:10px 10px;border-radius:14px;
      background:rgba(2,6,23,.18);
      border:1px solid rgba(148,163,184,.12);
      min-width:0;
    }
    .alert .a1{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .alert .ttl{font-weight:950}
    .alert .sev{font-size:11px;font-weight:950;color:var(--c)}
    .alert .a2{margin-top:6px;font-size:11px;color:var(--mut2);line-height:1.25}
    .alert .tm{margin-top:7px;font-size:10.5px;color:#9fb3cf}

    /* Compact for laptop */
    @media (max-height: 820px) and (min-width: 1100px){
      .topbar{height:52px}
      .page{padding:10px}
      .kpi-val{font-size:20px}
      .tbl th,.tbl td{padding:8px 8px}
      .dash{grid-template-rows: 1fr 0.92fr}
    }

    /* Marker styles */
    .marker-pin{
      width:22px;height:22px;border-radius:999px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(2,6,23,.55);
      border:2px solid #fff;
      box-shadow:0 10px 20px rgba(2,6,23,.45);
      color:#fff;font-weight:950;font-size:11px;
    }
    .halo{filter:drop-shadow(0 12px 20px rgba(2,6,23,.5))}
    select.flt,input.flt{font-size:12px;padding:6px 8px;border-radius:9px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.30);color:#e5e7eb}
    .btn-ghost.xs{padding:4px 8px;font-size:10px;margin-left:3px}
    .btn-ghost.on{background:rgba(59,130,246,.38);border-color:rgba(59,130,246,.55);color:#fff}
    .tabbtn{ background:#16202e; color:#9fb3cf; border:1px solid rgba(148,163,184,.2); border-radius:8px; padding:6px 11px; font-size:12px; cursor:pointer; }
    .tabbtn.act{ background:#1d4ed8; color:#fff; border-color:#1d4ed8; }
    .sechd{ font-size:12px; letter-spacing:.5px; color:#9fb3cf; text-transform:uppercase; margin:14px 2px 8px; border-left:3px solid #1d4ed8; padding-left:8px; }
    .note-dev{ background:rgba(250,204,21,.08); border:1px solid rgba(250,204,21,.3); color:#fde68a; border-radius:8px; padding:8px 10px; font-size:11.5px; margin-top:10px; }
    table.heat{ border-collapse:collapse; width:100%; font-size:10px; }
    table.heat th{ color:#9fb3cf; font-weight:600; padding:4px 5px; text-align:center; font-size:9px; }
    table.heat td{ text-align:center; padding:5px 6px; border:1px solid rgba(11,18,32,.6); }
    table.logtbl{ border-collapse:collapse; width:100%; font-size:11.5px; }
    table.logtbl th{ position:sticky; top:0; background:#16202e; color:#9fb3cf; font-weight:600; padding:8px 9px; text-align:left; white-space:nowrap; z-index:1; }
    table.logtbl td{ padding:7px 9px; border-top:1px solid rgba(148,163,184,.12); color:#dbe6f3; vertical-align:middle; }
    table.logtbl a{ color:#7dd3fc; text-decoration:none; }
    .rdot{ display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:5px; vertical-align:middle; }
    .mini{ border:0; border-radius:6px; padding:4px 8px; font-size:10.5px; cursor:pointer; color:#fff; }
    .mini.close{ background:#16a34a; } .mini.reopen{ background:#64748b; } .mini.prog{ background:#ca8a04; }
    .dchip{ background:rgba(148,163,184,.18); color:#9fb3cf; font-size:9px; padding:1px 5px; border-radius:6px; }
    @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:.35} }
    .live-badge{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:#22c55e;font-weight:900;letter-spacing:.05em}

    /* Hamburger toggle — hidden on desktop */
    .ham{display:none;border:none;background:transparent;color:#e5e7eb;font-size:22px;cursor:pointer;padding:4px 8px;line-height:1}

    /* ===== MOBILE ≤768px ===== */
    @media(max-width:768px){
      body{overflow:auto}
      .app{flex-direction:column;height:auto;min-height:100vh}
      .sidebar{
        width:100%;flex:0 0 auto;
        padding:10px;gap:8px;
        position:fixed;top:0;left:0;right:0;bottom:0;z-index:900;
        transform:translateX(-100%);transition:transform .22s ease;
      }
      .sidebar.open{transform:translateX(0)}
      .ham{display:block}
      .nav button{padding:12px 10px;font-size:13px}
      .main{min-width:0;width:100%}
      .topbar{height:auto;min-height:48px;flex-wrap:wrap;gap:6px;padding:8px 10px}
      .topbar h1{font-size:12px}
      .topbar .sub{display:none}
      .chip{font-size:10px;padding:5px 8px}
      .page{padding:8px;overflow:auto;gap:8px}
      .page.scroll{overflow:auto}

      .kpi-grid{grid-template-columns:repeat(2,1fr);gap:6px}
      .kpi-val{font-size:17px}
      .instruments{grid-template-columns:repeat(2,1fr);gap:6px}
      .dash{grid-template-rows:auto;display:flex;flex-direction:column;gap:8px}
      .upper,.lower{display:flex;flex-direction:column;gap:8px}
      .split{grid-template-columns:1fr}
      .sparks{grid-template-columns:1fr}
      .two-stack,.alerts-stack{display:flex;flex-direction:column;gap:8px}
      #map{min-height:220px}
      .card-hd{padding:8px 10px 0}
      .card-bd{padding:8px 10px 10px}

      select.flt,input.flt{font-size:11px;padding:5px 6px}
      .btn-ghost{padding:6px 8px;font-size:11px}
      .btn-ghost.xs{padding:3px 6px;font-size:9px}
      .sechd{font-size:11px;margin:10px 2px 6px}
      table.logtbl{font-size:10px}
      table.logtbl th,table.logtbl td{padding:5px 6px}
      .tbl{font-size:10px}
      .tbl th,.tbl td{padding:6px 5px}
    }

    /* ===== TABLET 769–1024px ===== */
    @media(min-width:769px) and (max-width:1024px){
      body{overflow:auto}
      .page{overflow:auto}

      [style*="grid-template-columns: repeat(3"],

<body>
  <div id="root">
    <div class="center" style="min-height:100vh"><div class="spin"></div></div>
  </div>

  <script>
    "use strict";
    const sb = GMS.sb, esc = GMS.esc;

    const RC = { Low:getCss('--t-low'), Medium:getCss('--t-med'), High:getCss('--t-high'), 'Very High':getCss('--t-vh') };
    const EEWS_C = { LV1:RC.Low, LV2:RC.Medium, LV3:RC.High, LV4:RC['Very High'] };
    const EWS_COLORS = { HIJAU:'#22c55e', KUNING:'#eab308', JINGGA:'#f97316', MERAH:'#ef4444' };
    const EWS_LABELS = { HIJAU:'AMAN', KUNING:'WASPADA', JINGGA:'SIAGA', MERAH:'DARURAT' };

    const STATE = { view:'overview', exRange:'24h', awRange:'24h', rainRange:'7d', incRange:'7d', vwpRange:'7d', incNode:null, vwpNode:null, incFrom:null, incTo:null };
    let DATA = {};
    let map = null;
    let overlays = null;
    let charts = {};
    let ewsChannel = null;

    // ── Realtime subscription state ──
    let realtimeChannel = null;
    let lastRealtimeTs = null;

    const GAUGE_LEN = 3000;
    const INC_NODES = [{id:'108052',label:'WOC-02 INC'},{id:'108102',label:'WDN-2 INC-01'},{id:'108164',label:'WDN-2 INC-02'},{id:'108403',label:'WOC-01 INC'}];
    const VWP_NODES = [{id:'181348',label:'OPJ VWP'},{id:'181361',label:'OPN VWP'},{id:'181404',label:'WOC-02 VWP'},{id:'181456',label:'WOC-01 VWP'},{id:'181461',label:'WDN-2 VWP',channels:3}];

    function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
    function num(x){ const n = parseFloat(x); return isNaN(n) ? null : n; }
    function ago(ts){
      if(!ts) return '—';
      const m=Math.round((Date.now()-new Date(ts).getTime())/60000);
      if(m<1) return 'baru saja';
      if(m<60) return m+' mnt';
      const h=Math.floor(m/60);
      if(h<24) return h+' jam';
      return Math.floor(h/24)+' hr';
    }
    function stale(ts,mx){ return !ts || (Date.now()-new Date(ts).getTime())/60000 > (mx||15); }
    function fmt(n,dec){ const x=Number(n); if(!isFinite(x)) return '—'; return x.toFixed(dec ?? (Math.abs(x)>=100?0:Math.abs(x)>=10?1:2)); }

    function extStatus(s){
      const v = Math.abs(s.latest_value || 0);
      const th = s.thresholds || {};
      const rtc = num(th.rtc), rtw = num(th.rtw);
      if(rtc!=null && v>=rtc) return 'Very High';
      if(rtw!=null && v>=rtw) return 'High';
      return 'Low';
    }
    function riskScoreFromLevel(lvl){
      return ({Low:1, Medium:2, High:3, 'Very High':4}[lvl] || 1);
    }
    function riskLabelFromIndex(x){
      // dipakai seperti screenshot: Low/Moderate/High
      if(x>=70) return {t:'High', c:RC['Very High']};
      if(x>=40) return {t:'Moderate', c:RC.High};
      return {t:'Low', c:RC.Low};
    }

    function linearRegression(points){
      const pts = (points||[]).filter(p=>isFinite(p.x)&&isFinite(p.y));
      if(pts.length<2) return null;
      let n=pts.length, sx=0, sy=0, sxx=0, sxy=0;
      for(const p of pts){ sx+=p.x; sy+=p.y; sxx+=p.x*p.x; sxy+=p.x*p.y; }
      const den = (n*sxx - sx*sx);
      if(Math.abs(den) < 1e-12) return null;
      const b = (n*sxy - sx*sy) / den;
      const a = (sy - b*sx) / n;
      return {a,b};
    }

    function seriesStats(rows){
      const r=(rows||[]).filter(x=>x&&x.ts&&isFinite(+x.value)).map(x=>({t:new Date(x.ts).getTime(), v:+x.value})).sort((a,b)=>a.t-b.t);
      if(r.length<2) return {n:r.length, mmPerDay:null, delta:null, last:null};
      const reg = linearRegression(r.map(p=>({x:p.t,y:p.v})));
      const mmPerDay = reg ? reg.b * 86400000 : null;
      const delta = r[r.length-1].v - r[0].v;
      return { n:r.length, mmPerDay, delta, last:r[r.length-1] };
    }

    function parseRange(range){
      const h = { '24h':24, '7d':7*24, '30d':30*24 }[range] || 24;
      return new Date(Date.now()-h*3600*1000).toISOString();
    }

    let lastHeavy = 0;
    function rangeParams(range, nowIso){
      if(range==='live') return {from:new Date(Date.now()-2*3600*1000).toISOString(), to:nowIso, every:'1 minute'};
      if(range==='24h')  return {from:parseRange('24h'), to:nowIso, every:'15 minutes'};
      return {from:parseRange('7d'), to:nowIso, every:'2 hours'};
    }

    // ── Realtime: subscribe to new instrument readings ──
    function subscribeRealtime(){
      if(realtimeChannel) return;
      realtimeChannel = sb.channel('monitoring-live')
        .on('postgres_changes',
          { event:'INSERT', schema:'monitoring', table:'readings' },
          (payload)=>{
            lastRealtimeTs = new Date().toISOString();
            updateLiveIndicator(true);
            // readings table has sensor_id; resolve kind via DATA.sensors
            const sid = payload.new?.sensor_id;
            const sensor = (DATA.sensors||[]).find(s=>s.sensor_id===sid);
            const kind = sensor?.kind;
            if(STATE.view==='inclinometer' && STATE.incRange==='live' && kind==='inclinometer'){
              debouncedLiveRefresh('inc');
            } else if(STATE.view==='vwp' && STATE.vwpRange==='live' && kind==='piezometer'){
              debouncedLiveRefresh('vwp');
            }
          })
        .subscribe((status)=>{
          updateLiveIndicator(status==='SUBSCRIBED');
        });
    }
    function unsubscribeRealtime(){
      if(realtimeChannel){ sb.removeChannel(realtimeChannel); realtimeChannel=null; }
      updateLiveIndicator(false);
    }
    function updateLiveIndicator(connected){
      const el=document.querySelector('.chip .dot');
      if(el){
        el.style.setProperty('--c', connected?'#22c55e':'#94a3b8');
        el.style.animation = connected?'pulse 2s infinite':'none';
      }
      const lbl=document.querySelector('.chip b');
      if(!lbl) return;
      const parent=lbl.closest('.chip');
      if(parent && parent.textContent.includes('LIVE')){
        parent.innerHTML = `<span class="dot" style="--c:${connected?'#22c55e':'#94a3b8'};animation:${connected?'pulse 2s infinite':'none'}"></span> LIVE${connected?' · RT':' · 2m'}`;
      }
    }
    let _liveRefreshTimer = {};
    function debouncedLiveRefresh(scope){
      if(_liveRefreshTimer[scope]) return;
      _liveRefreshTimer[scope] = setTimeout(()=>{
        _liveRefreshTimer[scope] = null;
        loadAll();
      }, 3000);
    }
    function needsRealtime(){
      return (STATE.view==='inclinometer' && STATE.incRange==='live') ||
             (STATE.view==='vwp' && STATE.vwpRange==='live');
    }

    function subscribeEws(){
      if(ewsChannel) return;
      ewsChannel = sb.channel('ews-live')
        .on('postgres_changes',
          { event:'INSERT', schema:'monitoring', table:'ews_evaluations' },
          (payload)=>{
            DATA.ews = payload.new;
            updateEwsBanner();
          })
        .subscribe();
    }
    function updateEwsBanner(){
      const e = DATA.ews;
      if(!e) return;
      const el = document.getElementById('ewsBanner');
      if(!el) return;
      const c = EWS_COLORS[e.status]||EWS_COLORS.HIJAU;
      const lbl = EWS_LABELS[e.status]||e.status;
      el.style.borderColor = c;
      el.style.background = `linear-gradient(90deg, ${c}18, ${c}08)`;
      const dot = el.querySelector('.ews-dot');
      if(dot) dot.style.background = c;
      const st = el.querySelector('.ews-status');
      if(st){ st.textContent = lbl; st.style.color = c; }
      const sub = el.querySelector('.ews-sub');
      if(sub) sub.textContent = e.alasan || '';
      const ts = el.querySelector('.ews-ts');
      if(ts) ts.textContent = e.evaluated_at ? new Date(e.evaluated_at).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
      const evak = el.querySelector('.ews-evak');
      if(evak) evak.style.display = e.evakuasi ? '' : 'none';
    }
    async function loadAll(){
      const nowMs=Date.now(), nowIso=new Date().toISOString();
      const heavy = (!DATA.ext7) || (nowMs-lastHeavy > 600000); // boot or every 10 min

      const baseP = Promise.all([
        sb.from('v_instrument_sensors').select('*'),
        sb.from('v_rain_status').select('*'),
        sb.from('v_rain_summary').select('*'),
        sb.from('v_rain_daily').select('*'),
      ]);
      let activeP=null, activeTarget=null;
      if(STATE.view==='instrument' && STATE.exRange!=='7d'){ const p=rangeParams(STATE.exRange,nowIso); activeTarget='extActive'; activeP=sb.rpc('instrument_series',{p_kind:'extensometer',p_from:p.from,p_to:p.to,p_every:p.every}); }
      else if(STATE.view==='aws' && STATE.awRange!=='7d'){ const p=rangeParams(STATE.awRange,nowIso); activeTarget='wxActive'; activeP=sb.rpc('instrument_series',{p_kind:'weather',p_from:p.from,p_to:p.to,p_every:p.every}); }
      else if(STATE.view==='inclinometer'){ const iFrom=STATE.incFrom?new Date(STATE.incFrom+'T00:00:00').toISOString():new Date(Date.now()-7*24*3600*1000).toISOString(); const iTo=STATE.incTo?new Date(STATE.incTo+'T23:59:59').toISOString():nowIso; const iDiff=Math.max(1,Math.round((new Date(iTo)-new Date(iFrom))/86400000)); const iEv=iDiff<=7?'1 hour':iDiff<=14?'3 hours':'6 hours'; activeTarget='incData'; activeP=sb.rpc('instrument_series_json',{p_kind:'inclinometer',p_from:iFrom,p_to:iTo,p_every:iEv}); }
      else if(STATE.view==='vwp'){ const d=STATE.vwpRange==='live'?1:({'3d':3,'7d':7,'10d':10,'30d':30}[STATE.vwpRange]||7); const f=new Date(Date.now()-d*24*3600*1000).toISOString(); const ev=STATE.vwpRange==='live'?'5 minutes':(d<=3?'1 hour':d<=10?'3 hours':'6 hours'); activeTarget='vwpData'; activeP=sb.rpc('instrument_series',{p_kind:'piezometer',p_from:f,p_to:nowIso,p_every:ev}); }

      const heavyP = heavy ? Promise.all([
        sb.from('inspections').select('id,location_id,inspection_date,inspector,risk_final,tarp_level,total_score,approval_status,status').neq('status','CLOSED').order('inspection_date',{ascending:false}),
        sb.from('locations').select('id,name,area_code,lat,lng,easting,northing'),
        sb.from('earthquakes').select('id,magnitude,wilayah,kedalaman,tanggal,status,lintang,bujur').order('tanggal',{ascending:false}).limit(8),
        sb.rpc('instrument_series',{p_kind:'extensometer',p_from:parseRange('7d'),p_to:nowIso,p_every:'2 hours'}),
        sb.rpc('instrument_series',{p_kind:'weather',p_from:parseRange('7d'),p_to:nowIso,p_every:'2 hours'}),
        sb.from('v_aws_stats').select('*'),
        sb.from('v_rain_hours').select('*'),
        sb.from('v_inspection_risk_areas').select('*'),
      ]) : null;

      const ewsP = sb.rpc('ews_latest');
      const [base, active, heavyR, ewsR] = await Promise.all([baseP, activeP, heavyP, ewsP]);
      const [sn,rain,rsum,rdaily]=base;
      DATA.sensors=sn.data||[]; DATA.rain=(rain.data||[])[0]||{};
      DATA.rainSum=(rsum.data||[])[0]||{}; DATA.rainDaily=rdaily.data||[];
      if(active && activeTarget) DATA[activeTarget]=active.data||[];
      if(ewsR.data) DATA.ews = ewsR.data;
      if(heavyR){
        DATA.insp=heavyR[0].data||[]; DATA.locs=heavyR[1].data||[]; DATA.eq=heavyR[2].data||[];
        DATA.ext7=heavyR[3].data||[]; DATA.wx7=heavyR[4].data||[]; DATA.awsStats=heavyR[5].data||[]; DATA.rainHours=(heavyR[6].data||[])[0]||{};
        DATA.riskAreas=heavyR[7].data||[];
        lastHeavy=nowMs;
      }
      if(STATE.view==='aws'){ try{ const ro=await sb.rpc('rain_overview',{p_range:STATE.rainRange}); DATA.rainOv=ro.data||[]; }catch(e){ DATA.rainOv=DATA.rainOv||[]; } }
      render();
    }
    function extDataset(){ return STATE.exRange==='7d' ? (DATA.ext7||[]) : (DATA.extActive||[]); }
    function wxDataset(){ return STATE.awRange==='7d' ? (DATA.wx7||[]) : (DATA.wxActive||[]); }
    function rangeToggle(scope,cur){
      const opts=[['live','Live · 1-min'],['24h','24h'],['7d','7d']];
      const fn=scope==='ex'?'setExRange':'setAwRange';
      return opts.map(([v,l])=>`<button class="btn-ghost xs ${cur===v?'on':''}" onclick="${fn}('${v}')">${l}</button>`).join('');
    }
    function setExRange(r){ STATE.exRange=r; loadAll(); }
    function setAwRange(r){ STATE.awRange=r; loadAll(); }
    window.setExRange=setExRange; window.setAwRange=setAwRange;
    function rainRangeToggle(cur){
      const opts=[['today','Today'],['7d','7 Days'],['30d','30 Days'],['1y','1 Year']];
      return opts.map(([v,l])=>`<button class="btn-ghost xs ${cur===v?'on':''}" onclick="setRainRange('${v}')">${l}</button>`).join('');
    }
    function setRainRange(r){ STATE.rainRange=r; loadAll(); }
    window.setRainRange=setRainRange;

    // ── EEWS PGA (replica of fetch-bmkg) ──
    function haversineKm(la1,lo1,la2,lo2){ const R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
      const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2; return R*2*Math.asin(Math.sqrt(a)); }
    function pgaDonovan(M,R){ return 1.096*Math.exp(0.664*M)*Math.pow(R+25,-1.55); }
    function parseCoordNum(str,neg){ const n=parseFloat(String(str||'').replace(/[^0-9.]/g,'')); return String(str||'').includes(neg)?-n:n; }
    function tarpInfo(pga){ if(pga<0.02) return {lv:'LV1',c:'#22c55e'}; if(pga<0.05) return {lv:'LV2',c:'#eab308'}; if(pga<0.10) return {lv:'LV3',c:'#f97316'}; return {lv:'LV4',c:'#ef4444'}; }
    function shortWil(w){ w=w||''; return w.length>24? w.slice(0,24)+'…':(w||'—'); }
    function latestPga(q){
      const M=Number(q.magnitude), depth=parseFloat(String(q.kedalaman||'').replace(/[^0-9.]/g,''));
      const lat=parseCoordNum(q.lintang,'LS'), lon=parseCoordNum(q.bujur,'BB');
      if(![M,depth,lat,lon].every(Number.isFinite)) return null;
      const sites=[{n:'WOC',la:-2.748761,lo:122.000297},{n:'Port',la:-2.725700,lo:122.028042}];
      let best={g:-1,site:'',epi:0};
      sites.forEach(s=>{ const epi=haversineKm(lat,lon,s.la,s.lo); const R=Math.sqrt(epi*epi+depth*depth); const g=pgaDonovan(M,R); if(g>best.g) best={g,site:s.n,epi:Math.round(epi)}; });
      const t=tarpInfo(best.g); return {g:best.g, site:best.site, tarp:t.lv, color:t.c, epi:best.epi};
    }

    function utm(e,n){
      const a=6378137,ec=0.00669438,k0=0.9996,x=e-500000,y=n-10000000,M=y/k0;
      const mu=M/(a*(1-ec/4-3*ec*ec/64)),e1=(1-Math.sqrt(1-ec))/(1+Math.sqrt(1-ec));
      const phi=mu+(3*e1/2-27*e1**3/32)*Math.sin(2*mu)+(21*e1**2/16-55*e1**4/32)*Math.sin(4*mu)+(151*e1**3/96)*Math.sin(6*mu);
      const N=a/Math.sqrt(1-ec*Math.sin(phi)**2),T=Math.tan(phi)**2,C=(ec/(1-ec))*Math.cos(phi)**2,R=a*(1-ec)/(1-ec*Math.sin(phi)**2)**1.5,D=x/(N*k0);
      const lat=phi-(N*Math.tan(phi)/R)*(D*D/2-(5+3*T+10*C-4*C*C-9*ec)*D**4/24);
      const lng=(123*Math.PI/180)+(D-(1+2*T+C)*D**3/6)/Math.cos(phi);
      return{lat:lat*180/Math.PI,lng:lng*180/Math.PI};
    }
    function locLatLng(l){
      if(l.lat && l.lng) return {lat:+l.lat, lng:+l.lng};
      if(l.easting && l.northing) return utm(+l.easting,+l.northing);
      return null;
    }

    function compute(){
      const sensors = DATA.sensors||[];
      const totalSensors = sensors.length;
      const onlineSensors = sensors.filter(s=>!stale(s.latest_ts,15)).length;
      const offlineSensors = totalSensors - onlineSensors;
      const newest = sensors.reduce((mx,s)=>s.latest_ts && (!mx||s.latest_ts>mx) ? s.latest_ts : mx, null);

      // inspections latest by location
      const latestIns = {};
      (DATA.insp||[]).forEach(d=>{ if(!latestIns[d.location_id]) latestIns[d.location_id]=d; });
      const insRows = Object.values(latestIns);

      const inspByRisk = { 'Very High':0, High:0, Medium:0, Low:0 };
      insRows.forEach(r=>{
        const k = (r.risk_final||'Low');
        inspByRisk[k] = (inspByRisk[k]||0) + 1;
      });

      const extTriggered = sensors.filter(s=>s.kind==='extensometer' && extStatus(s)!=='Low');
      const inspTriggered = insRows.filter(r=>r.risk_final==='High'||r.risk_final==='Very High');
      const totalAlerts = extTriggered.length + inspTriggered.length;

      // risk index (0-100) from inspection distribution
      const locCount = Math.max(insRows.length, 1);
      const raw = insRows.reduce((sum,r)=>sum + riskScoreFromLevel(r.risk_final||'Low'), 0);
      const riskIndex = Math.round((raw/(locCount*4))*100);
      const riskLabel = riskLabelFromIndex(riskIndex);

      // last inspection
      const lastInsp = (DATA.insp||[])[0] || null;

      // next inspection: placeholder +7d from last
      const nextInspDate = lastInsp && lastInsp.inspection_date ? new Date(new Date(lastInsp.inspection_date).getTime()+7*86400000) : null;

      // active instruments by type (unique device count)
      const kindMap = {};
      sensors.forEach(s=>{
        const k = s.kind || 'other';
        const id = String(s.external_device_id || s.sensor_id || s.sensor_name || Math.random());
        (kindMap[k]=kindMap[k]||new Set()).add(id);
      });
      const activeInstruments = onlineSensors; // tampil sebagai "X / X" seperti referensi

      // Alerts breakdown (watch/warning/critical)
      const warn = sensors.filter(s=>s.kind==='extensometer' && extStatus(s)==='High').length;
      const critical = sensors.filter(s=>s.kind==='extensometer' && extStatus(s)==='Very High').length;
      const watch = Math.max(0, totalAlerts - warn - critical);

      // Slope Stability Index (composite, higher = safer / FoS-like 0–3).
      // hazard = max(EWS level, normalized inspection risk) + rain penalty.
      const ewsLvMap = {HIJAU:0, KUNING:1, JINGGA:2, MERAH:3};
      const ewsLv = ewsLvMap[(DATA.ews && DATA.ews.status) || 'HIJAU'] || 0;
      const inspNorm = (riskIndex/100)*3;
      const rainPen = (DATA.ews && DATA.ews.rain_modifier_active) ? 0.5 : 0;
      const hazard = Math.min(3, Math.max(ewsLv, inspNorm) + rainPen);
      const ssi = Math.max(0, Math.min(3, 3 - hazard));
      const ssiLabel = ssi>=1.5 ? {t:'Normal', c:RC.Low}
                     : ssi>=1.0 ? {t:'Caution', c:RC.High}
                     : {t:'Critical', c:RC['Very High']};

      return {
        totalSensors, onlineSensors, offlineSensors, newest,
        insRows, inspByRisk,
        totalAlerts, extTriggered, inspTriggered,
        riskIndex, riskLabel,
        lastInsp, nextInspDate,
        activeInstruments, watch, warn, critical,
        ssi, ssiLabel,
      };
    }

    function overallStatus(metrics){
      // Meniru gaya "NORMAL" seperti referensi
      if(metrics.critical>0 || metrics.riskIndex>=70) return {t:'WASPADA', c:RC['Very High'], sub:'Critical condition detected'};
      if(metrics.totalAlerts>0 || metrics.riskIndex>=40) return {t:'PERHATIAN', c:RC.High, sub:'Attention required on triggered points'};
      return {t:'NORMAL', c:RC.Low, sub:'All monitored parameters within normal range'};
    }

    function tpl(){
      const nav = [
        ['overview','Overview'],
        ['instrument','Extensometer'],
        ['inclinometer','Inclinometer'],
        ['vwp','VWP'],
        ['aws','AWS / Weather'],
        ['inspection','Inspection Data'],
      ];

      return `
        <div class="app">
          <aside class="sidebar">
            <div class="brand">
              <div class="logo">G</div>
              <div>
                <b>GEOTECH MONITORING</b>
                <small>Executive Dashboard</small>
              </div>
            </div>

            <div class="nav">
              ${nav.map(([k,n])=>`
                <button class="${STATE.view===k?'act':''}" onclick="setView('${k}')">
                  <span class="ico">${k==='overview'?'▣':k==='instrument'?'⌁':k==='inclinometer'?'∠':k==='vwp'?'◎':k==='aws'?'☁':k==='inspection'?'▦':'⚙'}</span>
                  <span>${esc(n)}</span>
                </button>`).join('')}
            </div>

            <div class="side-foot">
              <div class="kv"><span>Project</span><b>Example Geotechnical</b></div>
              <div class="kv"><span>Location</span><b>West Area</b></div>
              <div class="kv"><span>Last Data Update</span><b id="lastUpd">—</b></div>
              <button class="btn" onclick="exportDashboard()">Export Report</button>
            </div>
          </aside>

          <main class="main">
            <div class="topbar">
              <button class="ham" onclick="toggleSidebar()">☰</button>
              <h1>EXECUTIVE MONITORING</h1>
              <div class="sub" id="modeLbl">Decision view</div>

    // ====== Time-series + trendline (tab instrumen) ======
    function groupBySensor(rows){
      const g={};
      (rows||[]).forEach(r=>{ const k=(r.external_device_id?('dev '+r.external_device_id+' · '):'')+r.sensor_name; (g[k]=g[k]||[]).push(r); });
      return g;
    }
    function byName(rows, sub){
      const s=sub.toLowerCase();
      return (rows||[]).filter(r=>(r.sensor_name||'').toLowerCase().includes(s)).slice().sort((a,b)=>new Date(a.ts)-new Date(b.ts));
    }
    function multiSeries(seriesList){
      const tset=new Set();
      seriesList.forEach(s=>(s.rows||[]).forEach(r=>tset.add(r.ts)));
      const ts=[...tset].sort();
      const labels=ts.map(t=>new Date(t).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}));
      const datasets=seriesList.map(s=>{ const m={}; (s.rows||[]).forEach(r=>m[r.ts]=(isFinite(+r.value)?+r.value:null));
        return {label:s.name,data:ts.map(t=>m[t]??null),borderColor:s.color,backgroundColor:s.color,borderWidth:1.6,pointRadius:0,tension:.25,spanGaps:true,fill:false}; });
      return {labels,datasets};
    }
    function addTrend(ms,color){
      if(!ms.datasets.length) return;
      const d0=ms.datasets[0].data;
      const pts=d0.map((y,i)=>({x:i,y})).filter(p=>p.y!=null&&isFinite(p.y));
      const reg=linearRegression(pts); if(!reg) return;
      ms.datasets.push({label:'Trendline',data:d0.map((_,i)=>reg.a+reg.b*i),borderColor:color||'#fbbf24',borderDash:[6,4],borderWidth:1.5,pointRadius:0,fill:false,tension:0,order:99});
    }
    function tsChart(canvasId,ms,unit){
      const cv=document.getElementById(canvasId); if(!cv||!window.Chart) return;
      charts[canvasId]=new Chart(cv,{type:'line',data:{labels:ms.labels,datasets:ms.datasets},
        options:{responsive:true,maintainAspectRatio:false,animation:false,interaction:{mode:'index',intersect:false},
          plugins:{legend:{display:true,labels:{color:'#cbd5e1',font:{size:9},boxWidth:10,boxHeight:8}}},
          scales:{x:{ticks:{maxTicksLimit:6,color:'#9fb3cf',font:{size:8}},grid:{display:false}},
                  y:{ticks:{color:'#9fb3cf',font:{size:9}},grid:{color:'rgba(148,163,184,.10)'},title:{display:!!unit,text:unit||'',color:'#9fb3cf',font:{size:9}}}}}});
    }

    function miniKpi(label,val,color){
      return `<div style="padding:9px 11px;border-radius:12px;background:rgba(2,6,23,.18);border:1px solid rgba(148,163,184,.12)">
        <div style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#9fb3cf;font-weight:900">${esc(label)}</div>
        <div style="font-size:18px;font-weight:950;color:${color};margin-top:5px">${esc(val)}</div></div>`;
    }
    function statsTable(){
      const order={extensometer:0,weather:1};
      const rows=(DATA.awsStats||[]).slice().sort((a,b)=>(order[a.kind]-order[b.kind])||String(a.sensor_name).localeCompare(b.sensor_name));
      return `<div class="card-hd" style="padding:12px 2px 2px"><div class="t">STATISTIK SENSOR — 7 HARI (avg / min / max)</div></div>
        <div class="card"><div class="card-bd" style="overflow:auto;max-height:240px">
          <table class="tbl"><thead><tr><th>Sensor</th><th>Jenis</th><th>Avg (7h)</th><th>Min</th><th>Max</th><th>Data</th></tr></thead><tbody>
          ${rows.map(s=>{const u=s.sensor_type_name==='AIO Atmosphere'?'kPa':(s.unit||'');
            return `<tr><td>${esc(s.sensor_name)}</td><td>${s.kind==='extensometer'?'Extensometer':'AWS'}</td><td><b>${fmt(s.avg_7d,2)}</b> ${esc(u)}</td><td>${fmt(s.min_7d,2)}</td><td>${fmt(s.max_7d,2)}</td><td>${s.n_7d||0}</td></tr>`;}).join('')}
          </tbody></table></div></div>`;
    }
    function instrumentView(){
      const ext=groupBySensor(DATA.ext7||[]);
      const extKeys=Object.keys(ext);
      const extCards = extKeys.length ? extKeys.map((k,i)=>`
        <div class="card"><div class="card-hd"><div class="t">📏 ${esc(k)}</div><div class="t" id="extrate_${i}" style="color:#9fb3cf"></div></div>
          <div class="card-bd" style="height:180px"><canvas id="extc_${i}"></canvas></div></div>`).join('')
        : `<div class="card"><div class="card-bd" style="color:var(--mut2)">Belum ada data extensometer 7 hari.</div></div>`;
      const awsCards = `
        <div class="card"><div class="card-hd"><div class="t">🌧️ Curah Hujan (menit & jam)</div></div><div class="card-bd" style="height:180px"><canvas id="awsRain"></canvas></div></div>
        <div class="card"><div class="card-hd"><div class="t">🌡️ Suhu & Kelembapan</div></div><div class="card-bd" style="height:180px"><canvas id="awsTH"></canvas></div></div>
        <div class="card"><div class="card-hd"><div class="t">💨 Kecepatan Angin & Radiasi</div></div><div class="card-bd" style="height:180px"><canvas id="awsWR"></canvas></div></div>`;
      const rs=DATA.rainSum||{}, rn=DATA.rain||{};
      const hidro = `
        <div class="card-hd" style="padding:0 2px 2px"><div class="t">AWS — HIDROLOGI · DATABASE HUJAN (durasi · akumulasi · peak)</div></div>
        <div class="card"><div class="card-bd">
          <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:10px">
            ${miniKpi('Durasi hujan kini', rn.is_raining?((rn.ongoing_rain_minutes||0)+' mnt'):'Tidak hujan', '#38bdf8')}
            ${miniKpi('Akumulasi hari ini', fmt(rs.today_mm,1)+' mm', '#22d3ee')}
            ${miniKpi('Akumulasi 7 hari', fmt(rs.week_mm,1)+' mm', '#3b82f6')}
            ${miniKpi('Akumulasi 30 hari', fmt(rs.month_mm,1)+' mm', '#6366f1')}
            ${miniKpi('Peak menit (24j)', fmt(rs.peak_minute_24h_mm,2)+' mm', '#f59e0b')}
            ${miniKpi('Peak jam (24j)', fmt(rs.peak_hour_24h_mm,1)+' mm/jam', '#f97316')}
          </div>
          <div style="margin-top:7px;font-size:10.5px;color:#9fb3cf">Menit hujan: hari ini <b>${rs.rain_minutes_today||0}</b> · 24 jam <b>${rs.rain_minutes_24h||0}</b>. ${(Number(rs.peak_hour_24h_mm)>0 && Number(rs.today_mm)===0)?'<span style="color:#f59e0b">⚠ Channel hujan/menit membaca 0 tetapi hujan/jam ada nilai — perlu verifikasi sensor.</span>':''}</div>
          <div style="height:150px;margin-top:8px"><canvas id="rainDaily"></canvas></div>
        </div></div>`;
      return hidro + `
        <div class="card-hd" style="padding:12px 2px 2px"><div class="t">EXTENSOMETER — TREND 7 HARI · garis putus-putus = trendline (laju mm/hari)</div></div>
        <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:10px">${extCards}</div>
        <div class="card-hd" style="padding:12px 2px 2px"><div class="t">AWS / CUACA — TREND 7 HARI</div></div>
        <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">${awsCards}</div>`
        + statsTable();
    }
    function drawInstrumentCharts(){
      Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}}); charts={};
      const ext=groupBySensor(DATA.ext7||[]);
      Object.keys(ext).forEach((k,i)=>{
        const ms=multiSeries([{name:k,rows:ext[k],color:'#a78bfa'}]); addTrend(ms,'#fbbf24');
        tsChart('extc_'+i,ms,'mm');
        const st=seriesStats(ext[k]); const el=document.getElementById('extrate_'+i);
        if(el&&st.mmPerDay!=null) el.textContent=(st.mmPerDay>=0?'+':'')+fmt(st.mmPerDay,3)+' mm/hari';
      });
      tsChart('awsRain', multiSeries([{name:'Hujan/menit (mm)',rows:byName(DATA.wx7,'rainfall minute'),color:'#38bdf8'},{name:'Hujan/jam (mm)',rows:byName(DATA.wx7,'rainfall hour'),color:'#1d4ed8'}]),'mm');
      const th=multiSeries([{name:'Suhu (°C)',rows:byName(DATA.wx7,'temperature'),color:'#ef4444'},{name:'Kelembapan (%)',rows:byName(DATA.wx7,'humidity'),color:'#22d3ee'}]); addTrend(th,'#fbbf24'); tsChart('awsTH',th);
      tsChart('awsWR', multiSeries([{name:'Angin (m/s)',rows:byName(DATA.wx7,'wind speed'),color:'#22c55e'},{name:'Radiasi (W/m²)',rows:byName(DATA.wx7,'radiation'),color:'#f97316'}]));
      // Akumulasi hujan harian (bar)
      const rd=DATA.rainDaily||[]; const cvd=document.getElementById('rainDaily');
      if(cvd&&window.Chart){
        charts['rainDaily']=new Chart(cvd,{type:'bar',
          data:{labels:rd.map(d=>new Date(d.day).toLocaleDateString('id-ID',{day:'2-digit',month:'short'})),
            datasets:[{label:'Akumulasi (mm/hari)',data:rd.map(d=>d.total_mm),backgroundColor:'#38bdf8'}]},
          options:{responsive:true,maintainAspectRatio:false,animation:false,plugins:{legend:{display:false}},
            scales:{x:{ticks:{color:'#9fb3cf',font:{size:8}},grid:{display:false}},
                    y:{beginAtZero:true,ticks:{color:'#9fb3cf',font:{size:9}},grid:{color:'rgba(148,163,184,.10)'},title:{display:true,text:'mm/hari',color:'#9fb3cf',font:{size:9}}}}}});
      }
    }

    // ===================== EXTENSOMETER & AWS TABS =====================
    function hexA(hex,a){ const h=hex.replace('#',''); const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16); return `rgba(${r},${g},${b},${a})`; }
    function sensorVU(s){ if(s.latest_value==null) return {v:'—',unit:''};
      if(s.sensor_type_name==='AIO Atmosphere') return {v:fmt(s.latest_value,2),unit:'kPa'};
      return {v:fmt(s.latest_value,2),unit:s.unit||''}; }
    function statusOf(s){ if(s.manual_state==='on') return {t:'ACTIVE (manual)',c:'#22c55e'};
      if(s.manual_state==='off') return {t:'OFF (manual)',c:'#94a3b8'};
      return stale(s.latest_ts,15)?{t:'DOWN',c:'#ef4444'}:{t:'ACTIVE',c:'#22c55e'}; }
    function trendArrow(mmPerDay){ if(mmPerDay==null||!isFinite(mmPerDay)) return '<span class="trend-st">→ stable</span>';
      const v=mmPerDay/24;
      if(v>0.0005) return `<span class="trend-up">↑ rising (+${fmt(v,4)} mm/hour)</span>`;
      if(v<-0.0005) return `<span class="trend-dn">↓ falling (${fmt(v,4)} mm/hour)</span>`;
      return `<span class="trend-st">→ stable (${fmt(v,4)} mm/hour)</span>`; }
    function trendOfRows(rows){ const byS={}; (rows||[]).forEach(r=>{(byS[r.sensor_name]=byS[r.sensor_name]||[]).push(r);});
      const sl=Object.values(byS).map(rs=>seriesStats(rs).mmPerDay).filter(x=>x!=null&&isFinite(x));
      return sl.length? sl.reduce((a,b)=>a+b,0)/sl.length : null; }
    function areaCfg(ms,unit){ return {type:'line',data:{labels:ms.labels,datasets:ms.datasets},
      options:{responsive:true,maintainAspectRatio:false,animation:false,interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:true,position:'top',labels:{color:'#cbd5e1',font:{size:9},boxWidth:10,boxHeight:8,usePointStyle:true}}},
        scales:{x:{ticks:{maxTicksLimit:7,color:'#9fb3cf',font:{size:8}},grid:{display:false}},
                y:{ticks:{color:'#9fb3cf',font:{size:9}},grid:{color:'rgba(148,163,184,.10)'},title:{display:!!unit,text:unit||'',color:'#9fb3cf',font:{size:9}}}}}}; }
    function dStr(off){ return new Date(Date.now()+off*86400000).toISOString().slice(0,10); }

    function sensorNum(name){ const m=(name||'').match(/Sensor(\d+)/); return m?parseInt(m[1]):0; }

    function processInc(rows){
      const byDev={};
      (rows||[]).forEach(r=>{(byDev[r.external_device_id]=byDev[r.external_device_id]||[]).push(r);});
      const out={};
      for(const devId of Object.keys(byDev)){
        const all=byDev[devId];
        const aRows=all.filter(r=>r.sensor_name.includes('-A-Axis-sin'));
        const bRows=all.filter(r=>r.sensor_name.includes('-B-Axis-sin'));
        const tRows=all.filter(r=>r.sensor_name.includes('-Temp-'));
        const nums=[...new Set(aRows.map(r=>sensorNum(r.sensor_name)))].filter(n=>n>0).sort((a,b)=>a-b);
        if(!nums.length) continue;
        const maxN=Math.max(...nums);
        const allNums=[];
        for(let n=1;n<=maxN;n++) allNums.push(n);
        const timestamps=[...new Set(aRows.map(r=>r.ts))].sort();
        if(!timestamps.length) continue;
        const aLk={}, bLk={};
        aRows.forEach(r=>{ aLk[r.ts+'|'+sensorNum(r.sensor_name)]=r.value; });
        bRows.forEach(r=>{ bLk[r.ts+'|'+sensorNum(r.sensor_name)]=r.value; });
        const baseTsA={}, baseTsB={};
        for(const n of allNums){
          for(const ts of timestamps){
            if(baseTsA[n]==null && aLk[ts+'|'+n]!=null) baseTsA[n]=aLk[ts+'|'+n];
            if(baseTsB[n]==null && bLk[ts+'|'+n]!=null) baseTsB[n]=bLk[ts+'|'+n];
            if(baseTsA[n]!=null && baseTsB[n]!=null) break;
          }
        }
        const profiles={};
        for(const ts of timestamps){
          let cumA=0,cumB=0; const depths=[],aCum=[],bCum=[];
          for(const n of allNums){
            const aVal=aLk[ts+'|'+n], bVal=bLk[ts+'|'+n];
            const dA=aVal!=null&&baseTsA[n]!=null?(aVal-baseTsA[n])*GAUGE_LEN:0;
            const dB=bVal!=null&&baseTsB[n]!=null?(bVal-baseTsB[n])*GAUGE_LEN:0;
            cumA+=dA; cumB+=dB;
            depths.push((maxN-n+1)*3);
            aCum.push(cumA); bCum.push(cumB);
          }
          profiles[ts]={depths,aCum,bCum};
        }
        const topIdx=allNums.length-1;
        const topSeries=timestamps.map(ts=>({ts,a:profiles[ts].aCum[topIdx],b:profiles[ts].bCum[topIdx]}));
        const latestTemp=tRows.length?tRows.sort((a,b)=>b.ts.localeCompare(a.ts))[0].value:null;
        const dailyGroups={};
        for(const ts of timestamps){ const dk=new Date(ts).toLocaleDateString('id-ID',{day:'numeric',month:'short'}); (dailyGroups[dk]=dailyGroups[dk]||[]).push(ts); }
        const dailyDates=Object.keys(dailyGroups);
        const dailyProfiles={};
        for(const dk of dailyDates){ const tsList=dailyGroups[dk]; const cnt=tsList.length; const aCum=allNums.map((_,j)=>tsList.reduce((s,ts)=>s+(profiles[ts]?.aCum[j]||0),0)/cnt); const bCum=allNums.map((_,j)=>tsList.reduce((s,ts)=>s+(profiles[ts]?.bCum[j]||0),0)/cnt); dailyProfiles[dk]={depths:allNums.map(nn=>(maxN-nn+1)*3),aCum,bCum}; }
        out[devId]={nums:allNums,maxN,timestamps,profiles,topSeries,latestTemp,depths:allNums.map(n=>(maxN-n+1)*3),dailyDates,dailyProfiles};
      }
      return out;
    }

    function pickProfileDates(timestamps,max){
      if(timestamps.length<=max) return timestamps.slice();
      const step=Math.max(1,Math.floor((timestamps.length-1)/(max-1)));
      const out=[];
      for(let i=0;i<timestamps.length&&out.length<max-1;i+=step) out.push(timestamps[i]);
      if(out[out.length-1]!==timestamps[timestamps.length-1]) out.push(timestamps[timestamps.length-1]);
      return out;
    }

    const VWP_CALIB = {

      '181361': {1:{G:0.00031458,R0:8607.6344904}},

    };

    // Koordinat instalasi VWP (mE, mN, depth m) — untuk peta nanti
    const VWP_COORDS = {
      '181456': {hole:'VWP-WOC-01',mE:388487,mN:9696227,depth:30},

    function vwpChLabel(devId,chName){
      const node=VWP_NODES.find(n=>n.id===devId);
      if(!node) return chName;
      const m=chName.match(/Ch(\d+)/);
      if(m && (node.channels||0)>1) return node.label+' '+String(m[1]).padStart(2,'0');
      return node.label;
    }

    function processVwp(rows){
      const byDev={};
      (rows||[]).forEach(r=>{(byDev[r.external_device_id]=byDev[r.external_device_id]||[]).push(r);});
      const out={};
      for(const devId of Object.keys(byDev)){
        const all=byDev[devId];
        const digitRows=all.filter(r=>r.sensor_name.startsWith('freqSqInDigit-'));
        const tRows=all.filter(r=>r.sensor_name.startsWith('tInCelsius-'));
        const channels={};
        const calib=VWP_CALIB[devId];
        digitRows.forEach(r=>{
          const m=r.sensor_name.match(/Ch(\d+)/);
          if(!m||!calib) return;
          const chNum=parseInt(m[1]);
          const cal=calib[chNum];
          if(!cal) return;
          const pKpa=cal.G*(cal.R0-r.value)*1000;
          const chKey='p-'+devId+'-Ch'+chNum;
          const row={...r, sensor_name:chKey, value:pKpa};
          (channels[chKey]=channels[chKey]||[]).push(row);
        });
        const latestTemp=tRows.length?tRows.sort((a,b)=>b.ts.localeCompare(a.ts))[0].value:null;
        out[devId]={channels,latestTemp,pRows:Object.values(channels).flat()};
      }
      return out;
    }

        const detailSeries=chKeys.map((ch,i)=>{

          if(STATE.vwpRange==='live') addTrend(ms,'#fbbf24');
          tsChart('vwpDetail',ms,'kPa');
        }
      }
    }

    function renderInsHeatmap(){
      const h=(INS.analytics&&INS.analytics.heatmap)||[]; const box=document.getElementById('insHeat'); if(!box) return;
      if(!h.length){ box.innerHTML='<div style="color:var(--mut2)">Tidak ada finding aktif.</div>'; return; }
      const locs=[...new Set(h.map(d=>d.location))];
      const ptot={}; h.forEach(d=>{ptot[d.parameter]=(ptot[d.parameter]||0)+(+d.score||0);});
      const params=Object.keys(ptot).sort((a,b)=>ptot[b]-ptot[a]).slice(0,8);
      const cell={}; h.forEach(d=>{cell[d.location+'|'+d.parameter]=Math.max(cell[d.location+'|'+d.parameter]||0,+d.score||0);});
      const short=s=>s.replace('Kondisi ','').replace(' (instrument)','').replace('Movement Velocity','MV');
      let html='<table class="heat"><thead><tr><th style="text-align:left">Lokasi</th>'+params.map(p=>`<th title="${esc(p)}">${esc(short(p))}</th>`).join('')+'</tr></thead><tbody>';
      locs.forEach(L=>{ html+=`<tr><td style="text-align:left;white-space:nowrap">${esc(L)}</td>`+params.map(p=>{const v=cell[L+'|'+p];return `<td style="background:${hmColor(v||0)};color:#0b1220;font-weight:700">${v||''}</td>`;}).join('')+'</tr>'; });
      html+='</tbody></table>';
      box.innerHTML=html;
    }

      try{

        await drawInspectionData(); setInsTab('log');
      }catch(e){ alert('Gagal mengubah status: '+(e.message||e)); }

      drawSsiGauge(m.ssi, m.ssiLabel.c);

      document.getElementById('kRiskIdx').textContent = m.riskIndex;
      document.getElementById('kRiskLbl').textContent = m.riskLabel.t;
      document.getElementById('kRiskDot').style.setProperty('--c', m.riskLabel.c);
