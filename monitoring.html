<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#071a2e" />
  <link rel="manifest" href="manifest.json" />
  <title>Geotechnical Monitoring — Executive Dashboard</title>

  <!-- Referensi font & token warna tetap mengikuti bundle yang Anda kirim -->
  <link rel="stylesheet" href="common.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="common.js"></script>

  <style>
    :root{
      --bg0:#051426;
      --bg1:#04101f;
      --panel0:#0a2037;
      --panel1:#0b243f;
      --panel2:#0e2c4d;
      --stroke:rgba(148,163,184,.16);
      --stroke2:rgba(148,163,184,.12);
      --txt:#e5e7eb;
      --txt2:#f1f5f9;
      --mut:#94a3b8;
      --mut2:#a8b4c7;
      --blue:#3b82f6;
      --cyan:#22d3ee;
      --green:#22c55e;
      --yellow:#eab308;
      --orange:#f97316;
      --red:#ef4444;
      --shadow:0 14px 40px rgba(2,6,23,.35);

      /* Trigger symbology (sesuai diskusi) */
      --t-low: #22c55e;   /* hijau */
      --t-med: #eab308;   /* kuning */
      --t-high:#f97316;   /* oranye */
      --t-vh:  #ef4444;   /* merah */
    }

    *{box-sizing:border-box}
    html,body{height:100%;margin:0}
    body{
      color:var(--txt);
      background:
        radial-gradient(1000px 520px at 16% 0%, rgba(59,130,246,.18), rgba(0,0,0,0) 60%),
        radial-gradient(820px 520px at 80% 8%, rgba(34,197,94,.12), rgba(0,0,0,0) 55%),
        linear-gradient(180deg, var(--bg0) 0%, var(--bg1) 100%);
      overflow:hidden; /* target 1 layar laptop */
    }

    .app{display:flex;height:100vh;width:100vw}
    .sidebar{
      position:fixed;top:0;left:0;bottom:0;z-index:200;width:240px;
      background:linear-gradient(180deg, rgba(8,26,45,.99) 0%, rgba(5,18,32,.99) 100%);
      border-right:1px solid rgba(148,163,184,.12);
      padding:14px 12px;
      display:flex;flex-direction:column;gap:14px;overflow-y:auto;
      transform:translateX(-100%);transition:transform .22s ease;
    }
    .sidebar.open{transform:translateX(0);box-shadow:6px 0 40px rgba(0,0,0,.55)}
    .scrim{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:190;opacity:0;pointer-events:none;transition:opacity .2s ease}
    .scrim.show{opacity:1;pointer-events:auto}
    .brand{
      display:flex;align-items:center;gap:10px;
      padding:10px 10px;border-radius:14px;
      background:rgba(2,6,23,.20);
      border:1px solid rgba(148,163,184,.12);
    }
    .logo{
      width:36px;height:36px;border-radius:11px;
      display:flex;align-items:center;justify-content:center;font-size:17px;
      background:linear-gradient(150deg,rgba(251,146,60,.2),rgba(37,99,235,.16));
      border:1px solid rgba(251,146,60,.4);color:var(--orange);font-weight:900;
    }
    .topbar .logo{width:30px;height:30px;font-size:15px;border-radius:9px}
    .brand b{font-size:12px;letter-spacing:.06em}
    .brand small{display:block;color:var(--mut);font-size:10px;margin-top:2px}

    .nav{display:flex;flex-direction:column;gap:4px}
    .nav button{
      width:100%;border:none;background:transparent;
      color:#b8c7de;cursor:pointer;
      padding:10px 10px;border-radius:12px;
      display:flex;align-items:center;gap:10px;
      font-size:12px;font-weight:700;
    }
    .nav button:hover{background:rgba(255,255,255,.05)}
    .nav button.act{
      background:linear-gradient(180deg, rgba(59,130,246,.18), rgba(59,130,246,.10));
      border:1px solid rgba(59,130,246,.25);
      color:var(--txt2);
    }
    .ico{
      width:26px;height:26px;border-radius:10px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(148,163,184,.10);
      border:1px solid rgba(148,163,184,.12);
      color:#cbd5e1;font-size:12px;
      flex:0 0 auto;
    }
    .nav button.act .ico{background:rgba(59,130,246,.18);border-color:rgba(59,130,246,.25);color:#bfdbfe}

    .side-foot{
      margin-top:auto;
      padding:10px;border-radius:14px;
      background:rgba(2,6,23,.18);
      border:1px solid rgba(148,163,184,.12);
      display:flex;flex-direction:column;gap:8px;
      font-size:11px;color:var(--mut2);
    }
    .side-foot .kv{display:flex;justify-content:space-between;gap:10px}
    .side-foot .kv b{color:var(--txt2)}
    .side-foot .btn{
      margin-top:6px;border:none;border-radius:12px;
      background:rgba(59,130,246,.92);
      color:#fff;font-weight:900;font-size:12px;
      padding:9px 10px;cursor:pointer;
    }
    .side-foot .btn:hover{filter:brightness(1.05)}

    .main{flex:1;min-width:0;display:flex;flex-direction:column}
    .topbar{
      height:54px;flex:0 0 54px;
      display:flex;align-items:center;gap:10px;
      padding:10px 14px;
      background:rgba(10,32,55,.75);
      border-bottom:1px solid rgba(148,163,184,.10);
      backdrop-filter:saturate(130%) blur(10px);
    }
    .topbar h1{margin:0;font-size:13px;font-weight:950;letter-spacing:.06em}
    .topbar .sub{font-size:11px;color:var(--mut);margin-left:8px}
    .topbar .spacer{margin-left:auto}
    .chip{
      display:inline-flex;align-items:center;gap:8px;
      padding:7px 10px;border-radius:999px;
      border:1px solid rgba(148,163,184,.14);
      background:rgba(2,6,23,.18);
      font-size:11px;color:var(--mut2);
    }
    .chip b{color:var(--txt2)}
    .btn-ghost{
      border:1px solid rgba(148,163,184,.14);
      background:rgba(2,6,23,.16);
      color:var(--txt2);
      padding:8px 10px;border-radius:12px;
      font-weight:900;font-size:12px;cursor:pointer;
    }
    .btn-ghost:hover{background:rgba(255,255,255,.05)}

    .page{
      flex:1;min-height:0;
      padding:12px;
      overflow:hidden; /* tetap 1 layar */
      display:flex;flex-direction:column;gap:10px;
    }
    .page.scroll{overflow:auto}

    .card{
      background:linear-gradient(180deg, rgba(14,44,77,.85), rgba(10,32,55,.85));
      border:1px solid var(--stroke);
      border-radius:16px;
      box-shadow:var(--shadow);
      min-width:0;
      position:relative;
    }
    /* Clickable card — used on Overview for drill-down into detail tabs */
    .card.clickable{cursor:pointer;transition:transform .12s ease, border-color .12s ease, box-shadow .12s ease}
    .card.clickable:hover{transform:translateY(-2px);border-color:rgba(59,130,246,.45);box-shadow:0 18px 36px rgba(2,8,20,.45)}
    .card.clickable .more-arrow{display:none}
    .card-hd{
      padding:10px 12px 0;
      display:flex;align-items:center;justify-content:space-between;gap:10px;
    }
    .card-hd .t{
      font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;
      color:#9fb3cf;
      font-weight:900;
    }
    .card-hd .ic{
      width:28px;height:28px;border-radius:12px;
      display:flex;align-items:center;justify-content:center;
      background:rgba(148,163,184,.10);
      border:1px solid rgba(148,163,184,.14);
      color:#cbd5e1;font-size:12px;
      flex:0 0 auto;
    }
    .card-bd{padding:10px 12px 12px;min-height:0}

    /* EWS Banner */
    .ews-banner{
      border:1.5px solid;border-radius:14px;
      padding:10px 14px;
      display:flex;align-items:center;justify-content:space-between;gap:14px;
      flex-wrap:wrap;
    }
    .ews-main{display:flex;align-items:center;gap:10px}
    .ews-dot{width:12px;height:12px;border-radius:50%;flex:0 0 12px;animation:pulse 2s infinite}
    .ews-label{font-size:10px;letter-spacing:.12em;text-transform:uppercase;font-weight:900;color:var(--mut2)}
    .ews-status{font-size:18px;font-weight:950;letter-spacing:.04em}
    .ews-evak{
      font-size:10px;font-weight:900;letter-spacing:.08em;
      padding:3px 10px;border-radius:999px;
      background:rgba(239,68,68,.25);color:#ef4444;border:1px solid rgba(239,68,68,.5);
      animation:pulse 1.5s infinite;
    }
    .ews-sub{font-size:11px;color:var(--mut2);margin-top:2px}
    .ews-meta{font-size:10px;color:var(--mut);margin-top:2px;display:flex;gap:6px;flex-wrap:wrap}
    .ews-devices{display:flex;gap:6px;flex-wrap:wrap}
    .ews-dev{
      display:flex;align-items:center;gap:4px;
      padding:4px 8px;border-radius:8px;
      background:rgba(2,6,23,.3);border:1px solid rgba(148,163,184,.12);
      font-size:10px;
    }
    .ews-dev-dot{width:6px;height:6px;border-radius:50%;flex:0 0 6px}
    .ews-dev-nm{color:var(--mut2);font-weight:700}
    .ews-dev-lv{font-weight:900;font-size:9px;letter-spacing:.06em}
    .ews-dev-v{color:var(--mut);font-size:9px}
    .ews-dev-vr{color:var(--mut);font-size:9px}

    .kpi-grid{
      display:grid;
      grid-template-columns: 1fr 1fr 1.55fr 1.35fr 1.1fr 1fr 1fr;
      gap:8px;
    }
    @media(max-width:1280px){
      .kpi-grid{grid-template-columns:repeat(4,1fr)}
      body{overflow:auto} /* fallback utk layar kecil */
      .page{overflow:visible}
    }

    .kpi-val{font-size:22px;font-weight:950;letter-spacing:.01em}
    .kpi-sub{font-size:11px;color:var(--mut2);margin-top:4px;line-height:1.25}
    .kpi-tag{display:inline-flex;align-items:center;gap:6px;margin-top:8px;font-size:11px;color:var(--mut2)}
    .dot{width:8px;height:8px;border-radius:999px;background:var(--c);display:inline-block}
    /* Tighter typography for the 7-up KPI row */
    .kpi-grid .card-bd{padding:6px 9px 7px}
    .kpi-grid .card-hd{padding:6px 9px 0}
    .kpi-grid .kpi-val{font-size:18px}
    .kpi-grid .kpi-sub{font-size:9.5px;margin-top:2px}
    .kpi-grid .kpi-tag{margin-top:4px}
    .kpi-grid .card-hd .t{font-size:8.5px}

    .dash{
      flex:1;
      display:grid;
      grid-template-rows: 1fr 0.92fr;
      gap:10px;
      min-height:0;
    }
    .upper{
      display:grid;
      grid-template-columns: 1.55fr 1fr 1fr;
      gap:10px;
      min-height:0;
    }
    .lower{
      display:grid;
      grid-template-columns: 1.25fr 1fr 1fr;
      gap:10px;
      min-height:0;
    }

    /* Executive dashboard layout (matches reference mockup) */
    .exec-grid{
      display:grid;
      grid-template-columns: 1fr 1.95fr 1.05fr;
      grid-template-rows: 1fr auto;
      gap:10px; min-height:0;
      height:calc(100vh - 180px);
    }
    .exec-left{ grid-column:1; grid-row:1 / span 2; }
    .exec-map{ grid-column:2; grid-row:1; }
    .exec-alerts{ grid-column:3; grid-row:1; }
    .exec-bottom{ grid-column:2 / span 2; grid-row:2; display:grid; grid-template-columns:repeat(4,1fr); gap:10px; }
    .exec-col{display:flex;flex-direction:column;gap:10px;min-height:0;overflow:auto}
    .exec-col.exec-left{overflow:hidden}   /* no scrollbar — cards flex to fit the column */
    /* Monitoring dashboard: 4 charts stacked to fill one screen, shared timeline */
    .mon-stack{display:flex;flex-direction:column;gap:7px}   /* page scrolls; heatmap gets natural height */
    .mon-stack>.card{height:230px;min-height:230px;display:flex;flex-direction:column}
    .mon-inc{display:flex;flex-direction:column;margin:2px 0}
    #monIncOverview canvas{position:static;inset:auto;max-width:100%;display:block}
    .mon-stack .card-hd{padding:5px 12px 0}
    .mon-stack>.card>.card-bd{flex:1;min-height:0;position:relative;padding:5px 10px 7px}
    .mon-stack canvas{position:absolute;inset:6px 10px 8px}
    /* Side-by-side A/B axis split for the inclinometer card */
    .mon-split{display:grid;grid-template-columns:1fr 1fr;grid-template-rows:minmax(0,1fr);gap:12px;height:100%;min-height:0;overflow:hidden}
    .mon-split>div{position:relative;min-height:0;min-width:0;overflow:hidden}
    .mon-stack .mon-split canvas{position:absolute;inset:15px 4px 8px 4px}
    .mon-sub{position:absolute;top:0;left:4px;font-size:9px;font-weight:800;letter-spacing:.04em;color:#9fb3cf;z-index:1}
    /* Hover info bubble (ⓘ) — technical reading guide per chart */
    .info{position:relative;display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;border:1px solid rgba(148,163,184,.55);color:#9fb3cf;font-size:10px;line-height:1;cursor:help;margin-left:7px;font-style:normal;font-weight:700;vertical-align:middle}
    .info .info-pop{display:none;position:absolute;top:130%;left:0;width:250px;background:#0b1424;border:1px solid rgba(148,163,184,.35);border-radius:9px;padding:9px 11px;font-size:10.5px;line-height:1.45;color:#cbd5e1;z-index:60;box-shadow:0 12px 34px rgba(0,0,0,.55);font-weight:500;text-transform:none;letter-spacing:0;text-align:left;white-space:normal}
    .info:hover .info-pop,.info:focus .info-pop{display:block}
    .card-hd .t .info-pop b{color:#e5e7eb}
    .exec-grid > .card{display:flex;flex-direction:column;min-height:0}
    .exec-grid > .card > .card-bd{flex:1;min-height:0;overflow:hidden;display:flex;flex-direction:column}
    .exec-grid .alert-list{flex:1;min-height:0;overflow-y:auto;padding-right:5px}
    .inst-card .card-hd{padding:7px 10px 0}
    .inst-card .card-bd{padding:5px 10px 8px}
    .inst-card .ic-metric{font-size:9px;color:var(--mut)}
    .inst-card .ic-val{font-size:18px;font-weight:900;line-height:1.05;margin:1px 0}
    .inst-card .ic-spark{height:28px;margin-top:1px}
    .inst-card .ic-delta{font-size:10px;margin-top:2px;font-weight:700}
    .inst-card .spike{margin-top:2px;font-size:9px}
    /* Dark scrollbars matching the background */
    *::-webkit-scrollbar{width:9px;height:9px}
    *::-webkit-scrollbar-track{background:rgba(2,8,20,.30);border-radius:9px}
    *::-webkit-scrollbar-thumb{background:rgba(59,130,246,.32);border-radius:9px;border:2px solid transparent;background-clip:padding-box}
    *::-webkit-scrollbar-thumb:hover{background:rgba(59,130,246,.55);background-clip:padding-box}
    *{scrollbar-width:thin;scrollbar-color:rgba(59,130,246,.38) rgba(2,8,20,.30)}
    @media(max-width:1100px){
      .exec-grid{grid-template-columns:1fr;grid-template-rows:none;height:auto}
      .exec-left,.exec-map,.exec-alerts,.exec-bottom{grid-column:auto;grid-row:auto}
      .exec-col{overflow:visible}
      .exec-bottom{grid-template-columns:repeat(2,1fr)}
    }

    /* Map */
    #map{flex:1;height:100%;min-height:260px;border-radius:14px;overflow:hidden}
    .map-wrap{height:100%;min-height:260px}
    .mapcard{display:flex;flex-direction:column}
    .mapcard > .card-bd{flex:1;min-height:260px;display:flex;flex-direction:column;position:relative}
    .legend{
      position:absolute;left:10px;bottom:10px;z-index:500;
      background:rgba(2,6,23,.62);
      border:1px solid rgba(148,163,184,.18);
      border-radius:10px;
      padding:6px 8px;
      font-size:10.5px;color:#cbd5e1;
      backdrop-filter: blur(10px);
      max-width:200px;
      transition:padding .15s ease, max-height .2s ease;
      overflow:hidden;
    }
    .legend.collapsed{padding:4px 6px;max-height:24px;}
    .legend .lg{
      font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;color:#9fb3cf;font-weight:900;
      display:flex;align-items:center;justify-content:space-between;gap:8px;cursor:pointer;user-select:none;
      margin-bottom:4px;
    }
    .legend.collapsed .lg{margin-bottom:0}
    .legend .lg .tg{font-size:10px;line-height:1;padding:0 3px;color:#9fb3cf}
    .legend .body{display:block}
    .legend.collapsed .body{display:none}
    .legend .it{display:flex;align-items:center;gap:7px;margin:2px 0}
    .legend .sw{width:10px;height:10px;border-radius:3px;background:var(--c);border:1px solid rgba(255,255,255,.16);flex:0 0 auto}

    /* Leaflet theming */
    .leaflet-control-zoom a{
      background:rgba(2,6,23,.55) !important;
      border:1px solid rgba(148,163,184,.18) !important;
      color:#e5e7eb !important;
    }
    .leaflet-control-layers{
      background:rgba(2,6,23,.55) !important;
      border:1px solid rgba(148,163,184,.18) !important;
      border-radius:14px !important;
      box-shadow:var(--shadow) !important;
      color:#e5e7eb !important;
      backdrop-filter: blur(10px);
    }
    .leaflet-control-layers label{font-size:12px}
    .leaflet-control-layers-expanded{padding:10px 10px 8px}
    .leaflet-control-attribution{display:none}

    /* Panels internal layout */
    .split{
      display:grid;
      grid-template-columns: 0.95fr 1fr;
      gap:10px;
      align-items:center;
    }
    .mini-list{display:flex;flex-direction:column;gap:7px}
    .mini-list .row{
      display:flex;align-items:center;justify-content:space-between;gap:10px;
      padding:8px 10px;border-radius:12px;
      background:rgba(2,6,23,.18);
      border:1px solid rgba(148,163,184,.12);
      font-size:11px;color:var(--mut2);
    }
    .mini-list .row b{color:var(--txt2)}
    /* Compact breakdown for the Total Risk Level KPI card */
    #kRiskBreakdown{gap:3px;justify-content:center}
    #kRiskBreakdown .row{padding:2px 2px;background:none;border:none;font-size:10px}

    .tbl{
      width:100%;border-collapse:collapse;
      font-size:11.5px;
    }
    .tbl th,.tbl td{
      border-bottom:1px solid rgba(148,163,184,.10);
      padding:9px 8px;
      text-align:left;
      white-space:nowrap;
    }
    .tbl th{
      font-size:9.5px;text-transform:uppercase;letter-spacing:.12em;
      color:#9fb3cf;
    }
    .tbl td:last-child,.tbl th:last-child{text-align:right}
    .trend-up{color:var(--green);font-weight:900}
    .trend-dn{color:var(--red);font-weight:900}
    .trend-st{color:#cbd5e1;font-weight:900}

    .instruments{display:flex;flex-direction:column;gap:5px;flex:1;justify-content:center;min-height:0}
    .inst{
      padding:4px 9px;border-radius:9px;
      background:rgba(2,6,23,.18);
      border:1px solid rgba(148,163,184,.12);
      display:flex;align-items:center;gap:8px;min-width:0;
    }
    .inst .inst-ico{font-size:13px;width:17px;text-align:center;flex:none}
    .inst .nm{font-size:8.5px;letter-spacing:.03em;text-transform:uppercase;color:#cbd5e1;font-weight:800;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .inst .v{font-size:12px;font-weight:950;flex:none}
    .inst .s{font-size:8px;flex:none;min-width:64px;text-align:right;white-space:nowrap}

    .two-stack{display:flex;flex-direction:column;gap:10px;min-height:0}
    .alerts-stack{display:grid;grid-template-rows: 0.46fr 0.54fr;gap:10px;min-height:0}

    .sparks{
      display:grid;grid-template-columns:repeat(2,1fr);
      gap:10px;
    }
    .spark{
      padding:10px 10px;border-radius:14px;
      background:rgba(2,6,23,.18);
      border:1px solid rgba(148,163,184,.12);
      min-width:0;
    }
    .spark .k{font-size:10px;color:#9fb3cf;letter-spacing:.12em;text-transform:uppercase;font-weight:900}
    .spark .v{margin-top:6px;font-size:13px;font-weight:950;color:var(--txt2)}
    .spark .cv{margin-top:10px;height:74px}

    .alert-list{
      margin-top:8px;
      display:flex;flex-direction:column;gap:8px;
      max-height:100%;
      overflow:auto;
      padding-right:4px;
    }
    .alert{
      padding:10px 10px;border-radius:14px;
      background:rgba(2,6,23,.18);
      border:1px solid rgba(148,163,184,.12);
      min-width:0;
    }
    .alert .a1{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .alert .ttl{font-weight:950;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    .alert .sev{font-size:11px;font-weight:950;color:var(--c)}
    .alert .risk-pill{flex:none;font-size:10px;font-weight:900;color:var(--rc);
      border:1px solid var(--rc);background:color-mix(in srgb, var(--rc) 16%, transparent);
      padding:1px 8px;border-radius:999px;white-space:nowrap;line-height:1.5}
    .alert .a2{margin-top:6px;font-size:11px;color:var(--mut2);line-height:1.25}
    .alert .tm{margin-top:7px;font-size:10.5px;color:#9fb3cf}

    /* Compact for laptop */

<body>
  <div id="root">
    <div class="center" style="min-height:100vh"><div class="spin"></div></div>
  </div>

  <script>
    "use strict";
    const sb = GMS.sb, esc = GMS.esc;

    const RC = { Low:getCss('--t-low'), Medium:getCss('--t-med'), High:getCss('--t-high'), 'Very High':getCss('--t-vh') };
    const EEWS_C = { LV1:RC.Low, LV2:RC.Medium, LV3:RC.High, LV4:RC['Very High'] };
    const EWS_COLORS = { HIJAU:'#22c55e', KUNING:'#eab308', JINGGA:'#f97316', MERAH:'#ef4444' };
    const EWS_LABELS = { HIJAU:'Low', KUNING:'Medium', JINGGA:'High', MERAH:'Very High' };

    const STATE = { view:'overview', exRange:'24h', awRange:'24h', rainRange:'7d', incRange:'7d', vwpRange:'all', incNode:null, vwpNode:null, incFrom:null, incTo:null, carouselOn:false };
    let DATA = {};
    let map = null;
    let overlays = null;
    let charts = {};
    let ewsChannel = null;

    // ── Realtime subscription state ──
    let realtimeChannel = null;
    let lastRealtimeTs = null;

    const GAUGE_LEN = 3000;
    const INC_NODES = [{id:'108102',label:'WDN-2 INC-01'},{id:'108164',label:'WDN-2 INC-02'},{id:'108403',label:'WOC-01 INC'},{id:'108052',label:'WOC-02 INC'}];
    // Unified data-freshness thresholds (minutes). One source of truth: an instrument
    // past its window is BOTH counted offline in "Instruments Online" AND raised as a
    // data-outage alert — the two can never disagree.
    const INST_FRESH = { weather:30, extensometer:30, inclinometer:180, piezometer:180 };
    const INST_FRESH_LBL = { weather:'AWS / Rainfall', extensometer:'Extensometer', inclinometer:'Inclinometer', piezometer:'VWP / Piezometer' };
    const VWP_NODES = [{id:'181348',label:'OPJ VWP',channels:2},{id:'181361',label:'OPN VWP'},{id:'181404',label:'WOC-02 VWP'},{id:'181456',label:'WOC-01 VWP'},{id:'181461',label:'WDN-2 VWP',channels:3}];

    // Resolve an instrument's friendly LOCATION label from its EWS device name.
    // EWS names inclinometers/piezometers as "INC-108052" / "VWP-181348" (node id);
    // map those to the survey label. Extensometers already carry a location name.
    function instLocLabel(name){
      const s = String(name||'');
      let m = /INC-(\d+)/i.exec(s);
      if(m){ const n=INC_NODES.find(x=>x.id===m[1]); return n?n.label:s; }
      m = /VWP-(\d+)/i.exec(s);
      if(m){ const n=VWP_NODES.find(x=>x.id===m[1]); return n?n.label:s; }
      return s.replace(/Extensometer\s*/i,'').replace(/\s*\(.*?\)\s*/,'').trim() || s;
    }

    function getCss(v){ return getComputedStyle(document.documentElement).getPropertyValue(v).trim(); }
    function num(x){ const n = parseFloat(x); return isNaN(n) ? null : n; }
    function ago(ts){
      if(!ts) return '—';
      const m=Math.round((Date.now()-new Date(ts).getTime())/60000);
      if(m<1) return 'baru saja';
      if(m<60) return m+' mnt';
      const h=Math.floor(m/60);
      if(h<24) return h+' jam';
      return Math.floor(h/24)+' hr';
    }
    function stale(ts,mx){ return !ts || (Date.now()-new Date(ts).getTime())/60000 > (mx||15); }
    // English "x ago" for the executive dashboard (the detail views use ago()).
    function agoEn(ts){ if(!ts) return '—'; const m=Math.round((Date.now()-new Date(ts).getTime())/60000);
      if(m<1) return 'just now'; if(m<60) return m+'m ago'; const h=Math.floor(m/60);
      if(h<24) return h+'h ago'; return Math.floor(h/24)+'d ago'; }
    // Live wall-clock for the header (true current time, ticks every second).
    function updateClock(){ const el=document.getElementById('tsLbl'); if(!el) return;
      el.textContent = new Date().toLocaleString('en-GB',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false}); }
    function fmt(n,dec){ const x=Number(n); if(!isFinite(x)) return '—'; return x.toFixed(dec ?? (Math.abs(x)>=100?0:Math.abs(x)>=10?1:2)); }

    function extStatus(s){
      const v = Math.abs(s.latest_value || 0);
      const th = s.thresholds || {};
      const rtc = num(th.rtc), rtw = num(th.rtw);
      if(rtc!=null && v>=rtc) return 'Very High';
      if(rtw!=null && v>=rtw) return 'High';
      return 'Low';
    }
    function riskScoreFromLevel(lvl){
      return ({Low:1, Medium:2, High:3, 'Very High':4}[lvl] || 1);
    }
    function riskLabelFromIndex(x){
      // dipakai seperti screenshot: Low/Moderate/High
      if(x>=70) return {t:'High', c:RC['Very High']};
      if(x>=40) return {t:'Moderate', c:RC.High};
      return {t:'Low', c:RC.Low};
    }

    function linearRegression(points){
      const pts = (points||[]).filter(p=>isFinite(p.x)&&isFinite(p.y));
      if(pts.length<2) return null;
      let n=pts.length, sx=0, sy=0, sxx=0, sxy=0;
      for(const p of pts){ sx+=p.x; sy+=p.y; sxx+=p.x*p.x; sxy+=p.x*p.y; }
      const den = (n*sxx - sx*sx);
      if(Math.abs(den) < 1e-12) return null;
      const b = (n*sxy - sx*sy) / den;
      const a = (sy - b*sx) / n;
      return {a,b};
    }

    function seriesStats(rows){
      const r=(rows||[]).filter(x=>x&&x.ts&&isFinite(+x.value)).map(x=>({t:new Date(x.ts).getTime(), v:+x.value})).sort((a,b)=>a.t-b.t);
      if(r.length<2) return {n:r.length, mmPerDay:null, delta:null, last:null};
      const reg = linearRegression(r.map(p=>({x:p.t,y:p.v})));
      const mmPerDay = reg ? reg.b * 86400000 : null;
      const delta = r[r.length-1].v - r[0].v;
      return { n:r.length, mmPerDay, delta, last:r[r.length-1] };
    }

    function parseRange(range){
      const h = { '24h':24, '7d':7*24, '30d':30*24 }[range] || 24;
      return new Date(Date.now()-h*3600*1000).toISOString();
    }

    let lastHeavy = 0;
    function rangeParams(range, nowIso){
      if(range==='live') return {from:new Date(Date.now()-2*3600*1000).toISOString(), to:nowIso, every:'1 minute'};
      if(range==='24h')  return {from:parseRange('24h'), to:nowIso, every:'15 minutes'};
      return {from:parseRange('7d'), to:nowIso, every:'2 hours'};
    }

    // ── Realtime: subscribe to new instrument readings ──
    function subscribeRealtime(){
      if(realtimeChannel) return;
      realtimeChannel = sb.channel('monitoring-live')
        .on('postgres_changes',
          { event:'INSERT', schema:'monitoring', table:'readings' },
          (payload)=>{
            lastRealtimeTs = new Date().toISOString();
            updateLiveIndicator(true);
            // readings table has sensor_id; resolve kind via DATA.sensors
            const sid = payload.new?.sensor_id;
            const sensor = (DATA.sensors||[]).find(s=>s.sensor_id===sid);
            const kind = sensor?.kind;
            if(STATE.view==='inclinometer' && STATE.incRange==='live' && kind==='inclinometer'){
              debouncedLiveRefresh('inc');
            } else if(STATE.view==='vwp' && STATE.vwpRange==='live' && kind==='piezometer'){
              debouncedLiveRefresh('vwp');
            }
          })
        .subscribe((status)=>{
          updateLiveIndicator(status==='SUBSCRIBED');
        });
    }
    function unsubscribeRealtime(){
      if(realtimeChannel){ sb.removeChannel(realtimeChannel); realtimeChannel=null; }
      updateLiveIndicator(false);
    }
    function updateLiveIndicator(connected){
      const el=document.querySelector('.chip .dot');
      if(el){
        el.style.setProperty('--c', connected?'#22c55e':'#94a3b8');
        el.style.animation = connected?'pulse 2s infinite':'none';
      }
      const lbl=document.querySelector('.chip b');
      if(!lbl) return;
      const parent=lbl.closest('.chip');
      if(parent && parent.textContent.includes('LIVE')){
        parent.innerHTML = `<span class="dot" style="--c:${connected?'#22c55e':'#94a3b8'};animation:${connected?'pulse 2s infinite':'none'}"></span> LIVE${connected?' · RT':' · 2m'}`;
      }
    }
    let _liveRefreshTimer = {};
    function debouncedLiveRefresh(scope){
      if(_liveRefreshTimer[scope]) return;
      _liveRefreshTimer[scope] = setTimeout(()=>{
        _liveRefreshTimer[scope] = null;
        loadAll();
      }, 3000);
    }
    function needsRealtime(){
      return (STATE.view==='inclinometer' && STATE.incRange==='live') ||
             (STATE.view==='vwp' && STATE.vwpRange==='live');
    }

    function subscribeEws(){
      if(ewsChannel) return;
      ewsChannel = sb.channel('ews-live')
        .on('postgres_changes',
          { event:'INSERT', schema:'monitoring', table:'ews_evaluations' },
          (payload)=>{
            DATA.ews = payload.new;
            updateEwsBanner();
          })
        .subscribe();
    }
    function updateEwsBanner(){
      const e = DATA.ews;
      if(!e) return;
      const el = document.getElementById('ewsBanner');
      if(!el) return;
      const c = EWS_COLORS[e.status]||EWS_COLORS.HIJAU;
      const lbl = EWS_LABELS[e.status]||e.status;
      el.style.borderColor = c;
      el.style.background = `linear-gradient(90deg, ${c}18, ${c}08)`;
      const dot = el.querySelector('.ews-dot');
      if(dot) dot.style.background = c;
      const st = el.querySelector('.ews-status');
      if(st){ st.textContent = lbl; st.style.color = c; }
      const sub = el.querySelector('.ews-sub');
      if(sub) sub.textContent = e.alasan || '';
      const ts = el.querySelector('.ews-ts');
      if(ts) ts.textContent = e.evaluated_at ? new Date(e.evaluated_at).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}) : '';
      const evak = el.querySelector('.ews-evak');
      if(evak) evak.style.display = e.evakuasi ? '' : 'none';
    }
    async function loadAll(){
      const nowMs=Date.now(), nowIso=new Date().toISOString();
      const heavy = (!DATA.ext7) || (nowMs-lastHeavy > 600000); // boot or every 10 min

      const baseP = Promise.all([
        sb.from('v_instrument_sensors').select('*'),
        sb.from('v_rain_status').select('*'),
        sb.from('v_rain_summary').select('*'),
        sb.from('v_rain_daily').select('*'),
      ]);
      let activeP=null, activeTarget=null;
      if(STATE.view==='instrument' && STATE.exRange!=='7d'){ const p=rangeParams(STATE.exRange,nowIso); activeTarget='extActive'; activeP=sb.rpc('instrument_series_json',{p_kind:'extensometer',p_from:p.from,p_to:p.to,p_every:p.every}); }
      else if(STATE.view==='aws' && STATE.awRange!=='7d'){ const p=rangeParams(STATE.awRange,nowIso); activeTarget='wxActive'; activeP=sb.rpc('instrument_series_json',{p_kind:'weather',p_from:p.from,p_to:p.to,p_every:p.every}); }
      else if(STATE.view==='inclinometer'){ const iFrom=STATE.incFrom?new Date(STATE.incFrom+'T00:00:00').toISOString():'2020-01-01T00:00:00Z'; const iTo=STATE.incTo?new Date(STATE.incTo+'T23:59:59').toISOString():nowIso; const iDiff=Math.max(1,Math.round((new Date(iTo)-new Date(iFrom))/86400000)); const iEv=iDiff<=7?'1 hour':iDiff<=14?'3 hours':'6 hours'; activeTarget='incData'; activeP=Promise.all([sb.rpc('inc_top_displacement_series',{p_from:iFrom,p_to:iTo,p_every:iEv}), sb.rpc('inc_profile_daily',{p_from:iFrom,p_to:iTo})]); }
      else if(STATE.view==='vwp'){ const d=STATE.vwpRange==='live'?1:({'3d':3,'7d':7,'10d':10,'30d':30,'all':0}[STATE.vwpRange]||7); const f=d===0?'2020-01-01T00:00:00Z':new Date(Date.now()-d*24*3600*1000).toISOString(); const ev=STATE.vwpRange==='live'?'5 minutes':STATE.vwpRange==='all'?'6 hours':(d<=3?'1 hour':d<=10?'3 hours':'6 hours'); activeTarget='vwpData'; activeP=sb.rpc('vwp_pressure_series',{p_from:f,p_to:nowIso,p_every:ev}); }

      const heavyP = heavy ? Promise.all([
        sb.from('inspections').select('id,location_id,inspection_date,inspector,risk_final,tarp_level,total_score,approval_status,status').neq('status','CLOSED').order('inspection_date',{ascending:false}),
        sb.from('locations').select('id,name,area_code,lat,lng,easting,northing'),
        sb.from('earthquakes').select('id,magnitude,wilayah,kedalaman,tanggal,status,lintang,bujur').order('tanggal',{ascending:false}).limit(8),
        sb.rpc('instrument_series_json',{p_kind:'extensometer',p_from:parseRange('7d'),p_to:nowIso,p_every:'1 hour'}),
        sb.rpc('instrument_series_json',{p_kind:'weather',p_from:parseRange('7d'),p_to:nowIso,p_every:'1 hour'}),
        sb.from('v_aws_stats').select('*'),
        sb.from('v_rain_hours').select('*'),
        sb.from('v_inspection_risk_areas').select('*'),
        sb.rpc('instrument_series_json',{p_kind:'inclinometer',p_from:parseRange('7d'),p_to:nowIso,p_every:'3 hours'}),
        sb.rpc('vwp_pressure_series',{p_from:parseRange('7d'),p_to:nowIso,p_every:'1 hour'}),
        sb.rpc('inc_top_displacement_series',{p_from:parseRange('7d'),p_to:nowIso,p_every:'1 hour'}),
      ]) : null;

      // Static reference data (instrument coords) — fetch ONCE at boot. The inclinometer
      // install baseline is now used server-side only (inc RPCs), not in the front-end.
      const staticP = (!DATA.points) ? Promise.all([
        sb.from('v_instrument_points').select('*'),
      ]) : null;

      const ewsP = sb.rpc('ews_latest');
      const ewsAlP = sb.rpc('ews_alerts_recent',{p_limit:20});
      const rain24P = sb.rpc('instrument_series_json',{p_kind:'weather',p_from:new Date(nowMs-24*3600*1000).toISOString(),p_to:nowIso,p_every:'1 hour'});
      const instTempP = sb.rpc('inst_latest_temp');
      const [base, active, heavyR, ewsR, ewsAlR, rain24R, staticR, instTempR] = await Promise.all([baseP, activeP, heavyP, ewsP, ewsAlP, rain24P, staticP, instTempP]);
      if(instTempR && instTempR.data) DATA.instTemp = instTempR.data;
      const [sn,rain,rsum,rdaily]=base;
      DATA.sensors=sn.data||[]; DATA.rain=(rain.data||[])[0]||{};
      DATA.rainSum=(rsum.data||[])[0]||{}; DATA.rainDaily=rdaily.data||[];
      if(active && activeTarget){
        if(activeTarget==='incData'){ DATA.incData={ top:(active[0]&&active[0].data)||[], daily:(active[1]&&active[1].data)||[] }; }
        else DATA[activeTarget]=active.data||[];
      }
      if(ewsR.data) DATA.ews = ewsR.data;
      if(ewsAlR && ewsAlR.data) DATA.ewsAlerts = ewsAlR.data;
      if(rain24R && rain24R.data) DATA.rain24 = rain24R.data;
      if(heavyR){
        DATA.insp=heavyR[0].data||[]; DATA.locs=heavyR[1].data||[]; DATA.eq=heavyR[2].data||[];
        DATA.ext7=heavyR[3].data||[]; DATA.wx7=heavyR[4].data||[]; DATA.awsStats=heavyR[5].data||[]; DATA.rainHours=(heavyR[6].data||[])[0]||{};
        DATA.riskAreas=heavyR[7].data||[];
        DATA.inc7=heavyR[8].data||[]; DATA.vwp7=heavyR[9].data||[];
        DATA.incTop=heavyR[10].data||[];   // DB-computed cumulative top-displacement A/B (single source)
        lastHeavy=nowMs;
      }
      if(staticR){
        DATA.points=staticR[0].data||[];
      }

    // ── EEWS PGA (replica of fetch-bmkg) ──
    function haversineKm(la1,lo1,la2,lo2){ const R=6371,dLa=(la2-la1)*Math.PI/180,dLo=(lo2-lo1)*Math.PI/180;
      const a=Math.sin(dLa/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLo/2)**2; return R*2*Math.asin(Math.sqrt(a)); }
    function pgaDonovan(M,R){ return 1.096*Math.exp(0.664*M)*Math.pow(R+25,-1.55); }
    function parseCoordNum(str,neg){ const n=parseFloat(String(str||'').replace(/[^0-9.]/g,'')); return String(str||'').includes(neg)?-n:n; }
    function tarpInfo(pga){ if(pga<0.02) return {lv:'LV1',c:'#22c55e'}; if(pga<0.05) return {lv:'LV2',c:'#eab308'}; if(pga<0.10) return {lv:'LV3',c:'#f97316'}; return {lv:'LV4',c:'#ef4444'}; }
    function shortWil(w){ w=w||''; return w.length>24? w.slice(0,24)+'…':(w||'—'); }
    function latestPga(q){
      const M=Number(q.magnitude), depth=parseFloat(String(q.kedalaman||'').replace(/[^0-9.]/g,''));
      const lat=parseCoordNum(q.lintang,'LS'), lon=parseCoordNum(q.bujur,'BB');
      if(![M,depth,lat,lon].every(Number.isFinite)) return null;
      const sites=[{n:'WOC',la:-2.748761,lo:122.000297},{n:'Port',la:-2.725700,lo:122.028042}];
      let best={g:-1,site:'',epi:0};
      sites.forEach(s=>{ const epi=haversineKm(lat,lon,s.la,s.lo); const R=Math.sqrt(epi*epi+depth*depth); const g=pgaDonovan(M,R); if(g>best.g) best={g,site:s.n,epi:Math.round(epi)}; });
      const t=tarpInfo(best.g); return {g:best.g, site:best.site, tarp:t.lv, color:t.c, epi:best.epi};
    }

    function utm(e,n){
      const a=6378137,ec=0.00669438,k0=0.9996,x=e-500000,y=n-10000000,M=y/k0;
      const mu=M/(a*(1-ec/4-3*ec*ec/64)),e1=(1-Math.sqrt(1-ec))/(1+Math.sqrt(1-ec));
      const phi=mu+(3*e1/2-27*e1**3/32)*Math.sin(2*mu)+(21*e1**2/16-55*e1**4/32)*Math.sin(4*mu)+(151*e1**3/96)*Math.sin(6*mu);
      const N=a/Math.sqrt(1-ec*Math.sin(phi)**2),T=Math.tan(phi)**2,C=(ec/(1-ec))*Math.cos(phi)**2,R=a*(1-ec)/(1-ec*Math.sin(phi)**2)**1.5,D=x/(N*k0);
      const lat=phi-(N*Math.tan(phi)/R)*(D*D/2-(5+3*T+10*C-4*C*C-9*ec)*D**4/24);
      const lng=(123*Math.PI/180)+(D-(1+2*T+C)*D**3/6)/Math.cos(phi);
      return{lat:lat*180/Math.PI,lng:lng*180/Math.PI};
    }
    function locLatLng(l){
      if(l.lat && l.lng) return {lat:+l.lat, lng:+l.lng};
      if(l.easting && l.northing) return utm(+l.easting,+l.northing);
      return null;
    }

    function compute(){
      const sensors = DATA.sensors||[];
      const totalSensors = sensors.length;
      const onlineSensors = sensors.filter(s=>!stale(s.latest_ts,15)).length;
      const offlineSensors = totalSensors - onlineSensors;
      const newest = sensors.reduce((mx,s)=>s.latest_ts && (!mx||s.latest_ts>mx) ? s.latest_ts : mx, null);

      // Per-INSTRUMENT (device) health. Each inclinometer/VWP exposes dozens of
      // sensor channels, so counting raw channels is misleading — we count
      // devices. Freshness windows differ by type: AWS/extensometer stream
      // continuously (minutes); inclinometer/VWP are batch-ingested sub-daily,
      // so a device that reported within ~36h still counts as online (just lagging).
      const FRESH = INST_FRESH;
      const devHealth = {}; // kind -> {total:Set, online:Set, newest}
      sensors.forEach(s=>{
        const k=s.kind, id=String(s.external_device_id||'');
        if(!FRESH[k] || !id) return;
        const h = devHealth[k] = devHealth[k] || {total:new Set(), online:new Set(), newest:null};
        h.total.add(id);
        if(!stale(s.latest_ts, FRESH[k])) h.online.add(id);
        if(s.latest_ts && (!h.newest || s.latest_ts>h.newest)) h.newest = s.latest_ts;
      });
      let instTotal=0, instOnline=0;
      Object.values(devHealth).forEach(h=>{ instTotal+=h.total.size; instOnline+=h.online.size; });

      // inspections latest by location
      const latestIns = {};
      (DATA.insp||[]).forEach(d=>{ if(!latestIns[d.location_id]) latestIns[d.location_id]=d; });
      const insRows = Object.values(latestIns);

      const inspByRisk = { 'Very High':0, High:0, Medium:0, Low:0 };
      insRows.forEach(r=>{
        const k = (r.risk_final||'Low');
        inspByRisk[k] = (inspByRisk[k]||0) + 1;
      });

      const extTriggered = sensors.filter(s=>s.kind==='extensometer' && extStatus(s)!=='Low');
      const inspTriggered = insRows.filter(r=>r.risk_final==='High'||r.risk_final==='Very High');
      const totalAlerts = extTriggered.length + inspTriggered.length;

      // risk index (0-100) from inspection distribution
      const locCount = Math.max(insRows.length, 1);
      const raw = insRows.reduce((sum,r)=>sum + riskScoreFromLevel(r.risk_final||'Low'), 0);
      const riskIndex = Math.round((raw/(locCount*4))*100);
      const riskLabel = riskLabelFromIndex(riskIndex);

      // last inspection
      const lastInsp = (DATA.insp||[])[0] || null;

      // next inspection: placeholder +7d from last
      const nextInspDate = lastInsp && lastInsp.inspection_date ? new Date(new Date(lastInsp.inspection_date).getTime()+7*86400000) : null;

      // active instruments by type (unique device count)
      const kindMap = {};
      sensors.forEach(s=>{
        const k = s.kind || 'other';
        const id = String(s.external_device_id || s.sensor_id || s.sensor_name || Math.random());
        (kindMap[k]=kindMap[k]||new Set()).add(id);
      });
      const activeInstruments = onlineSensors; // tampil sebagai "X / X" seperti referensi

      // Alerts breakdown (watch/warning/critical)
      const warn = sensors.filter(s=>s.kind==='extensometer' && extStatus(s)==='High').length;
      const critical = sensors.filter(s=>s.kind==='extensometer' && extStatus(s)==='Very High').length;
      const watch = Math.max(0, totalAlerts - warn - critical);

      // Slope Stability Index (composite, higher = safer / FoS-like 0–3).
      // hazard = max(EWS level, normalized inspection risk) + rain penalty.
      const ewsLvMap = {HIJAU:0, KUNING:1, JINGGA:2, MERAH:3};
      const ewsLv = ewsLvMap[(DATA.ews && DATA.ews.status) || 'HIJAU'] || 0;
      const inspNorm = (riskIndex/100)*3;
      const rainPen = (DATA.ews && DATA.ews.rain_modifier_active) ? 0.5 : 0;
      const hazard = Math.min(3, Math.max(ewsLv, inspNorm) + rainPen);
      const ssi = Math.max(0, Math.min(3, 3 - hazard));
      const ssiLabel = ssi>=1.5 ? {t:'Normal', c:RC.Low}
                     : ssi>=1.0 ? {t:'Caution', c:RC.High}
                     : {t:'Critical', c:RC['Very High']};

      return {
        totalSensors, onlineSensors, offlineSensors, newest,
        devHealth, instTotal, instOnline,
        insRows, inspByRisk,
        totalAlerts, extTriggered, inspTriggered,
        riskIndex, riskLabel,
        lastInsp, nextInspDate,
        activeInstruments, watch, warn, critical,
        ssi, ssiLabel,
      };
    }

    function overallStatus(metrics){
      // Meniru gaya "NORMAL" seperti referensi
      if(metrics.critical>0 || metrics.riskIndex>=70) return {t:'Very High', c:RC['Very High'], sub:'Critical condition detected'};
      if(metrics.totalAlerts>0 || metrics.riskIndex>=40) return {t:'High', c:RC.High, sub:'Attention required on triggered points'};
      return {t:'Low', c:RC.Low, sub:'All monitored parameters within normal range'};
    }

    function instCardHtml(title, ic, metric, sparkId, valId, deltaId, spikeId){
      return `<div class="card inst-card">
        <div class="card-hd"><div class="t">${title}</div><div class="ic">${ic}</div></div>
        <div class="card-bd">
          <div class="ic-metric">${metric}</div>
          <div class="ic-val" id="${valId}">—</div>
          <div class="ic-spark"><canvas id="${sparkId}"></canvas></div>
          <div class="ic-delta" id="${deltaId}">—</div>
          ${spikeId?`<div class="spike" id="${spikeId}"></div>`:''}
        </div>
      </div>`;
    }

    // ====== Time-series + trendline (tab instrumen) ======
    function groupBySensor(rows){
      const g={};
      (rows||[]).forEach(r=>{ const k=(r.external_device_id?('dev '+r.external_device_id+' · '):'')+r.sensor_name; (g[k]=g[k]||[]).push(r); });
      return g;
    }
    function byName(rows, sub){
      const s=sub.toLowerCase();
      return (rows||[]).filter(r=>(r.sensor_name||'').toLowerCase().includes(s)).slice().sort((a,b)=>new Date(a.ts)-new Date(b.ts));
    }
    function multiSeries(seriesList){
      const tset=new Set();
      seriesList.forEach(s=>(s.rows||[]).forEach(r=>tset.add(r.ts)));
      const ts=[...tset].sort();
      const labels=ts.map(t=>new Date(t).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}));
      const datasets=seriesList.map(s=>{ const m={}; (s.rows||[]).forEach(r=>m[r.ts]=(isFinite(+r.value)?+r.value:null));
        return {label:s.name,data:ts.map(t=>m[t]??null),borderColor:s.color,backgroundColor:s.color,borderWidth:1.6,pointRadius:0,tension:.25,spanGaps:true,fill:false}; });
      return {labels,datasets};
    }
    function addTrend(ms,color){
      if(!ms.datasets.length) return;
      const d0=ms.datasets[0].data;
      const pts=d0.map((y,i)=>({x:i,y})).filter(p=>p.y!=null&&isFinite(p.y));
      const reg=linearRegression(pts); if(!reg) return;
      ms.datasets.push({label:'Trendline',data:d0.map((_,i)=>reg.a+reg.b*i),borderColor:color||'#fbbf24',borderDash:[6,4],borderWidth:1.5,pointRadius:0,fill:false,tension:0,order:99});
    }
    function tsChart(canvasId,ms,unit,yhint){
      const cv=document.getElementById(canvasId); if(!cv||!window.Chart) return;
      const yScale={ticks:{color:'#9fb3cf',font:{size:9}},grid:{color:'rgba(148,163,184,.10)'},title:{display:!!unit,text:unit||'',color:'#9fb3cf',font:{size:9}}};
      if(yhint){ yScale.suggestedMin=yhint[0]; yScale.suggestedMax=yhint[1]; }
      charts[canvasId]=new Chart(cv,{type:'line',data:{labels:ms.labels,datasets:ms.datasets},
        options:{responsive:true,maintainAspectRatio:false,animation:false,interaction:{mode:'index',intersect:false},
          plugins:{legend:{display:true,labels:{color:'#cbd5e1',font:{size:9},boxWidth:10,boxHeight:8}}},
          scales:{x:{ticks:{maxTicksLimit:6,color:'#9fb3cf',font:{size:8}},grid:{display:false}},
                  y:yScale}}});
    }

    function miniKpi(label,val,color){
      return `<div style="padding:9px 11px;border-radius:12px;background:rgba(2,6,23,.18);border:1px solid rgba(148,163,184,.12)">
        <div style="font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:#9fb3cf;font-weight:900">${esc(label)}</div>
        <div style="font-size:18px;font-weight:950;color:${color};margin-top:5px">${esc(val)}</div></div>`;
    }
    function statsTable(){
      const order={extensometer:0,weather:1};
      const rows=(DATA.awsStats||[]).slice().sort((a,b)=>(order[a.kind]-order[b.kind])||String(a.sensor_name).localeCompare(b.sensor_name));
      return `<div class="card-hd" style="padding:12px 2px 2px"><div class="t">STATISTIK SENSOR — 7 HARI (avg / min / max)</div></div>
        <div class="card"><div class="card-bd" style="overflow:auto;max-height:240px">
          <table class="tbl"><thead><tr><th>Sensor</th><th>Jenis</th><th>Avg (7h)</th><th>Min</th><th>Max</th><th>Data</th></tr></thead><tbody>
          ${rows.map(s=>{const u=s.sensor_type_name==='AIO Atmosphere'?'kPa':(s.unit||'');
            return `<tr><td>${esc(s.sensor_name)}</td><td>${s.kind==='extensometer'?'Extensometer':'AWS'}</td><td><b>${fmt(s.avg_7d,2)}</b> ${esc(u)}</td><td>${fmt(s.min_7d,2)}</td><td>${fmt(s.max_7d,2)}</td><td>${s.n_7d||0}</td></tr>`;}).join('')}
          </tbody></table></div></div>`;
    }
    // ── Monitoring dashboard: stacked charts on ONE shared 7-day timeline so a
    // rainfall burst or earthquake can be visually correlated with instrument
    // spikes. Titles only; no extra commentary. ──
    function infoDot(text){ return `<span class="info" tabindex="0">&#9432;<span class="info-pop">${text}</span></span>`; }
    function instrumentView(){
      const iRain = `<b>Rainfall</b> — hourly rain (mm) over 7 days. Tall bars = heavy rain. Watch whether the instrument charts below spike shortly <b>after</b> a rain burst: rain raises pore pressure and can drive movement. <b>Red dashed lines = earthquake events.</b>`;
      const iExt = `<b>Extensometer</b> — surface crack/displacement per sensor (D1–D5), zeroed to the period start, in mm. A line trending <b>up</b> = the crack is opening (slope creeping). A sudden step aligned with rain or a quake = a trigger to inspect.`;
      const iInc = `<b>Inclinometer — Live Overview</b> — <b>1 strip governing per hole</b> (waktu ke kanan). Tiap sel = sensor hidup dgn displacement tertinggi lintas <b>Axis A&amp;B</b> pada hari itu. Warna = besar displacement (hijau→merah). Label dalam sel: <b>kedalaman</b> (atas) &amp; <b>velocity mm/hari</b> (bawah). Hatch amber = FROZEN. Klik strip / <b>Detail →</b> untuk analisis lanjut per-kedalaman.`;
      const iVwp = `<b>VWP / Piezometer</b> — pore-water pressure inside the slope (kPa). A rising line, especially after rain, means water is building up and stability is dropping. Sharp sustained rises are a key early-warning signal.`;
      return `
        <div style="font-size:10.5px;color:#9fb3cf;margin:0 2px 8px">Shared 7-day timeline · <span style="color:#f87171">┊ red dashed = earthquake</span> · hover&nbsp;&#9432;&nbsp;on each chart for how to read it.</div>
        <div class="mon-stack">
          <div class="card"><div class="card-hd"><div class="t">🌧️ Rainfall (mm)${infoDot(iRain)}</div></div><div class="card-bd"><canvas id="monRain"></canvas></div></div>
          <div class="card"><div class="card-hd"><div class="t">📏 Extensometer — WOC &amp; Water Intake (mm)${infoDot(iExt)}</div></div><div class="card-bd"><canvas id="monExt"></canvas></div></div>
          <div class="mon-inc">
            <div class="card-hd" style="display:flex;align-items:center;gap:8px;padding:2px 2px 6px">
              <div class="t">∠ Inclinometer — Live Heatmap · A (kiri) · B (kanan)${infoDot(iInc)}</div>
              <a href="inclinometer.html" class="btn-ghost xs" style="margin-left:auto;text-decoration:none;font-weight:700">Advanced →</a>
            </div>
            <div id="monIncOverview"><div style="display:flex;justify-content:center;padding:20px"><div class="spin"></div></div></div>
          </div>
          <div class="card"><div class="card-hd"><div class="t">◎ VWP — Pore Pressure (kPa)${infoDot(iVwp)}</div></div><div class="card-bd"><canvas id="monVwp"></canvas></div></div>
        </div>`;
    }
    function drawInstrumentCharts(){
      Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}}); charts={};
      if(!window.Chart) return;
      const max=Date.now(), min=max-7*864e5;
      const XY = rows => (rows||[]).map(r=>({x:new Date(r.ts).getTime(), y:+((r.value!=null)?r.value:r.a)}))
                          .filter(p=>isFinite(p.x)&&isFinite(p.y)).sort((a,b)=>a.x-b.x);
      // Earthquake markers shared across every chart (vertical dashed lines).
      // Shown ONLY when the quake's site PGA crosses the (existing) trigger — i.e. its
      // TARP level is above LV1. A quake felt below trigger is not drawn.
      const eqList = (DATA.eq||[]).map(q=>{ const p=latestPga(q);
                        return {x:new Date(q.tanggal).getTime(), lv:p?p.tarp:'LV1'}; })
                      .filter(q=>isFinite(q.x) && q.x>=min && q.x<=max && q.lv && q.lv!=='LV1');
      const eqPlugin = { id:'eqv', afterDatasetsDraw(chart){
        const a=chart.chartArea, xs=chart.scales.x; if(!a||!xs) return;
        eqList.forEach(q=>{ const px=xs.getPixelForValue(q.x); if(px<a.left||px>a.right) return;
          const ctx=chart.ctx; ctx.save(); ctx.strokeStyle='rgba(248,113,113,.5)'; ctx.lineWidth=1; ctx.setLineDash([4,3]);
          ctx.beginPath(); ctx.moveTo(px,a.top); ctx.lineTo(px,a.bottom); ctx.stroke(); ctx.restore(); }); } };
      const monChart = (id, datasets, unit, type, yhint, trig)=>{
        const cv=document.getElementById(id); if(!cv) return;
        const yScale={ticks:{color:'#9fb3cf',font:{size:9}}, grid:{color:'rgba(148,163,184,.10)'}, title:{display:!!unit,text:unit,color:'#9fb3cf',font:{size:9}}, beginAtZero:type==='bar'};
        // Default display range; Chart.js only EXTENDS past suggested bounds, never clips,
        // so the axis auto-adjusts upward when displacement grows beyond the hint.
        if(yhint){ yScale.suggestedMin=yhint[0]; yScale.suggestedMax=yhint[1]; }
        const plugs = trig ? [eqPlugin, trigLinesPlugin(trig)] : [eqPlugin];
        charts[id]=new Chart(cv,{ type:type||'line', data:{datasets},
          options:{responsive:true, maintainAspectRatio:false, animation:false, parsing:false,
            interaction:{mode:'index',intersect:false},
            plugins:{ legend:{display:datasets.length>1, position:'top', labels:{color:'#cbd5e1',font:{size:9},boxWidth:10,boxHeight:8,usePointStyle:true}},
              tooltip:{callbacks:{title:(it)=> it.length?new Date(it[0].parsed.x).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):''}}},
            scales:{ x:{type:'linear', min, max, ticks:{color:'#9fb3cf',font:{size:8},maxTicksLimit:8,callback:v=>new Date(v).toLocaleDateString('id-ID',{day:'2-digit',month:'short'})}, grid:{color:'rgba(148,163,184,.07)'}},
              y:yScale } },
          plugins:plugs });
      };
      const line = (label,rows,color)=>({label, data:XY(rows), borderColor:color, backgroundColor:color, borderWidth:1.5, pointRadius:0, tension:.25, fill:false, spanGaps:true});

      // 1) Rainfall (bars)
      monChart('monRain', [{label:'Rainfall', data:XY(byName(DATA.wx7,'rainfall hour')), backgroundColor:'#38bdf8', borderColor:'#38bdf8', barThickness:3, maxBarThickness:6}], 'mm', 'bar');

      // 2) Extensometer — EVERY displacement channel per device (D1..D5), each
      // baseline-zeroed so the line shows that sensor's movement (displacement).
      const extBy={}; (DATA.ext7||[]).forEach(r=>{ const s=r.sensor_name||''; if(!/^D\d/i.test(s)) return;
        const d=r.external_device_id; (extBy[d]=extBy[d]||{}); (extBy[d][s]=extBy[d][s]||[]).push(r); });
      const extPal=['#a78bfa','#22d3ee','#f59e0b','#22c55e','#ef4444','#ec4899','#3b82f6','#84cc16','#fb923c'];
      const extDs=[]; let eci=0;
      Object.keys(extBy).sort().forEach(d=>{
        Object.keys(extBy[d]).sort().forEach((s)=>{
          const rows=extBy[d][s].slice().sort((a,b)=>new Date(a.ts)-new Date(b.ts));
          const f=rows.find(r=>r.value!=null); const b0=f?+f.value:0;
          extDs.push(line(`${areaLabel(d)} ${s}`, rows.map(r=>({ts:r.ts,value:(+r.value||0)-b0})), extPal[eci%extPal.length])); eci++;
        }); });
      // Default y-axis ±100 mm so the Medium/High accumulation thresholds are visible;
      // expands automatically if any channel moves beyond it.
      let extMax=0; extDs.forEach(ds=>ds.data.forEach(p=>{ const a=Math.abs(p.y); if(isFinite(a)&&a>extMax) extMax=a; }));
      const extB0 = Math.max(100, Math.ceil(extMax*1.3/10)*10);
      monChart('monExt', extDs.length?extDs:[line('—',[],'#a78bfa')], 'mm', 'line', [-extB0,extB0], DISP_TRIG);

      // 3) Inclinometer — LIVE 4-hole heatmap overview (A kiri | B kanan) + governing,
      // menggantikan chart top-displacement garis. Self-fetch inc_heatmap_series per hole
      // (single source, sudah termasuk QC dead/railed). Async → mengisi #monIncOverview.
      drawIncOverview('monIncOverview');

      // 4) VWP — pore pressure per channel
      const vwpDs=[]; const vwpPal=['#22d3ee','#3b82f6','#a78bfa','#ec4899','#f97316','#22c55e','#eab308','#06b6d4'];
      try{ const vwp=processVwp(DATA.vwp7||[]); let ci=0;
        for(const devId of Object.keys(vwp)){ const ch=vwp[devId].channels||{};
          for(const k of Object.keys(ch)){ vwpDs.push(line(vwpChLabel(devId,k), ch[k], vwpPal[ci%vwpPal.length])); ci++; } } }catch(e){}
      monChart('monVwp', vwpDs.length?vwpDs:[line('—',[],'#22d3ee')], 'kPa', 'line', [-50,50]);
    }

    // ===================== EXTENSOMETER & AWS TABS =====================
    function hexA(hex,a){ const h=hex.replace('#',''); const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16); return `rgba(${r},${g},${b},${a})`; }
    function sensorVU(s){ if(s.latest_value==null) return {v:'—',unit:''};
      if(s.sensor_type_name==='AIO Atmosphere') return {v:fmt(s.latest_value,2),unit:'kPa'};
      return {v:fmt(s.latest_value,2),unit:s.unit||''}; }
    function statusOf(s){ return stale(s.latest_ts,15)?{t:'DOWN',c:'#ef4444'}:{t:'ACTIVE',c:'#22c55e'}; }
    function trendArrow(mmPerDay){ if(mmPerDay==null||!isFinite(mmPerDay)) return '<span class="trend-st">→ stable</span>';
      const v=mmPerDay/24;
      if(v>0.0005) return `<span class="trend-up">↑ rising (+${fmt(v,4)} mm/hour)</span>`;
      if(v<-0.0005) return `<span class="trend-dn">↓ falling (${fmt(v,4)} mm/hour)</span>`;
      return `<span class="trend-st">→ stable (${fmt(v,4)} mm/hour)</span>`; }
    function trendOfRows(rows){ const byS={}; (rows||[]).forEach(r=>{(byS[r.sensor_name]=byS[r.sensor_name]||[]).push(r);});
      const sl=Object.values(byS).map(rs=>seriesStats(rs).mmPerDay).filter(x=>x!=null&&isFinite(x));
      return sl.length? sl.reduce((a,b)=>a+b,0)/sl.length : null; }
    // Horizontal EWS trigger lines (dashed) drawn across a chart's plot area.
    // levels = [{y, color, label}]. Lines outside the visible y-range are skipped.
    function trigLinesPlugin(levels){
      return { id:'trigLines', afterDatasetsDraw(chart){
        const a=chart.chartArea, ys=chart.scales.y; if(!a||!ys) return; const ctx=chart.ctx;
        (levels||[]).forEach(L=>{ const py=ys.getPixelForValue(L.y); if(!isFinite(py)||py<a.top||py>a.bottom) return;
          ctx.save(); ctx.strokeStyle=L.color; ctx.lineWidth=1; ctx.setLineDash([6,4]);
          ctx.beginPath(); ctx.moveTo(a.left,py); ctx.lineTo(a.right,py); ctx.stroke();
          ctx.setLineDash([]); ctx.fillStyle=L.color; ctx.font='9px sans-serif'; ctx.textAlign='right';
          ctx.fillText(L.label, a.right-4, py-2); ctx.restore(); });
      }};
    }
    // Cumulative-displacement triggers (±mm): Medium 50, High 100 (EWS TH_CUM_K/J),
    // Very High 150 (added level — adjust if geotech defines a different VH accumulation).
    // Lines are always present; trigLinesPlugin only draws those inside the visible
    // y-range, so High/Very High appear automatically as an instrument's movement grows.
    const DISP_TRIG = [
      {y:50,color:'rgba(234,179,8,.6)',label:'Medium 50'}, {y:-50,color:'rgba(234,179,8,.6)',label:''},
      {y:100,color:'rgba(249,115,22,.65)',label:'High 100'}, {y:-100,color:'rgba(249,115,22,.65)',label:''},
      {y:150,color:'rgba(239,68,68,.7)',label:'Very High 150'}, {y:-150,color:'rgba(239,68,68,.7)',label:''},
    ];
    function areaCfg(ms,unit,opts){ opts=opts||{}; const cfg={type:'line',data:{labels:ms.labels,datasets:ms.datasets},
      options:{responsive:true,maintainAspectRatio:false,animation:false,interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:true,position:'top',labels:{color:'#cbd5e1',font:{size:9},boxWidth:10,boxHeight:8,usePointStyle:true}}},
        scales:{x:{ticks:{maxTicksLimit:7,color:'#9fb3cf',font:{size:8}},grid:{display:false}},
                y:{ticks:{color:'#9fb3cf',font:{size:9}},grid:{color:'rgba(148,163,184,.10)'},title:{display:!!unit,text:unit||'',color:'#9fb3cf',font:{size:9}}}}}};
      if(opts.yhint){ cfg.options.scales.y.suggestedMin=opts.yhint[0]; cfg.options.scales.y.suggestedMax=opts.yhint[1]; }
      if(opts.trig){ cfg.plugins=[trigLinesPlugin(opts.trig)]; }
      return cfg; }
    function dStr(off){ return new Date(Date.now()+off*86400000).toISOString().slice(0,10); }
    function areaLabel(dev){ return dev==='373'?'WOC':dev==='372'?'Water Intake':('dev '+dev); }

    function batteryPanel(kind){
      const devs=[...new Set((DATA.sensors||[]).filter(s=>s.kind===kind).map(s=>s.external_device_id))];
      return `<div class="card-hd" style="padding:12px 2px 2px"><div class="t">BATTERY PER UNIT</div></div>
       <div style="display:grid;grid-template-columns:repeat(${Math.max(devs.length,1)},1fr);gap:10px">
       ${devs.map(d=>`<div class="card"><div class="card-bd"><div class="t" style="color:#9fb3cf">Unit ${esc(areaLabel(d))}</div>
         <div style="font-size:22px;font-weight:950;color:#64748b;margin-top:6px">— %</div>
         <div style="font-size:10px;color:#9fb3cf;margin-top:4px">Not available — Argatech sensor payload has no battery field (needs device-status endpoint).</div></div></div>`).join('')}
       </div>`;
    }
    function statusPanel(kind){
      const list=(DATA.sensors||[]).filter(s=>s.kind===kind).sort((a,b)=>String(a.external_device_id+a.sensor_name).localeCompare(b.external_device_id+b.sensor_name));
      return `<div class="card-hd" style="padding:12px 2px 2px"><div class="t">SENSOR STATUS · auto from incoming data (≤15 min = active)</div></div>
       <div class="card"><div class="card-bd" style="overflow:auto;max-height:300px">
       <table class="tbl"><thead><tr><th>Sensor</th><th>Area</th><th>Last value</th><th>Updated</th><th>Status</th></tr></thead><tbody>
       ${list.map(s=>{const st=statusOf(s);const vu=sensorVU(s);
         return `<tr><td>${esc(s.sensor_name)}</td><td>${esc(areaLabel(s.external_device_id))}</td><td>${vu.v} ${esc(vu.unit)}</td><td>${ago(s.latest_ts)}</td>
           <td><span style="color:${st.c};font-weight:900">● ${esc(st.t)}</span></td></tr>`;}).join('')}
       </tbody></table></div></div>`;
    }

    function rawControls(p, sensorSelectHtml, defStat){
      return `<div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
        ${sensorSelectHtml}
        <div><div class="t" style="color:#9fb3cf;margin-bottom:3px">Interval</div><select id="${p}_bucket" class="flt"><option value="hourly">Hourly</option><option value="daily">Daily</option><option value="weekly">Weekly</option><option value="monthly">Monthly</option></select></div>
        <div><div class="t" style="color:#9fb3cf;margin-bottom:3px">Statistic</div><select id="${p}_stat" class="flt">
          <option value="sum"${defStat==='sum'?' selected':''}>Sum</option>
          <option value="average"${defStat==='average'?' selected':''}>Average</option>
          <option value="min">Min</option><option value="max">Max</option><option value="none">None (raw)</option></select></div>
        <div><div class="t" style="color:#9fb3cf;margin-bottom:3px">From</div><input type="date" id="${p}_from" class="flt" value="${dStr(-7)}"></div>
        <div><div class="t" style="color:#9fb3cf;margin-bottom:3px">To</div><input type="date" id="${p}_to" class="flt" value="${dStr(0)}"></div>
        <button class="btn-ghost" onclick="${p==='ex'?'renderExt()':'renderAwsRaw()'}">▶ Render</button>

    function sensorNum(name){ const m=(name||'').match(/Sensor(\d+)/); return m?parseInt(m[1]):0; }

    // Inclinometer interpretation is now done in the DB. This only RESHAPES the two
    // DB results into the structure the detail-tab charts expect:
    //   data = { top:[{external_device_id,axis,ts,value}],            (inc_top_displacement_series)
    //            daily:[{external_device_id,day,axis,sn,depth_m,cum_mm}] }  (inc_profile_daily)
    function processInc(data){
      data = data || {};
      const out = {};
      const dev = id => out[id] = out[id] || {maxN:0, timestamps:[], topSeries:[], depths:[], dailyDates:[], dailyProfiles:{}, latestTemp:null};

      // top-displacement time-series → {ts, a, b}
      const topByDev = {};
      (data.top || []).forEach(r=>{ const id=String(r.external_device_id);
        const m = topByDev[id] = topByDev[id] || {};
        const t = m[r.ts] = m[r.ts] || {ts:r.ts, a:null, b:null};
        if(r.axis==='A') t.a=+r.value; else if(r.axis==='B') t.b=+r.value;
      });
      for(const id of Object.keys(topByDev)){
        const series = Object.values(topByDev[id]).sort((x,y)=>String(x.ts).localeCompare(String(y.ts)));
        const d = dev(id); d.topSeries = series; d.timestamps = series.map(s=>s.ts);
      }

      // daily depth profiles → dailyProfiles[label] = {depths, aCum, bCum}
      const dByDev = {};
      (data.daily || []).forEach(r=>{ const id=String(r.external_device_id);
        const days = dByDev[id] = dByDev[id] || {};
        const day = days[r.day] = days[r.day] || {A:[], B:[]};
        (day[r.axis] || (day[r.axis]=[])).push({sn:+r.sn, depth:+r.depth_m, cum:+r.cum_mm});
      });
      for(const id of Object.keys(dByDev)){
        const d = dev(id); let depths=null;
        Object.keys(dByDev[id]).sort().forEach(day=>{
          const A=(dByDev[id][day].A||[]).slice().sort((a,b)=>a.sn-b.sn);
          const B=(dByDev[id][day].B||[]).slice().sort((a,b)=>a.sn-b.sn);
          const dep = A.map(x=>x.depth);
          if(!depths && dep.length) depths = dep;
          const label = new Date(day+'T00:00:00').toLocaleDateString('id-ID',{day:'numeric',month:'short'});
          d.dailyDates.push(label);
          d.dailyProfiles[label] = {depths:dep, aCum:A.map(x=>x.cum), bCum:B.map(x=>x.cum)};
          d.maxN = Math.max(d.maxN, A.length);
        });
        if(depths) d.depths = depths;
      }

      // latest temperature (from inst_latest_temp RPC)
      const temps = (typeof DATA!=='undefined' && DATA.instTemp) || {};
      for(const id of Object.keys(out)){ if(temps[id]!=null) out[id].latestTemp = +temps[id]; }
      return out;
    }

          }}});
    }

      const pal=['#ef4444','#3b82f6','#22c55e','#f97316','#a78bfa','#ec4899','#06b6d4','#fbbf24'];
      const datasets=[];
      let yMax=0;
      let idx=0;
      for(const node of INC_NODES){
        const nd=incData[node.id]; if(!nd||!nd.topSeries.length) continue;
        const aData=nd.topSeries.map(p=>({x:p.ts,y:p.a}));
        const bData=nd.topSeries.map(p=>({x:p.ts,y:p.b}));
        aData.forEach(p=>{const a=Math.abs(+p.y); if(isFinite(a)&&a>yMax) yMax=a;});
        bData.forEach(p=>{const a=Math.abs(+p.y); if(isFinite(a)&&a>yMax) yMax=a;});
        datasets.push({label:node.label+' A',data:aData,borderColor:pal[idx%pal.length],backgroundColor:pal[idx%pal.length],borderWidth:1.5,pointRadius:2,pointBackgroundColor:pal[idx%pal.length],tension:0,fill:false});

        idx++;
      }
      // Auto-fit Y to the actual displacement range so small-movement holes are visible

      const allLabels=[...new Set(Object.values(incData).flatMap(nd=>nd.timestamps))].sort();
      const labels=allLabels.map(t=>{const d=new Date(t);return d.toLocaleString('id-ID',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'});});

    function pickProfileDates(timestamps,max){
      if(timestamps.length<=max) return timestamps.slice();
      const step=Math.max(1,Math.floor((timestamps.length-1)/(max-1)));
      const out=[];
      for(let i=0;i<timestamps.length&&out.length<max-1;i+=step) out.push(timestamps[i]);
      if(out[out.length-1]!==timestamps[timestamps.length-1]) out.push(timestamps[timestamps.length-1]);
      return out;
    }

    // governing lintas Axis A&B pada bucket terbaru, abaikan sensor mati.
    function incGovFromHeat(hmA,hmB){
      const bset=new Set(); [hmA,hmB].forEach(hm=>(hm&&hm.data||[]).forEach(d=>bset.add(d.b)));
      const buckets=[...bset].sort(); if(!buckets.length) return null;
      const lastB=buckets[buckets.length-1]; let best=null;
      [['A',hmA],['B',hmB]].forEach(([ax,hm])=>{
        if(!hm||!hm.sensors) return;
        const meta={}; hm.sensors.forEach(s=>meta[s.sn]=s);
        (hm.data||[]).forEach(d=>{
          const s=meta[d.sn]; if(!s||s.is_dead||d.b!==lastB) return;
          const a=Math.abs(d.v||0);
          if(!best||a>best.absv) best={absv:a,v:d.v,sn:d.sn,ax,depth:s.depth_m,railed:!!s.is_railed};
        });
      });
      return best;
    }

    async function drawIncOverview(containerId){

      const results=await Promise.all(INC_NODES.map(async n=>{
        try{
          const [rA,rB]=await Promise.all([
            sb.rpc('inc_heatmap_series',{p_device:n.id,p_from:from,p_to:to,p_every:ev,p_axis:'A'}),

    // Governing timeline (1 strip / hole): utk tiap bucket waktu, ambil sensor HIDUP
    // dgn |displacement| tertinggi lintas Axis A&B. Velocity = laju sensor governing itu
    // vs bucket sebelumnya (mm/hari). Displacement basis warna (single source: heatmap RPC).
    function incGovSeries(hmA,hmB){
      const bset=new Set(); [hmA,hmB].forEach(hm=>(hm&&hm.data||[]).forEach(d=>bset.add(d.b)));
      const buckets=[...bset].sort();
      const axInfo={};
      [['A',hmA],['B',hmB]].forEach(([ax,hm])=>{
        if(!hm||!hm.sensors) return;
        const meta={}; hm.sensors.forEach(s=>meta[s.sn]=s);
        const lk={}; (hm.data||[]).forEach(d=>{lk[d.sn+'|'+d.b]=d.v;});
        axInfo[ax]={meta,lk};
      });
      const cells=buckets.map((bk,bi)=>{
        let best=null;
        ['A','B'].forEach(ax=>{ const ai=axInfo[ax]; if(!ai) return;
          Object.keys(ai.meta).forEach(sn=>{ const s=ai.meta[sn]; if(s.is_dead) return;
            const v=ai.lk[sn+'|'+bk]; if(v==null) return; const a=Math.abs(v);
            if(!best||a>best.absv) best={absv:a,v,depth:s.depth_m,ax,sn,railed:!!s.is_railed};
          });
        });
        if(!best) return {b:bk,empty:true};
        let vel=null;
        const ai=axInfo[best.ax];
        for(let pj=bi-1;pj>=0;pj--){ const pv=ai.lk[best.sn+'|'+buckets[pj]];
          if(pv!=null){ const days=(new Date(bk)-new Date(buckets[pj]))/86400000; if(days>0) vel=(best.v-pv)/days; break; } }
        return {b:bk,absv:best.absv,v:best.v,depth:best.depth,ax:best.ax,sn:best.sn,railed:best.railed,vel};
      });
      return {buckets,cells};
    }

    // Render 1 strip governing (waktu ke kanan). Sel diwarnai displacement governing;
    // di dalam sel: kedalaman (atas) + velocity mm/hari (bawah). Frozen = hatch amber.
    function renderIncGovStrip(cv,hmA,hmB){
      if(!cv) return;
      const {buckets,cells}=incGovSeries(hmA,hmB); if(!buckets.length) return;
      const parent=cv.parentElement, availW=Math.max(280,(parent?parent.clientWidth:820)-2);
      const n=buckets.length, mL=8,mR=8,mT=6,mB=24, cellH=46;
      const cellW=Math.max(26,Math.floor((availW-mL-mR)/n));
      const w=mL+n*cellW+mR, h=mT+cellH+mB;
      cv.width=w; cv.height=h; cv.style.height=h+'px'; if(w<=availW) cv.style.width=w+'px';
      const ctx=cv.getContext('2d'); ctx.fillStyle='#0f172a'; ctx.fillRect(0,0,w,h);
      cells.forEach((c,xi)=>{
        const x=mL+xi*cellW, y=mT;
        if(c.empty){ ctx.fillStyle='#1e293b'; ctx.fillRect(x,y,cellW-1,cellH-1); return; }
        ctx.fillStyle=hmTriggerColor(c.v); ctx.fillRect(x,y,cellW-1,cellH-1);
        if(c.railed){ ctx.strokeStyle='#f59e0bdd'; ctx.lineWidth=.7; ctx.save(); ctx.beginPath(); ctx.rect(x,y,cellW,cellH); ctx.clip();
          for(let d=-cellH;d<cellW;d+=5){ctx.beginPath();ctx.moveTo(x+d,y);ctx.lineTo(x+d+cellH,y+cellH);ctx.stroke();} ctx.restore(); }
        if(cellW>=38){
          ctx.textAlign='center'; ctx.fillStyle='#0b1220';
          ctx.font='bold 11px sans-serif'; ctx.textBaseline='alphabetic';
          ctx.fillText(c.depth+'m', x+cellW/2, y+cellH/2-1);
          ctx.font='9px sans-serif';
          const vtxt=(c.vel==null)?'—':((c.vel>=0?'+':'')+c.vel.toFixed(c.absv>=10?1:2));
          ctx.fillText(vtxt, x+cellW/2, y+cellH/2+13);
        }
      });
      const li=cells.length-1;
      if(li>=0 && !cells[li].empty){ ctx.strokeStyle='#e5edf7'; ctx.lineWidth=2; ctx.strokeRect(mL+li*cellW+1,mT+1,cellW-3,cellH-3); }
      ctx.fillStyle='#9fb3cf'; ctx.font='9px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='top';
      const maxXL=Math.floor((w-mL-mR)/54), xStep=Math.max(1,Math.ceil(n/Math.max(1,maxXL)));
      buckets.forEach((bk,xi)=>{ if((xi%xStep) && xi!==n-1) return; const d=new Date(bk);
        ctx.fillText(d.toLocaleDateString('id-ID',{day:'numeric',month:'short'}), mL+xi*cellW+cellW/2, mT+cellH+5); });
    }

    function hmTriggerColor(v){
      const a=Math.abs(v);
      if(a>=10) return '#ef4444';
      if(a>=5)  return '#f97316';
      if(a>=2)  return '#eab308';
      return '#22c55e';
    }

    function renderHeatmapCanvas(container,data,title){
      const sensors=data.sensors.slice().sort((a,b)=>a.depth_m-b.depth_m);
      const buckets=[...new Set(data.data.map(d=>d.b))].sort();
      if(!buckets.length){
        container.innerHTML='<div style="color:#9fb3cf;padding:20px;text-align:center">No readings in selected range</div>';
        return;
      }
      const lookup={};
      data.data.forEach(d=>{lookup[d.sn+'|'+d.b]=d.v;});
      const deadSet=new Set(sensors.filter(s=>s.is_dead).map(s=>s.sn));

      const cellW=Math.max(8,Math.min(36,Math.floor(760/buckets.length)));
      const cellH=22;
      const mL=56,mR=16,mT=8,mB=52;
      const w=mL+buckets.length*cellW+mR;
      const h=mT+sensors.length*cellH+mB;

      container.innerHTML=
        '<canvas id="hmCanvas" width="'+w+'" height="'+h+'" style="display:block;'+(w>800?'':'width:100%;')+'"></canvas>'+
        '<div style="display:flex;gap:12px;align-items:center;justify-content:center;margin-top:6px;font-size:11px;color:#9fb3cf;flex-wrap:wrap">'+
        '<span style="display:inline-flex;align-items:center;gap:3px"><span style="width:12px;height:12px;background:#22c55e;border-radius:2px"></span>&lt;2 mm</span>'+
        '<span style="display:inline-flex;align-items:center;gap:3px"><span style="width:12px;height:12px;background:#eab308;border-radius:2px"></span>2–5 mm</span>'+
        '<span style="display:inline-flex;align-items:center;gap:3px"><span style="width:12px;height:12px;background:#f97316;border-radius:2px"></span>5–10 mm</span>'+
        '<span style="display:inline-flex;align-items:center;gap:3px"><span style="width:12px;height:12px;background:#ef4444;border-radius:2px"></span>&ge;10 mm</span>'+
        '<span style="display:inline-flex;align-items:center;gap:3px"><span style="width:12px;height:12px;background:#4b5563;border-radius:2px"></span>Dead / No Data</span>'+
        '</div>';

      const cv=document.getElementById('hmCanvas'); if(!cv) return;
      const ctx=cv.getContext('2d');
      ctx.fillStyle='#0f172a'; ctx.fillRect(0,0,w,h);

      sensors.forEach((s,yi)=>{
        const y=mT+yi*cellH;
        buckets.forEach((bk,xi)=>{
          const x=mL+xi*cellW;
          if(deadSet.has(s.sn)){
            ctx.fillStyle='#374151'; ctx.fillRect(x,y,cellW-1,cellH-1);
            ctx.strokeStyle='#6b7280'; ctx.lineWidth=0.5;
            for(let d=-cellH;d<cellW;d+=4){ctx.beginPath();ctx.moveTo(x+d,y);ctx.lineTo(x+d+cellH,y+cellH);ctx.stroke();}
          } else {
            const val=lookup[s.sn+'|'+bk];
            if(val!=null){
              ctx.fillStyle=hmTriggerColor(val); ctx.fillRect(x,y,cellW-1,cellH-1);
              if(cellW>=26){ctx.fillStyle='#000';ctx.font='bold 8px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(val.toFixed(1),x+cellW/2,y+cellH/2);}
            } else {
              ctx.fillStyle='#1e293b'; ctx.fillRect(x,y,cellW-1,cellH-1);
            }
          }
        });
      });

      ctx.fillStyle='#9fb3cf'; ctx.font='10px sans-serif'; ctx.textAlign='right'; ctx.textBaseline='middle';
      sensors.forEach((s,yi)=>{
        const y=mT+yi*cellH+cellH/2;
        ctx.fillText(s.depth_m+'m'+(deadSet.has(s.sn)?' ✗':''),mL-4,y);
      });

      ctx.textAlign='center'; ctx.font='9px sans-serif'; ctx.textBaseline='top';
      const maxXL=Math.floor((w-mL-mR)/50);
      const xStep=Math.max(1,Math.ceil(buckets.length/maxXL));
      buckets.forEach((bk,xi)=>{
        if(xi%xStep!==0) return;
        const x=mL+xi*cellW+cellW/2;
        const d=new Date(bk);
        ctx.save(); ctx.translate(x,mT+sensors.length*cellH+4); ctx.rotate(Math.PI/5);
        ctx.fillStyle='#9fb3cf';
        ctx.fillText(d.toLocaleDateString('id-ID',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}),0,0);
        ctx.restore();
      });
    }

    // ===================== VWP TAB =====================
    // VWP calibration (G, R0) now lives in the DB (monitoring.vwp_calibration) and the
    // kPa conversion + QC is done server-side (view v_vwp_pressure / RPC vwp_pressure_series).
    // The front-end no longer calibrates — single source of truth in the database.

    // Koordinat instalasi VWP (mE, mN, depth m) — untuk peta nanti
    const VWP_COORDS = {
      '181456': {hole:'VWP-WOC-01',mE:388487,mN:9696227,depth:30},
      '181404': {hole:'VWP-WOC-02',mE:388875,mN:9696150,depth:30},
      '181461_1': {hole:'VWP-WDN2-01',mE:389525,mN:9696585,depth:6},
      '181461_2': {hole:'VWP-WDN2-02',mE:389525,mN:9696585,depth:6},
      '181461_3': {hole:'VWP-WDN2-03',mE:389192,mN:9696656,depth:10},
      '181348_1': {hole:'OPJ-VWP-01',mE:389751,mN:9698099,depth:15},
      '181348_2': {hole:'OPJ-VWP-02',mE:389781,mN:9698074,depth:20},
      '181361': {hole:'OPN-VWP-01',mE:390956,mN:9698210,depth:20},
    };

    function vwpChLabel(devId,chName){
      const node=VWP_NODES.find(n=>n.id===devId);
      if(!node) return chName;
      const m=chName.match(/Ch(\d+)/);
      if(m && (node.channels||0)>1) return node.label+' '+String(m[1]).padStart(2,'0');
      return node.label;
    }

    // Pore pressure (kPa) now comes pre-calibrated and QC-filtered from the DB
    // (RPC vwp_pressure_series → view v_vwp_pressure). The front-end only reshapes
    // into per-channel series for the charts — NO calibration here anymore.
    function processVwp(rows){
      const byDev={};
      (rows||[]).forEach(r=>{

      });
      for(const devId of Object.keys(byDev)) byDev[devId].pRows=Object.values(byDev[devId].channels).flat();
      return byDev;
    }

    function drawVwpTab(){
      Object.values(charts).forEach(c=>{try{c.destroy()}catch(e){}}); charts={};

      const pal=['#22d3ee','#a78bfa','#f97316','#22c55e','#ef4444','#ec4899','#84cc16','#f59e0b'];

      const combSeries=[];
      let ci=0;
      let latestTs=null;
      VWP_NODES.forEach(n=>{
        const d=vwpData[n.id]; if(!d) return;
        const chKeys=Object.keys(d.channels).sort();
        chKeys.forEach(ch=>{
          const rows=d.channels[ch].slice().sort((a,b)=>a.ts.localeCompare(b.ts));
          if(!rows.length) return;
          if(!latestTs || rows[rows.length-1].ts>latestTs) latestTs=rows[rows.length-1].ts;
          combSeries.push({name:vwpChLabel(n.id,ch),rows:rows.map(r=>({ts:r.ts,value:r.value})),color:pal[ci%pal.length]});
          ci++;
        });
      });
      if(combSeries.length){
        const ms=multiSeries(combSeries);
        if(STATE.vwpRange==='live') addTrend(ms,'#fbbf24');
        tsChart('vwpCombined',ms,'kPa',[-50,50]);

          const ms=multiSeries(detailSeries);
          if(STATE.vwpRange==='live') addTrend(ms,'#fbbf24');
          tsChart('vwpDetail',ms,'kPa',[-50,50]);
        }
      }
    }

    function renderInsHeatmap(){
      const h=(INS.analytics&&INS.analytics.heatmap)||[]; const box=document.getElementById('insHeat'); if(!box) return;
      if(!h.length){ box.innerHTML='<div style="color:var(--mut2)">Tidak ada finding aktif.</div>'; return; }
      const locs=[...new Set(h.map(d=>d.location))];
      const ptot={}; h.forEach(d=>{ptot[d.parameter]=(ptot[d.parameter]||0)+(+d.score||0);});
      const params=Object.keys(ptot).sort((a,b)=>ptot[b]-ptot[a]).slice(0,8);
      const cell={}; h.forEach(d=>{cell[d.location+'|'+d.parameter]=Math.max(cell[d.location+'|'+d.parameter]||0,+d.score||0);});
      const short=s=>s.replace('Kondisi ','').replace(' (instrument)','').replace('Movement Velocity','MV');
      let html='<table class="heat"><thead><tr><th style="text-align:left">Lokasi</th>'+params.map(p=>`<th title="${esc(p)}">${esc(short(p))}</th>`).join('')+'</tr></thead><tbody>';
      locs.forEach(L=>{ html+=`<tr><td style="text-align:left;white-space:nowrap">${esc(L)}</td>`+params.map(p=>{const v=cell[L+'|'+p];return `<td style="background:${hmColor(v||0)};color:#0b1220;font-weight:700">${v||''}</td>`;}).join('')+'</tr>'; });
      html+='</tbody></table>';
      box.innerHTML=html;
    }

    async function insSetState(id, state){

      try{
        const { error } = await sb.rpc('inspection_set_state',{ p_id:id, p_state:state, p_note:note });

        await drawInspectionData(); setInsTab('log');

      document.getElementById('lastUpd').textContent = newest ? new Date(newest).toLocaleString('id-ID') : '—';

      // 📡 data-age chip: how fresh the newest reading is, coloured if stale
      const daEl = document.getElementById('dataAge'), daChip = document.getElementById('dataAgeChip');
      if(daEl){
        const mins = newest ? (Date.now()-new Date(newest).getTime())/60000 : null;
        daEl.textContent = newest ? agoEn(newest) : '—';
        if(daChip) daChip.style.color = mins==null ? '#94a3b8' : mins<=10 ? '#22c55e' : mins<=180 ? '#eab308' : '#f97316';
      }

      const st = overallStatus(m);
      document.getElementById('siteStat').textContent = st.t;

      const page = document.getElementById('page');
      page.classList.add('scroll');

      if(STATE.view==='overview'){
        page.innerHTML = overviewLayout();

        buildMap(m);

      } else if(STATE.view==='instrument'){
