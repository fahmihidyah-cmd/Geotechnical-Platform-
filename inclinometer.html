<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>

<title>Inplace Inclinometer — Realtime Monitoring</title>
<link rel="stylesheet" href="common.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg0:#020814;--bg1:#050f1f;--p0:#0a1830;--p1:#0c1e3a;--p2:#102a44;--pnl:#081627;--st:rgba(120,150,190,.14);--tx:#e5edf7;--mu:#8ba0bd;--cy:#38bdf8;--grn:#22c55e;--yel:#eab308;--org:#f97316;--red:#ef4444;--pur:#a855f7}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg0);color:var(--tx);overflow:hidden}
#root{display:flex;flex-direction:column;height:100vh;overflow:hidden}

.hdr{display:flex;align-items:center;gap:10px;padding:0 14px;height:34px;flex-shrink:0;background:linear-gradient(180deg,#0a1830,#071224);border-bottom:1px solid var(--st)}
.hdr .ttl{font-size:14px;font-weight:800;letter-spacing:.04em}
.hdr .nav{margin-left:auto;display:flex;gap:6px}
.hdr .nav a,.hdr .nav button{display:flex;align-items:center;gap:5px;background:#0e2240;border:1px solid var(--st);color:var(--mu);padding:3px 10px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;text-decoration:none}
.hdr .nav .on{background:#134e6b;border-color:#38bdf866;color:#e0f2fe}
.hdr .nav a:hover,.hdr .nav button:hover{color:var(--tx)}

.stats{display:flex;align-items:stretch;gap:8px;padding:4px 14px;height:48px;flex-shrink:0;background:var(--bg1);border-bottom:1px solid var(--st)}
.stbox{display:flex;flex-direction:column;justify-content:center;padding:0 12px;border-right:1px solid var(--st)}
.stbox .k{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em}
.stbox .v{font-size:18px;font-weight:800;line-height:1.05}
.stbox .v small{font-size:10px;font-weight:600;opacity:.8}
.stbox.g .v{color:var(--grn)}.stbox.y .v{color:var(--yel)}.stbox.o .v{color:var(--org)}.stbox.r .v{color:var(--red)}
.stbox .live{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--grn);font-weight:700}
.stbox .live .d{width:7px;height:7px;border-radius:50%;background:var(--grn);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.leg{margin-left:auto;display:flex;flex-direction:column;justify-content:center;min-width:300px}
.leg .lt{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;text-align:center;margin-bottom:3px}
.leg .row{display:flex;align-items:center;gap:9px}
.leg .grad{flex:1}
.leg .bar{height:11px;border-radius:3px;background:linear-gradient(90deg,#16a34a,#22c55e 16%,#eab308 30%,#f97316 33%,#f97316 63%,#ef4444 66%,#ef4444 96%,#a855f7)}
.leg .sc{display:flex;justify-content:space-between;font-size:8px;color:var(--mu);margin-top:1px}
.leg .nd{display:flex;align-items:center;gap:4px;font-size:8px;color:var(--mu);white-space:nowrap}
.leg .nd .sw{width:16px;height:12px;border-radius:2px;border:1px solid var(--st);background:repeating-linear-gradient(45deg,#22303f,#22303f 2px,#3c4a5c 2px,#3c4a5c 4px)}
.leg .nd .sw.fr{border-color:#f59e0b;background:repeating-linear-gradient(45deg,#3a2a06,#3a2a06 2px,#f59e0b 2px,#f59e0b 4px)}

.ctl{display:flex;align-items:center;gap:6px;padding:0 14px;height:28px;flex-shrink:0;background:var(--p0);border-bottom:1px solid var(--st)}
.ctl label{font-size:9px;color:var(--mu);text-transform:uppercase}
.ctl select,.ctl input[type=date]{background:#0e2240;border:1px solid var(--st);color:var(--tx);padding:2px 6px;border-radius:4px;font-size:10px;height:21px}
.ctl select{cursor:pointer}.ctl #cDev{font-weight:700;color:var(--cy);min-width:150px}
.ctl input[type=date]{width:118px}
.ctl .btn{background:#155e75;border:1px solid #38bdf855;color:#e0f2fe;padding:2px 14px;border-radius:4px;cursor:pointer;font-size:10px;font-weight:700;height:21px}
.ctl .btn:hover{background:#0e7490}
.ctl .note{margin-left:auto;font-size:9px;color:var(--mu)}

.main{flex:1;display:grid;grid-template-columns:344px 1fr 186px;min-height:0;overflow:hidden}
.pnl{background:var(--pnl);overflow:hidden;display:flex;flex-direction:column;min-height:0}
.pnl.l{border-right:1px solid var(--st)}
.pnl.r{border-left:1px solid var(--st);padding:7px}
.ph{padding:4px 10px;font-size:11px;font-weight:800;letter-spacing:.02em;border-bottom:1px solid var(--st);flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.ph small{font-weight:600;color:var(--mu);font-size:9px}
.ph .cy{color:var(--cy)}

.cwrap{flex:1;display:grid;grid-template-columns:minmax(240px,1.15fr) 1fr;grid-template-rows:1fr 1fr;gap:6px;padding:6px;min-height:0;overflow:hidden}
.card{background:var(--p0);border:1px solid var(--st);border-radius:6px;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.card .ch{padding:4px 9px;font-size:10px;font-weight:700;color:var(--tx);border-bottom:1px solid var(--st);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.card .ch small{color:var(--mu);font-weight:500;font-size:9px}
.card .ch select{background:#0e2240;border:1px solid var(--st);color:var(--tx);font-size:9px;border-radius:3px;height:19px;padding:0 3px}
.card .cb{flex:1;position:relative;min-height:0;padding:3px}
.card.tall{grid-row:1/3}
.ovbody{flex:1;position:relative;min-height:0;padding:4px}

.badge{text-align:center;padding:8px 6px;border-radius:7px;margin-bottom:7px;font-size:14px;font-weight:900;letter-spacing:.03em;display:flex;align-items:center;justify-content:center;gap:5px;flex-shrink:0}
.badge.hijau{background:rgba(34,197,94,.13);color:#22c55e;border:1.5px solid #22c55e}
.badge.kuning{background:rgba(234,179,8,.13);color:#eab308;border:1.5px solid #eab308}
.badge.jingga{background:rgba(249,115,22,.13);color:#f97316;border:1.5px solid #f97316}
.badge.merah{background:rgba(239,68,68,.13);color:#ef4444;border:1.5px solid #ef4444}
.frzn{background:rgba(245,158,11,.13);border:1.5px solid #f59e0b;color:#fbbf24;border-radius:7px;padding:6px 8px;margin-bottom:7px;font-size:9px;font-weight:700;line-height:1.35}
.mrow{padding:5px 0;border-bottom:1px solid var(--st)}
.mrow .k{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em}
.mrow .line{display:flex;justify-content:space-between;align-items:baseline;margin-top:2px}
.mrow .big{font-size:17px;font-weight:900;line-height:1}
.mrow .at{font-size:8px;color:var(--mu)}
.mrow .big.g{color:#22c55e}.mrow .big.y{color:#eab308}.mrow .big.o{color:#f97316}.mrow .big.r{color:#ef4444}.mrow .big.p{color:#a855f7}
.dir{display:flex;align-items:center;justify-content:center;gap:5px;font-size:14px;font-weight:900;padding:2px 0}
.sec{margin-top:6px;padding-top:5px;border-top:1px solid var(--st)}
.sec h4{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.sr{display:flex;justify-content:space-between;padding:2px 0;font-size:10px}
.sr .k{color:var(--mu)}.sr .v{font-weight:700}
.sr .v.g{color:#22c55e}.sr .v.y{color:#eab308}.sr .v.o{color:#f97316}.sr .v.r{color:#ef4444}
.dvrow{display:flex;justify-content:space-between;align-items:center;padding:3px 4px;border-radius:4px;cursor:pointer;font-size:10px}
.dvrow:hover{background:rgba(56,189,248,.08)}
.dvrow.on{background:rgba(56,189,248,.12)}

.pb{display:flex;align-items:center;gap:9px;padding:0 14px;height:44px;flex-shrink:0;background:linear-gradient(180deg,#071224,#0a1830);border-top:1px solid var(--st)}
.pb .lbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.pb button{width:28px;height:28px;border-radius:50%;background:#134e6b;border:1px solid #38bdf855;color:#e0f2fe;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pb button:hover{background:#0e7490}
.pb .cur{font-size:11px;font-weight:800;color:var(--cy);background:#0e2240;border:1px solid var(--st);border-radius:4px;padding:3px 6px;white-space:nowrap;min-width:96px;text-align:center;flex-shrink:0}
.pb .tk{font-size:8px;color:var(--mu);white-space:nowrap;flex-shrink:0}
.pb input[type=range]{flex:1 1 auto;min-width:120px;accent-color:#38bdf8;height:14px;cursor:pointer}
.pb select{background:#0e2240;border:1px solid var(--st);color:var(--tx);font-size:9px;border-radius:4px;height:21px;width:46px;flex-shrink:0}
.pb .live{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--grn);font-weight:700;cursor:pointer;flex-shrink:0}
.pb .live .d{width:7px;height:7px;border-radius:50%;background:#334155}
.pb .live.on .d{background:var(--grn);animation:pulse 1.4s infinite}

.msg{color:var(--mu);font-size:10px;text-align:center;position:absolute;top:50%;left:0;right:0;transform:translateY(-50%)}
#ovTip{position:fixed;z-index:60;pointer-events:none;background:#0b1a2e;border:1px solid #38bdf866;border-radius:5px;padding:5px 8px;font-size:10px;color:#e5edf7;box-shadow:0 4px 14px rgba(0,0,0,.55);line-height:1.55;white-space:nowrap}
#ovTip b{color:#38bdf8}
</style>

<body>
<div id="root"></div>
<script>
"use strict";
const sb=GMS.sb,esc=GMS.esc;
const NODES=[
  {id:'108052',label:'WOC-02 INC',short:'WOC-02',depth:30},
  {id:'108102',label:'WDN-2 INC-01',short:'WDN-01',depth:51},
  {id:'108164',label:'WDN-2 INC-02',short:'WDN-02',depth:39},
  {id:'108403',label:'WOC-01 INC',short:'WOC-01',depth:15}
];
// Sensor mati permanen (laporan operator: casing shear/pergeseran) → dipaksa NO-DATA.
const DEAD_OVERRIDE={'108102':[9]};
let S={sel:'108102',from:null,to:null,depthIdx:-1,pbIdx:0,playing:false,speed:2};
let D={hm:null,hmA:null,hmB:null,ews:[],bks:[],cumA:{},cumB:{},cumAbsMax:10,maxDepth:51,gov:null,ch:{}};
let pbTimer=null;

function ds(o){return new Date(Date.now()+o*864e5).toISOString().slice(0,10)}
function isOverrideDead(dev,sn){return (DEAD_OVERRIDE[dev]||[]).includes(sn)}
function vcl(v){if(v==null)return'';const a=Math.abs(v);if(a>=20)return'p';if(a>=10)return'r';if(a>=5)return'o';if(a>=2)return'y';return'g'}
// warna sesuai ambang EWS: point-disp (<50 Low hijau, 50-100 Medium oranye, >=100 High merah)
function dispCls(v){const a=Math.abs(v);if(a>=100)return'r';if(a>=50)return'o';return'g'}
// velocity mm/jam: >=62.5 VeryHigh(merah), >=2.08 High(oranye,=50mm/hari), >=0.17 Medium(kuning,=4.1mm/hari), else Low(hijau)
function velCls(v){const a=Math.abs(v);if(a>=62.5)return'r';if(a>=2.08)return'o';if(a>=0.17)return'y';return'g'}
function tlv(l){if(!l)return{c:'hijau',t:'LOW'};const u=String(l).toUpperCase();if(u==='MERAH')return{c:'merah',t:'VERY HIGH'};if(u==='JINGGA')return{c:'jingga',t:'HIGH'};if(u==='KUNING')return{c:'kuning',t:'MEDIUM'};return{c:'hijau',t:'LOW'}}
function fmtB(b){const d=new Date(b);return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}
function ramp(t){t=Math.max(0,Math.min(1,t));const st=[[0,[22,101,52]],[.12,[34,197,94]],[.38,[234,179,8]],[.58,[249,115,22]],[.78,[239,68,68]],[.9,[185,28,28]],[1,[168,85,247]]];
  for(let i=1;i<st.length;i++){if(t<=st[i][0]){const a=st[i-1],b=st[i],f=(t-a[0])/(b[0]-a[0]);return`rgb(${a[1].map((c,j)=>Math.round(c+(b[1][j]-c)*f)).join(',')})`}}return'rgb(168,85,247)'}
// ABSOLUTE cumulative color scale (mm) selaras ambang EWS/TARP kita:
// <50 Low (hijau) · ≥50 Medium (oranye) · ≥100 High (merah) · ≥150 sangat tinggi (ungu).
// Warna selalu bermakna sama & tidak berubah antar-load.
function hcCum(v){if(v==null)return null;const a=Math.abs(v);if(a>=150)return'#a855f7';if(a>=100)return'#ef4444';if(a>=50)return'#f97316';if(a>=25)return'#eab308';if(a>=10)return'#22c55e';return'#16a34a'}

function shell(){
  document.getElementById('root').innerHTML=`
  <div class="hdr">
    <div class="ttl">INPLACE INCLINOMETER &mdash; REALTIME MONITORING</div>
    <div class="nav"><button class="on">&#9636; DASHBOARD</button><a href="monitoring.html">&#9639; DASHBOARD UTAMA</a></div>
  </div>
  <div class="stats">
    <div class="stbox"><div class="k">Total Inclinometer</div><div class="v">${NODES.length} <small>UNIT</small></div></div>
    <div class="stbox g"><div class="k">Low</div><div class="v" id="sN">0</div></div>
    <div class="stbox y"><div class="k">Medium</div><div class="v" id="sW">0</div></div>
    <div class="stbox o"><div class="k">High</div><div class="v" id="sWn">0</div></div>
    <div class="stbox r"><div class="k">Very High</div><div class="v" id="sA">0</div></div>
    <div class="stbox"><div class="k">Time (WIB)</div><div class="v" id="ck" style="font-size:15px">—</div><div class="live"><span class="d"></span>LIVE &middot; <span id="ckd">—</span></div></div>
    <div class="leg"><div class="lt">Incremental (mm) = (current &minus; initial) &times; 3000</div><div class="row"><div class="grad"><div class="bar"></div><div class="sc"><span>0</span><span>50</span><span>100</span><span>&ge;150</span></div></div><div class="nd"><span class="sw"></span>No Data</div><div class="nd"><span class="sw fr"></span>Frozen</div></div></div>
  </div>
  <div class="ctl">
    <label>Device</label><select id="cDev" onchange="setDev(this.value)">${NODES.map(n=>`<option value="${n.id}"${n.id===S.sel?' selected':''}>${esc(n.label)}</option>`).join('')}</select>
    <label>From</label><input type="date" id="cF" value="${S.from||ds(-7)}" onchange="applyRange()"/>
    <label>To</label><input type="date" id="cT" value="${S.to||ds(0)}" onchange="applyRange()"/>
    <button class="btn" onclick="applyRange()">SHOW</button>
    <span class="note">Overview & cumulative: Axis A &amp; B tampil semua · time-series ikut sensor governing</span>
  </div>
  <div class="main">
    <div class="pnl l">
      <div class="ph"><span>OVERVIEW &mdash; <span class="cy" id="ovDev">—</span></span><small>Incremental heatmap · A atas / B bawah</small></div>
      <div class="ovbody"><canvas id="cvO"></canvas><div class="msg" id="ovMsg" style="display:none"></div></div>
      <div id="ovTip" style="display:none"></div>
    </div>
    <div class="pnl">
      <div class="ph"><span class="cy" id="selT">SELECTED: —</span><small id="selI"></small></div>
      <div class="cwrap">
        <div class="card tall"><div class="ch"><span>CUMULATIVE DISPLACEMENT (bottom&rarr;up) &mdash; A | B</span><small id="cumAt"></small></div>
          <div class="cb" style="display:flex;gap:3px"><div style="flex:1;position:relative"><canvas id="cvCA"></canvas></div><div style="flex:1;position:relative;border-left:1px solid var(--st)"><canvas id="cvCB"></canvas></div></div></div>
        <div class="card"><div class="ch"><span>INCR. DISPLACEMENT vs TIME</span><span><small>Depth</small> <select id="cDp" onchange="setDp(this.value)"></select></span></div><div class="cb"><canvas id="cvD"></canvas></div></div>
        <div class="card"><div class="ch"><span>VELOCITY vs TIME</span><small id="velAt">@ —</small></div><div class="cb"><canvas id="cvV"></canvas></div></div>
      </div>
    </div>
    <div class="pnl r" id="stP"></div>
  </div>
  <div class="pb">
    <button id="pbBtn" onclick="togglePlay()">&#9654;</button>
    <span class="cur" id="pbCur">—</span>
    <span class="tk" id="pbA">—</span>
    <input type="range" id="pbRng" min="0" max="0" value="0" oninput="onScrub(+this.value)"/>
    <span class="tk" id="pbB">—</span>
    <select id="pbSpd" onchange="S.speed=+this.value" title="Speed"><option value="1">1&times;</option><option value="2" selected>2&times;</option><option value="4">4&times;</option><option value="8">8&times;</option></select>
    <span class="live on" id="pbLive" onclick="goLive()"><span class="d"></span>LIVE</span>
  </div>`;
  ckUp();setInterval(ckUp,1000);
}
function ckUp(){const n=new Date(),e=document.getElementById('ck'),e2=document.getElementById('ckd');if(e)e.textContent=n.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});if(e2)e2.textContent=n.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})}

function setDev(id){S.sel=id;const e=document.getElementById('cDev');if(e)e.value=id;loadSel()}
function selDev(id){setDev(id)}
function setDp(v){S.depthIdx=parseInt(v,10);drawDisp();drawVel();renderSt()}
function applyRange(){stopPlay();loadSel()}
window.setDev=setDev;window.selDev=selDev;window.setDp=setDp;window.loadSel=loadSel;window.applyRange=applyRange;
window.togglePlay=togglePlay;window.onScrub=onScrub;window.goLive=goLive;

function renderStats(){
  const by={};(D.ews||[]).filter(e=>e.category==='inclinometer').forEach(e=>{by[e.external_device_id]=e});
  let n=0,w=0,wn=0,a=0;
  NODES.forEach(d=>{const c=tlv(by[d.id]?.trigger_level).c;if(c==='merah')a++;else if(c==='jingga')wn++;else if(c==='kuning')w++;else n++});
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v};
  set('sN',n);set('sW',w);set('sWn',wn);set('sA',a);
}

function alive(){return (D.hm?.sensors||[]).filter(s=>!s.is_dead)}
function curB(){return D.bks[Math.min(S.pbIdx,D.bks.length-1)]}

function computeCum(hm){
  const cum={},bks=[...new Set((hm?.data||[]).map(d=>d.b))].sort(),inc={};
  (hm?.data||[]).forEach(d=>{(inc[d.b]=inc[d.b]||{})[d.sn]=d.v});
  const al=(hm?.sensors||[]).filter(s=>!s.is_dead).sort((a,b)=>b.depth_m-a.depth_m); // deepest (bottom) first
  let mx=1;
  bks.forEach(b=>{let s=0;const m={};
    al.forEach(sn=>{s+=inc[b]?.[sn.sn]||0;m[sn.sn]=s});          // raw cumulative bottom->up
    const base=al.length?(m[al[0].sn]||0):0;                     // anchor deepest ALIVE sensor to 0 (fixed base)
    al.forEach(sn=>{m[sn.sn]=Math.round((m[sn.sn]-base)*1000)/1000;if(Math.abs(m[sn.sn])>mx)mx=Math.abs(m[sn.sn])});
    cum[b]=m;});
  return {cum,maxAbs:mx,bks,inc};
}
function computeGov(){ // governing = (axis,sensor) HIDUP dgn |incremental| terbesar (abaikan sensor mati)
  let mv=0,sn=null,ax='B';
  ['A','B'].forEach(a=>{const dead=new Set((D['hm'+a]?.sensors||[]).filter(s=>s.is_dead).map(s=>s.sn));
    (D['hm'+a]?.data||[]).forEach(d=>{if(dead.has(d.sn))return;const v=Math.abs(d.v||0);if(v>mv){mv=v;sn=d.sn;ax=a}})});
  const s=(D.hm?.sensors||[]).find(x=>x.sn===sn);
  D.gov=sn!=null?{sn,ax,depth:s?.depth_m||0}:null;
}

async function loadSel(){
  const dev=S.sel,nd=NODES.find(n=>n.id===dev);
  document.getElementById('ovDev').textContent=(nd?.label||dev);
  document.getElementById('selT').textContent='SELECTED: '+(nd?.label||dev);
  S.from=document.getElementById('cF')?.value||ds(-7);S.to=document.getElementById('cT')?.value||ds(0);
  const f=new Date(S.from+'T00:00:00').toISOString(),t=new Date(S.to+'T23:59:59').toISOString();
  const dd=Math.max(1,Math.round((new Date(t)-new Date(f))/864e5));
  const ev=dd<=2?'1 hour':dd<=7?'3 hours':dd<=30?'6 hours':'1 day';
  const ovMsg=document.getElementById('ovMsg');if(ovMsg)ovMsg.style.display='none';
  try{
    const[rA,rB]=await Promise.all([
      sb.rpc('inc_heatmap_series',{p_device:dev,p_from:f,p_to:t,p_every:ev,p_axis:'A'}),
      sb.rpc('inc_heatmap_series',{p_device:dev,p_from:f,p_to:t,p_every:ev,p_axis:'B'})
    ]);
    if(rA.error)throw rA.error;if(rB.error)throw rB.error;
    const ov=DEAD_OVERRIDE[dev]||[];
    [rA.data,rB.data].forEach(dt=>{if(dt?.sensors)dt.sensors.forEach(s=>{if(ov.includes(s.sn))s.is_dead=true});if(dt?.data)dt.data=dt.data.filter(d=>!ov.includes(d.sn))});
    D.hmA=rA.data;D.hmB=rB.data;D.hm=D.hmA;
    const A=computeCum(D.hmA),B=computeCum(D.hmB);
    D.cumA=A.cum;D.cumB=B.cum;D.incA=A.inc;D.incB=B.inc;D.bks=A.bks.length?A.bks:B.bks;
    D.cumAbsMax=Math.max(A.maxAbs,B.maxAbs);D.maxDepth=Math.max(3,...alive().map(s=>s.depth_m));
    computeGov();
    const al=alive().sort((a,b)=>b.depth_m-a.depth_m);
    const dp=document.getElementById('cDp');
    if(dp)dp.innerHTML='<option value="-1"'+(S.depthIdx<0?' selected':'')+'>Auto (Max)</option>'+al.map((s,i)=>`<option value="${i}"${i===S.depthIdx?' selected':''}>${s.depth_m}.0 m</option>`).join('');
    document.getElementById('selI').textContent=`Depth ${nd?.depth||'?'}.0m · Sensor ${D.hm?.sensors?.length||0} · Int 3.0m`;
    S.pbIdx=D.bks.length-1;
    const rng=document.getElementById('pbRng');if(rng){rng.max=Math.max(0,D.bks.length-1);rng.value=S.pbIdx}
    document.getElementById('pbA').textContent=D.bks.length?fmtB(D.bks[0]):'—';
    document.getElementById('pbB').textContent=D.bks.length?fmtB(D.bks[D.bks.length-1]):'—';
    if(!D.bks.length&&ovMsg){ovMsg.style.display='block';ovMsg.textContent='Tidak ada data pada rentang ini'}
    drawOv();drawCumBoth();drawDisp();drawVel();updateCur();renderSt();
  }catch(e){console.warn(e);if(ovMsg){ovMsg.style.display='block';ovMsg.textContent='Error memuat data'}}
}

// ---------- Overview: depth×time cumulative heatmaps (A top, B bottom) ----------
function drawOv(){
  const cv=document.getElementById('cvO'),wrap=cv?.parentElement;if(!cv||!wrap)return;
  if(!D.bks.length){return}
  const W=Math.max(240,wrap.clientWidth-8),H=Math.max(180,wrap.clientHeight-8);
  const dpr=window.devicePixelRatio||1;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);
  const sensors=(D.hm?.sensors||[]).slice().sort((a,b)=>a.depth_m-b.depth_m); // shallow top
  const LBL=30,TAX=16,GH=13,nb=D.bks.length,ns=sensors.length;
  const hmH=(H-2*GH-TAX)/2,cellW=(W-LBL)/nb,cellH=hmH/Math.max(1,ns);
  D.ovGeo={LBL,TAX,GH,nb,ns,hmH,cellW,cellH,sensors};
  const cursorX=LBL+(S.pbIdx+0.5)*cellW;
  [['A',D.incA,0],['B',D.incB,GH+hmH]].forEach(([ax,cum,oy])=>{
    ctx.fillStyle=ax==='A'?'#38bdf8':'#a855f7';ctx.font='bold 9px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText('AXIS '+ax,2,oy+GH/2);
    const top=oy+GH;
    sensors.forEach((s,yi)=>{const y=top+yi*cellH;
      D.bks.forEach((bk,xi)=>{const x=LBL+xi*cellW;
        if(s.is_dead){ctx.fillStyle='#22303f';ctx.fillRect(x,y,Math.ceil(cellW),Math.ceil(cellH)-0.5);ctx.strokeStyle='#3c4a5c';ctx.lineWidth=.4;ctx.save();ctx.beginPath();ctx.rect(x,y,cellW,cellH);ctx.clip();for(let d=-cellH;d<cellW;d+=4){ctx.beginPath();ctx.moveTo(x+d,y);ctx.lineTo(x+d+cellH,y+cellH);ctx.stroke()}ctx.restore()}
        else{const v=cum[bk]?.[s.sn];ctx.fillStyle=v!=null?hcCum(v):'#132132';ctx.fillRect(x,y,Math.ceil(cellW),Math.ceil(cellH)-0.5);
          if(s.is_railed){ctx.strokeStyle='#f59e0bcc';ctx.lineWidth=.5;ctx.save();ctx.beginPath();ctx.rect(x,y,cellW,cellH);ctx.clip();for(let d=-cellH;d<cellW;d+=4){ctx.beginPath();ctx.moveTo(x+d,y);ctx.lineTo(x+d+cellH,y+cellH);ctx.stroke()}ctx.restore()}}
      });
    });
    ctx.fillStyle='#8ba0bd';ctx.font='7px sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';
    const step=cellH<11?Math.ceil(11/cellH):1;
    sensors.forEach((s,yi)=>{if(yi%step&&yi!==ns-1)return;ctx.fillText(s.depth_m+'m',LBL-2,top+yi*cellH+cellH/2)});
    ctx.strokeStyle='#e0f2fe';ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(cursorX,top);ctx.lineTo(cursorX,top+hmH);ctx.stroke();
  });
  ctx.fillStyle='#8ba0bd';ctx.font='8px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
  const mxL=Math.floor((W-LBL)/70),xst=Math.max(1,Math.ceil(nb/Math.max(1,mxL)));
  D.bks.forEach((bk,xi)=>{if(xi%xst)return;const x=LBL+(xi+0.5)*cellW,d=new Date(bk);ctx.fillText(d.toLocaleDateString('id-ID',{day:'2-digit',month:'short'}),x,H-TAX+2)});
}
function ovClick(ev){const cv=document.getElementById('cvO');if(!cv||!D.bks.length)return;const r=cv.getBoundingClientRect();const W=r.width,LBL=30,cellW=(W-LBL)/D.bks.length;let i=Math.floor((ev.clientX-r.left-LBL)/cellW);i=Math.max(0,Math.min(D.bks.length-1,i));S.pbIdx=i;document.getElementById('pbRng').value=i;stopPlay();refreshAtCursor()}
function ovHover(ev){
  const g=D.ovGeo,tip=document.getElementById('ovTip'),cv=document.getElementById('cvO');if(!g||!tip||!cv||!D.bks.length){if(tip)tip.style.display='none';return}
  const r=cv.getBoundingClientRect(),mx=ev.clientX-r.left,my=ev.clientY-r.top;
  const xi=Math.floor((mx-g.LBL)/g.cellW);
  if(mx<g.LBL||xi<0||xi>=g.nb){tip.style.display='none';return}
  const aT=g.GH,aB=g.GH+g.hmH,bT=2*g.GH+g.hmH,bB=2*g.GH+2*g.hmH;let ax=null,yi=-1;
  if(my>=aT&&my<aB){ax='A';yi=Math.floor((my-aT)/g.cellH)}else if(my>=bT&&my<bB){ax='B';yi=Math.floor((my-bT)/g.cellH)}
  if(!ax||yi<0||yi>=g.ns){tip.style.display='none';return}
  const s=g.sensors[yi],bk=D.bks[xi],val=(ax==='A'?D.cumA:D.cumB)[bk]?.[s.sn];
  const iv=(ax==='A'?D.incA:D.incB)[bk]?.[s.sn];
  tip.innerHTML=`<b>Axis ${ax} &middot; ${s.depth_m} m</b><br>${fmtB(bk)}<br>Incremental: <b>${s.is_dead||iv==null?'No Data':(iv>=0?'+':'')+iv.toFixed(1)+' mm'}</b><br>Cumulative: <b>${s.is_dead||val==null?'No Data':(val>=0?'+':'')+val.toFixed(1)+' mm'}</b>${s.is_railed?'<br><span style="color:#f59e0b;font-weight:700">&#9888; FROZEN &mdash; magnitude valid, velocity tak terpantau</span>':''}`;
  tip.style.display='block';
  let tx=ev.clientX+14,ty=ev.clientY+14;const tw=tip.offsetWidth,th=tip.offsetHeight;
  if(tx+tw>innerWidth)tx=ev.clientX-tw-14;if(ty+th>innerHeight)ty=ev.clientY-th-14;
  tip.style.left=tx+'px';tip.style.top=ty+'px';
}

// ---------- time-series @ governing (or manual) sensor ----------
function selTarget(){
  const al=alive().sort((a,b)=>b.depth_m-a.depth_m);if(!al.length)return null;
  if(S.depthIdx<0)return D.gov||{sn:al[0].sn,ax:'B',depth:al[0].depth_m};
  const s=al[Math.min(S.depthIdx,al.length-1)],lb=D.bks[D.bks.length-1];
  const va=Math.abs((D.hmA?.data||[]).find(d=>d.b===lb&&d.sn===s.sn)?.v||0),vb=Math.abs((D.hmB?.data||[]).find(d=>d.b===lb&&d.sn===s.sn)?.v||0);
  return {sn:s.sn,ax:va>=vb?'A':'B',depth:s.depth_m};
}
function seriesFor(sn,ax){return ((ax==='A'?D.hmA:D.hmB)?.data||[]).filter(d=>d.sn===sn).sort((a,b)=>String(a.b).localeCompare(String(b.b)))}
function pbCursorPlugin(){return {id:'cur',afterDatasetsDraw(c){if(!D.bks.length)return;const x=new Date(curB()).getTime(),xs=c.scales.x,ar=c.chartArea;if(!ar)return;const px=xs.getPixelForValue(x);if(px<ar.left||px>ar.right)return;const ctx=c.ctx;ctx.save();ctx.strokeStyle='rgba(224,242,254,.9)';ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(px,ar.top);ctx.lineTo(px,ar.bottom);ctx.stroke();ctx.restore()}}}
function tgtLabel(t){return '@ '+t.depth+'.0 m'+(S.depthIdx<0?' (gov depth)':'')+' · A & B'}
function velPts(sn,ax){const raw=seriesFor(sn,ax),o=[];for(let i=1;i<raw.length;i++){const dt=(new Date(raw[i].b)-new Date(raw[i-1].b))/36e5;if(dt>0)o.push({x:new Date(raw[i].b).getTime(),y:(raw[i].v-raw[i-1].v)/dt})}return o}
const LEG={display:true,position:'top',align:'end',labels:{color:'#cdd8e6',font:{size:8},boxWidth:8,boxHeight:8,padding:5,usePointStyle:true}};

      plugins:{legend:LEG,title:{display:true,text:tgtLabel(t),color:'#8ba0bd',font:{size:9},position:'top',align:'start'},tooltip:{callbacks:{title:it=>it.length?fmtB(it[0].parsed.x):'',label:c=>c.dataset.label+': '+c.parsed.y.toFixed(1)+' mm'}}},
      scales:{x:{type:'linear',ticks:{color:'#8ba0bd',font:{size:7},maxTicksLimit:6,callback:v=>new Date(v).toLocaleDateString('id-ID',{day:'2-digit',month:'short'})},grid:{color:'rgba(120,150,190,.06)'}},

  const ok=await GMS.guard({mount:'#root'});if(!ok)return;
  shell();await loadAll();
  setInterval(()=>{if(!GMS.isOnline()||document.hidden||S.playing||S.pbIdx!==D.bks.length-1)return;loadAll().catch(()=>{})},120000);
  document.addEventListener('visibilitychange',()=>{if(!document.hidden&&GMS.isOnline()&&!S.playing)loadAll().catch(()=>{})});
})();
</script>
