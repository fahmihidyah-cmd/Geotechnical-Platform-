<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#071a2e"/>
<title>Inclinometer Monitoring — Geotechnical Platform</title>
<link rel="stylesheet" href="common.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="common.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg0:#051426;--bg1:#04101f;--p0:#0a2037;--p1:#0b243f;--p2:#0e2c4d;--st:rgba(148,163,184,.16);--tx:#e5e7eb;--mu:#94a3b8;--grn:#22c55e;--yel:#eab308;--org:#f97316;--red:#ef4444}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg0);color:var(--tx);overflow:hidden;height:100vh}

/* Header */
.hdr{display:flex;align-items:center;gap:8px;padding:4px 12px;background:var(--p0);border-bottom:1px solid var(--st);height:36px;flex-shrink:0}
.hdr .back{background:none;border:1px solid var(--st);color:var(--mu);padding:2px 8px;border-radius:3px;cursor:pointer;font-size:10px;white-space:nowrap}
.hdr .back:hover{color:var(--tx)}
.hdr .ttl{font-size:13px;font-weight:800;letter-spacing:.03em;white-space:nowrap}
.hdr .st{padding:1px 7px;border-radius:3px;font-size:10px;font-weight:700;background:var(--p2);border:1px solid var(--st);white-space:nowrap}
.hdr .st b{font-size:13px;margin-right:2px}
.hdr .lg{display:flex;gap:3px;align-items:center;font-size:9px;color:var(--mu);margin-left:auto}
.hdr .lg .sq{width:12px;height:12px;border-radius:2px;display:inline-block}
.hdr .clk{text-align:right;font-size:10px;color:var(--mu);white-space:nowrap;margin-left:8px;line-height:1.2}
.hdr .clk b{display:block;font-size:13px;color:var(--tx)}

/* 3-column layout */
.wrap{display:grid;grid-template-columns:180px 1fr 220px;height:calc(100vh - 36px);overflow:hidden}

/* Left: device selector */
.lp{background:var(--p0);border-right:1px solid var(--st);padding:6px;overflow-y:auto}
.lp h3{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.dv{cursor:pointer;border-radius:5px;padding:4px;margin-bottom:6px;border:2px solid transparent;transition:all .15s}
.dv:hover{background:var(--p2)}
.dv.act{background:var(--p1);border-color:#22d3ee}
.dv .nm{font-size:10px;font-weight:700;margin-bottom:2px;text-align:center}
.dv .ax-row{display:flex;gap:1px;justify-content:center}
.dv .ax-col{display:flex;flex-direction:column;align-items:center;gap:1px}
.dv .ax-col .al{font-size:8px;color:var(--mu);font-weight:600;margin-bottom:1px}
.dv .cl{width:22px;height:12px;border-radius:1px}
.dv .cl.dead{background:repeating-linear-gradient(45deg,#374151,#374151 2px,#4b5563 2px,#4b5563 4px)}
.dv .cl.nd{background:#1e293b}
.dv .dot-row{text-align:center;margin-top:3px;font-size:8px;color:var(--mu)}
.dv .dot-row .dot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:3px;vertical-align:middle}

/* Center */
.cp{display:flex;flex-direction:column;overflow:hidden;background:var(--bg1)}
.cp-hd{display:flex;align-items:center;gap:6px;padding:4px 10px;background:var(--p0);border-bottom:1px solid var(--st);flex-wrap:wrap;min-height:28px}
.cp-hd .st{font-size:12px;font-weight:800;color:#22d3ee;white-space:nowrap}
.cp-hd .si{font-size:10px;color:var(--mu);white-space:nowrap}
.cp-hd .sp{flex:1}
/* Controls row */
.ctl{display:flex;align-items:center;gap:4px;padding:3px 10px;background:var(--p0);border-bottom:1px solid var(--st);flex-wrap:wrap}
.ctl label{font-size:9px;color:var(--mu);text-transform:uppercase}
.ctl select,.ctl input[type=date]{background:var(--p2);border:1px solid var(--st);color:var(--tx);padding:2px 4px;border-radius:3px;font-size:10px;height:22px}
.ctl select{min-width:60px}
.ctl input[type=date]{width:105px}
.ctl .btn{background:var(--p2);border:1px solid var(--st);color:var(--tx);padding:2px 10px;border-radius:3px;cursor:pointer;font-size:10px;font-weight:700;height:22px}
.ctl .btn:hover{border-color:var(--mu)}

/* Chart area */
.charts{flex:1;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:4px;padding:4px;min-height:0;overflow:hidden}
.cc{background:var(--p0);border-radius:4px;border:1px solid var(--st);display:flex;flex-direction:column;overflow:hidden;min-height:0}
.cc .ch{padding:3px 8px;font-size:10px;font-weight:700;color:var(--mu);border-bottom:1px solid var(--st);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.cc .cb{flex:1;padding:2px;position:relative;min-height:0}
.cc.wide{grid-column:1/3}

/* Right: status */
.rp{background:var(--p0);border-left:1px solid var(--st);padding:8px;overflow-y:auto;font-size:11px}
.badge{text-align:center;padding:8px 6px;border-radius:6px;margin-bottom:8px;font-size:15px;font-weight:900;letter-spacing:.03em}
.badge.hijau{background:rgba(34,197,94,.12);color:#22c55e;border:2px solid #22c55e}
.badge.kuning{background:rgba(234,179,8,.12);color:#eab308;border:2px solid #eab308}
.badge.jingga{background:rgba(249,115,22,.12);color:#f97316;border:2px solid #f97316}
.badge.merah{background:rgba(239,68,68,.12);color:#ef4444;border:2px solid #ef4444}
.sr{display:flex;justify-content:space-between;align-items:baseline;padding:4px 0;border-bottom:1px solid var(--st)}
.sr .k{color:var(--mu);font-size:9px;text-transform:uppercase;letter-spacing:.03em}
.sr .v{font-weight:700;font-size:12px}
.sr .v.g{color:#22c55e}.sr .v.y{color:#eab308}.sr .v.o{color:#f97316}.sr .v.r{color:#ef4444}
.ss{margin-top:8px;padding-top:6px;border-top:1px solid var(--st)}
.ss h4{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}

.spin{width:18px;height:18px;border:2px solid var(--st);border-top-color:#3b82f6;border-radius:50%;animation:sp .6s linear infinite;margin:auto}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
const sb=GMS.sb,esc=GMS.esc,GAUGE=3000;
const NODES=[
  {id:'108052',label:'WOC-02 INC',depth:30},
  {id:'108102',label:'WDN-2 INC-01',depth:51},
  {id:'108164',label:'WDN-2 INC-02',depth:39},
  {id:'108403',label:'WOC-01 INC',depth:15}
];
let S={sel:'108102',axis:'A',depthIdx:0,from:null,to:null};
let D={ov:[],hm:null,ews:[],ch:{}};
function ds(o){return new Date(Date.now()+o*864e5).toISOString().slice(0,10)}
function hc(v){if(v==null)return null;const a=Math.abs(v);if(a>=20)return'#991b1b';if(a>=10)return'#ef4444';if(a>=5)return'#f97316';if(a>=2)return'#eab308';if(a>=1)return'#22c55e';return'#166534'}
function vcl(v){if(v==null)return'';const a=Math.abs(v);if(a>=10)return'r';if(a>=5)return'o';if(a>=2)return'y';return'g'}
function tlv(l){if(!l)return{c:'hijau',t:'NORMAL'};const u=l.toUpperCase();if(u==='MERAH')return{c:'merah',t:'ALARM'};if(u==='JINGGA')return{c:'jingga',t:'WARNING'};if(u==='KUNING')return{c:'kuning',t:'WATCH'};return{c:'hijau',t:'NORMAL'}}

// Cumulative: sum incremental from deepest (bottom) upward
function toCum(sensors,data){
  const alive=sensors.filter(s=>!s.is_dead).sort((a,b)=>b.depth_m-a.depth_m);
  const bks=[...new Set(data.map(d=>d.b))].sort();
  const inc={};data.forEach(d=>{inc[d.sn+'|'+d.b]=d.v||0});
  const cum=[];
  bks.forEach(bk=>{let s=0;alive.forEach(sn=>{s+=inc[sn.sn+'|'+bk]||0;cum.push({sn:sn.sn,b:bk,v:Math.round(s*1000)/1000})})});
  return cum;
}
function toCumOv(rows,devId){
  const devRows=rows.filter(r=>r.device===devId).sort((a,b)=>b.depth_m-a.depth_m);
  let cumA=0,cumB=0;
  return devRows.map(r=>{cumA+=(r.a_mm||0);cumB+=(r.b_mm||0);return{...r,ca:Math.round(cumA*1000)/1000,cb:Math.round(cumB*1000)/1000}});
}

function shell(){
  document.getElementById('root').innerHTML=`
  <div class="hdr">
    <button class="back" onclick="location.href='monitoring.html'">&larr; Dashboard</button>
    <div class="ttl">INCLINOMETER &mdash; REALTIME MONITORING</div>
    <div id="hdSt"></div>
    <div class="lg">
      <span class="sq" style="background:#166534"></span>&lt;1
      <span class="sq" style="background:#22c55e"></span>1-2
      <span class="sq" style="background:#eab308"></span>2-5
      <span class="sq" style="background:#f97316"></span>5-10
      <span class="sq" style="background:#ef4444"></span>10-20
      <span class="sq" style="background:#991b1b"></span>&ge;20
      <span class="sq" style="background:repeating-linear-gradient(45deg,#374151,#374151 2px,#4b5563 2px,#4b5563 4px)"></span>No Data
      <span>mm</span>
    </div>
    <div class="clk"><b id="ck1">—</b><span id="ck2">—</span></div>
  </div>
  <div class="wrap">
    <div class="lp"><h3>All Inclinometer Overview (Live)</h3><div id="ovB"><div class="spin"></div></div></div>
    <div class="cp">
      <div class="cp-hd">
        <span class="st" id="sT">SELECTED: —</span>
        <span class="si" id="sI"></span>
        <span class="sp"></span>
      </div>
      <div class="ctl">
        <label>Axis</label><select id="xAx" onchange="setAx(this.value)"><option value="A">A-Axis</option><option value="B">B-Axis</option></select>
        <label>Depth</label><select id="xDp" onchange="setDp(+this.value)"></select>
        <label>From</label><input type="date" id="xF" value="${S.from||ds(-7)}"/>
        <label>To</label><input type="date" id="xT" value="${S.to||ds(0)}"/>
        <button class="btn" onclick="loadSel()">SHOW</button>
      </div>
      <div class="charts">
        <div class="cc"><div class="ch">CUMULATIVE DISPLACEMENT PROFILE (Latest)</div><div class="cb"><canvas id="cvP"></canvas></div></div>
        <div class="cc"><div class="ch"><span>CUMULATIVE DISPLACEMENT vs TIME</span><span id="dpL" style="color:#22d3ee"></span></div><div class="cb"><canvas id="cvD"></canvas></div></div>
        <div class="cc wide"><div class="ch">DEPTH &times; TIME HEATMAP &mdash; <span id="axL">A-Axis</span> (Cumulative)</div><div class="cb" style="overflow:auto"><div id="hmB"><div class="spin"></div></div></div></div>
      </div>
    </div>
    <div class="rp" id="stP"><div class="spin"></div></div>
  </div>`;
  ckUp();setInterval(ckUp,1000);
}
function ckUp(){const n=new Date(),e=document.getElementById('ck1'),e2=document.getElementById('ck2');if(e)e.textContent=n.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' WIB';if(e2)e2.textContent=n.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}

// Overview
async function loadOv(){
  try{const{data,error}=await sb.rpc('inc_overview_latest');if(error)throw error;D.ov=data||[]}catch(e){D.ov=[]}
  renderOv();
}
function renderOv(){
  const box=document.getElementById('ovB');if(!box)return;
  const ewsBy={};(D.ews||[]).filter(e=>e.category==='inclinometer').forEach(e=>{ewsBy[e.external_device_id]=e});
  let cn={n:0,w:0,wn:0,a:0};
  NODES.forEach(n=>{const lv=tlv(ewsBy[n.id]?.trigger_level);if(lv.c==='merah')cn.a++;else if(lv.c==='jingga')cn.wn++;else if(lv.c==='kuning')cn.w++;else cn.n++});
  const hs=document.getElementById('hdSt');
  if(hs)hs.innerHTML=`<div class="st"><b>${NODES.length}</b> TOTAL</div><div class="st" style="color:#22c55e"><b>${cn.n}</b> Normal</div><div class="st" style="color:#eab308"><b>${cn.w}</b> Watch</div><div class="st" style="color:#f97316"><b>${cn.wn}</b> Warning</div><div class="st" style="color:#ef4444"><b>${cn.a}</b> Alarm</div>`;

  let h='';
  NODES.forEach(nd=>{
    const cumRows=toCumOv(D.ov,nd.id);
    const act=S.sel===nd.id?'act':'';
    const ew=ewsBy[nd.id];
    const lv=tlv(ew?.trigger_level);
    const dc=lv.c==='hijau'?'#22c55e':lv.c==='kuning'?'#eab308':lv.c==='jingga'?'#f97316':'#ef4444';

    h+=`<div class="dv ${act}" onclick="selDev('${nd.id}')"><div class="nm">${esc(nd.label)}</div><div class="ax-row">`;
    h+=`<div class="ax-col"><div class="al">A</div>`;
    cumRows.forEach(r=>{
      if(r.a_mm==null&&r.ca===0)h+=`<div class="cl nd" title="${r.depth_m}m: no data"></div>`;
      else h+=`<div class="cl" style="background:${hc(r.ca)}" title="${r.depth_m}m: ${r.ca.toFixed(1)} mm cum"></div>`;
    });
    h+=`</div><div class="ax-col"><div class="al">B</div>`;
    cumRows.forEach(r=>{
      if(r.b_mm==null&&r.cb===0)h+=`<div class="cl nd" title="${r.depth_m}m: no data"></div>`;
      else h+=`<div class="cl" style="background:${hc(r.cb)}" title="${r.depth_m}m: ${r.cb.toFixed(1)} mm cum"></div>`;
    });
    h+=`</div></div><div class="dot-row"><span class="dot" style="background:${dc}"></span>${lv.t}</div></div>`;
  });
  box.innerHTML=h;
}

function selDev(id){S.sel=id;renderOv();loadSel()}
function setAx(a){S.axis=a;const el=document.getElementById('axL');if(el)el.textContent=a+'-Axis';loadSel()}
function setDp(i){S.depthIdx=i;drawDisp()}
window.selDev=selDev;window.setAx=setAx;window.setDp=setDp;window.loadSel=loadSel;

async function loadSel(){
  const dev=S.sel,nd=NODES.find(n=>n.id===dev);
  const el=document.getElementById('sT');if(el)el.textContent='SELECTED: '+(nd?.label||dev);
  S.from=document.getElementById('xF')?.value||ds(-7);
  S.to=document.getElementById('xT')?.value||ds(0);
  const f=new Date(S.from+'T00:00:00').toISOString(),t=new Date(S.to+'T23:59:59').toISOString();
  const dd=Math.max(1,Math.round((new Date(t)-new Date(f))/864e5));
  const ev=dd<=3?'1 hour':dd<=7?'3 hours':dd<=30?'6 hours':'1 day';
  const hmB=document.getElementById('hmB');if(hmB)hmB.innerHTML='<div class="spin" style="margin:12px auto"></div>';
  try{
    const{data,error}=await sb.rpc('inc_heatmap_series',{p_device:dev,p_from:f,p_to:t,p_every:ev,p_axis:S.axis});
    if(error)throw error;
    D.hm=data;
    // Compute cumulative
    if(data?.sensors?.length&&data?.data?.length){
      D.cumData=toCum(data.sensors,data.data);
    }else{D.cumData=[];}
    const depSel=document.getElementById('xDp');
    if(depSel&&data?.sensors?.length){
      const alive=data.sensors.filter(s=>!s.is_dead).sort((a,b)=>b.depth_m-a.depth_m);
      depSel.innerHTML=alive.map((s,i)=>`<option value="${i}"${i===S.depthIdx?' selected':''}>${s.depth_m} m</option>`).join('');
    }
    const si=document.getElementById('sI');
    if(si&&data?.sensors)si.textContent=`Depth: ${nd?.depth||'?'}m · Sensors: ${data.sensors.length} · Interval: 3.0m`;
    drawProf();drawDisp();drawHM();renderSt();
  }catch(e){if(hmB)hmB.innerHTML='<div style="color:#ef4444;padding:8px">Error: '+esc(e.message||e)+'</div>'}
}

// Profile chart with heatmap background (CUMULATIVE)
function drawProf(){
  const cv=document.getElementById('cvP');if(!cv||!D.hm)return;
  if(D.ch.prof)D.ch.prof.destroy();
  const hm=D.hm,sensors=hm.sensors.filter(s=>!s.is_dead).sort((a,b)=>a.depth_m-b.depth_m);
  if(!sensors.length)return;
  const bks=[...new Set(D.cumData.map(d=>d.b))].sort();
  const latBk=bks[bks.length-1];
  const lk={};D.cumData.forEach(d=>{if(d.b===latBk)lk[d.sn]=d.v});
  const pts=sensors.map(s=>({x:lk[s.sn]||0,y:s.depth_m}));
  let mx=0;pts.forEach(p=>{const a=Math.abs(p.x);if(a>mx)mx=a});
  const xM=Math.max(3,Math.ceil(mx*1.3));
  const bgPl={id:'hmBg',beforeDatasetsDraw(chart){
    const ctx=chart.ctx,ar=chart.chartArea,ys=chart.scales.y;if(!ar)return;
    sensors.forEach((s,i)=>{
      const v=lk[s.sn],yp=ys.getPixelForValue(s.depth_m);
      const hh=i<sensors.length-1?Math.abs(ys.getPixelForValue(sensors[i+1]?.depth_m||s.depth_m+3)-yp)/2:12;
      ctx.save();ctx.fillStyle=v!=null?hc(v)+'50':'rgba(30,41,59,.3)';ctx.fillRect(ar.left,yp-hh,ar.right-ar.left,hh*2);ctx.restore();
    });
  }};
  D.ch.prof=new Chart(cv,{type:'scatter',data:{datasets:[
    {label:'Baseline',data:sensors.map(s=>({x:0,y:s.depth_m})),showLine:true,borderColor:'rgba(148,163,184,.4)',borderDash:[4,4],borderWidth:1,pointRadius:0,fill:false},
    {label:'Latest',data:pts,showLine:true,borderColor:'#fff',backgroundColor:'#fff',borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#fff',fill:false,tension:0}
  ]},options:{responsive:true,maintainAspectRatio:false,animation:false,
    plugins:{legend:{display:false},title:{display:true,text:'Profile — '+S.axis+'-Axis (Latest)',color:'#e5e7eb',font:{size:11,weight:'bold'}}},
    scales:{x:{min:-xM,max:xM,title:{display:true,text:'Displacement (mm)',color:'#9fb3cf',font:{size:8}},ticks:{color:'#9fb3cf',font:{size:7}},grid:{color:'rgba(148,163,184,.08)'}},
      y:{reverse:true,title:{display:true,text:'Depth (m)',color:'#9fb3cf',font:{size:8}},ticks:{color:'#9fb3cf',font:{size:7},stepSize:3},grid:{color:'rgba(148,163,184,.08)'}}}},
    plugins:[bgPl]});
}

// Cumulative displacement vs time
function drawDisp(){
  const cv=document.getElementById('cvD');if(!cv||!D.hm)return;
  if(D.ch.disp)D.ch.disp.destroy();
  const sensors=D.hm.sensors.filter(s=>!s.is_dead).sort((a,b)=>b.depth_m-a.depth_m);
  if(!sensors.length)return;
  const idx=Math.min(S.depthIdx,sensors.length-1),sel=sensors[idx];
  const lbl=document.getElementById('dpL');if(lbl)lbl.textContent='@ '+sel.depth_m+' m';
  const pts=D.cumData.filter(d=>d.sn===sel.sn).sort((a,b)=>String(a.b).localeCompare(String(b.b))).map(d=>({x:new Date(d.b).getTime(),y:d.v}));
  let mx=0;pts.forEach(p=>{const a=Math.abs(p.y);if(a>mx)mx=a});
  const yM=Math.max(3,Math.ceil(mx*1.3));
  D.ch.disp=new Chart(cv,{type:'line',data:{datasets:[{data:pts,borderColor:'#3b82f6',backgroundColor:'#3b82f6',borderWidth:1.5,pointRadius:2,pointBackgroundColor:'#3b82f6',fill:false,tension:.2,spanGaps:true}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,parsing:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},title:{display:true,text:'Displacement vs Time — '+S.axis+'-Axis',color:'#e5e7eb',font:{size:11,weight:'bold'}},
        tooltip:{callbacks:{title:it=>it.length?new Date(it[0].parsed.x).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):''}}},
      scales:{x:{type:'linear',ticks:{color:'#9fb3cf',font:{size:7},maxTicksLimit:6,callback:v=>{const d=new Date(v);return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}},grid:{color:'rgba(148,163,184,.06)'}},
        y:{min:-yM,max:yM,title:{display:true,text:'mm',color:'#9fb3cf',font:{size:8}},ticks:{color:'#9fb3cf',font:{size:7}},grid:{color:'rgba(148,163,184,.08)'}}}}});
  // Annotate last value
  if(pts.length){const lp=pts[pts.length-1];const meta=D.ch.disp.getDatasetMeta(0);if(meta.data.length){
    setTimeout(()=>{const last=meta.data[meta.data.length-1];const ctx=cv.getContext('2d');const col=vcl(lp.y)==='r'?'#ef4444':vcl(lp.y)==='o'?'#f97316':vcl(lp.y)==='y'?'#eab308':'#22c55e';
      ctx.save();ctx.fillStyle=col;ctx.font='bold 9px sans-serif';ctx.textAlign='left';ctx.textBaseline='bottom';ctx.fillText(lp.y.toFixed(1)+' mm',last.x+4,last.y-3);ctx.restore()},60)}}
}

// Heatmap (cumulative)
function drawHM(){
  const box=document.getElementById('hmB');if(!box||!D.hm)return;
  const sensors=D.hm.sensors.slice().sort((a,b)=>a.depth_m-b.depth_m);
  const bks=[...new Set(D.cumData.map(d=>d.b))].sort();
  if(!bks.length){box.innerHTML='<div style="color:var(--mu);padding:8px;text-align:center;font-size:10px">No data</div>';return}
  const lk={};D.cumData.forEach(d=>{lk[d.sn+'|'+d.b]=d.v});
  const dead=new Set(D.hm.sensors.filter(s=>s.is_dead).map(s=>s.sn));
  const cW=Math.max(8,Math.min(34,Math.floor(680/bks.length))),cH=18;
  const mL=42,mR=8,mT=2,mB=40;
  const w=mL+bks.length*cW+mR,h=mT+sensors.length*cH+mB;
  box.innerHTML='<canvas id="hmC" width="'+w+'" height="'+h+'" style="display:block;'+(w>700?'':'width:100%;')+'"></canvas>';
  const cv=document.getElementById('hmC');if(!cv)return;
  const ctx=cv.getContext('2d');ctx.fillStyle='#0f172a';ctx.fillRect(0,0,w,h);
  sensors.forEach((s,yi)=>{const y=mT+yi*cH;bks.forEach((bk,xi)=>{const x=mL+xi*cW;
    if(dead.has(s.sn)){ctx.fillStyle='#374151';ctx.fillRect(x,y,cW-1,cH-1);ctx.strokeStyle='#6b7280';ctx.lineWidth=.5;for(let d=-cH;d<cW;d+=4){ctx.beginPath();ctx.moveTo(x+d,y);ctx.lineTo(x+d+cH,y+cH);ctx.stroke()}}
    else{const v=lk[s.sn+'|'+bk];if(v!=null){ctx.fillStyle=hc(v);ctx.fillRect(x,y,cW-1,cH-1);if(cW>=22){ctx.fillStyle='#000';ctx.font='bold 7px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(v.toFixed(1),x+cW/2,y+cH/2)}}
    else{ctx.fillStyle='#1e293b';ctx.fillRect(x,y,cW-1,cH-1)}}
  })});
  ctx.fillStyle='#9fb3cf';ctx.font='9px sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';
  sensors.forEach((s,yi)=>{ctx.fillText(s.depth_m+'m',mL-3,mT+yi*cH+cH/2)});
  ctx.textAlign='center';ctx.font='8px sans-serif';ctx.textBaseline='top';
  const mxL=Math.floor((w-mL-mR)/46),xSt=Math.max(1,Math.ceil(bks.length/mxL));
  bks.forEach((bk,xi)=>{if(xi%xSt!==0)return;const x=mL+xi*cW+cW/2;const d=new Date(bk);
    ctx.save();ctx.translate(x,mT+sensors.length*cH+3);ctx.rotate(Math.PI/5);ctx.fillStyle='#9fb3cf';
    ctx.fillText(d.toLocaleDateString('id-ID',{day:'numeric',month:'short'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'}),0,0);ctx.restore()});
}

// Status panel
function renderSt(){
  const p=document.getElementById('stP');if(!p)return;
  const dev=S.sel,nd=NODES.find(n=>n.id===dev),hm=D.hm;
  const ew=(D.ews||[]).find(e=>e.category==='inclinometer'&&e.external_device_id===dev);
  const lv=tlv(ew?.trigger_level);
  let mxA=0,mxD=0,mxV=0;
  if(D.cumData?.length&&hm?.sensors?.length){
    const bks=[...new Set(D.cumData.map(d=>d.b))].sort();const lb=bks[bks.length-1];
    const sm={};hm.sensors.forEach(s=>{sm[s.sn]=s});
    D.cumData.filter(d=>d.b===lb).forEach(d=>{const a=Math.abs(d.v||0);if(a>mxA){mxA=a;mxD=sm[d.sn]?.depth_m||0;mxV=d.v}});
  }
  let vel=0,vD=0;
  if(D.cumData?.length){const bks=[...new Set(D.cumData.map(d=>d.b))].sort();
    if(bks.length>=2){const b1=bks[bks.length-2],b2=bks[bks.length-1];const dt=(new Date(b2)-new Date(b1))/36e5;
    if(dt>0){const sm={};hm.sensors.forEach(s=>{sm[s.sn]=s});const d1={},d2={};
      D.cumData.forEach(d=>{if(d.b===b1)d1[d.sn]=d.v;if(d.b===b2)d2[d.sn]=d.v});let mv=0;
      Object.keys(d2).forEach(sn=>{if(d1[sn]!=null&&d2[sn]!=null){const v=Math.abs(d2[sn]-d1[sn])/dt;if(v>mv){mv=v;vD=sm[+sn]?.depth_m||0}}});vel=mv}}}
  const dir=mxV>0.5?'DOWNSLOPE':mxV<-0.5?'UPSLOPE':'STABLE';
  const di=mxV>0.5?'↓':mxV<-0.5?'↑':'—';
  const lu=D.cumData?.length?new Date(Math.max(...[...new Set(D.cumData.map(d=>d.b))].map(b=>new Date(b).getTime()))):null;
  const ewsBy={};(D.ews||[]).filter(e=>e.category==='inclinometer').forEach(e=>{ewsBy[e.external_device_id]=e});

  p.innerHTML=`
    <div class="badge ${lv.c}">${lv.t}</div>
    <div class="sr"><span class="k">Max Cumul. Disp. (abs)</span></div>
    <div class="sr"><span class="v ${vcl(mxA)}" style="font-size:18px">${mxA.toFixed(1)} mm</span><span class="k">AT ${mxD} M</span></div>
    <div class="sr"><span class="k">Max Velocity (abs)</span></div>
    <div class="sr"><span class="v ${vcl(vel*24)}">${vel.toFixed(2)} mm/hr</span><span class="k">AT ${vD} M</span></div>
    <div class="ss"><h4>Direction of Movement</h4>
      <div style="text-align:center;padding:4px;font-size:16px;font-weight:900"><span style="font-size:22px">${di}</span> ${dir}</div></div>
    <div class="ss"><h4>Last Update</h4>
      <div style="text-align:center;font-size:12px;font-weight:700;padding:2px 0">${lu?lu.toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'—'}</div></div>
    <div class="ss"><h4>EWS Details</h4>
      <div class="sr"><span class="k">Velocity (day)</span><span class="v">${(ew?.velocity_mm_day||0).toFixed(1)} mm/d</span></div>
      <div class="sr"><span class="k">Velocity (hr)</span><span class="v">${(ew?.velocity_mm_hr||0).toFixed(2)} mm/hr</span></div>
      <div class="sr"><span class="k">Cumulative</span><span class="v">${(ew?.cumulative_disp_mm||0).toFixed(1)} mm</span></div>
      <div class="sr"><span class="k">QC</span><span class="v">${esc(ew?.qc||'—')}</span></div></div>
    <div class="ss"><h4>All Devices Status</h4>
      ${NODES.map(n=>{const e2=ewsBy[n.id];const l2=tlv(e2?.trigger_level);
        return`<div class="sr" style="cursor:pointer" onclick="selDev('${n.id}')"><span class="k" style="font-size:10px">${esc(n.label)}</span><span class="v ${l2.c==='hijau'?'g':l2.c==='kuning'?'y':l2.c==='jingga'?'o':'r'}" style="font-size:10px">${l2.t}</span></div>`}).join('')}
    </div>`;
}

async function loadAll(){
  const[,ewsR]=await Promise.all([loadOv(),sb.rpc('ews_device_latest')]);
  if(ewsR.data)D.ews=ewsR.data;renderOv();await loadSel();
}
(async()=>{
  const ok=await GMS.guard({mount:'#root'});if(!ok)return;
  shell();await loadAll();
  setInterval(()=>{if(!GMS.isOnline()||document.hidden)return;loadAll().catch(()=>{})},120000);
  document.addEventListener('visibilitychange',()=>{if(!document.hidden&&GMS.isOnline())loadAll().catch(()=>{})});
})();
</script>
</body>
