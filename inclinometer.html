<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#020814"/>
<title>Inplace Inclinometer — Realtime Monitoring</title>
<link rel="stylesheet" href="common.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="common.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg0:#020814;--bg1:#050f1f;--p0:#0a1830;--p1:#0c1e3a;--p2:#102a44;--pnl:#081627;--st:rgba(120,150,190,.14);--tx:#e5edf7;--mu:#8ba0bd;--cy:#38bdf8;--grn:#22c55e;--yel:#eab308;--org:#f97316;--red:#ef4444;--pur:#a855f7}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg0);color:var(--tx);overflow:hidden}
#root{display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* Header */
.hdr{display:flex;align-items:center;gap:10px;padding:0 14px;height:36px;flex-shrink:0;background:linear-gradient(180deg,#0a1830,#071224);border-bottom:1px solid var(--st)}
.hdr .ttl{font-size:14px;font-weight:800;letter-spacing:.04em}
.hdr .nav{margin-left:auto;display:flex;gap:6px}
.hdr .nav a,.hdr .nav button{display:flex;align-items:center;gap:5px;background:#0e2240;border:1px solid var(--st);color:var(--mu);padding:3px 10px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;text-decoration:none}
.hdr .nav .on{background:#134e6b;border-color:#38bdf866;color:#e0f2fe}
.hdr .nav a:hover,.hdr .nav button:hover{color:var(--tx)}

/* Stats bar */
.stats{display:flex;align-items:stretch;gap:8px;padding:5px 14px;height:52px;flex-shrink:0;background:var(--bg1);border-bottom:1px solid var(--st)}
.stbox{display:flex;flex-direction:column;justify-content:center;padding:0 12px;border-right:1px solid var(--st)}
.stbox .k{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em}
.stbox .v{font-size:19px;font-weight:800;line-height:1.05}
.stbox .v small{font-size:10px;font-weight:600;opacity:.8}
.stbox.g .v{color:var(--grn)}.stbox.y .v{color:var(--yel)}.stbox.o .v{color:var(--org)}.stbox.r .v{color:var(--red)}
.stbox.time{border-right:1px solid var(--st)}
.stbox .live{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--grn);font-weight:700}
.stbox .live .d{width:7px;height:7px;border-radius:50%;background:var(--grn);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.leg{margin-left:auto;display:flex;flex-direction:column;justify-content:center;min-width:280px}
.leg .lt{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;text-align:center;margin-bottom:3px}
.leg .bar{height:12px;border-radius:3px;background:linear-gradient(90deg,#16a34a,#22c55e 12%,#eab308 38%,#f97316 58%,#ef4444 78%,#b91c1c 90%,#a855f7)}
.leg .sc{display:flex;justify-content:space-between;font-size:8px;color:var(--mu);margin-top:1px}

/* Controls */
.ctl{display:flex;align-items:center;gap:6px;padding:0 14px;height:30px;flex-shrink:0;background:var(--p0);border-bottom:1px solid var(--st)}
.ctl label{font-size:9px;color:var(--mu);text-transform:uppercase}
.ctl select,.ctl input[type=date]{background:#0e2240;border:1px solid var(--st);color:var(--tx);padding:2px 6px;border-radius:4px;font-size:10px;height:22px}
.ctl select{cursor:pointer}.ctl #cDev{font-weight:700;color:var(--cy);min-width:150px}
.ctl input[type=date]{width:120px}
.ctl .btn{background:#155e75;border:1px solid #38bdf855;color:#e0f2fe;padding:2px 14px;border-radius:4px;cursor:pointer;font-size:10px;font-weight:700;height:22px}
.ctl .btn:hover{background:#0e7490}
.ctl .note{margin-left:auto;font-size:9px;color:var(--mu)}

/* Main 3-col */
.main{flex:1;display:grid;grid-template-columns:320px 1fr 216px;min-height:0;overflow:hidden}
.pnl{background:var(--pnl);overflow:hidden;display:flex;flex-direction:column;min-height:0}
.pnl.l{border-right:1px solid var(--st)}
.pnl.r{border-left:1px solid var(--st);padding:8px}
.ph{padding:5px 10px;font-size:11px;font-weight:800;letter-spacing:.02em;border-bottom:1px solid var(--st);flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.ph small{font-weight:600;color:var(--mu);font-size:9px}
.ph .cy{color:var(--cy)}

/* Overview canvas */
.ovwrap{flex:1;position:relative;min-height:0;padding:4px}
.ovhint{font-size:8px;color:var(--mu);text-align:center;padding:2px;flex-shrink:0}

/* Center */
.cwrap{flex:1;display:grid;grid-template-columns:minmax(230px,1fr) 1.15fr;grid-template-rows:1fr 1fr;gap:6px;padding:6px;min-height:0;overflow:hidden}
.card{background:var(--p0);border:1px solid var(--st);border-radius:6px;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.card .ch{padding:4px 9px;font-size:10px;font-weight:700;color:var(--tx);border-bottom:1px solid var(--st);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.card .ch small{color:var(--mu);font-weight:500;font-size:9px}
.card .ch select{background:#0e2240;border:1px solid var(--st);color:var(--tx);font-size:9px;border-radius:3px;height:19px;padding:0 3px}
.card .cb{flex:1;position:relative;min-height:0;padding:3px}
.card.prof{grid-row:1/3}

/* Right status */
.badge{text-align:center;padding:9px 6px;border-radius:7px;margin-bottom:8px;font-size:16px;font-weight:900;letter-spacing:.04em;display:flex;align-items:center;justify-content:center;gap:6px;flex-shrink:0}
.badge.hijau{background:rgba(34,197,94,.13);color:#22c55e;border:1.5px solid #22c55e}
.badge.kuning{background:rgba(234,179,8,.13);color:#eab308;border:1.5px solid #eab308}
.badge.jingga{background:rgba(249,115,22,.13);color:#f97316;border:1.5px solid #f97316}
.badge.merah{background:rgba(239,68,68,.13);color:#ef4444;border:1.5px solid #ef4444}
.mrow{padding:6px 0;border-bottom:1px solid var(--st)}
.mrow .k{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em}
.mrow .line{display:flex;justify-content:space-between;align-items:baseline;margin-top:2px}
.mrow .big{font-size:20px;font-weight:900;line-height:1}
.mrow .at{font-size:9px;color:var(--mu)}
.mrow .big.g{color:#22c55e}.mrow .big.y{color:#eab308}.mrow .big.o{color:#f97316}.mrow .big.r{color:#ef4444}.mrow .big.p{color:#a855f7}
.dir{display:flex;align-items:center;justify-content:center;gap:6px;font-size:16px;font-weight:900;padding:3px 0}
.sec{margin-top:7px;padding-top:5px;border-top:1px solid var(--st)}
.sec h4{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.sr{display:flex;justify-content:space-between;padding:2px 0;font-size:10px}
.sr .k{color:var(--mu)}.sr .v{font-weight:700}
.sr .v.g{color:#22c55e}.sr .v.y{color:#eab308}.sr .v.o{color:#f97316}.sr .v.r{color:#ef4444}
.dvrow{display:flex;justify-content:space-between;align-items:center;padding:3px 4px;border-radius:4px;cursor:pointer;font-size:10px}
.dvrow:hover{background:rgba(56,189,248,.08)}
.dvrow.on{background:rgba(56,189,248,.12)}
.msg{color:var(--mu);font-size:10px;text-align:center;position:absolute;top:50%;left:0;right:0;transform:translateY(-50%)}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
if(window.CanvasRenderingContext2D&&!CanvasRenderingContext2D.prototype.roundRect){CanvasRenderingContext2D.prototype.roundRect=function(x,y,w,h,r){this.beginPath();this.moveTo(x+r,y);this.arcTo(x+w,y,x+w,y+h,r);this.arcTo(x+w,y+h,x,y+h,r);this.arcTo(x,y+h,x,y,r);this.arcTo(x,y,x+w,y,r);this.closePath();return this};}
const sb=GMS.sb,esc=GMS.esc;
const NODES=[
  {id:'108052',label:'WOC-02 INC',short:'WOC-02',depth:30},
  {id:'108102',label:'WDN-2 INC-01',short:'WDN-01',depth:51},
  {id:'108164',label:'WDN-2 INC-02',short:'WDN-02',depth:39},
  {id:'108403',label:'WOC-01 INC',short:'WOC-01',depth:15}
];
// Sensor mati permanen (laporan operator: casing shear/pergeseran) — dipaksa NO-DATA.
// 108102: sn 1-8 sudah nol otomatis; sn 9 (27m) masih kirim data tapi fisiknya mati → override.
const DEAD_OVERRIDE={'108102':[9]};
let S={sel:'108102',axis:'B',from:null,to:null,depthIdx:0};
let D={ov:[],hm:null,ews:[],ch:{}};

function ds(o){return new Date(Date.now()+o*864e5).toISOString().slice(0,10)}
function depthsOf(dev){const n=NODES.find(x=>x.id===dev);const a=[];for(let d=3;d<=(n?.depth||0);d+=3)a.push(d);return a}
function isOverrideDead(dev,sn){return (DEAD_OVERRIDE[dev]||[]).includes(sn)}
// incremental color scale
function hc(v){if(v==null)return null;const a=Math.abs(v);if(a>=30)return'#a855f7';if(a>=20)return'#b91c1c';if(a>=10)return'#ef4444';if(a>=5)return'#f97316';if(a>=2)return'#eab308';if(a>=1)return'#22c55e';return'#16a34a'}
function vcl(v){if(v==null)return'';const a=Math.abs(v);if(a>=20)return'p';if(a>=10)return'r';if(a>=5)return'o';if(a>=2)return'y';return'g'}
function tlv(l){if(!l)return{c:'hijau',t:'NORMAL'};const u=String(l).toUpperCase();if(u==='MERAH')return{c:'merah',t:'ALARM'};if(u==='JINGGA')return{c:'jingga',t:'WARNING'};if(u==='KUNING')return{c:'kuning',t:'WATCH'};return{c:'hijau',t:'NORMAL'}}

function shell(){
  document.getElementById('root').innerHTML=`
  <div class="hdr">
    <div class="ttl">INPLACE INCLINOMETER &mdash; REALTIME MONITORING</div>
    <div class="nav">
      <button class="on">&#9636; DASHBOARD</button>
      <a href="monitoring.html">&#9639; DASHBOARD UTAMA</a>
    </div>
  </div>
  <div class="stats">
    <div class="stbox"><div class="k">Total Inclinometer</div><div class="v">${NODES.length} <small>UNIT</small></div></div>
    <div class="stbox g"><div class="k">Normal</div><div class="v" id="sN">0 <small></small></div></div>
    <div class="stbox y"><div class="k">Watch</div><div class="v" id="sW">0 <small></small></div></div>
    <div class="stbox o"><div class="k">Warning</div><div class="v" id="sWn">0 <small></small></div></div>
    <div class="stbox r"><div class="k">Alarm</div><div class="v" id="sA">0 <small></small></div></div>
    <div class="stbox time"><div class="k">Time (WIB)</div><div class="v" id="ck" style="font-size:16px">—</div><div class="live"><span class="d"></span>LIVE &middot; <span id="ckd">—</span></div></div>
    <div class="leg"><div class="lt">Incremental Displacement (mm)</div><div class="bar"></div><div class="sc"><span>0</span><span>2</span><span>5</span><span>10</span><span>20</span><span>&ge;30</span></div></div>
  </div>
  <div class="ctl">
    <label>Device</label><select id="cDev" onchange="setDev(this.value)">${NODES.map(n=>`<option value="${n.id}"${n.id===S.sel?' selected':''}>${esc(n.label)}</option>`).join('')}</select>
    <label>Axis (detail)</label><select id="cAx" onchange="setAx(this.value)"><option value="A">A-Axis</option><option value="B"${S.axis==='B'?' selected':''}>B-Axis</option></select>
    <label>From</label><input type="date" id="cF" value="${S.from||ds(-7)}"/>
    <label>To</label><input type="date" id="cT" value="${S.to||ds(0)}"/>
    <button class="btn" onclick="loadSel()">SHOW</button>
    <span class="note">Overview = incremental terkini (Axis A atas, Axis B bawah)</span>
  </div>
  <div class="main">
    <div class="pnl l">
      <div class="ph">ALL INCLINOMETER OVERVIEW <small>(Live)</small></div>
      <div class="ovwrap"><canvas id="ovC"></canvas><div class="msg" id="ovMsg" style="display:none"></div></div>
      <div class="ovhint">Klik strip untuk pilih inclinometer &middot; X = kedalaman (m)</div>
    </div>
    <div class="pnl">
      <div class="ph"><span><span class="cy" id="selT">SELECTED: —</span></span><small id="selI"></small></div>
      <div class="cwrap">
        <div class="card prof"><div class="ch"><span>INCREMENTAL DISPLACEMENT PROFILE</span><small>Latest</small></div><div class="cb"><canvas id="cvP"></canvas></div></div>
        <div class="card"><div class="ch"><span>INCR. DISPLACEMENT vs TIME</span><span><small>Depth</small> <select id="cDp" onchange="setDp(+this.value)"></select></span></div><div class="cb"><canvas id="cvD"></canvas></div></div>
        <div class="card"><div class="ch"><span>VELOCITY vs TIME</span><small id="velAt">@ —</small></div><div class="cb"><canvas id="cvV"></canvas></div></div>
      </div>
    </div>
    <div class="pnl r" id="stP"></div>
  </div>`;
  ckUp();setInterval(ckUp,1000);
}
function ckUp(){const n=new Date(),e=document.getElementById('ck'),e2=document.getElementById('ckd');if(e)e.textContent=n.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});if(e2)e2.textContent=n.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})}

function setDev(id){S.sel=id;const e=document.getElementById('cDev');if(e)e.value=id;drawOverview();loadSel()}
function selDev(id){setDev(id)}
function setAx(a){S.axis=a;loadSel()}
function setDp(i){S.depthIdx=i;drawDisp();drawVel();renderSt()}
window.setDev=setDev;window.selDev=selDev;window.setAx=setAx;window.setDp=setDp;window.loadSel=loadSel;

// ---------- stats + overview ----------
function renderStats(){
  const by={};(D.ews||[]).filter(e=>e.category==='inclinometer').forEach(e=>{by[e.external_device_id]=e});
  let n=0,w=0,wn=0,a=0;
  NODES.forEach(d=>{const c=tlv(by[d.id]?.trigger_level).c;if(c==='merah')a++;else if(c==='jingga')wn++;else if(c==='kuning')w++;else n++});
  const T=NODES.length,pct=x=>T?Math.round(x/T*100):0;
  const set=(id,v,p)=>{const el=document.getElementById(id);if(el)el.innerHTML=v+' <small>('+p+'%)</small>'};
  set('sN',n,pct(n));set('sW',w,pct(w));set('sWn',wn,pct(wn));set('sA',a,pct(a));
}

// overview: latest incremental per sensor, Axis A group (top) + Axis B group (bottom)
let OVHIT=[];
function drawOverview(){
  const cv=document.getElementById('ovC'),wrap=cv?.parentElement,msg=document.getElementById('ovMsg');if(!cv||!wrap)return;
  const byDev={};(D.ov||[]).forEach(r=>{(byDev[r.device]=byDev[r.device]||{})[r.depth_m]={a:r.a_mm,b:r.b_mm,sn:r.sn}});
  if(!D.ov||!D.ov.length){if(msg){msg.style.display='block';msg.textContent='Memuat…'}return}
  if(msg)msg.style.display='none';
  const W=Math.max(240,wrap.clientWidth-8),H=Math.max(160,wrap.clientHeight-8);
  const dpr=window.devicePixelRatio||1;cv.width=W*dpr;cv.height=H*dpr;cv.style.width=W+'px';cv.style.height=H+'px';
  const ctx=cv.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);ctx.clearRect(0,0,W,H);
  const LBL=58,RPAD=6,XAX=15,GH=13;
  const maxCols=Math.max(...NODES.map(n=>n.depth/3));
  const cellW=(W-LBL-RPAD)/maxCols;
  const bodyH=H-XAX-2*GH;const stripH=bodyH/(NODES.length*2);
  OVHIT=[];
  let y=0;
  [['A','a','AXIS A'],['B','b','AXIS B']].forEach(([ax,fld,glabel])=>{
    ctx.fillStyle=ax==='A'?'#38bdf8':'#a855f7';ctx.font='bold 9px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
    ctx.fillText(glabel,4,y+GH/2);y+=GH;
    NODES.forEach(nd=>{
      const sel=S.sel===nd.id,map=byDev[nd.id]||{};
      const y0=y,rowY=y+stripH/2;
      if(sel){ctx.fillStyle='rgba(56,189,248,.10)';ctx.fillRect(0,y0,W,stripH)}
      ctx.fillStyle=sel?'#e0f2fe':'#cbd5e1';ctx.font=(sel?'bold ':'')+'9px sans-serif';ctx.textAlign='left';ctx.textBaseline='middle';
      ctx.fillText(nd.short,4,rowY);
      depthsOf(nd.id).forEach(dp=>{
        const idx=dp/3-1,x=LBL+idx*cellW,cell=map[dp];
        const dead=!cell||cell[fld]==null||isOverrideDead(nd.id,cell.sn);
        if(dead){ctx.fillStyle='#2a3646';ctx.fillRect(x,y0+1,cellW-1,stripH-2);ctx.strokeStyle='#465063';ctx.lineWidth=.5;ctx.beginPath();for(let d=-stripH;d<cellW;d+=4){ctx.moveTo(x+d,y0);ctx.lineTo(x+d+stripH,y0+stripH)}ctx.save();ctx.rect(x,y0+1,cellW-1,stripH-2);ctx.clip();ctx.stroke();ctx.restore()}
        else{ctx.fillStyle=hc(cell[fld]);ctx.fillRect(x,y0+1,cellW-1,stripH-2)}
      });
      if(sel){ctx.strokeStyle='#38bdf8';ctx.lineWidth=1.4;ctx.strokeRect(LBL-1,y0+.5,W-LBL-RPAD+1,stripH-1)}
      OVHIT.push({y0,y1:y0+stripH,dev:nd.id});
      y+=stripH;
    });
  });
  // depth axis
  ctx.fillStyle='#8ba0bd';ctx.font='7px sans-serif';ctx.textAlign='center';ctx.textBaseline='top';
  for(let dp=6;dp<=maxCols*3;dp+=6){const x=LBL+(dp/3-1)*cellW+cellW/2;ctx.fillText(dp,x,y+3)}
  ctx.textAlign='left';ctx.fillText('m',W-RPAD-6,y+3);
}
function ovClick(ev){const cv=document.getElementById('ovC');if(!cv)return;const r=cv.getBoundingClientRect();const y=ev.clientY-r.top;const h=OVHIT.find(o=>y>=o.y0&&y<o.y1);if(h)setDev(h.dev)}

// ---------- selected device detail ----------
async function loadSel(){
  const dev=S.sel,nd=NODES.find(n=>n.id===dev);
  document.getElementById('selT').textContent='SELECTED: '+(nd?.label||dev);
  S.from=document.getElementById('cF')?.value||ds(-7);S.to=document.getElementById('cT')?.value||ds(0);
  const f=new Date(S.from+'T00:00:00').toISOString(),t=new Date(S.to+'T23:59:59').toISOString();
  const dd=Math.max(1,Math.round((new Date(t)-new Date(f))/864e5));
  const ev=dd<=2?'1 hour':dd<=7?'3 hours':dd<=30?'6 hours':'1 day';
  try{
    const{data,error}=await sb.rpc('inc_heatmap_series',{p_device:dev,p_from:f,p_to:t,p_every:ev,p_axis:S.axis});
    if(error)throw error;
    // apply override: force listed sensors dead + drop their data
    const ov=DEAD_OVERRIDE[dev]||[];
    if(data?.sensors)data.sensors.forEach(s=>{if(ov.includes(s.sn))s.is_dead=true});
    if(data?.data)data.data=data.data.filter(d=>!ov.includes(d.sn));
    D.hm=data;
    const alive=(data?.sensors||[]).filter(s=>!s.is_dead).sort((a,b)=>b.depth_m-a.depth_m);
    if(S.depthIdx>=alive.length)S.depthIdx=0;
    const dp=document.getElementById('cDp');
    if(dp)dp.innerHTML=alive.map((s,i)=>`<option value="${i}"${i===S.depthIdx?' selected':''}>${s.depth_m}.0 m</option>`).join('');
    document.getElementById('selI').textContent=`Depth: ${nd?.depth||'?'}.0 m · Sensor: ${data?.sensors?.length||0} · Interval: 3.0 m`;
    drawProf();drawDisp();drawVel();renderSt();
  }catch(e){console.warn(e)}
}
function alive(){return (D.hm?.sensors||[]).filter(s=>!s.is_dead)}
function latestBk(){return [...new Set((D.hm?.data||[]).map(d=>d.b))].sort().pop()}

// profile: heatmap background bands (by |incr|) + white profile line, x=mm y=depth
function drawProf(){
  const cv=document.getElementById('cvP');if(!cv||!D.hm)return;if(D.ch.prof){D.ch.prof.destroy();D.ch.prof=null}
  const sensors=alive().sort((a,b)=>a.depth_m-b.depth_m);if(!sensors.length)return;
  const lb=latestBk(),lk={};(D.hm.data||[]).forEach(d=>{if(d.b===lb)lk[d.sn]=d.v});
  const pts=sensors.map(s=>({x:lk[s.sn]??0,y:s.depth_m}));
  let mx=0;pts.forEach(p=>{const a=Math.abs(p.x);if(a>mx)mx=a});const xM=Math.max(10,Math.ceil(mx*1.25));
  const bg={id:'bg',beforeDatasetsDraw(c){const ctx=c.ctx,ar=c.chartArea,ys=c.scales.y;if(!ar)return;
    sensors.forEach((s,i)=>{const v=lk[s.sn],yp=ys.getPixelForValue(s.depth_m);
      const up=i>0?(yp+ys.getPixelForValue(sensors[i-1].depth_m))/2:ar.top;
      const dn=i<sensors.length-1?(yp+ys.getPixelForValue(sensors[i+1].depth_m))/2:ar.bottom;
      ctx.fillStyle=v!=null?hc(v)+'66':'rgba(40,50,66,.5)';ctx.fillRect(ar.left,up,ar.right-ar.left,dn-up)})}};
  D.ch.prof=new Chart(cv,{type:'scatter',data:{datasets:[
    {data:sensors.map(s=>({x:0,y:s.depth_m})),showLine:true,borderColor:'rgba(148,163,184,.35)',borderDash:[4,4],borderWidth:1,pointRadius:0},
    {data:pts,showLine:true,borderColor:'#fff',borderWidth:2,pointRadius:2.5,pointBackgroundColor:'#fff',tension:0}
  ]},options:{responsive:true,maintainAspectRatio:false,animation:false,
    plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>c.parsed.x.toFixed(1)+' mm @ '+c.parsed.y+' m'}}},
    scales:{x:{min:-xM,max:xM,title:{display:true,text:'mm',color:'#8ba0bd',font:{size:8}},ticks:{color:'#8ba0bd',font:{size:7}},grid:{color:'rgba(120,150,190,.08)'}},
      y:{reverse:true,title:{display:true,text:'Depth (m)',color:'#8ba0bd',font:{size:8}},ticks:{color:'#8ba0bd',font:{size:7},stepSize:3},grid:{color:'rgba(120,150,190,.06)'}}}},plugins:[bg]});
}

function selSensor(){const a=alive().sort((x,y)=>y.depth_m-x.depth_m);return a[Math.min(S.depthIdx,a.length-1)]}
function seriesFor(sn){return (D.hm?.data||[]).filter(d=>d.sn===sn).sort((a,b)=>String(a.b).localeCompare(String(b.b)))}

// incremental vs time @ selected depth, with threshold lines + end tag
function drawDisp(){
  const cv=document.getElementById('cvD');if(!cv||!D.hm)return;if(D.ch.disp){D.ch.disp.destroy();D.ch.disp=null}
  const s=selSensor();if(!s)return;
  const pts=seriesFor(s.sn).map(d=>({x:new Date(d.b).getTime(),y:d.v}));
  let mx=0;pts.forEach(p=>{const a=Math.abs(p.y);if(a>mx)mx=a});const yM=Math.max(10,Math.ceil(mx*1.3));
  const last=pts.length?pts[pts.length-1]:null;
  const tag={id:'tag',afterDatasetsDraw(c){if(!last)return;const m=c.getDatasetMeta(0),el=m.data[m.data.length-1];if(!el)return;const ctx=c.ctx,txt=last.y.toFixed(1)+' mm',col=hc(last.y);
    ctx.save();ctx.font='bold 9px sans-serif';const w=ctx.measureText(txt).width+8;ctx.fillStyle=col;ctx.beginPath();ctx.roundRect(Math.min(el.x+6,c.chartArea.right-w-2),el.y-8,w,15,3);ctx.fill();ctx.fillStyle='#fff';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(txt,Math.min(el.x+10,c.chartArea.right-w+2),el.y);ctx.restore()}};
  const thr={id:'thr',beforeDatasetsDraw(c){const ctx=c.ctx,ar=c.chartArea,ys=c.scales.y;if(!ar)return;[[10,'#f97316'],[20,'#ef4444']].forEach(([lv,cl])=>{[lv,-lv].forEach(t=>{const yp=ys.getPixelForValue(t);if(yp<ar.top||yp>ar.bottom)return;ctx.save();ctx.strokeStyle=cl+'99';ctx.setLineDash([5,4]);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(ar.left,yp);ctx.lineTo(ar.right,yp);ctx.stroke();ctx.restore()})})}};
  D.ch.disp=new Chart(cv,{type:'line',data:{datasets:[{data:pts,borderColor:'#38bdf8',backgroundColor:'#38bdf8',borderWidth:1.6,pointRadius:1.8,pointBackgroundColor:'#38bdf8',tension:.2,spanGaps:true}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,parsing:false,interaction:{mode:'index',intersect:false},layout:{padding:{right:12}},
      plugins:{legend:{display:false},tooltip:{callbacks:{title:it=>it.length?new Date(it[0].parsed.x).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'',label:c=>c.parsed.y.toFixed(1)+' mm'}}},
      scales:{x:{type:'linear',ticks:{color:'#8ba0bd',font:{size:7},maxTicksLimit:6,callback:v=>{const d=new Date(v);return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short'})+'\n'+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}},grid:{color:'rgba(120,150,190,.06)'}},
        y:{min:-yM,max:yM,title:{display:true,text:'mm',color:'#8ba0bd',font:{size:8}},ticks:{color:'#8ba0bd',font:{size:7}},grid:{color:'rgba(120,150,190,.08)'}}}},plugins:[thr,tag]});
}

// velocity vs time @ selected depth (mm/hr) = d(incr)/dt
function drawVel(){
  const cv=document.getElementById('cvV');if(!cv||!D.hm)return;if(D.ch.vel){D.ch.vel.destroy();D.ch.vel=null}
  const s=selSensor();if(!s)return;
  const at=document.getElementById('velAt');if(at)at.textContent='@ '+s.depth_m+'.0 m';
  const raw=seriesFor(s.sn),pts=[];
  for(let i=1;i<raw.length;i++){const dt=(new Date(raw[i].b)-new Date(raw[i-1].b))/36e5;if(dt>0)pts.push({x:new Date(raw[i].b).getTime(),y:(raw[i].v-raw[i-1].v)/dt})}
  let mx=.5;pts.forEach(p=>{const a=Math.abs(p.y);if(a>mx)mx=a});const yM=Math.ceil(mx*1.3*100)/100;
  const last=pts.length?pts[pts.length-1]:null;
  const tag={id:'tag2',afterDatasetsDraw(c){if(!last)return;const m=c.getDatasetMeta(0),el=m.data[m.data.length-1];if(!el)return;const ctx=c.ctx,txt=last.y.toFixed(2)+' mm/hr';ctx.save();ctx.font='bold 9px sans-serif';const w=ctx.measureText(txt).width+8;ctx.fillStyle='#a855f7';ctx.beginPath();ctx.roundRect(Math.min(el.x+6,c.chartArea.right-w-2),el.y-8,w,15,3);ctx.fill();ctx.fillStyle='#fff';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(txt,Math.min(el.x+10,c.chartArea.right-w+2),el.y);ctx.restore()}};
  D.ch.vel=new Chart(cv,{type:'line',data:{datasets:[{data:pts,borderColor:'#a855f7',backgroundColor:'rgba(168,85,247,.12)',borderWidth:1.6,pointRadius:1.8,pointBackgroundColor:'#a855f7',tension:.25,fill:true,spanGaps:true}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,parsing:false,interaction:{mode:'index',intersect:false},layout:{padding:{right:12}},
      plugins:{legend:{display:false},tooltip:{callbacks:{title:it=>it.length?new Date(it[0].parsed.x).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'',label:c=>c.parsed.y.toFixed(2)+' mm/hr'}}},
      scales:{x:{type:'linear',ticks:{color:'#8ba0bd',font:{size:7},maxTicksLimit:6,callback:v=>{const d=new Date(v);return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short'})+'\n'+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}},grid:{color:'rgba(120,150,190,.06)'}},
        y:{min:-yM,max:yM,title:{display:true,text:'mm/hr',color:'#8ba0bd',font:{size:8}},ticks:{color:'#8ba0bd',font:{size:7}},grid:{color:'rgba(120,150,190,.08)'}}}},plugins:[tag]});
}

function renderSt(){
  const p=document.getElementById('stP');if(!p)return;
  const dev=S.sel,ew=(D.ews||[]).find(e=>e.category==='inclinometer'&&e.external_device_id===dev),lv=tlv(ew?.trigger_level);
  const lb=latestBk();let mxA=0,mxD=0,mxV=0;
  if(lb){(D.hm.data||[]).filter(d=>d.b===lb).forEach(d=>{const a=Math.abs(d.v||0);if(a>mxA){mxA=a;mxV=d.v;const s=alive().find(x=>x.sn===d.sn);mxD=s?.depth_m||0}})}
  // max velocity across sensors (last two buckets)
  const bks=[...new Set((D.hm?.data||[]).map(d=>d.b))].sort();let vel=0,vD=0;
  if(bks.length>=2){const b1=bks[bks.length-2],b2=bks[bks.length-1],dt=(new Date(b2)-new Date(b1))/36e5;
    if(dt>0){const m1={},m2={};(D.hm.data||[]).forEach(d=>{if(d.b===b1)m1[d.sn]=d.v;if(d.b===b2)m2[d.sn]=d.v});
      alive().forEach(s=>{if(m1[s.sn]!=null&&m2[s.sn]!=null){const v=Math.abs(m2[s.sn]-m1[s.sn])/dt;if(v>vel){vel=v;vD=s.depth_m}}})}}
  const dir=mxV>0.3?'DOWNWARD':mxV<-0.3?'UPWARD':'STABLE',dc=mxV>0.3?'r':mxV<-0.3?'y':'g',di=mxV>0.3?'&darr;':mxV<-0.3?'&uarr;':'&rarr;';
  const lu=lb?new Date(lb):null;
  const by={};(D.ews||[]).filter(e=>e.category==='inclinometer').forEach(e=>{by[e.external_device_id]=e});
  p.innerHTML=`
    <div class="badge ${lv.c}">${lv.c==='hijau'?'&#10004;':'&#9888;'} ${lv.t}</div>
    <div class="mrow"><div class="k">Max Incremental (abs)</div><div class="line"><span class="big ${vcl(mxA)}">${mxA.toFixed(1)} mm</span><span class="at">AT ${mxD}.0 M</span></div></div>
    <div class="mrow"><div class="k">Max Velocity (abs)</div><div class="line"><span class="big p">${vel.toFixed(2)}<span style="font-size:11px"> mm/hr</span></span><span class="at">AT ${vD}.0 M</span></div></div>
    <div class="mrow"><div class="k">Direction of Movement</div><div class="dir"><span class="${dc==='r'?'':''}" style="color:${dc==='r'?'#ef4444':dc==='y'?'#eab308':'#22c55e'};font-size:20px">${di}</span> <span style="color:${dc==='r'?'#ef4444':dc==='y'?'#eab308':'#22c55e'}">${dir}</span></div></div>
    <div class="mrow" style="border-bottom:none"><div class="k">Last Update</div><div style="font-weight:800;font-size:13px;margin-top:2px">${lu?lu.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})+' · '+lu.toLocaleDateString('id-ID',{day:'2-digit',month:'short'}):'—'}</div></div>
    <div class="sec"><h4>EWS Details</h4>
      <div class="sr"><span class="k">Velocity (day)</span><span class="v">${(ew?.velocity_mm_day||0).toFixed(1)} mm/d</span></div>
      <div class="sr"><span class="k">Velocity (hr)</span><span class="v">${(ew?.velocity_mm_hr||0).toFixed(2)} mm/hr</span></div>
      <div class="sr"><span class="k">Cumulative</span><span class="v">${(ew?.cumulative_disp_mm||0).toFixed(1)} mm</span></div>
      <div class="sr"><span class="k">QC</span><span class="v">${esc(ew?.qc||'—')}</span></div></div>
    <div class="sec"><h4>All Devices Status</h4>
      ${NODES.map(n=>{const l2=tlv(by[n.id]?.trigger_level),on=S.sel===n.id;
        return`<div class="dvrow ${on?'on':''}" onclick="selDev('${n.id}')"><span class="k" style="${on?'color:#38bdf8;font-weight:700':''}">${esc(n.label)}</span><span class="v ${l2.c==='hijau'?'g':l2.c==='kuning'?'y':l2.c==='jingga'?'o':'r'}">&#9679; ${l2.t}</span></div>`}).join('')}
    </div>`;
}

async function loadAll(){
  try{const[ewsR,ovR]=await Promise.all([sb.rpc('ews_device_latest'),sb.rpc('inc_overview_latest')]);
    if(ewsR.data)D.ews=ewsR.data;if(ovR.data)D.ov=ovR.data;}catch(e){console.warn(e)}
  renderStats();drawOverview();await loadSel();
  const cv=document.getElementById('ovC');if(cv&&!cv._b){cv._b=1;cv.style.cursor='pointer';cv.addEventListener('click',ovClick)}
}
let rzT;window.addEventListener('resize',()=>{clearTimeout(rzT);rzT=setTimeout(()=>{drawOverview()},160)});
(async()=>{
  const ok=await GMS.guard({mount:'#root'});if(!ok)return;
  shell();await loadAll();
  setInterval(()=>{if(!GMS.isOnline()||document.hidden)return;loadAll().catch(()=>{})},120000);
  document.addEventListener('visibilitychange',()=>{if(!document.hidden&&GMS.isOnline())loadAll().catch(()=>{})});
})();
</script>
</body>
