<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#020814"/>
<title>Inplace Inclinometer — Realtime Monitoring</title>
<link rel="stylesheet" href="common.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="common.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg0:#020814;--bg1:#050f1f;--p0:#0a1830;--p1:#0c1e3a;--p2:#102a44;--pnl:#081627;--st:rgba(120,150,190,.14);--tx:#e5edf7;--mu:#8ba0bd;--cy:#38bdf8;--grn:#22c55e;--yel:#eab308;--org:#f97316;--red:#ef4444;--pur:#a855f7}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg0);color:var(--tx);overflow:hidden}
#root{display:flex;flex-direction:column;height:100vh;overflow:hidden}

.hdr{display:flex;align-items:center;gap:10px;padding:0 14px;height:34px;flex-shrink:0;background:linear-gradient(180deg,#0a1830,#071224);border-bottom:1px solid var(--st)}
.hdr .ttl{font-size:14px;font-weight:800;letter-spacing:.04em}
.hdr .nav{margin-left:auto;display:flex;gap:6px}
.hdr .nav a,.hdr .nav button{display:flex;align-items:center;gap:5px;background:#0e2240;border:1px solid var(--st);color:var(--mu);padding:3px 10px;border-radius:5px;font-size:10px;font-weight:600;cursor:pointer;text-decoration:none}
.hdr .nav .on{background:#134e6b;border-color:#38bdf866;color:#e0f2fe}
.hdr .nav a:hover,.hdr .nav button:hover{color:var(--tx)}

.stats{display:flex;align-items:stretch;gap:8px;padding:4px 14px;height:48px;flex-shrink:0;background:var(--bg1);border-bottom:1px solid var(--st)}
.stbox{display:flex;flex-direction:column;justify-content:center;padding:0 12px;border-right:1px solid var(--st)}
.stbox .k{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em}
.stbox .v{font-size:18px;font-weight:800;line-height:1.05}
.stbox .v small{font-size:10px;font-weight:600;opacity:.8}
.stbox.g .v{color:var(--grn)}.stbox.y .v{color:var(--yel)}.stbox.o .v{color:var(--org)}.stbox.r .v{color:var(--red)}
.stbox .live{display:flex;align-items:center;gap:5px;font-size:9px;color:var(--grn);font-weight:700}
.stbox .live .d{width:7px;height:7px;border-radius:50%;background:var(--grn);animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.leg{margin-left:auto;display:flex;flex-direction:column;justify-content:center;min-width:270px}
.leg .lt{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;text-align:center;margin-bottom:3px}
.leg .bar{height:11px;border-radius:3px;background:linear-gradient(90deg,#16a34a,#22c55e 12%,#eab308 38%,#f97316 58%,#ef4444 78%,#b91c1c 90%,#a855f7)}
.leg .sc{display:flex;justify-content:space-between;font-size:8px;color:var(--mu);margin-top:1px}

.ctl{display:flex;align-items:center;gap:6px;padding:0 14px;height:28px;flex-shrink:0;background:var(--p0);border-bottom:1px solid var(--st)}
.ctl label{font-size:9px;color:var(--mu);text-transform:uppercase}
.ctl select,.ctl input[type=date]{background:#0e2240;border:1px solid var(--st);color:var(--tx);padding:2px 6px;border-radius:4px;font-size:10px;height:21px}
.ctl select{cursor:pointer}.ctl #cDev{font-weight:700;color:var(--cy);min-width:150px}
.ctl input[type=date]{width:118px}
.ctl .btn{background:#155e75;border:1px solid #38bdf855;color:#e0f2fe;padding:2px 14px;border-radius:4px;cursor:pointer;font-size:10px;font-weight:700;height:21px}
.ctl .btn:hover{background:#0e7490}
.ctl .note{margin-left:auto;font-size:9px;color:var(--mu)}

.main{flex:1;display:grid;grid-template-columns:308px 1fr 208px;min-height:0;overflow:hidden}
.pnl{background:var(--pnl);overflow:hidden;display:flex;flex-direction:column;min-height:0}
.pnl.l{border-right:1px solid var(--st)}
.pnl.r{border-left:1px solid var(--st);padding:7px}
.ph{padding:4px 10px;font-size:11px;font-weight:800;letter-spacing:.02em;border-bottom:1px solid var(--st);flex-shrink:0;display:flex;justify-content:space-between;align-items:center}
.ph small{font-weight:600;color:var(--mu);font-size:9px}
.ph .cy{color:var(--cy)}

.cwrap{flex:1;display:grid;grid-template-columns:minmax(220px,1fr) 1.1fr;grid-template-rows:1fr 1fr;gap:6px;padding:6px;min-height:0;overflow:hidden}
.card{background:var(--p0);border:1px solid var(--st);border-radius:6px;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.card .ch{padding:4px 9px;font-size:10px;font-weight:700;color:var(--tx);border-bottom:1px solid var(--st);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.card .ch small{color:var(--mu);font-weight:500;font-size:9px}
.card .ch select{background:#0e2240;border:1px solid var(--st);color:var(--tx);font-size:9px;border-radius:3px;height:19px;padding:0 3px}
.card .cb{flex:1;position:relative;min-height:0;padding:3px}
.card.tall{grid-row:1/3}
.ovbody{flex:1;position:relative;min-height:0;padding:4px}

.badge{text-align:center;padding:8px 6px;border-radius:7px;margin-bottom:7px;font-size:15px;font-weight:900;letter-spacing:.04em;display:flex;align-items:center;justify-content:center;gap:6px;flex-shrink:0}
.badge.hijau{background:rgba(34,197,94,.13);color:#22c55e;border:1.5px solid #22c55e}
.badge.kuning{background:rgba(234,179,8,.13);color:#eab308;border:1.5px solid #eab308}
.badge.jingga{background:rgba(249,115,22,.13);color:#f97316;border:1.5px solid #f97316}
.badge.merah{background:rgba(239,68,68,.13);color:#ef4444;border:1.5px solid #ef4444}
.mrow{padding:5px 0;border-bottom:1px solid var(--st)}
.mrow .k{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em}
.mrow .line{display:flex;justify-content:space-between;align-items:baseline;margin-top:2px}
.mrow .big{font-size:19px;font-weight:900;line-height:1}
.mrow .at{font-size:9px;color:var(--mu)}
.mrow .big.g{color:#22c55e}.mrow .big.y{color:#eab308}.mrow .big.o{color:#f97316}.mrow .big.r{color:#ef4444}.mrow .big.p{color:#a855f7}
.dir{display:flex;align-items:center;justify-content:center;gap:6px;font-size:15px;font-weight:900;padding:2px 0}
.sec{margin-top:6px;padding-top:5px;border-top:1px solid var(--st)}
.sec h4{font-size:8px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;margin-bottom:3px}
.sr{display:flex;justify-content:space-between;padding:2px 0;font-size:10px}
.sr .k{color:var(--mu)}.sr .v{font-weight:700}
.sr .v.g{color:#22c55e}.sr .v.y{color:#eab308}.sr .v.o{color:#f97316}.sr .v.r{color:#ef4444}
.dvrow{display:flex;justify-content:space-between;align-items:center;padding:3px 4px;border-radius:4px;cursor:pointer;font-size:10px}
.dvrow:hover{background:rgba(56,189,248,.08)}
.dvrow.on{background:rgba(56,189,248,.12)}

/* playback */
.pb{display:flex;align-items:center;gap:10px;padding:0 16px;height:42px;flex-shrink:0;background:linear-gradient(180deg,#071224,#0a1830);border-top:1px solid var(--st)}
.pb .lbl{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.pb button{width:28px;height:28px;border-radius:50%;background:#134e6b;border:1px solid #38bdf855;color:#e0f2fe;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.pb button:hover{background:#0e7490}
.pb .cur{font-size:12px;font-weight:800;color:var(--cy);background:#0e2240;border:1px solid var(--st);border-radius:4px;padding:3px 8px;white-space:nowrap;min-width:118px;text-align:center}
.pb .tk{font-size:9px;color:var(--mu);white-space:nowrap}
.pb input[type=range]{flex:1;accent-color:#38bdf8;height:5px}
.pb select{background:#0e2240;border:1px solid var(--st);color:var(--tx);font-size:10px;border-radius:4px;height:22px}
.pb .live{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--grn);font-weight:700;cursor:pointer}
.pb .live .d{width:7px;height:7px;border-radius:50%;background:#334155}
.pb .live.on .d{background:var(--grn);animation:pulse 1.4s infinite}

.msg{color:var(--mu);font-size:10px;text-align:center;position:absolute;top:50%;left:0;right:0;transform:translateY(-50%)}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
const sb=GMS.sb,esc=GMS.esc;
const NODES=[
  {id:'108052',label:'WOC-02 INC',short:'WOC-02',depth:30},
  {id:'108102',label:'WDN-2 INC-01',short:'WDN-01',depth:51},
  {id:'108164',label:'WDN-2 INC-02',short:'WDN-02',depth:39},
  {id:'108403',label:'WOC-01 INC',short:'WOC-01',depth:15}
];
// Sensor mati permanen (laporan operator: casing shear/pergeseran) → dipaksa NO-DATA.
const DEAD_OVERRIDE={'108102':[9]};
let S={sel:'108102',axis:'B',from:null,to:null,depthIdx:0,pbIdx:0,playing:false,speed:2};
let D={hm:null,ews:[],bks:[],inc:{},cum:{},incYMax:10,cumYMax:10,maxDepth:51,ch:{}};
let pbTimer=null;

function ds(o){return new Date(Date.now()+o*864e5).toISOString().slice(0,10)}
function isOverrideDead(dev,sn){return (DEAD_OVERRIDE[dev]||[]).includes(sn)}
function hc(v){if(v==null)return null;const a=Math.abs(v);if(a>=30)return'#a855f7';if(a>=20)return'#b91c1c';if(a>=10)return'#ef4444';if(a>=5)return'#f97316';if(a>=2)return'#eab308';if(a>=1)return'#22c55e';return'#16a34a'}
function vcl(v){if(v==null)return'';const a=Math.abs(v);if(a>=20)return'p';if(a>=10)return'r';if(a>=5)return'o';if(a>=2)return'y';return'g'}
function tlv(l){if(!l)return{c:'hijau',t:'NORMAL'};const u=String(l).toUpperCase();if(u==='MERAH')return{c:'merah',t:'ALARM'};if(u==='JINGGA')return{c:'jingga',t:'WARNING'};if(u==='KUNING')return{c:'kuning',t:'WATCH'};return{c:'hijau',t:'NORMAL'}}
function fmtB(b){const d=new Date(b);return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short'})+' '+d.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})}

function shell(){
  document.getElementById('root').innerHTML=`
  <div class="hdr">
    <div class="ttl">INPLACE INCLINOMETER &mdash; REALTIME MONITORING</div>
    <div class="nav"><button class="on">&#9636; DASHBOARD</button><a href="monitoring.html">&#9639; DASHBOARD UTAMA</a></div>
  </div>
  <div class="stats">
    <div class="stbox"><div class="k">Total Inclinometer</div><div class="v">${NODES.length} <small>UNIT</small></div></div>
    <div class="stbox g"><div class="k">Normal</div><div class="v" id="sN">0</div></div>
    <div class="stbox y"><div class="k">Watch</div><div class="v" id="sW">0</div></div>
    <div class="stbox o"><div class="k">Warning</div><div class="v" id="sWn">0</div></div>
    <div class="stbox r"><div class="k">Alarm</div><div class="v" id="sA">0</div></div>
    <div class="stbox"><div class="k">Time (WIB)</div><div class="v" id="ck" style="font-size:15px">—</div><div class="live"><span class="d"></span>LIVE &middot; <span id="ckd">—</span></div></div>
    <div class="leg"><div class="lt">Incremental Displacement (mm)</div><div class="bar"></div><div class="sc"><span>0</span><span>2</span><span>5</span><span>10</span><span>20</span><span>&ge;30</span></div></div>
  </div>
  <div class="ctl">
    <label>Device</label><select id="cDev" onchange="setDev(this.value)">${NODES.map(n=>`<option value="${n.id}"${n.id===S.sel?' selected':''}>${esc(n.label)}</option>`).join('')}</select>
    <label>Axis</label><select id="cAx" onchange="setAx(this.value)"><option value="A">A-Axis</option><option value="B"${S.axis==='B'?' selected':''}>B-Axis</option></select>
    <label>From</label><input type="date" id="cF" value="${S.from||ds(-7)}"/>
    <label>To</label><input type="date" id="cT" value="${S.to||ds(0)}"/>
    <button class="btn" onclick="loadSel()">SHOW</button>
    <span class="note">Overview = incremental (heatmap) · Tengah = cumulative bottom&rarr;up</span>
  </div>
  <div class="main">
    <div class="pnl l">
      <div class="ph"><span>OVERVIEW &mdash; <span class="cy" id="ovDev">—</span></span><small>Incremental · heatmap</small></div>
      <div class="ovbody"><canvas id="cvO"></canvas><div class="msg" id="ovMsg" style="display:none"></div></div>
    </div>
    <div class="pnl">
      <div class="ph"><span class="cy" id="selT">SELECTED: —</span><small id="selI"></small></div>
      <div class="cwrap">
        <div class="card tall"><div class="ch"><span>CUMULATIVE DISPLACEMENT (bottom&rarr;up)</span><small id="cumAt"></small></div><div class="cb"><canvas id="cvC"></canvas></div></div>
        <div class="card"><div class="ch"><span>INCR. DISPLACEMENT vs TIME</span><span><small>Depth</small> <select id="cDp" onchange="setDp(+this.value)"></select></span></div><div class="cb"><canvas id="cvD"></canvas></div></div>
        <div class="card"><div class="ch"><span>VELOCITY vs TIME</span><small id="velAt">@ —</small></div><div class="cb"><canvas id="cvV"></canvas></div></div>
      </div>
    </div>
    <div class="pnl r" id="stP"></div>
  </div>
  <div class="pb">
    <span class="lbl">Playback</span>
    <button id="pbBtn" onclick="togglePlay()">&#9654;</button>
    <span class="cur" id="pbCur">—</span>
    <span class="tk" id="pbA">—</span>
    <input type="range" id="pbRng" min="0" max="0" value="0" oninput="onScrub(+this.value)"/>
    <span class="tk" id="pbB">—</span>
    <span class="lbl">Speed</span>
    <select id="pbSpd" onchange="S.speed=+this.value"><option value="1">1&times;</option><option value="2" selected>2&times;</option><option value="4">4&times;</option><option value="8">8&times;</option></select>
    <span class="live on" id="pbLive" onclick="goLive()"><span class="d"></span>LIVE</span>
  </div>`;
  ckUp();setInterval(ckUp,1000);
}
function ckUp(){const n=new Date(),e=document.getElementById('ck'),e2=document.getElementById('ckd');if(e)e.textContent=n.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});if(e2)e2.textContent=n.toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'})}

function setDev(id){S.sel=id;const e=document.getElementById('cDev');if(e)e.value=id;loadSel()}
function selDev(id){setDev(id)}
function setAx(a){S.axis=a;loadSel()}
function setDp(i){S.depthIdx=i;drawDisp();drawVel();renderSt()}
window.setDev=setDev;window.selDev=selDev;window.setAx=setAx;window.setDp=setDp;window.loadSel=loadSel;
window.togglePlay=togglePlay;window.onScrub=onScrub;window.goLive=goLive;

function renderStats(){
  const by={};(D.ews||[]).filter(e=>e.category==='inclinometer').forEach(e=>{by[e.external_device_id]=e});
  let n=0,w=0,wn=0,a=0;
  NODES.forEach(d=>{const c=tlv(by[d.id]?.trigger_level).c;if(c==='merah')a++;else if(c==='jingga')wn++;else if(c==='kuning')w++;else n++});
  const set=(id,v)=>{const el=document.getElementById(id);if(el)el.textContent=v};
  set('sN',n);set('sW',w);set('sWn',wn);set('sA',a);
}

function alive(){return (D.hm?.sensors||[]).filter(s=>!s.is_dead)}
function selSensor(){const a=alive().sort((x,y)=>y.depth_m-x.depth_m);return a[Math.min(S.depthIdx,Math.max(0,a.length-1))]}
function curB(){return D.bks[Math.min(S.pbIdx,D.bks.length-1)]}

// ---------- load ----------
async function loadSel(){
  const dev=S.sel,nd=NODES.find(n=>n.id===dev);
  document.getElementById('ovDev').textContent=(nd?.label||dev)+' · '+S.axis;
  document.getElementById('selT').textContent='SELECTED: '+(nd?.label||dev);
  S.from=document.getElementById('cF')?.value||ds(-7);S.to=document.getElementById('cT')?.value||ds(0);
  const f=new Date(S.from+'T00:00:00').toISOString(),t=new Date(S.to+'T23:59:59').toISOString();
  const dd=Math.max(1,Math.round((new Date(t)-new Date(f))/864e5));
  const ev=dd<=2?'1 hour':dd<=7?'3 hours':dd<=30?'6 hours':'1 day';
  const ovMsg=document.getElementById('ovMsg');if(ovMsg)ovMsg.style.display='none';
  try{
    const{data,error}=await sb.rpc('inc_heatmap_series',{p_device:dev,p_from:f,p_to:t,p_every:ev,p_axis:S.axis});
    if(error)throw error;
    const ov=DEAD_OVERRIDE[dev]||[];
    if(data?.sensors)data.sensors.forEach(s=>{if(ov.includes(s.sn))s.is_dead=true});
    if(data?.data)data.data=data.data.filter(d=>!ov.includes(d.sn));
    D.hm=data;buildData();
    const al=alive().sort((a,b)=>b.depth_m-a.depth_m);
    if(S.depthIdx>=al.length)S.depthIdx=0;
    const dp=document.getElementById('cDp');
    if(dp)dp.innerHTML=al.map((s,i)=>`<option value="${i}"${i===S.depthIdx?' selected':''}>${s.depth_m}.0 m</option>`).join('');
    document.getElementById('selI').textContent=`Depth ${nd?.depth||'?'}.0m · Sensor ${data?.sensors?.length||0} · Int 3.0m`;
    // playback range
    S.pbIdx=D.bks.length-1;
    const rng=document.getElementById('pbRng');if(rng){rng.max=Math.max(0,D.bks.length-1);rng.value=S.pbIdx}
    document.getElementById('pbA').textContent=D.bks.length?fmtB(D.bks[0]):'—';
    document.getElementById('pbB').textContent=D.bks.length?fmtB(D.bks[D.bks.length-1]):'—';
    if(!D.bks.length){if(ovMsg){ovMsg.style.display='block';ovMsg.textContent='Tidak ada data pada rentang ini'}}
    drawOv();drawCum();drawDisp();drawVel();updateCur();renderSt();
  }catch(e){console.warn(e);if(ovMsg){ovMsg.style.display='block';ovMsg.textContent='Error memuat data'}}
}

function buildData(){
  const hm=D.hm;D.bks=[];D.inc={};D.cum={};D.incYMax=10;D.cumYMax=10;
  if(!hm||!hm.data){return}
  D.bks=[...new Set(hm.data.map(d=>d.b))].sort();
  hm.data.forEach(d=>{(D.inc[d.b]=D.inc[d.b]||{})[d.sn]=d.v});
  const al=alive().sort((a,b)=>b.depth_m-a.depth_m); // deepest (bottom) first
  D.maxDepth=Math.max(3,...alive().map(s=>s.depth_m));
  let im=1,cm=1;
  D.bks.forEach(b=>{
    let s=0;const m={};
    al.forEach(sn=>{const iv=D.inc[b]?.[sn.sn]||0;s+=iv;m[sn.sn]=Math.round(s*1000)/1000;
      if(Math.abs(iv)>im)im=Math.abs(iv);if(Math.abs(s)>cm)cm=Math.abs(s)});
    D.cum[b]=m;
  });
  D.incYMax=Math.ceil(im*1.2);D.cumYMax=Math.ceil(cm*1.2);
}

// ---------- Overview: incremental profile heatmap (x=depth, y=incr mm) ----------
let OVSTRIP=[];
function ovPoints(b){const al=alive().sort((a,b)=>a.depth_m-b.depth_m);return al.map(s=>({x:s.depth_m,y:(D.inc[b]?.[s.sn])??0,sn:s.sn}))}
function drawOv(){
  const cv=document.getElementById('cvO');if(!cv)return;if(D.ch.ov){D.ch.ov.destroy();D.ch.ov=null}
  if(!D.bks.length)return;
  const b=curB(),pts=ovPoints(b);
  OVSTRIP=pts.map(p=>({x:p.x,v:p.y}));
  const yM=D.incYMax;
  const strip={id:'strip',beforeDatasetsDraw(c){const ctx=c.ctx,ar=c.chartArea,xs=c.scales.x;if(!ar)return;
    OVSTRIP.forEach(s=>{const xL=xs.getPixelForValue(s.x-1.5),xR=xs.getPixelForValue(s.x+1.5);ctx.fillStyle=hc(s.v)+'59';ctx.fillRect(Math.max(ar.left,xL),ar.top,Math.min(ar.right,xR)-Math.max(ar.left,xL),ar.bottom-ar.top)});
    const y0=c.scales.y.getPixelForValue(0);ctx.strokeStyle='rgba(200,215,235,.35)';ctx.setLineDash([3,3]);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(ar.left,y0);ctx.lineTo(ar.right,y0);ctx.stroke();ctx.setLineDash([])}};
  D.ch.ov=new Chart(cv,{type:'scatter',data:{datasets:[{data:pts,showLine:true,borderColor:'#fff',borderWidth:1.8,pointRadius:2.4,pointBackgroundColor:'#fff',tension:0}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,parsing:true,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>'depth '+c.parsed.x+'m: '+c.parsed.y.toFixed(1)+' mm'}}},
      scales:{x:{type:'linear',min:0,max:D.maxDepth+1.5,title:{display:true,text:'Depth (m)',color:'#8ba0bd',font:{size:8}},ticks:{color:'#8ba0bd',font:{size:7},stepSize:6},grid:{color:'rgba(120,150,190,.07)'}},
        y:{min:-yM,max:yM,title:{display:true,text:'Incremental (mm)',color:'#8ba0bd',font:{size:8}},ticks:{color:'#8ba0bd',font:{size:7}},grid:{color:'rgba(120,150,190,.08)'}}}},
    plugins:[strip]});
}

// ---------- Center: cumulative profile (x=depth, y=cumulative mm) ----------
function cumPoints(b){const al=alive().sort((a,b)=>a.depth_m-b.depth_m);return al.map(s=>({x:s.depth_m,y:(D.cum[b]?.[s.sn])??0}))}
function drawCum(){
  const cv=document.getElementById('cvC');if(!cv)return;if(D.ch.cum){D.ch.cum.destroy();D.ch.cum=null}
  if(!D.bks.length)return;
  const b=curB(),pts=cumPoints(b),yM=D.cumYMax;
  const at=document.getElementById('cumAt');if(at)at.textContent=fmtB(b);
  D.ch.cum=new Chart(cv,{type:'scatter',data:{datasets:[
    {data:pts,showLine:true,borderColor:'#38bdf8',backgroundColor:'rgba(56,189,248,.12)',borderWidth:2,pointRadius:2.6,pointBackgroundColor:'#38bdf8',fill:true,tension:.15}
  ]},options:{responsive:true,maintainAspectRatio:false,animation:false,parsing:true,
    plugins:{legend:{display:false},title:{display:true,text:'Cumulative @ '+fmtB(b),color:'#e5edf7',font:{size:10,weight:'bold'}},tooltip:{callbacks:{label:c=>'depth '+c.parsed.x+'m: '+c.parsed.y.toFixed(1)+' mm'}}},
    scales:{x:{type:'linear',min:0,max:D.maxDepth+1.5,title:{display:true,text:'Depth (m)',color:'#8ba0bd',font:{size:8}},ticks:{color:'#8ba0bd',font:{size:7},stepSize:6},grid:{color:'rgba(120,150,190,.07)'}},
      y:{min:-yM,max:yM,title:{display:true,text:'Cumulative (mm)',color:'#8ba0bd',font:{size:8}},ticks:{color:'#8ba0bd',font:{size:7}},grid:{color:'rgba(120,150,190,.08)'}}}}});
}

// ---------- time-series @ selected depth ----------
function pbCursorPlugin(){return {id:'cur',afterDatasetsDraw(c){if(!D.bks.length)return;const x=new Date(curB()).getTime(),xs=c.scales.x,ar=c.chartArea;if(!ar)return;const px=xs.getPixelForValue(x);if(px<ar.left||px>ar.right)return;const ctx=c.ctx;ctx.save();ctx.strokeStyle='rgba(56,189,248,.9)';ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(px,ar.top);ctx.lineTo(px,ar.bottom);ctx.stroke();ctx.restore()}}}
function seriesFor(sn){return (D.hm?.data||[]).filter(d=>d.sn===sn).sort((a,b)=>String(a.b).localeCompare(String(b.b)))}
function drawDisp(){
  const cv=document.getElementById('cvD');if(!cv||!D.hm)return;if(D.ch.disp){D.ch.disp.destroy();D.ch.disp=null}
  const s=selSensor();if(!s)return;
  const pts=seriesFor(s.sn).map(d=>({x:new Date(d.b).getTime(),y:d.v}));
  let mx=0;pts.forEach(p=>{const a=Math.abs(p.y);if(a>mx)mx=a});const yM=Math.max(5,Math.ceil(mx*1.3));
  const thr={id:'thr',beforeDatasetsDraw(c){const ctx=c.ctx,ar=c.chartArea,ys=c.scales.y;if(!ar)return;[[10,'#f97316'],[20,'#ef4444']].forEach(([lv,cl])=>{[lv,-lv].forEach(t=>{const yp=ys.getPixelForValue(t);if(yp<ar.top||yp>ar.bottom)return;ctx.save();ctx.strokeStyle=cl+'88';ctx.setLineDash([5,4]);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(ar.left,yp);ctx.lineTo(ar.right,yp);ctx.stroke();ctx.restore()})})}};
  D.ch.disp=new Chart(cv,{type:'line',data:{datasets:[{data:pts,borderColor:'#38bdf8',backgroundColor:'#38bdf8',borderWidth:1.5,pointRadius:1.6,pointBackgroundColor:'#38bdf8',tension:.2,spanGaps:true}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,parsing:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{callbacks:{title:it=>it.length?fmtB(it[0].parsed.x):'',label:c=>c.parsed.y.toFixed(1)+' mm'}}},
      scales:{x:{type:'linear',ticks:{color:'#8ba0bd',font:{size:7},maxTicksLimit:6,callback:v=>new Date(v).toLocaleDateString('id-ID',{day:'2-digit',month:'short'})},grid:{color:'rgba(120,150,190,.06)'}},
        y:{min:-yM,max:yM,title:{display:true,text:'mm',color:'#8ba0bd',font:{size:8}},ticks:{color:'#8ba0bd',font:{size:7}},grid:{color:'rgba(120,150,190,.08)'}}}},plugins:[thr,pbCursorPlugin()]});
}
function drawVel(){
  const cv=document.getElementById('cvV');if(!cv||!D.hm)return;if(D.ch.vel){D.ch.vel.destroy();D.ch.vel=null}
  const s=selSensor();if(!s)return;
  const at=document.getElementById('velAt');if(at)at.textContent='@ '+s.depth_m+'.0 m';
  const raw=seriesFor(s.sn),pts=[];
  for(let i=1;i<raw.length;i++){const dt=(new Date(raw[i].b)-new Date(raw[i-1].b))/36e5;if(dt>0)pts.push({x:new Date(raw[i].b).getTime(),y:(raw[i].v-raw[i-1].v)/dt})}
  let mx=.5;pts.forEach(p=>{const a=Math.abs(p.y);if(a>mx)mx=a});const yM=Math.ceil(mx*1.3*100)/100;
  D.ch.vel=new Chart(cv,{type:'line',data:{datasets:[{data:pts,borderColor:'#a855f7',backgroundColor:'rgba(168,85,247,.12)',borderWidth:1.5,pointRadius:1.6,pointBackgroundColor:'#a855f7',tension:.25,fill:true,spanGaps:true}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,parsing:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{callbacks:{title:it=>it.length?fmtB(it[0].parsed.x):'',label:c=>c.parsed.y.toFixed(2)+' mm/hr'}}},
      scales:{x:{type:'linear',ticks:{color:'#8ba0bd',font:{size:7},maxTicksLimit:6,callback:v=>new Date(v).toLocaleDateString('id-ID',{day:'2-digit',month:'short'})},grid:{color:'rgba(120,150,190,.06)'}},
        y:{min:-yM,max:yM,title:{display:true,text:'mm/hr',color:'#8ba0bd',font:{size:8}},ticks:{color:'#8ba0bd',font:{size:7}},grid:{color:'rgba(120,150,190,.08)'}}}},plugins:[pbCursorPlugin()]});
}

// ---------- playback ----------
function updateCur(){const b=D.bks.length?curB():null;document.getElementById('pbCur').textContent=b?fmtB(b):'—';
  const live=document.getElementById('pbLive');if(live)live.classList.toggle('on',D.bks.length&&S.pbIdx===D.bks.length-1)}
function refreshAtCursor(){
  // profiles depend on bucket → update in place
  if(D.ch.ov){D.ch.ov.data.datasets[0].data=ovPoints(curB());OVSTRIP=D.ch.ov.data.datasets[0].data.map(p=>({x:p.x,v:p.y}));D.ch.ov.update('none')}
  if(D.ch.cum){const b=curB();D.ch.cum.data.datasets[0].data=cumPoints(b);D.ch.cum.options.plugins.title.text='Cumulative @ '+fmtB(b);D.ch.cum.update('none');const at=document.getElementById('cumAt');if(at)at.textContent=fmtB(b)}
  if(D.ch.disp)D.ch.disp.update('none');
  if(D.ch.vel)D.ch.vel.update('none');
  updateCur();renderSt();
}
function onScrub(v){S.pbIdx=v;stopPlay();refreshAtCursor()}
function goLive(){if(!D.bks.length)return;S.pbIdx=D.bks.length-1;document.getElementById('pbRng').value=S.pbIdx;refreshAtCursor()}
function togglePlay(){if(S.playing)stopPlay();else startPlay()}
function startPlay(){if(!D.bks.length)return;if(S.pbIdx>=D.bks.length-1)S.pbIdx=0;S.playing=true;document.getElementById('pbBtn').innerHTML='&#10073;&#10073;';
  clearInterval(pbTimer);pbTimer=setInterval(()=>{if(S.pbIdx>=D.bks.length-1){stopPlay();return}S.pbIdx++;document.getElementById('pbRng').value=S.pbIdx;refreshAtCursor()},700/S.speed)}
function stopPlay(){S.playing=false;clearInterval(pbTimer);const b=document.getElementById('pbBtn');if(b)b.innerHTML='&#9654;'}

// ---------- status ----------
function renderSt(){
  const p=document.getElementById('stP');if(!p)return;
  const dev=S.sel,ew=(D.ews||[]).find(e=>e.category==='inclinometer'&&e.external_device_id===dev),lv=tlv(ew?.trigger_level);
  const b=D.bks.length?curB():null;let mxA=0,mxD=0,mxV=0,mxC=0,mxCD=0;
  if(b){alive().forEach(s=>{const iv=D.inc[b]?.[s.sn];if(iv!=null&&Math.abs(iv)>mxA){mxA=Math.abs(iv);mxV=iv;mxD=s.depth_m}
    const cv=D.cum[b]?.[s.sn];if(cv!=null&&Math.abs(cv)>mxC){mxC=Math.abs(cv);mxCD=s.depth_m}})}
  // velocity between cursor and previous bucket
  let vel=0,vD=0;
  if(b&&S.pbIdx>0){const b1=D.bks[S.pbIdx-1],dt=(new Date(b)-new Date(b1))/36e5;if(dt>0)alive().forEach(s=>{const a=D.inc[b1]?.[s.sn],c=D.inc[b]?.[s.sn];if(a!=null&&c!=null){const v=Math.abs(c-a)/dt;if(v>vel){vel=v;vD=s.depth_m}}})}
  const dir=mxV>0.3?'DOWNWARD':mxV<-0.3?'UPWARD':'STABLE',dcol=mxV>0.3?'#ef4444':mxV<-0.3?'#eab308':'#22c55e',di=mxV>0.3?'&darr;':mxV<-0.3?'&uarr;':'&rarr;';
  const by={};(D.ews||[]).filter(e=>e.category==='inclinometer').forEach(e=>{by[e.external_device_id]=e});
  p.innerHTML=`
    <div class="badge ${lv.c}">${lv.c==='hijau'?'&#10004;':'&#9888;'} ${lv.t}</div>
    <div class="mrow"><div class="k">Max Incremental (abs)</div><div class="line"><span class="big ${vcl(mxA)}">${mxA.toFixed(1)} mm</span><span class="at">AT ${mxD}.0 M</span></div></div>
    <div class="mrow"><div class="k">Max Cumulative (abs)</div><div class="line"><span class="big ${vcl(mxC)}">${mxC.toFixed(1)} mm</span><span class="at">AT ${mxCD}.0 M</span></div></div>
    <div class="mrow"><div class="k">Max Velocity (abs)</div><div class="line"><span class="big p">${vel.toFixed(2)}<span style="font-size:11px"> mm/hr</span></span><span class="at">AT ${vD}.0 M</span></div></div>
    <div class="mrow"><div class="k">Direction of Movement</div><div class="dir"><span style="color:${dcol};font-size:19px">${di}</span> <span style="color:${dcol}">${dir}</span></div></div>
    <div class="mrow" style="border-bottom:none"><div class="k">Cursor Time</div><div style="font-weight:800;font-size:12px;margin-top:2px">${b?fmtB(b):'—'}</div></div>
    <div class="sec"><h4>EWS Details</h4>
      <div class="sr"><span class="k">Velocity (day)</span><span class="v">${(ew?.velocity_mm_day||0).toFixed(1)} mm/d</span></div>
      <div class="sr"><span class="k">Velocity (hr)</span><span class="v">${(ew?.velocity_mm_hr||0).toFixed(2)} mm/hr</span></div>
      <div class="sr"><span class="k">Cumulative</span><span class="v">${(ew?.cumulative_disp_mm||0).toFixed(1)} mm</span></div>
      <div class="sr"><span class="k">QC</span><span class="v">${esc(ew?.qc||'—')}</span></div></div>
    <div class="sec"><h4>All Devices Status</h4>
      ${NODES.map(n=>{const l2=tlv(by[n.id]?.trigger_level),on=S.sel===n.id;
        return`<div class="dvrow ${on?'on':''}" onclick="selDev('${n.id}')"><span class="k" style="${on?'color:#38bdf8;font-weight:700':''}">${esc(n.label)}</span><span class="v ${l2.c==='hijau'?'g':l2.c==='kuning'?'y':l2.c==='jingga'?'o':'r'}">&#9679; ${l2.t}</span></div>`}).join('')}
    </div>`;
}

async function loadAll(){
  try{const{data}=await sb.rpc('ews_device_latest');if(data)D.ews=data}catch(e){console.warn(e)}
  renderStats();await loadSel();
}
let rzT;window.addEventListener('resize',()=>{clearTimeout(rzT);rzT=setTimeout(()=>{drawOv();drawCum();drawDisp();drawVel();},180)});
(async()=>{
  const ok=await GMS.guard({mount:'#root'});if(!ok)return;
  shell();await loadAll();
  setInterval(()=>{if(!GMS.isOnline()||document.hidden||S.playing)return;loadAll().catch(()=>{})},120000);
  document.addEventListener('visibilitychange',()=>{if(!document.hidden&&GMS.isOnline()&&!S.playing)loadAll().catch(()=>{})});
})();
</script>
</body>
