<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="theme-color" content="#071a2e"/>
<title>Inclinometer Monitoring — Geotechnical Platform</title>
<link rel="stylesheet" href="common.css"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<script src="common.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg0:#051426;--bg1:#04101f;--p0:#0a2037;--p1:#0b243f;--p2:#0e2c4d;--st:rgba(148,163,184,.16);--tx:#e5e7eb;--mu:#94a3b8;--cy:#22d3ee;--grn:#22c55e;--yel:#eab308;--org:#f97316;--red:#ef4444}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg0);color:var(--tx);overflow:hidden}

/* Header */
.hdr{display:flex;align-items:center;gap:8px;padding:0 12px;background:var(--p0);border-bottom:1px solid var(--st);height:34px;flex-shrink:0}
.hdr .back{background:none;border:1px solid var(--st);color:var(--mu);padding:2px 8px;border-radius:3px;cursor:pointer;font-size:10px;white-space:nowrap}
.hdr .back:hover{color:var(--tx)}
.hdr .ttl{font-size:13px;font-weight:800;letter-spacing:.03em;white-space:nowrap}
.hdr .chips{display:flex;gap:5px}
.hdr .chip{padding:1px 7px;border-radius:3px;font-size:10px;font-weight:700;background:var(--p2);border:1px solid var(--st);white-space:nowrap}
.hdr .chip b{font-size:12px;margin-right:3px}
.hdr .lg{display:flex;gap:3px;align-items:center;font-size:9px;color:var(--mu);margin-left:auto}
.hdr .lg .sq{width:12px;height:11px;border-radius:2px;display:inline-block}
.hdr .clk{text-align:right;font-size:9px;color:var(--mu);white-space:nowrap;line-height:1.15}
.hdr .clk b{display:block;font-size:12px;color:var(--tx)}

/* Controls */
.ctl{display:flex;align-items:center;gap:5px;padding:0 12px;background:var(--p0);border-bottom:1px solid var(--st);height:32px;flex-shrink:0;flex-wrap:nowrap;overflow:hidden}
.ctl label{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.03em}
.ctl select,.ctl input[type=date]{background:var(--p2);border:1px solid var(--st);color:var(--tx);padding:2px 5px;border-radius:3px;font-size:10px;height:22px}
.ctl select{cursor:pointer}
.ctl #cDev{min-width:140px;font-weight:700;color:var(--cy)}
.ctl input[type=date]{width:118px}
.ctl .btn{background:#155e75;border:1px solid #22d3ee55;color:#e0f2fe;padding:2px 12px;border-radius:3px;cursor:pointer;font-size:10px;font-weight:700;height:22px}
.ctl .btn:hover{background:#0e7490}
.ctl .sel{margin-left:auto;font-size:10px;color:var(--mu);white-space:nowrap}
.ctl .sel b{color:var(--cy)}

/* Layout */
.wrap{display:grid;grid-template-columns:232px 1fr 214px;height:calc(100vh - 66px);overflow:hidden}

/* Left overview */
.lp{background:var(--p0);border-right:1px solid var(--st);display:flex;flex-direction:column;overflow:hidden;padding:6px}
.lp h3{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px;line-height:1.2}
.lp .ovsub{font-size:9px;color:var(--mu);margin-bottom:5px}
.lp .ovsub b{color:var(--cy)}
.lp .ovcard{flex:1;background:var(--bg1);border:1px solid var(--st);border-radius:5px;position:relative;min-height:0;padding:3px}
.lp .ovstat{margin-top:6px;display:grid;grid-template-columns:1fr 1fr;gap:4px}
.lp .ovstat .b{background:var(--bg1);border:1px solid var(--st);border-radius:4px;padding:4px 5px}
.lp .ovstat .b .k{font-size:8px;color:var(--mu);text-transform:uppercase}
.lp .ovstat .b .v{font-size:13px;font-weight:800}

/* Center */
.cp{display:flex;flex-direction:column;overflow:hidden;background:var(--bg1)}
.charts{flex:1;display:grid;grid-template-rows:1fr 1.05fr;gap:5px;padding:5px;min-height:0;overflow:hidden}
.row1{display:grid;grid-template-columns:1fr 1fr;gap:5px;min-height:0}
.cc{background:var(--p0);border-radius:5px;border:1px solid var(--st);display:flex;flex-direction:column;overflow:hidden;min-height:0}
.cc .ch{padding:3px 8px;font-size:10px;font-weight:700;color:var(--mu);border-bottom:1px solid var(--st);display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.cc .ch .hl{color:var(--cy)}
.cc .cb{flex:1;position:relative;min-height:0;padding:2px}

/* Right status */
.rp{background:var(--p0);border-left:1px solid var(--st);padding:7px;overflow:hidden;font-size:11px;display:flex;flex-direction:column}
.badge{text-align:center;padding:7px 6px;border-radius:6px;margin-bottom:6px;font-size:15px;font-weight:900;letter-spacing:.04em;flex-shrink:0}
.badge.hijau{background:rgba(34,197,94,.12);color:#22c55e;border:2px solid #22c55e}
.badge.kuning{background:rgba(234,179,8,.12);color:#eab308;border:2px solid #eab308}
.badge.jingga{background:rgba(249,115,22,.12);color:#f97316;border:2px solid #f97316}
.badge.merah{background:rgba(239,68,68,.12);color:#ef4444;border:2px solid #ef4444}
.sr{display:flex;justify-content:space-between;align-items:baseline;padding:3px 0;border-bottom:1px solid var(--st)}
.sr .k{color:var(--mu);font-size:9px;text-transform:uppercase;letter-spacing:.02em}
.sr .v{font-weight:700;font-size:12px}
.sr .v.g{color:#22c55e}.sr .v.y{color:#eab308}.sr .v.o{color:#f97316}.sr .v.r{color:#ef4444}
.ss{margin-top:5px;padding-top:4px;border-top:1px solid var(--st)}
.ss h4{font-size:9px;color:var(--mu);text-transform:uppercase;letter-spacing:.04em;margin-bottom:2px}
.bigv{font-size:18px;font-weight:900;line-height:1}

.spin{width:18px;height:18px;border:2px solid var(--st);border-top-color:#3b82f6;border-radius:50%;animation:sp .6s linear infinite;position:absolute;top:50%;left:50%;margin:-9px}
@keyframes sp{to{transform:rotate(360deg)}}
.msg{color:var(--mu);font-size:10px;text-align:center;position:absolute;top:50%;left:0;right:0;transform:translateY(-50%)}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
const sb=GMS.sb,esc=GMS.esc;
const NODES=[
  {id:'108052',label:'WOC-02 INC',depth:30},
  {id:'108102',label:'WDN-2 INC-01',depth:51},
  {id:'108164',label:'WDN-2 INC-02',depth:39},
  {id:'108403',label:'WOC-01 INC',depth:15}
];
let S={sel:'108102',axis:'B',depthIdx:0,from:null,to:null};
let D={hm:null,cumData:[],ews:[],ch:{}};

function ds(o){return new Date(Date.now()+o*864e5).toISOString().slice(0,10)}
function hc(v){if(v==null)return null;const a=Math.abs(v);if(a>=20)return'#991b1b';if(a>=10)return'#ef4444';if(a>=5)return'#f97316';if(a>=2)return'#eab308';if(a>=1)return'#22c55e';return'#166534'}
function vcl(v){if(v==null)return'';const a=Math.abs(v);if(a>=10)return'r';if(a>=5)return'o';if(a>=2)return'y';return'g'}
function tlv(l){if(!l)return{c:'hijau',t:'NORMAL'};const u=String(l).toUpperCase();if(u==='MERAH')return{c:'merah',t:'ALARM'};if(u==='JINGGA')return{c:'jingga',t:'WARNING'};if(u==='KUNING')return{c:'kuning',t:'WATCH'};return{c:'hijau',t:'NORMAL'}}

// Cumulative: sum incremental from deepest (bottom) upward
function toCum(sensors,data){
  const alive=sensors.filter(s=>!s.is_dead).sort((a,b)=>b.depth_m-a.depth_m);
  const bks=[...new Set(data.map(d=>d.b))].sort();
  const inc={};data.forEach(d=>{inc[d.sn+'|'+d.b]=d.v||0});
  const cum=[];
  bks.forEach(bk=>{let s=0;alive.forEach(sn=>{s+=inc[sn.sn+'|'+bk]||0;cum.push({sn:sn.sn,b:bk,v:Math.round(s*1000)/1000})})});
  return cum;
}

function shell(){
  document.getElementById('root').innerHTML=`
  <div class="hdr">
    <button class="back" onclick="location.href='monitoring.html'">&larr; Dashboard</button>
    <div class="ttl">INCLINOMETER &mdash; REALTIME MONITORING</div>
    <div class="chips" id="hdC"></div>
    <div class="lg">
      <span class="sq" style="background:#166534"></span>&lt;1
      <span class="sq" style="background:#22c55e"></span>1-2
      <span class="sq" style="background:#eab308"></span>2-5
      <span class="sq" style="background:#f97316"></span>5-10
      <span class="sq" style="background:#ef4444"></span>10-20
      <span class="sq" style="background:#991b1b"></span>&ge;20
      <span style="margin-right:6px">mm</span>
    </div>
    <div class="clk"><b id="ck1">—</b><span id="ck2">—</span></div>
  </div>
  <div class="ctl">
    <label>Device</label><select id="cDev" onchange="setDev(this.value)">${NODES.map(n=>`<option value="${n.id}"${n.id===S.sel?' selected':''}>${esc(n.label)}</option>`).join('')}</select>
    <label>Axis</label><select id="cAx" onchange="setAx(this.value)"><option value="A">A-Axis</option><option value="B"${S.axis==='B'?' selected':''}>B-Axis</option></select>
    <label>Depth</label><select id="cDp" onchange="setDp(+this.value)"></select>
    <label>From</label><input type="date" id="cF" value="${S.from||ds(-7)}"/>
    <label>To</label><input type="date" id="cT" value="${S.to||ds(0)}"/>
    <button class="btn" onclick="loadSel()">SHOW</button>
    <span class="sel" id="cSel"></span>
  </div>
  <div class="wrap">
    <div class="lp">
      <h3>Overview &mdash; Incremental 1 Hari</h3>
      <div class="ovsub">Rata-rata/jam &middot; <b id="ovDev">—</b></div>
      <div class="ovcard"><canvas id="cvO"></canvas><div class="msg" id="ovMsg" style="display:none"></div></div>
      <div class="ovstat">
        <div class="b"><div class="k">Avg Terkini</div><div class="v" id="ovNow">—</div></div>
        <div class="b"><div class="k">Avg 24 Jam</div><div class="v" id="ovMax">—</div></div>
      </div>
    </div>
    <div class="cp">
      <div class="charts">
        <div class="row1">
          <div class="cc"><div class="ch">CUMULATIVE DISPLACEMENT PROFILE (Latest)</div><div class="cb"><canvas id="cvP"></canvas></div></div>
          <div class="cc"><div class="ch"><span>CUMULATIVE DISPLACEMENT vs TIME</span><span class="hl" id="dpL"></span></div><div class="cb"><canvas id="cvD"></canvas></div></div>
        </div>
        <div class="cc"><div class="ch">DEPTH &times; TIME HEATMAP &mdash; <span class="hl" id="axL">B-Axis</span> (Cumulative)</div><div class="cb" id="hmWrap"><canvas id="hmC"></canvas><div class="msg" id="hmMsg" style="display:none"></div></div></div>
      </div>
    </div>
    <div class="rp" id="stP"></div>
  </div>`;
  ckUp();setInterval(ckUp,1000);
}
function ckUp(){const n=new Date(),e=document.getElementById('ck1'),e2=document.getElementById('ck2');if(e)e.textContent=n.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'})+' WIB';if(e2)e2.textContent=n.toLocaleDateString('id-ID',{day:'numeric',month:'long',year:'numeric'})}

function renderHdr(){
  const ewsBy={};(D.ews||[]).filter(e=>e.category==='inclinometer').forEach(e=>{ewsBy[e.external_device_id]=e});
  let w=0,wn=0,a=0;
  NODES.forEach(n=>{const c=tlv(ewsBy[n.id]?.trigger_level).c;if(c==='merah')a++;else if(c==='jingga')wn++;else if(c==='kuning')w++});
  const el=document.getElementById('hdC');if(el)el.innerHTML=
    `<div class="chip" style="color:#eab308"><b>${w}</b>Watch</div><div class="chip" style="color:#f97316"><b>${wn}</b>Warning</div><div class="chip" style="color:#ef4444"><b>${a}</b>Alarm</div>`;
}

function setDev(id){S.sel=id;const e=document.getElementById('cDev');if(e)e.value=id;loadSel();loadOv1d()}
function selDev(id){setDev(id)}
function setAx(a){S.axis=a;const el=document.getElementById('axL');if(el)el.textContent=a+'-Axis';loadSel();loadOv1d()}
function setDp(i){S.depthIdx=i;drawDisp()}
window.setDev=setDev;window.selDev=selDev;window.setAx=setAx;window.setDp=setDp;window.loadSel=loadSel;

// ---- Left overview: incremental, 1 day, hourly-averaged across alive sensors ----
async function loadOv1d(){
  const dev=S.sel,nd=NODES.find(n=>n.id===dev);
  const el=document.getElementById('ovDev');if(el)el.textContent=(nd?.label||dev)+' · '+S.axis;
  const f=new Date(Date.now()-864e5).toISOString(),t=new Date().toISOString();
  try{
    const{data,error}=await sb.rpc('inc_heatmap_series',{p_device:dev,p_from:f,p_to:t,p_every:'1 hour',p_axis:S.axis});
    if(error)throw error;
    const alive=new Set((data?.sensors||[]).filter(s=>!s.is_dead).map(s=>s.sn));
    const byB={};(data?.data||[]).forEach(d=>{if(!alive.has(d.sn)||d.v==null)return;(byB[d.b]=byB[d.b]||[]).push(d.v)});
    const pts=Object.keys(byB).sort().map(b=>{const ar=byB[b];return{x:new Date(b).getTime(),y:Math.round(ar.reduce((s,c)=>s+c,0)/ar.length*1000)/1000}});
    drawOv1d(pts);
  }catch(e){drawOv1d([])}
}
function drawOv1d(pts){
  const cv=document.getElementById('cvO'),msg=document.getElementById('ovMsg');
  const now=document.getElementById('ovNow'),mx=document.getElementById('ovMax');
  if(D.ch.ov){D.ch.ov.destroy();D.ch.ov=null}
  if(!pts.length){if(msg){msg.style.display='block';msg.textContent='Tidak ada data 24 jam terakhir'}if(cv)cv.style.display='none';if(now)now.textContent='—';if(mx)mx.textContent='—';return}
  if(msg)msg.style.display='none';if(cv)cv.style.display='block';
  const last=pts[pts.length-1].y;let pk=0;pts.forEach(p=>{if(Math.abs(p.y)>Math.abs(pk))pk=p.y});
  if(now){now.textContent=last.toFixed(2)+' mm';now.className='v '+(vcl(last)||'g')}
  if(mx){mx.textContent=pk.toFixed(2)+' mm';mx.className='v '+(vcl(pk)||'g')}
  let m=0;pts.forEach(p=>{const a=Math.abs(p.y);if(a>m)m=a});const yM=Math.max(2,Math.ceil(m*1.3));
  D.ch.ov=new Chart(cv,{type:'line',data:{datasets:[{data:pts,borderColor:'#22d3ee',backgroundColor:'rgba(34,211,238,.12)',borderWidth:1.6,pointRadius:1.5,pointBackgroundColor:'#22d3ee',fill:true,tension:.25,spanGaps:true}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,parsing:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{callbacks:{title:it=>it.length?new Date(it[0].parsed.x).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'',label:c=>c.parsed.y.toFixed(2)+' mm'}}},
      scales:{x:{type:'linear',ticks:{color:'#9fb3cf',font:{size:7},maxTicksLimit:5,callback:v=>new Date(v).toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'})},grid:{color:'rgba(148,163,184,.06)'}},
        y:{min:-yM,max:yM,title:{display:true,text:'incr. mm',color:'#9fb3cf',font:{size:8}},ticks:{color:'#9fb3cf',font:{size:7}},grid:{color:'rgba(148,163,184,.08)'}}}}});
}

// ---- Center: load selected device (user range), cumulative ----
async function loadSel(){
  const dev=S.sel,nd=NODES.find(n=>n.id===dev);
  S.from=document.getElementById('cF')?.value||ds(-7);
  S.to=document.getElementById('cT')?.value||ds(0);
  const f=new Date(S.from+'T00:00:00').toISOString(),t=new Date(S.to+'T23:59:59').toISOString();
  const dd=Math.max(1,Math.round((new Date(t)-new Date(f))/864e5));
  const ev=dd<=2?'1 hour':dd<=7?'3 hours':dd<=30?'6 hours':'1 day';
  const hmMsg=document.getElementById('hmMsg');if(hmMsg)hmMsg.style.display='none';
  try{
    const{data,error}=await sb.rpc('inc_heatmap_series',{p_device:dev,p_from:f,p_to:t,p_every:ev,p_axis:S.axis});
    if(error)throw error;
    D.hm=data;
    D.cumData=(data?.sensors?.length&&data?.data?.length)?toCum(data.sensors,data.data):[];
    const dpSel=document.getElementById('cDp');
    if(dpSel&&data?.sensors?.length){
      const alive=data.sensors.filter(s=>!s.is_dead).sort((a,b)=>b.depth_m-a.depth_m);
      if(S.depthIdx>=alive.length)S.depthIdx=0;
      dpSel.innerHTML=alive.map((s,i)=>`<option value="${i}"${i===S.depthIdx?' selected':''}>${s.depth_m} m</option>`).join('');
    }
    const sel=document.getElementById('cSel');
    if(sel)sel.innerHTML=`SELECTED: <b>${esc(nd?.label||dev)}</b> · Depth ${nd?.depth||'?'}m · Sensors ${data?.sensors?.length||0} · Interval 3.0m`;
    drawProf();drawDisp();drawHM();renderSt();
  }catch(e){const m=document.getElementById('hmMsg');if(m){m.style.display='block';m.textContent='Error: '+esc(e.message||e)}}
}

// Profile with heatmap background (cumulative)
function drawProf(){
  const cv=document.getElementById('cvP');if(!cv||!D.hm)return;
  if(D.ch.prof){D.ch.prof.destroy();D.ch.prof=null}
  const sensors=D.hm.sensors.filter(s=>!s.is_dead).sort((a,b)=>a.depth_m-b.depth_m);
  if(!sensors.length)return;
  const bks=[...new Set(D.cumData.map(d=>d.b))].sort();const latBk=bks[bks.length-1];
  const lk={};D.cumData.forEach(d=>{if(d.b===latBk)lk[d.sn]=d.v});
  const pts=sensors.map(s=>({x:lk[s.sn]||0,y:s.depth_m}));
  let mx=0;pts.forEach(p=>{const a=Math.abs(p.x);if(a>mx)mx=a});const xM=Math.max(3,Math.ceil(mx*1.3));
  const bgPl={id:'hmBg',beforeDatasetsDraw(chart){
    const ctx=chart.ctx,ar=chart.chartArea,ys=chart.scales.y;if(!ar)return;
    sensors.forEach((s,i)=>{const v=lk[s.sn],yp=ys.getPixelForValue(s.depth_m);
      const hh=i<sensors.length-1?Math.abs(ys.getPixelForValue(sensors[i+1].depth_m)-yp)/2:12;
      ctx.save();ctx.fillStyle=v!=null?hc(v)+'4d':'rgba(30,41,59,.3)';ctx.fillRect(ar.left,yp-hh,ar.right-ar.left,hh*2);ctx.restore()})}};
  D.ch.prof=new Chart(cv,{type:'scatter',data:{datasets:[
    {label:'Baseline',data:sensors.map(s=>({x:0,y:s.depth_m})),showLine:true,borderColor:'rgba(148,163,184,.4)',borderDash:[4,4],borderWidth:1,pointRadius:0,fill:false},
    {label:'Latest',data:pts,showLine:true,borderColor:'#fff',backgroundColor:'#fff',borderWidth:2.5,pointRadius:4,pointBackgroundColor:'#fff',fill:false,tension:0}
  ]},options:{responsive:true,maintainAspectRatio:false,animation:false,
    plugins:{legend:{display:false},title:{display:true,text:'Profile — '+S.axis+'-Axis (Latest)',color:'#e5e7eb',font:{size:11,weight:'bold'}},
      tooltip:{callbacks:{label:c=>c.parsed.x.toFixed(1)+' mm @ '+c.parsed.y+' m'}}},
    scales:{x:{min:-xM,max:xM,title:{display:true,text:'Displacement (mm)',color:'#9fb3cf',font:{size:8}},ticks:{color:'#9fb3cf',font:{size:7}},grid:{color:'rgba(148,163,184,.08)'}},
      y:{reverse:true,title:{display:true,text:'Depth (m)',color:'#9fb3cf',font:{size:8}},ticks:{color:'#9fb3cf',font:{size:7},stepSize:3},grid:{color:'rgba(148,163,184,.08)'}}}},
    plugins:[bgPl]});
}

// Cumulative vs time @ selected depth
function drawDisp(){
  const cv=document.getElementById('cvD');if(!cv||!D.hm)return;
  if(D.ch.disp){D.ch.disp.destroy();D.ch.disp=null}
  const sensors=D.hm.sensors.filter(s=>!s.is_dead).sort((a,b)=>b.depth_m-a.depth_m);
  if(!sensors.length)return;
  const idx=Math.min(S.depthIdx,sensors.length-1),sel=sensors[idx];
  const lbl=document.getElementById('dpL');if(lbl)lbl.textContent='@ '+sel.depth_m+' m';
  const pts=D.cumData.filter(d=>d.sn===sel.sn).sort((a,b)=>String(a.b).localeCompare(String(b.b))).map(d=>({x:new Date(d.b).getTime(),y:d.v}));
  let mx=0;pts.forEach(p=>{const a=Math.abs(p.y);if(a>mx)mx=a});const yM=Math.max(3,Math.ceil(mx*1.3));
  D.ch.disp=new Chart(cv,{type:'line',data:{datasets:[{data:pts,borderColor:'#3b82f6',backgroundColor:'#3b82f6',borderWidth:1.5,pointRadius:2,pointBackgroundColor:'#3b82f6',fill:false,tension:.2,spanGaps:true}]},
    options:{responsive:true,maintainAspectRatio:false,animation:false,parsing:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},title:{display:true,text:'Displacement vs Time — '+S.axis+'-Axis',color:'#e5e7eb',font:{size:11,weight:'bold'}},
        tooltip:{callbacks:{title:it=>it.length?new Date(it[0].parsed.x).toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'',label:c=>c.parsed.y.toFixed(1)+' mm'}}},
      scales:{x:{type:'linear',ticks:{color:'#9fb3cf',font:{size:7},maxTicksLimit:6,callback:v=>{const d=new Date(v);return d.toLocaleDateString('id-ID',{day:'2-digit',month:'short'})}},grid:{color:'rgba(148,163,184,.06)'}},
        y:{min:-yM,max:yM,title:{display:true,text:'mm',color:'#9fb3cf',font:{size:8}},ticks:{color:'#9fb3cf',font:{size:7}},grid:{color:'rgba(148,163,184,.08)'}}}}});
}

// Heatmap (cumulative) — fit container, no scroll
function drawHM(){
  const cv=document.getElementById('hmC'),wrap=document.getElementById('hmWrap'),msg=document.getElementById('hmMsg');if(!cv||!wrap||!D.hm)return;
  const sensors=D.hm.sensors.slice().sort((a,b)=>a.depth_m-b.depth_m);
  const bks=[...new Set(D.cumData.map(d=>d.b))].sort();
  if(!bks.length||!sensors.length){if(msg){msg.style.display='block';msg.textContent='Tidak ada data'}cv.style.display='none';return}
  if(msg)msg.style.display='none';cv.style.display='block';
  const lk={};D.cumData.forEach(d=>{lk[d.sn+'|'+d.b]=d.v});
  const dead=new Set(D.hm.sensors.filter(s=>s.is_dead).map(s=>s.sn));
  const availW=Math.max(220,wrap.clientWidth-6),availH=Math.max(120,wrap.clientHeight-6);
  const mL=38,mR=6,mT=4,mB=30;
  const cW=Math.max(3,Math.floor((availW-mL-mR)/bks.length)),cH=Math.max(8,Math.floor((availH-mT-mB)/sensors.length));
  const w=mL+bks.length*cW+mR,h=mT+sensors.length*cH+mB;
  const dpr=window.devicePixelRatio||1;
  cv.width=w*dpr;cv.height=h*dpr;cv.style.width=w+'px';cv.style.height=h+'px';
  const ctx=cv.getContext('2d');ctx.setTransform(dpr,0,0,dpr,0,0);
  ctx.clearRect(0,0,w,h);
  const showNum=cW>=22&&cH>=13;
  sensors.forEach((s,yi)=>{const y=mT+yi*cH;bks.forEach((bk,xi)=>{const x=mL+xi*cW;
    if(dead.has(s.sn)){ctx.fillStyle='#374151';ctx.fillRect(x,y,cW-1,cH-1);ctx.strokeStyle='#586271';ctx.lineWidth=.5;ctx.beginPath();for(let d=-cH;d<cW;d+=4){ctx.moveTo(x+d,y);ctx.lineTo(x+d+cH,y+cH)}ctx.stroke()}
    else{const v=lk[s.sn+'|'+bk];if(v!=null){ctx.fillStyle=hc(v);ctx.fillRect(x,y,cW-1,cH-1);if(showNum){ctx.fillStyle='#000';ctx.font='bold 7px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(v.toFixed(1),x+cW/2,y+cH/2)}}
    else{ctx.fillStyle='#1e293b';ctx.fillRect(x,y,cW-1,cH-1)}}})});
  ctx.fillStyle='#9fb3cf';ctx.font='9px sans-serif';ctx.textAlign='right';ctx.textBaseline='middle';
  const yStep=cH<13?Math.ceil(13/cH):1;
  sensors.forEach((s,yi)=>{if(yi%yStep!==0&&yi!==sensors.length-1)return;ctx.fillText(s.depth_m+'m',mL-3,mT+yi*cH+cH/2)});
  ctx.textAlign='center';ctx.font='8px sans-serif';ctx.textBaseline='top';
  const xStep=Math.max(1,Math.ceil(bks.length/Math.floor((w-mL-mR)/52)));
  bks.forEach((bk,xi)=>{if(xi%xStep!==0)return;const x=mL+xi*cW+cW/2,d=new Date(bk);
    ctx.save();ctx.translate(x,mT+sensors.length*cH+3);ctx.rotate(Math.PI/6);ctx.fillStyle='#9fb3cf';
    ctx.fillText(d.toLocaleDateString('id-ID',{day:'numeric',month:'short'}),0,0);ctx.restore()});
}

// Right status panel
function renderSt(){
  const p=document.getElementById('stP');if(!p)return;
  const dev=S.sel,hm=D.hm;
  const ew=(D.ews||[]).find(e=>e.category==='inclinometer'&&e.external_device_id===dev);
  const lv=tlv(ew?.trigger_level);
  let mxA=0,mxD=0,mxV=0;
  if(D.cumData?.length&&hm?.sensors?.length){
    const bks=[...new Set(D.cumData.map(d=>d.b))].sort(),lb=bks[bks.length-1];
    const sm={};hm.sensors.forEach(s=>{sm[s.sn]=s});
    D.cumData.filter(d=>d.b===lb).forEach(d=>{const a=Math.abs(d.v||0);if(a>mxA){mxA=a;mxD=sm[d.sn]?.depth_m||0;mxV=d.v}});
  }
  let vel=0,vD=0;
  if(D.cumData?.length&&hm?.sensors?.length){const bks=[...new Set(D.cumData.map(d=>d.b))].sort();
    if(bks.length>=2){const b1=bks[bks.length-2],b2=bks[bks.length-1],dt=(new Date(b2)-new Date(b1))/36e5;
      if(dt>0){const sm={};hm.sensors.forEach(s=>{sm[s.sn]=s});const d1={},d2={};
        D.cumData.forEach(d=>{if(d.b===b1)d1[d.sn]=d.v;if(d.b===b2)d2[d.sn]=d.v});let mv=0;
        Object.keys(d2).forEach(sn=>{if(d1[sn]!=null&&d2[sn]!=null){const v=Math.abs(d2[sn]-d1[sn])/dt;if(v>mv){mv=v;vD=sm[+sn]?.depth_m||0}}});vel=mv}}}
  const dir=mxV>0.5?'DOWNSLOPE':mxV<-0.5?'UPSLOPE':'STABLE',di=mxV>0.5?'&darr;':mxV<-0.5?'&uarr;':'&mdash;';
  const lu=D.cumData?.length?new Date(Math.max(...[...new Set(D.cumData.map(d=>d.b))].map(b=>new Date(b).getTime()))):null;
  const ewsBy={};(D.ews||[]).filter(e=>e.category==='inclinometer').forEach(e=>{ewsBy[e.external_device_id]=e});
  p.innerHTML=`
    <div class="badge ${lv.c}">${lv.t}</div>
    <div class="sr"><span class="k">Max Cumul. Disp. (abs)</span></div>
    <div class="sr"><span class="bigv ${vcl(mxA)}">${mxA.toFixed(1)} mm</span><span class="k">AT ${mxD} M</span></div>
    <div class="sr"><span class="k">Max Velocity (abs)</span></div>
    <div class="sr"><span class="v ${vcl(vel*24)}">${vel.toFixed(2)} mm/hr</span><span class="k">AT ${vD} M</span></div>
    <div class="ss"><h4>Direction of Movement</h4>
      <div style="text-align:center;padding:3px;font-size:15px;font-weight:900"><span style="font-size:20px">${di}</span> ${dir}</div></div>
    <div class="ss"><h4>Last Update</h4>
      <div style="text-align:center;font-size:12px;font-weight:700;padding:1px 0">${lu?lu.toLocaleString('id-ID',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'}):'—'}</div></div>
    <div class="ss"><h4>EWS Details</h4>
      <div class="sr"><span class="k">Velocity (day)</span><span class="v">${(ew?.velocity_mm_day||0).toFixed(1)} mm/d</span></div>
      <div class="sr"><span class="k">Velocity (hr)</span><span class="v">${(ew?.velocity_mm_hr||0).toFixed(2)} mm/hr</span></div>
      <div class="sr"><span class="k">Cumulative</span><span class="v">${(ew?.cumulative_disp_mm||0).toFixed(1)} mm</span></div>
      <div class="sr"><span class="k">QC</span><span class="v">${esc(ew?.qc||'—')}</span></div></div>
    <div class="ss"><h4>All Devices Status</h4>
      ${NODES.map(n=>{const l2=tlv(ewsBy[n.id]?.trigger_level),a=S.sel===n.id;
        return`<div class="sr" style="cursor:pointer;${a?'background:rgba(34,211,238,.08)':''}" onclick="selDev('${n.id}')"><span class="k" style="font-size:10px;${a?'color:#22d3ee':''}">${esc(n.label)}</span><span class="v ${l2.c==='hijau'?'g':l2.c==='kuning'?'y':l2.c==='jingga'?'o':'r'}" style="font-size:10px">${l2.t}</span></div>`}).join('')}
    </div>`;
}

async function loadAll(){
  try{const{data}=await sb.rpc('ews_device_latest');if(data)D.ews=data}catch(e){}
  renderHdr();
  await Promise.all([loadSel(),loadOv1d()]);
}

let rzT;
window.addEventListener('resize',()=>{clearTimeout(rzT);rzT=setTimeout(()=>{if(D.hm)drawHM()},180)});

(async()=>{
  const ok=await GMS.guard({mount:'#root'});if(!ok)return;
  shell();await loadAll();
  setInterval(()=>{if(!GMS.isOnline()||document.hidden)return;loadAll().catch(()=>{})},120000);
  document.addEventListener('visibilitychange',()=>{if(!document.hidden&&GMS.isOnline())loadAll().catch(()=>{})});
})();
</script>
