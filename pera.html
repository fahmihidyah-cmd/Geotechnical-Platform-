<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0b1f3a">
<link rel="manifest" href="manifest.json">
<title>Post-Earthquake Rapid Assessment — IGP Morowali</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    --navy:#0b1f3a; --blue:#1d4ed8; --blue2:#2563eb;
    --green:#16a34a; --red:#dc2626; --amber:#d97706;
    --bg:#f4f6f9; --card:#ffffff; --line:#e5e9f0; --line2:#eef1f6;
    --txt:#1e293b; --mut:#64748b; --mut2:#94a3b8;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  body{margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg); color:var(--txt); font-size:15px; line-height:1.5;}
  .hidden{display:none !important;}

  /* top bar */
  header{background:var(--navy); color:#fff; padding:14px 16px; position:sticky; top:0; z-index:20;
    display:flex; align-items:center; gap:12px;}
  header .t{font-weight:700; font-size:16px; line-height:1.2;}
  header .t small{display:block; font-weight:400; font-size:11px; color:#9db4d4;}
  header .right{margin-left:auto; font-size:12px; color:#cfe0f5; display:flex; align-items:center; gap:6px;}
  .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .dot.on{background:#22c55e;} .dot.off{background:#f59e0b;}

  .wrap{max-width:680px; margin:0 auto; padding:14px 14px 120px;}

  /* event card */
  .event{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:14px; display:flex; gap:12px; align-items:center; margin-bottom:14px;}
  .event .ic{width:42px;height:42px;border-radius:10px;background:#fee2e2;color:var(--red);display:flex;align-items:center;justify-content:center;font-size:20px;flex:0 0 auto;}
  .event .d{font-size:12px;color:var(--mut);}
  .event .m{font-weight:700;font-size:14px;}

  /* progress */
  .progress{margin:4px 2px 14px;}
  .progress .row{display:flex;justify-content:space-between;font-size:12px;color:var(--mut);margin-bottom:6px;}
  .bar{height:7px;background:var(--line);border-radius:99px;overflow:hidden;}
  .bar > i{display:block;height:100%;background:var(--green);width:0;transition:width .3s;}

  /* question card */
  .q{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:12px;}
  .q .head{display:flex;gap:10px;align-items:flex-start;margin-bottom:12px;}
  .q .num{width:24px;height:24px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;background:var(--mut2);}
  .q.answered .num{background:var(--green);}
  .q.crit .num{box-shadow:0 0 0 2px #fecaca;}
  .q .qt{font-size:14px;font-weight:600;}
  .q .tag{display:inline-block;margin-top:3px;font-size:10px;font-weight:700;letter-spacing:.04em;color:var(--amber);}
  .opts{display:flex;gap:8px;}
  .opt{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:10px 6px;font-size:13px;font-weight:600;color:var(--mut);
    display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer;transition:.15s;}
  .opt.ya.sel{border-color:var(--green);background:#f0fdf4;color:var(--green);}
  .opt.tidak.sel{border-color:var(--red);background:#fef2f2;color:var(--red);}
  .opt.tt.sel{border-color:var(--mut);background:#f8fafc;color:var(--txt);}

  .detail{margin-top:12px;border-top:1px dashed var(--line);padding-top:12px;}
  label.f{display:block;font-size:12px;font-weight:600;color:var(--txt);margin:10px 0 5px;}
  label.f .req{color:var(--red);}
  textarea,input[type=text]{width:100%;border:1px solid var(--line);border-radius:9px;padding:10px;font:inherit;font-size:13px;resize:vertical;background:#fcfdff;}
  textarea:focus,input:focus{outline:none;border-color:var(--blue2);}
  .cnt{text-align:right;font-size:10px;color:var(--mut2);margin-top:2px;}

  .photos{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
  .ph{position:relative;width:80px;height:80px;border-radius:9px;overflow:hidden;border:1px solid var(--line);}
  .ph img{width:100%;height:100%;object-fit:cover;}
  .ph .x{position:absolute;top:2px;right:2px;width:18px;height:18px;border-radius:50%;background:rgba(0,0,0,.6);color:#fff;border:none;font-size:11px;cursor:pointer;line-height:1;}
  .addph{width:80px;height:80px;border-radius:9px;border:1.5px dashed var(--line);background:#fafbfd;color:var(--mut);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;cursor:pointer;}
  .addph input{display:none;}

  .loc{display:flex;align-items:center;gap:10px;border:1px solid var(--line);border-radius:9px;padding:10px;background:#fcfdff;font-size:13px;}
  .loc .pin{color:var(--blue2);font-size:16px;}
  .loc .coord{font-size:11px;color:var(--mut);}

  /* bottom action bar */
  .actions{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--line);padding:10px 14px;display:flex;gap:10px;max-width:680px;margin:0 auto;}
  .btn{flex:1;border-radius:10px;padding:13px;font-size:14px;font-weight:700;border:1px solid var(--line);background:#fff;color:var(--txt);cursor:pointer;}
  .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff;}
  .btn:disabled{opacity:.5;}

  .banner{padding:10px 14px;border-radius:10px;font-size:13px;margin-bottom:12px;display:flex;gap:8px;align-items:flex-start;}
  .banner.warn{background:#fffbeb;border:1px solid #fde68a;color:#92400e;}
  .banner.ok{background:#f0fdf4;border:1px solid #bbf7d0;color:#166534;}
  .banner.info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e40af;}

  .center{min-height:60vh;display:flex;align-items:center;justify-content:center;padding:20px;text-align:center;color:var(--mut);}
  .spin{width:26px;height:26px;border:3px solid var(--line);border-top-color:var(--blue);border-radius:50%;animation:s 1s linear infinite;}
  @keyframes s{to{transform:rotate(360deg);}}

  /* outbox chip */
  #outbox{position:fixed;bottom:74px;left:0;right:0;max-width:680px;margin:0 auto;padding:0 14px;}
  #outbox .chip{background:#1e293b;color:#fff;border-radius:10px;padding:9px 12px;font-size:12px;display:flex;align-items:center;gap:8px;}
  #outbox .chip button{margin-left:auto;background:#334155;color:#fff;border:none;border-radius:7px;padding:5px 10px;font-size:12px;cursor:pointer;}
</style>
</head>
<body>
<header>
  <div class="t">Post-Earthquake Rapid Assessment<small>IGP Morowali — Bahodopi</small></div>
  <div class="right"><span id="netDot" class="dot off"></span><span id="netTxt">offline</span></div>
</header>

<div id="app" class="wrap"><div class="center"><div class="spin"></div></div></div>

<div id="outbox"></div>

<div id="actions" class="actions hidden">
  <button class="btn" id="btnDraft">Simpan Draft</button>
  <button class="btn primary" id="btnSubmit">Kirim Penilaian</button>
</div>

<script>
"use strict";
// ===================== CONFIG =====================
const SUPABASE_URL = "https://dhddckamrkfleuigrsip.supabase.co";
const SUPABASE_KEY = "sb_publishable_p52IeJQKTTcg1M_cIL1ybA_j5G7rG0l";
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const $ = (id) => document.getElementById(id);
const isOnline = () => navigator.onLine;

// ===================== IndexedDB (offline store) =====================
const DB_NAME = "pera-db", DB_VER = 1;
let _db = null;
function idb(){
  return new Promise((res, rej)=>{
    if(_db) return res(_db);
    const r = indexedDB.open(DB_NAME, DB_VER);
    r.onupgradeneeded = (e)=>{
      const db = e.target.result;
      if(!db.objectStoreNames.contains("meta"))   db.createObjectStore("meta");          // questions, event, draft
      if(!db.objectStoreNames.contains("outbox"))  db.createObjectStore("outbox", {keyPath:"id"}); // pending submissions
    };
    r.onsuccess = ()=>{ _db = r.result; res(_db); };
    r.onerror = ()=> rej(r.error);
  });
}
async function metaGet(k){ const db=await idb(); return new Promise((res,rej)=>{ const t=db.transaction("meta").objectStore("meta").get(k); t.onsuccess=()=>res(t.result); t.onerror=()=>rej(t.error); }); }
async function metaSet(k,v){ const db=await idb(); return new Promise((res,rej)=>{ const t=db.transaction("meta","readwrite").objectStore("meta").put(v,k); t.onsuccess=()=>res(); t.onerror=()=>rej(t.error); }); }
async function obxAll(){ const db=await idb(); return new Promise((res,rej)=>{ const t=db.transaction("outbox").objectStore("outbox").getAll(); t.onsuccess=()=>res(t.result||[]); t.onerror=()=>rej(t.error); }); }
async function obxPut(rec){ const db=await idb(); return new Promise((res,rej)=>{ const t=db.transaction("outbox","readwrite").objectStore("outbox").put(rec); t.onsuccess=()=>res(); t.onerror=()=>rej(t.error); }); }
async function obxDel(id){ const db=await idb(); return new Promise((res,rej)=>{ const t=db.transaction("outbox","readwrite").objectStore("outbox").delete(id); t.onsuccess=()=>res(); t.onerror=()=>rej(t.error); }); }

// ===================== STATE =====================
let QUESTIONS = [];
let EVENT = null;            // {event_id, magnitude, tanggal, wilayah, ...}
let ANS = {};               // { [qid]: {answer, explanation, note, photos:[dataURL], loc:{lat,lng,label}} }
let GPS = null;             // submission-level gps

// ===================== UTIL =====================
function uuid(){
  if(crypto.randomUUID) return crypto.randomUUID();
  return "xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx".replace(/[xy]/g,c=>{const r=Math.random()*16|0;return (c=="x"?r:(r&0x3|0x8)).toString(16);});
}
function fmtDate(iso){ if(!iso) return "-"; try{const d=new Date(iso);return d.toLocaleString("id-ID",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});}catch(e){return iso;} }
function setNet(){ const on=isOnline(); $("netDot").className="dot "+(on?"on":"off"); $("netTxt").textContent=on?"online":"offline"; }

// downscale a photo File -> jpeg dataURL (max 1280px, q .7)
function fileToDataURL(file){
  return new Promise((res)=>{
    const img = new Image();
    const rd = new FileReader();
    rd.onload = ()=>{ img.onload = ()=>{
      let {width:w, height:h} = img; const MAX=1280;
      if(w>MAX||h>MAX){ const s=Math.min(MAX/w, MAX/h); w=Math.round(w*s); h=Math.round(h*s); }
      const c=document.createElement("canvas"); c.width=w; c.height=h;
      c.getContext("2d").drawImage(img,0,0,w,h);
      res(c.toDataURL("image/jpeg",0.7));
    }; img.src = rd.result; };
    rd.readAsDataURL(file);
  });
}
function dataURLtoBlob(d){ const [meta,b64]=d.split(","); const mime=meta.match(/:(.*?);/)[1]; const bin=atob(b64); const u=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i); return new Blob([u],{type:mime}); }

// ===================== LOAD =====================
async function loadQuestions(){
  if(isOnline()){
    try{
      const {data,error} = await sb.from("pera_questions").select("*").eq("active",true).order("ord");
      if(!error && data && data.length){ QUESTIONS=data; await metaSet("questions",data); return; }
    }catch(e){}
  }
  QUESTIONS = (await metaGet("questions")) || [];
}
async function loadEvent(){
  const params = new URLSearchParams(location.search);
  const eqId = params.get("eq"); // earthquakes.event_id (text)
  if(isOnline()){
    try{
      let q = sb.from("earthquakes").select("event_id,magnitude,tanggal,wilayah,kedalaman,lintang,bujur,status").order("tanggal",{ascending:false}).limit(1);
      if(eqId) q = sb.from("earthquakes").select("event_id,magnitude,tanggal,wilayah,kedalaman,lintang,bujur,status").eq("event_id",eqId).limit(1);
      const {data} = await q;
      if(data && data[0]){ EVENT=data[0]; await metaSet("event",EVENT); return; }
    }catch(e){}
  }
  EVENT = (await metaGet("event")) || null;
}
async function loadDraft(){
  const d = await metaGet("draft");
  if(d && d.event && EVENT && d.event.event_id===EVENT.event_id){ ANS = d.ans||{}; GPS=d.gps||null; }
}

// ===================== GPS =====================
function getGPS(cb){
  if(!navigator.geolocation){ cb(null); return; }
  navigator.geolocation.getCurrentPosition(
    p=>cb({lat:p.coords.latitude, lng:p.coords.longitude}),
    ()=>cb(null), {enableHighAccuracy:true, timeout:8000, maximumAge:30000}
  );
}

// ===================== RENDER =====================
function answeredCount(){ return QUESTIONS.filter(q=>ANS[q.id] && ANS[q.id].answer).length; }
function isTriggered(q){ return ANS[q.id] && ANS[q.id].answer === (q.trigger_answer||"Ya"); }

function render(){
  const total = QUESTIONS.length;
  const done = answeredCount();
  const pct = total? Math.round(done/total*100):0;
  const ev = EVENT;
  const app = $("app");
  app.innerHTML = `
    <div class="event">
      <div class="ic">&#9728;</div>
      <div>
        <div class="d">${ev?fmtDate(ev.tanggal):"Event tidak terhubung"}</div>
        <div class="m">${ev?("M "+ev.magnitude+" &middot; "+(ev.wilayah||"")):"Isi manual / tanpa event"}</div>
        <div class="d">${ev&&ev.status?("TARP "+ev.status):""}</div>
      </div>
    </div>

    <div class="banner ${isOnline()?'info':'warn'}">
      <span>${isOnline()?"&#9432;":"&#9888;"}</span>
      <span>${isOnline()?"Online — penilaian langsung terkirim saat 'Kirim'.":"Offline — penilaian disimpan di perangkat & otomatis terkirim saat sinyal kembali."}</span>
    </div>

    <div class="progress">
      <div class="row"><span>Progres Penilaian</span><span>${done} / ${total}</span></div>
      <div class="bar"><i style="width:${pct}%"></i></div>
    </div>

    <div id="qlist"></div>

    <label class="f" style="margin-top:6px">Nama Inspektor <span class="req">*</span></label>
    <input type="text" id="inspector" placeholder="Nama lengkap petugas" value="${(ANS.__inspector||'').replace(/"/g,'&quot;')}">
  `;
  const list = app.querySelector("#qlist");
  QUESTIONS.forEach(q=> list.appendChild(renderQ(q)));
  $("actions").classList.remove("hidden");
}

function renderQ(q){
  const a = ANS[q.id] || {};
  const el = document.createElement("div");
  el.className = "q" + (a.answer?" answered":"") + (q.critical?" crit":"");
  const trig = isTriggered(q);
  el.innerHTML = `
    <div class="head">
      <div class="num">${q.ord}</div>
      <div><div class="qt">${q.text}</div>${q.critical?'<span class="tag">PARAMETER KRITIS</span>':''}</div>
    </div>
    <div class="opts">
      <div class="opt ya ${a.answer==='Ya'?'sel':''}" data-a="Ya">&#10003; Ya</div>
      <div class="opt tidak ${a.answer==='Tidak'?'sel':''}" data-a="Tidak">&#10007; Tidak</div>
      <div class="opt tt ${a.answer==='Tidak Tahu'?'sel':''}" data-a="Tidak Tahu">? Tidak Tahu</div>
    </div>
    <div class="detail ${trig?'':'hidden'}">
      <label class="f">Jelaskan ${q.requires_explanation?'<span class="req">*</span>':''}</label>
      <textarea data-f="explanation" maxlength="500" rows="3" placeholder="Tuliskan lokasi, kondisi, dan dampak...">${a.explanation||''}</textarea>
      <div class="cnt">${(a.explanation||'').length} / 500</div>

      <label class="f">Foto ${q.requires_photo?'<span class="req">* (wajib jika Ya)</span>':''}</label>
      <div class="photos" data-ph></div>

      <label class="f">Lokasi Kejadian</label>
      <div class="loc"><span class="pin">&#9679;</span>
        <div style="flex:1"><div data-loclabel>${a.loc&&a.loc.lat?(a.loc.lat.toFixed(5)+", "+a.loc.lng.toFixed(5)):"Belum diambil"}</div><div class="coord">ketuk tombol untuk ambil GPS</div></div>
        <button class="btn" style="flex:0 0 auto;padding:7px 10px;font-size:12px" data-getloc>GPS</button>
      </div>

      <label class="f">Catatan (opsional)</label>
      <textarea data-f="note" maxlength="300" rows="2" placeholder="Tambahkan catatan jika diperlukan...">${a.note||''}</textarea>
      <div class="cnt">${(a.note||'').length} / 300</div>
    </div>
  `;
  // answer buttons
  el.querySelectorAll(".opt").forEach(o=> o.addEventListener("click", ()=>{
    ANS[q.id] = ANS[q.id]||{photos:[]};
    ANS[q.id].answer = o.dataset.a;
    saveDraftQuiet();
    render();
  }));
  // text fields
  el.querySelectorAll("[data-f]").forEach(t=> t.addEventListener("input", ()=>{
    ANS[q.id] = ANS[q.id]||{photos:[]};
    ANS[q.id][t.dataset.f] = t.value;
    const c = t.parentElement.querySelector(".cnt"); if(c) c.textContent = t.value.length + " / " + t.maxLength;
  }));
  // gps
  const gb = el.querySelector("[data-getloc]");
  if(gb) gb.addEventListener("click", ()=>{ gb.textContent="..."; getGPS(loc=>{ gb.textContent="GPS"; if(loc){ ANS[q.id]=ANS[q.id]||{photos:[]}; ANS[q.id].loc=loc; saveDraftQuiet(); el.querySelector("[data-loclabel]").textContent=loc.lat.toFixed(5)+", "+loc.lng.toFixed(5); } }); });
  // photos
  renderPhotos(el, q);
  return el;
}

function renderPhotos(el, q){
  const box = el.querySelector("[data-ph]"); if(!box) return;
  const a = ANS[q.id] || {photos:[]}; a.photos = a.photos||[];
  box.innerHTML = "";
  a.photos.forEach((d,i)=>{
    const w=document.createElement("div"); w.className="ph";
    w.innerHTML = `<img src="${d}"><button class="x">&times;</button>`;
    w.querySelector(".x").addEventListener("click", ()=>{ a.photos.splice(i,1); saveDraftQuiet(); renderPhotos(el,q); });
    box.appendChild(w);
  });
  const add=document.createElement("label"); add.className="addph";
  add.innerHTML = `<span style="font-size:18px">&#128247;</span><span>Tambah</span><input type="file" accept="image/*" capture="environment">`;
  add.querySelector("input").addEventListener("change", async (e)=>{
    const f=e.target.files[0]; if(!f) return;
    const d=await fileToDataURL(f);
    ANS[q.id]=ANS[q.id]||{photos:[]}; ANS[q.id].photos=ANS[q.id].photos||[]; ANS[q.id].photos.push(d);
    saveDraftQuiet(); renderPhotos(el,q);
  });
  box.appendChild(add);
}

// ===================== DRAFT =====================
let _draftTimer=null;
function saveDraftQuiet(){
  const insp = $("inspector"); if(insp) ANS.__inspector = insp.value;
  clearTimeout(_draftTimer);
  _draftTimer = setTimeout(()=> metaSet("draft",{event:EVENT, ans:ANS, gps:GPS}), 400);
}

// ===================== VALIDATE + SUBMIT =====================
function validate(){
  const errs=[];
  const insp = ($("inspector")&&$("inspector").value.trim())||ANS.__inspector;
  if(!insp) errs.push("Nama inspektor wajib diisi.");
  QUESTIONS.forEach(q=>{
    const a=ANS[q.id];
    if(!a||!a.answer){ errs.push("Soal "+q.ord+" belum dijawab."); return; }
    if(a.answer===(q.trigger_answer||"Ya")){
      if(q.requires_explanation && !(a.explanation&&a.explanation.trim())) errs.push("Soal "+q.ord+": penjelasan wajib.");
      if(q.requires_photo && !(a.photos&&a.photos.length)) errs.push("Soal "+q.ord+": foto wajib.");
    }
  });
  return errs;
}

function buildRecord(){
  const insp = ($("inspector")&&$("inspector").value.trim())||ANS.__inspector||"";
  let yes=0, critYes=0, answered=0;
  const answers = QUESTIONS.map(q=>{
    const a=ANS[q.id]||{};
    if(a.answer) answered++;
    if(a.answer==="Ya"){ yes++; if(q.critical) critYes++; }
    return { question_id:q.id, code:q.code, ord:q.ord, text:q.text, critical:!!q.critical,
      answer:a.answer||null, explanation:a.explanation||null, note:a.note||null,
      location:a.loc||null, photos:[] /* paths terisi saat sync */, _photoData:a.photos||[] };
  });
  const triage = critYes>0 ? "CRITICAL_FOLLOWUP" : (yes>0 ? "NEEDS_FOLLOWUP" : "CLEAR");
  return {
    id: uuid(),
    event_id: EVENT? EVENT.event_id : null,
    event_snapshot: EVENT || null,
    answers, // contains _photoData (stripped before insert)
    summary: { yes_count:yes, critical_yes:critYes, total_answered:answered, total:QUESTIONS.length, triage },
    inspector_name: insp,
    gps_lat: null, gps_lng: null,
    status: "submitted",
    client_created_at: new Date().toISOString()
  };
}

// upload photos for a record, return answers with photo paths filled
async function uploadPhotos(rec){
  const out = [];
  for(const ans of rec.answers){
    const paths=[];
    const data = ans._photoData||[];
    for(let i=0;i<data.length;i++){
      const blob = dataURLtoBlob(data[i]);
      const path = `${rec.id}/${ans.code}_${i+1}.jpg`;
      const {error} = await sb.storage.from("pera-photos").upload(path, blob, {contentType:"image/jpeg", upsert:true});
      if(error) throw error;
      paths.push(path);
    }
    const {_photoData, ...clean} = ans; clean.photos = paths;
    out.push(clean);
  }
  return out;
}

async function pushRecord(rec){
  const answers = await uploadPhotos(rec);
  const {error} = await sb.from("pera_assessments").upsert({
    id: rec.id, event_id: rec.event_id, event_snapshot: rec.event_snapshot,
    answers, summary: rec.summary, inspector_name: rec.inspector_name,
    gps_lat: rec.gps_lat, gps_lng: rec.gps_lng, status: rec.status,
    client_created_at: rec.client_created_at
  }, {onConflict:"id", ignoreDuplicates:true});
  if(error) throw error;
}

async function submit(){
  const errs = validate();
  if(errs.length){ alert("Belum lengkap:\n\n• " + errs.slice(0,8).join("\n• ") + (errs.length>8?"\n• ...":"")); return; }
  $("btnSubmit").disabled=true; $("btnSubmit").textContent="Memproses...";
  const rec = buildRecord();
  try{
    if(isOnline()){
      await pushRecord(rec);
      await metaSet("draft", null); ANS={};
      doneScreen(true);
    } else {
      await obxPut(rec);                 // simpan ke outbox (dengan foto)
      await metaSet("draft", null); ANS={};
      doneScreen(false);
    }
  }catch(e){
    // gagal kirim online -> simpan ke outbox sebagai fallback
    try{ await obxPut(rec); await metaSet("draft",null); ANS={}; doneScreen(false,String(e.message||e)); }
    catch(e2){ $("btnSubmit").disabled=false; $("btnSubmit").textContent="Kirim Penilaian"; alert("Gagal menyimpan: "+(e2.message||e2)); }
  }
}

function doneScreen(sent, warn){
  $("actions").classList.add("hidden"); $("outbox").innerHTML="";
  $("app").innerHTML = `
    <div class="center" style="flex-direction:column;gap:14px">
      <div style="width:64px;height:64px;border-radius:50%;background:${sent?'#dcfce7':'#fef3c7'};color:${sent?'#16a34a':'#d97706'};display:flex;align-items:center;justify-content:center;font-size:32px">${sent?'&#10003;':'&#8681;'}</div>
      <div style="font-size:18px;font-weight:700;color:#1e293b">${sent?'Penilaian Terkirim':'Tersimpan (menunggu sinyal)'}</div>
      <div style="font-size:13px;max-width:340px">${sent?'Data PERA berhasil dikirim ke server dan masuk ke database audit.':'Tidak ada sinyal. Penilaian disimpan di perangkat dan akan otomatis terkirim saat online.'}</div>
      ${warn?`<div class="banner warn" style="max-width:360px">Catatan: kirim online gagal (${warn}); disimpan ke antrean offline.</div>`:''}
      <button class="btn primary" style="max-width:240px" onclick="location.reload()">Penilaian Baru</button>
    </div>`;
  refreshOutbox();
}

// ===================== OUTBOX SYNC =====================
let _syncing=false;
async function syncOutbox(){
  if(_syncing || !isOnline()) return;
  const items = await obxAll(); if(!items.length){ refreshOutbox(); return; }
  _syncing=true; refreshOutbox();
  for(const rec of items){
    try{ await pushRecord(rec); await obxDel(rec.id); }
    catch(e){ /* biarkan di antrean, coba lagi nanti */ }
  }
  _syncing=false; refreshOutbox();
}
async function refreshOutbox(){
  const box=$("outbox"); if(!box) return;
  const items = await obxAll();
  if(!items.length){ box.innerHTML=""; return; }
  box.innerHTML = `<div class="chip"><span>&#8681; ${items.length} penilaian menunggu terkirim${_syncing?' (mengirim...)':''}</span>${isOnline()&&!_syncing?'<button id="syncNow">Kirim sekarang</button>':''}</div>`;
  const b=$("syncNow"); if(b) b.addEventListener("click", syncOutbox);
}

// ===================== INIT =====================
async function init(){
  setNet();
  // butuh sesi login (dibagi dgn platform via localStorage)
  const {data:{session}} = await sb.auth.getSession();
  if(!session){
    $("app").innerHTML = `<div class="center" style="flex-direction:column;gap:12px">
      <div style="font-size:16px;font-weight:700;color:#1e293b">Perlu login</div>
      <div style="font-size:13px">Buka platform utama dan login dulu, lalu kembali ke halaman ini.</div>
      <a class="btn primary" style="max-width:220px;text-decoration:none;text-align:center" href="index.html">Ke Halaman Login</a></div>`;
    return;
  }
  await loadQuestions();
  await loadEvent();
  await loadDraft();
  if(!QUESTIONS.length){
    $("app").innerHTML = `<div class="center">Daftar pertanyaan belum tersedia offline. Sambungkan internet sekali untuk mengunduh, lalu bisa dipakai offline.</div>`;
    return;
  }
  render();
  refreshOutbox();
  syncOutbox();
}

$("btnDraft").addEventListener("click", async ()=>{ saveDraftQuiet(); setTimeout(()=>alert("Draft tersimpan di perangkat."),450); });
$("btnSubmit").addEventListener("click", submit);
window.addEventListener("online", ()=>{ setNet(); syncOutbox(); });
window.addEventListener("offline", setNet);

if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
init();
</script>
