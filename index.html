<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1f3a">
<link rel="manifest" href="manifest.json">
<title>Geotech Monitoring — Bahodopi</title>
<link rel="stylesheet" href="common.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="common.js"></script>
</head>
<body>
<div id="root"><div class="center"><div class="spin"></div></div></div>

<script>
"use strict";
const sb = GMS.sb, $ = GMS.$;

// ===================== TILES =====================
// access: "all" | "admin"
// NOTE: tile ditambah seiring halamannya dibangun (eews/dashboard/validasi/database menyusul)
const TILES = [
  { key:"monitoring",href:"monitoring.html",label:"Monitoring", sub:"Dashboard terintegrasi (EEWS · risiko · instrumen)", ic:"&#9707;", c:"#0b1f3a", cb:"#e7ebf2", access:"all" },
  { key:"inspeksi", href:"inspeksi.html", label:"Inspeksi Baru", sub:"Checklist · GPS · foto (offline)", ic:"&#9633;", c:"#ea580c", cb:"#fff1e7", access:"all" },
  { key:"pera",     href:"pera.html",     label:"PERA",          sub:"Penilaian cepat pasca gempa (offline)", ic:"&#9888;", c:"#0891b2", cb:"#e6f7fb", access:"all" },
  { key:"eews",     href:"eews.html",     label:"EEWS",          sub:"Peringatan dini gempa", ic:"&#9883;", c:"#dc2626", cb:"#fdeaea", access:"all" },
  { key:"dashboard",href:"dashboard.html",label:"Dashboard",     sub:"Peta & daftar risiko + laporan", ic:"&#9636;", c:"#2563eb", cb:"#e8eefc", access:"admin" },
  { key:"validasi", href:"validasi.html", label:"Validasi",      sub:"Verifikasi & approve inspeksi", ic:"&#9745;", c:"#0d9488", cb:"#e3f5f2", access:"admin" },
  { key:"database", href:"database.html", label:"Database",      sub:"Checklist · User · Reporting · Audit PERA", ic:"&#9638;", c:"#7c3aed", cb:"#f0e9fc", access:"admin" },
];

// ===================== HOME (after login) =====================
function renderHome(p){
  const canV = p.canValidate;
  const tiles = TILES.filter(t => t.access==="all" || canV);
  const tileHtml = tiles.map(t =>
    '<a class="tile" href="'+t.href+'" style="--c:'+t.c+';--cb:'+t.cb+'">'+
      '<div class="ic">'+t.ic+'</div>'+
      '<div><div class="lab">'+t.label+'</div><div class="sub">'+t.sub+'</div></div>'+
    '</a>').join("");

  $("root").innerHTML =
    GMS.header("Geotech Monitoring", "Bahodopi Block 2 & 3", {back:false}) +
    '<div class="wrap">'+
      '<div class="panel" style="display:flex;align-items:center;gap:14px;margin-bottom:18px">'+
        '<div style="width:44px;height:44px;border-radius:50%;background:#e8eefc;color:#2563eb;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:700">'+
          GMS.esc((p.email||"?").slice(0,1).toUpperCase())+'</div>'+
        '<div style="flex:1">'+
          '<div style="font-weight:700">'+GMS.esc(p.email||"")+'</div>'+
          '<div style="font-size:12px;color:var(--mut)">'+GMS.esc((p.profile&&p.profile.position)||"")+
            ' · <span class="mono">'+GMS.esc(p.role)+'</span></div>'+
        '</div>'+
        '<button class="btn" onclick="GMS.logout()">Keluar</button>'+
      '</div>'+
      '<div class="eyebrow">Menu</div>'+
      '<div class="tiles">'+tileHtml+'</div>'+
      '<p class="mono" style="font-size:10px;color:var(--mut2);text-align:center;margin-top:24px">IGP Morowali · PT Vale Indonesia</p>'+
    '</div>';
}

// ===================== AUTH SCREEN =====================
let mode = "signin"; // signin | signup | forgot | newpass
let abusy = false, aerr = "", amsg = "";

function renderAuth(){
  const f = {
    email: ($("email")&&$("email").value)||"",
    pass:  ($("pass") &&$("pass").value )||"",
    bn:    ($("bn")   &&$("bn").value   )||"",
    pos:   ($("pos")  &&$("pos").value  )||"",
  };
  const tabs = mode!=="newpass" ?
    '<div class="row" style="gap:6px;margin-bottom:16px">'+
      ['signin','Sign in','signup','Sign up'].reduce((a,_,i,arr)=>{ if(i%2)return a; const k=arr[i],t=arr[i+1];
        return a+'<button class="btn" style="flex:1'+(mode===k?';background:var(--blue);color:#fff;border-color:var(--blue)':'')+'" onclick="setMode(\''+k+'\')">'+t+'</button>';},'')+
    '</div>' : '';

  const emailF = mode!=="newpass" ? '<label class="f">Email</label><input id="email" type="email" value="'+GMS.esc(f.email)+'">' : '';
  const signupF = mode==="signup" ?
      '<label class="f">Badge Number (B/N)</label><input id="bn" placeholder="mis. 0676733" value="'+GMS.esc(f.bn)+'">'+
      '<label class="f">Position</label><input id="pos" placeholder="mis. Geotechnical Engineer" value="'+GMS.esc(f.pos)+'">' : '';
  const passF = mode!=="forgot" ?
      '<label class="f">'+(mode==="newpass"?"Password Baru":"Password")+((mode==="signup"||mode==="newpass")?' <span style="color:var(--mut);font-weight:400">(min. 6)</span>':'')+'</label>'+
      '<input id="pass" type="password" value="'+GMS.esc(f.pass)+'" onkeydown="if(event.key===\'Enter\')doAuth()">' : '';
  const forgotLink = mode==="signin" ? '<div style="margin:8px 0 0"><button class="linkbtn" onclick="setMode(\'forgot\')">Lupa password?</button></div>' : '';

  const btnLabel = abusy?"Memproses…":mode==="signup"?"Buat Akun":mode==="forgot"?"Kirim Link Reset":mode==="newpass"?"Simpan Password":"Sign in";
  const note = mode==="signup" ? "Email @vale.com / @valeindonesia.com / @gmail.com. Akun baru menunggu persetujuan Super Admin."
            : mode==="forgot" ? "Masukkan email akunmu; link reset dikirim ke email."
            : mode==="newpass" ? "Buat password baru untuk akunmu."
            : "Masuk dengan akun terdaftar.";

  $("root").innerHTML =
    '<div class="wrap narrow" style="padding-top:8vh">'+
      '<div class="panel">'+
        '<div class="row" style="margin-bottom:18px">'+
          '<div style="width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;background:rgba(251,146,60,.14);border:1px solid rgba(251,146,60,.4);color:#ea580c;font-size:18px">&#9650;</div>'+
          '<div><div style="font-weight:800;font-size:17px">Geotech Monitoring</div>'+
          '<div class="mono" style="font-size:10px;color:var(--mut)">BAHODOPI BLOCK 2 &amp; 3</div></div>'+
        '</div>'+
        tabs + emailF + signupF + passF + forgotLink +
        (aerr?'<div class="banner err" style="margin:12px 0 0">'+GMS.esc(aerr)+'</div>':'')+
        (amsg?'<div class="banner ok" style="margin:12px 0 0">'+GMS.esc(amsg)+'</div>':'')+
        '<button class="btn primary block" style="margin-top:16px" '+(abusy?'disabled':'')+' onclick="doAuth()">'+btnLabel+'</button>'+
        (mode==="forgot"?'<button class="btn block" style="margin-top:8px" onclick="setMode(\'signin\')">Kembali</button>':'')+
        '<p class="mono" style="font-size:10px;color:var(--mut);margin-top:12px;line-height:1.5">'+note+'</p>'+
      '</div>'+
    '</div>';
}

function setMode(m){ mode=m; aerr=""; amsg=""; renderAuth(); }
window.setMode = setMode;

async function doAuth(){
  const email = (($("email")&&$("email").value)||"").trim();
  const pass  =  ($("pass") &&$("pass").value )||"";
  const bn    = (($("bn")   &&$("bn").value   )||"").trim();
  const pos   = (($("pos")  &&$("pos").value  )||"").trim();
  aerr=""; amsg=""; abusy=true; renderAuth();
  try{
    if(mode==="signup"){
      const allowed=["gmail.com","vale.com","valeindonesia.com"];
      const dom=(email.split("@")[1]||"").toLowerCase();
      if(!allowed.includes(dom)) throw new Error("Hanya email @vale.com, @valeindonesia.com, atau @gmail.com yang diizinkan.");
      const { data, error } = await sb.auth.signUp({ email, password:pass,
        options:{ data:{ badge_number:bn, position:pos }, emailRedirectTo: location.origin } });
      if(error) throw error;
      if(data.session){ return boot(); }
      const { error:e2 } = await sb.auth.signInWithPassword({ email, password:pass });
      if(!e2){ return boot(); }
      mode="signin"; amsg="Akun dibuat, menunggu persetujuan Super Admin."; abusy=false; renderAuth();
    } else if(mode==="forgot"){
      const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: location.origin });
      if(error) throw error;
      amsg="Jika email terdaftar, link reset sudah dikirim. Cek inbox/spam."; abusy=false; renderAuth();
    } else if(mode==="newpass"){
      const { error } = await sb.auth.updateUser({ password:pass });
      if(error) throw error;
      amsg="Password diperbarui. Mengarahkan…"; renderAuth(); setTimeout(boot,800);
    } else {
      const { error } = await sb.auth.signInWithPassword({ email, password:pass });
      if(error) throw error;
      return boot();
    }
  }catch(e){ aerr=e.message||String(e); abusy=false; renderAuth(); }
}
window.doAuth = doAuth;

// ===================== BOOT =====================
async function boot(){
  $("root").innerHTML = '<div class="center"><div class="spin"></div></div>';
  const session = await GMS.getSession();
  if(!session){
    if((location.hash||"").includes("type=recovery")) mode="newpass";
    abusy=false; renderAuth(); return;
  }
  const p = await GMS.getProfile();
  if(!p){ abusy=false; renderAuth(); return; }
  if(p.status!=="active"){
    $("root").innerHTML = GMS.header("Geotech Monitoring","Bahodopi",{back:false}) +
      '<div class="center">'+
        '<div style="width:56px;height:56px;border-radius:50%;background:#fef3c7;color:#d97706;display:flex;align-items:center;justify-content:center;font-size:26px">&#9888;</div>'+
        '<div style="font-size:17px;font-weight:700">'+(p.status==="disabled"?"Akun dinonaktifkan":"Menunggu persetujuan")+'</div>'+
        '<div style="font-size:13px;max-width:340px">'+(p.status==="disabled"?"Akun ini dinonaktifkan oleh admin.":"Akun kamu menunggu persetujuan Super Admin sebelum bisa dipakai.")+'</div>'+
        '<button class="btn" style="max-width:180px" onclick="GMS.logout()">Keluar</button>'+
      '</div>';
    return;
  }
  renderHome(p);
}

// recovery link handler
sb.auth.onAuthStateChange((ev)=>{ if(ev==="PASSWORD_RECOVERY"){ mode="newpass"; renderAuth(); } });

if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
boot();
</script>
</body>
</html>
