<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GMS Dashboard — PTVI Bahodopi</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<style>
:root{
  /* LIGHT THEME */
  --bg:#f4f6fb;--bg2:#ffffff;--bg3:#eef2f8;--bg4:#e2e8f0;
  --bd:#cbd5e1;--bd2:#94a3b8;
  --tx:#0f172a;--tx2:#334155;--tx3:#64748b;
  --acc:#1a6eff;
  /* RISK COLORS — merah / oranye / kuning / hijau */
  --g:#16a34a;--gb:rgba(22,163,74,.12);--gb2:rgba(22,163,74,.45);
  --y:#eab308;--yb:rgba(234,179,8,.15);--yb2:rgba(234,179,8,.5);
  --o:#f97316;--ob:rgba(249,115,22,.14);--ob2:rgba(249,115,22,.5);
  --r:#dc2626;--rb:rgba(220,38,38,.12);--rb2:rgba(220,38,38,.5);
  --mono:'JetBrains Mono',monospace;
  --head:'Rajdhani',sans-serif;
  --body:'Inter',sans-serif;
  --shadow-card:0 1px 2px rgba(15,23,42,.06),0 2px 8px rgba(15,23,42,.04);
  --shadow-glow:0 0 0 1px rgba(26,110,255,.25),0 10px 28px -10px rgba(26,110,255,.35);
  --ease:cubic-bezier(.22,.61,.36,1);
}
*{box-sizing:border-box;margin:0;padding:0;transition:background-color .25s var(--ease),border-color .25s var(--ease),color .2s var(--ease),box-shadow .25s var(--ease),transform .25s var(--ease)}
html,body{height:100%;overflow:hidden}
body{font-family:var(--body);background:
  radial-gradient(1200px 600px at 20% -10%,rgba(26,110,255,.08),transparent 60%),
  radial-gradient(900px 500px at 110% 110%,rgba(22,163,74,.06),transparent 60%),
  var(--bg);color:var(--tx);font-size:11px;line-height:1.4}

/* ═══ TOPBAR ═══ */
.topbar{height:40px;background:var(--bg2);border-bottom:1px solid var(--bd);display:flex;align-items:center;padding:0 14px;gap:12px;flex-shrink:0;box-shadow:var(--shadow-card)}
.topbar::after{content:'';position:absolute;top:39px;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent 0%,var(--acc) 20%,#00b3ff 50%,var(--acc) 80%,transparent 100%);background-size:200% 100%;animation:slide 6s linear infinite;opacity:.7}
@keyframes slide{0%{background-position:0 0}100%{background-position:200% 0}}
.logo-icon{width:26px;height:26px;background:linear-gradient(135deg,var(--acc),#00a8ff);border-radius:4px;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-size:12px;font-weight:700;color:#fff}
.logo-text{font-family:var(--head);font-size:14px;font-weight:700;letter-spacing:.06em;color:var(--tx)}
.logo-sub{font-family:var(--mono);font-size:7px;color:var(--tx3);letter-spacing:.1em;text-transform:uppercase}
.top-divider{width:1px;height:18px;background:var(--bd)}
.top-label{font-family:var(--mono);font-size:8px;color:var(--tx2);text-transform:uppercase;letter-spacing:.1em}
.top-right{margin-left:auto;display:flex;align-items:center;gap:10px}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--g);box-shadow:0 0 8px var(--g);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.tarp-master{font-family:var(--head);font-size:12px;font-weight:700;padding:3px 12px;border-radius:3px;border:1px solid;letter-spacing:.08em;cursor:default;animation:tarpglow 2.5s ease-in-out infinite}
@keyframes tarpglow{0%,100%{box-shadow:0 0 0 0 transparent}50%{box-shadow:0 0 14px -2px currentColor}}
.clock-display{font-family:var(--mono);font-size:8px;color:var(--tx2);text-align:right;line-height:1.3}
.refresh-btn{width:24px;height:24px;background:var(--bg2);border:1px solid var(--bd);color:var(--tx2);cursor:pointer;border-radius:3px;font-size:11px;display:flex;align-items:center;justify-content:center}
.refresh-btn:hover{border-color:var(--acc);color:var(--acc);transform:translateY(-1px);box-shadow:0 4px 12px -4px rgba(26,110,255,.4)}
.refresh-btn:active{transform:rotate(180deg) scale(.9)}

/* ═══ LAYOUT ═══ */
.app{display:grid;grid-template-rows:40px 78px 1fr 46px;height:100vh}
.row-stats{display:grid;grid-template-columns:repeat(3,1fr) 2fr repeat(3,1fr);gap:6px;padding:6px;height:78px}
.row-main{display:grid;grid-template-columns:330px 1fr 360px;gap:6px;padding:0 6px;min-height:0;overflow:hidden}
.row-bottom{padding:4px 8px;border-top:1px solid var(--bd);background:var(--bg2);display:flex;align-items:center;gap:10px}

/* ═══ STAT BIG CARDS ═══ */
.bigstat{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:10px 14px;display:flex;align-items:center;gap:12px;position:relative;overflow:hidden;box-shadow:var(--shadow-card)}
.bigstat::before{content:'';position:absolute;top:0;left:0;bottom:0;width:3px}
.bs-g::before{background:var(--g)}
.bs-y::before{background:var(--y)}
.bs-o::before{background:var(--o)}
.bs-r::before{background:var(--r)}
.bs-b::before{background:var(--acc)}
.bigstat:hover{transform:translateY(-2px);border-color:var(--bd2);box-shadow:var(--shadow-glow)}
.bs-icon{width:38px;height:38px;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:18px;font-weight:700;transition:transform .35s var(--ease)}
.bigstat:hover .bs-icon{transform:scale(1.08) rotate(-3deg)}
.bs-icon.ic-b{background:rgba(26,110,255,.1);color:var(--acc)}
.bs-icon.ic-r{background:var(--rb);color:var(--r)}
.bs-icon.ic-o{background:var(--ob);color:var(--o)}
.bs-icon.ic-y{background:var(--yb);color:var(--y)}
.bs-icon.ic-g{background:var(--gb);color:var(--g)}
.bs-meta{flex:1;min-width:0}
.bs-lbl{font-family:var(--mono);font-size:8px;color:var(--tx3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:2px}
.bs-val{font-family:var(--head);font-size:24px;font-weight:700;line-height:1;color:var(--tx)}
.bs-sub{font-family:var(--mono);font-size:8px;color:var(--tx3);margin-top:1px}
.bs-pct{font-family:var(--mono);font-size:8px;font-weight:600;margin-top:2px}

/* ═══ PGA HIGHLIGHT CARD ═══ */
.bigstat.pga-highlight{background:linear-gradient(135deg,#ffffff,#fef9ec);border:2px solid var(--y);box-shadow:0 0 0 1px var(--yb2),0 4px 14px -2px rgba(234,179,8,.35);animation:pgaPulse 3s ease-in-out infinite}
.bigstat.pga-highlight::before{width:4px;background:linear-gradient(180deg,var(--y),var(--o))}
@keyframes pgaPulse{0%,100%{box-shadow:0 0 0 1px var(--yb2),0 4px 14px -2px rgba(234,179,8,.25)}50%{box-shadow:0 0 0 2px var(--yb2),0 6px 20px -2px rgba(234,179,8,.5)}}
.bigstat.pga-highlight .bs-val{font-size:26px}
.bigstat.pga-highlight .bs-lbl{color:var(--o);font-weight:700}

/* ═══ MAP TITLE ═══ */
.map-title-bar{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;padding:0 14px;display:flex;align-items:center;justify-content:space-between;gap:10px;box-shadow:var(--shadow-card)}
.mtb-title{font-family:var(--head);font-size:14px;font-weight:700;letter-spacing:.06em;color:var(--tx);text-transform:uppercase}
.mtb-sub{font-family:var(--mono);font-size:9px;color:var(--tx3)}

/* ═══ PANEL ═══ */
.panel{background:var(--bg2);border:1px solid var(--bd);border-radius:6px;display:flex;flex-direction:column;min-height:0;overflow:hidden;box-shadow:var(--shadow-card)}
.panel:hover{border-color:var(--bd2)}
.ph{padding:6px 10px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;position:relative;background:var(--bg3)}
.ph::after{content:'';position:absolute;left:0;right:0;bottom:-1px;height:1px;background:linear-gradient(90deg,transparent,var(--acc),transparent);opacity:0;transition:opacity .3s var(--ease)}
.panel:hover .ph::after{opacity:.7}
.pt{font-family:var(--head);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx);display:flex;align-items:center;gap:6px}
.pt::before{content:'';width:3px;height:12px;border-radius:2px;background:var(--acc);flex-shrink:0}
.pt.r::before{background:var(--r)}
.pt.o::before{background:var(--o)}
.pt.y::before{background:var(--y)}
.pt.g::before{background:var(--g)}
.pb{padding:8px 10px;overflow-y:auto;flex:1;min-height:0}

/* ═══ COLUMNS ═══ */
.col-l,.col-r{display:flex;flex-direction:column;gap:6px;min-height:0;overflow:hidden}
.col-m{position:relative;min-height:0}

/* ═══ DONUT ═══ */
.donut-wrap{display:grid;grid-template-columns:130px 1fr;gap:8px;align-items:center;padding:8px 12px;flex:1}
.donut-canvas-wrap{position:relative;width:130px;height:130px}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none}
.donut-center-num{font-family:var(--head);font-size:28px;font-weight:700;color:var(--acc);line-height:1}
.donut-center-lbl{font-family:var(--mono);font-size:8px;color:var(--tx3);margin-top:2px}
.donut-legend{display:flex;flex-direction:column;gap:5px}
.dl-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:6px;align-items:center;font-family:var(--mono);font-size:9px;color:var(--tx2)}
.dl-dot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.dl-cnt{color:var(--tx);font-weight:700;font-family:var(--head)}
.dl-pct{color:var(--tx3);font-size:8px}

/* ═══ HAZARD TABLE ═══ */
.hzr-row{display:grid;grid-template-columns:auto 1fr auto auto;gap:8px;align-items:center;padding:5px 10px;border-bottom:1px solid var(--bd);cursor:pointer}
.hzr-row:last-child{border-bottom:none}
.hzr-row:hover{background:linear-gradient(90deg,rgba(26,110,255,.08),transparent);padding-left:14px}
.hzr-icon{width:22px;height:22px;border-radius:3px;display:flex;align-items:center;justify-content:center;background:var(--bg3);color:var(--tx2);flex-shrink:0;font-size:13px;transition:transform .25s var(--ease)}
.hzr-row:hover .hzr-icon{transform:scale(1.1);color:var(--acc)}
.hzr-name{font-size:10px;color:var(--tx);font-weight:500}
.hzr-sub{font-family:var(--mono);font-size:7px;color:var(--tx3)}
.hzr-cnt{font-family:var(--mono);font-size:11px;color:var(--tx);font-weight:700;text-align:right;min-width:24px}

/* ═══ BADGE ═══ */
.bdg{display:inline-flex;align-items:center;padding:2px 7px;border-radius:3px;font-family:var(--mono);font-size:8px;font-weight:700;border:1px solid;letter-spacing:.04em;white-space:nowrap;transition:transform .2s var(--ease),box-shadow .2s var(--ease)}
.bdg:hover{transform:translateY(-1px);box-shadow:0 4px 10px -4px currentColor}
.bg{background:var(--gb);border-color:var(--gb2);color:var(--g)}
.by{background:var(--yb);border-color:var(--yb2);color:#a16207}
.bo{background:var(--ob);border-color:var(--ob2);color:var(--o)}
.br{background:var(--rb);border-color:var(--rb2);color:var(--r)}
.bd{background:var(--bg3);border-color:var(--bd);color:var(--tx2)}

/* TARP CLASSES (LV0 hijau → LV4 merah) */
.lv0{background:var(--gb);border-color:var(--gb2);color:var(--g)}
.lv1{background:rgba(132,204,22,.14);border-color:rgba(132,204,22,.5);color:#65a30d}
.lv2{background:var(--yb);border-color:var(--yb2);color:#a16207}
.lv3{background:var(--ob);border-color:var(--ob2);color:var(--o)}
.lv4{background:var(--rb);border-color:var(--rb2);color:var(--r)}

/* ═══ TABLE ═══ */
.dtable{width:100%;border-collapse:collapse;font-size:10px}
.dtable th{font-family:var(--mono);font-size:7px;text-transform:uppercase;letter-spacing:.08em;color:var(--tx3);padding:5px 7px;border-bottom:1px solid var(--bd);text-align:left;white-space:nowrap;background:var(--bg3);position:sticky;top:0;z-index:1}
.dtable td{padding:4px 7px;border-bottom:1px solid var(--bd);color:var(--tx2);vertical-align:middle}
.dtable tr:last-child td{border-bottom:none}
.dtable tbody tr{cursor:pointer}
.dtable tbody tr:hover td{background:linear-gradient(90deg,rgba(26,110,255,.08),transparent);color:var(--tx)}
.no-cell{font-family:var(--mono);font-size:9px;color:var(--tx3);width:18px}
.trend-up{color:var(--r);font-weight:700}
.trend-st{color:var(--tx3)}
.trend-dn{color:var(--g);font-weight:700}

/* ═══ MAP ═══ */
.col-m .panel{padding:0;height:100%}
#leaflet-map{position:absolute;inset:0;border-radius:6px;z-index:1}
.leaflet-container{background:#e8eef5 !important;cursor:grab}
.leaflet-container:active{cursor:grabbing}
.leaflet-marker-icon{transition:transform .2s var(--ease)}
.leaflet-marker-icon:hover{transform:scale(1.4);filter:drop-shadow(0 0 6px rgba(26,110,255,.6));z-index:1000 !important}

.layer-ctrl{position:absolute;top:10px;left:10px;background:rgba(255,255,255,.97);border:1px solid var(--bd);border-radius:6px;z-index:20;backdrop-filter:blur(8px);min-width:150px;box-shadow:var(--shadow-card);overflow:hidden}
.lc-head{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;cursor:pointer;user-select:none;background:var(--bg3);border-bottom:1px solid var(--bd)}
.lc-head:hover{background:rgba(26,110,255,.08)}
.lc-title{font-family:var(--mono);font-size:8px;color:var(--tx2);text-transform:uppercase;letter-spacing:.12em;font-weight:700;display:flex;align-items:center;gap:6px}
.lc-title::before{content:'▣';color:var(--acc);font-size:10px}
.lc-caret{font-family:var(--mono);font-size:9px;color:var(--tx3);transition:transform .25s var(--ease)}
.layer-ctrl.collapsed .lc-caret{transform:rotate(-90deg)}
.lc-body{padding:6px 8px;max-height:340px;overflow:hidden;transition:max-height .3s var(--ease),padding .25s var(--ease)}
.layer-ctrl.collapsed .lc-body{max-height:0;padding-top:0;padding-bottom:0}
.lc-row{display:flex;align-items:center;gap:6px;padding:3px 4px;cursor:pointer;font-family:var(--mono);font-size:9px;color:var(--tx2);user-select:none;border-radius:3px}
.lc-row:hover{color:var(--tx);background:rgba(26,110,255,.08)}
.lc-check{width:11px;height:11px;border:1px solid var(--bd2);border-radius:2px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lc-check.on{border-color:var(--acc);background:var(--acc)}
.lc-check.on::after{content:'✓';font-size:8px;color:#fff;font-weight:700}
.lc-sym{width:14px;height:14px;flex-shrink:0;display:flex;align-items:center;justify-content:center}

.map-ctrl-right{position:absolute;top:10px;right:10px;display:flex;flex-direction:column;gap:4px;z-index:20}
.map-btn{width:26px;height:26px;background:rgba(255,255,255,.96);border:1px solid var(--bd);color:var(--tx2);cursor:pointer;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:var(--shadow-card)}
.map-btn:hover{border-color:var(--acc);color:var(--acc);transform:translateY(-1px)}

.basemap-sel{position:absolute;bottom:10px;left:10px;z-index:20;display:flex;gap:4px}
.bm-btn{padding:3px 8px;background:rgba(255,255,255,.95);border:1px solid var(--bd);color:var(--tx2);cursor:pointer;border-radius:3px;font-family:var(--mono);font-size:7px;text-transform:uppercase;letter-spacing:.06em;box-shadow:var(--shadow-card)}
.bm-btn:hover,.bm-btn.active{border-color:var(--acc);color:var(--acc);background:rgba(26,110,255,.1)}

.map-scale{position:absolute;bottom:10px;right:10px;background:rgba(255,255,255,.95);border:1px solid var(--bd);border-radius:3px;padding:5px 9px;z-index:20;font-family:var(--mono);font-size:7px;color:var(--tx2);box-shadow:var(--shadow-card)}
.scale-bar{height:3px;background:var(--tx2);margin-top:4px;position:relative}
.scale-bar::before,.scale-bar::after{content:'';position:absolute;top:-3px;width:1px;height:9px;background:var(--tx2)}
.scale-bar::before{left:0}.scale-bar::after{right:0}

.north{position:absolute;top:50px;right:10px;z-index:20;width:30px;height:30px;background:rgba(255,255,255,.95);border:1px solid var(--bd);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--head);font-size:11px;font-weight:700;color:var(--tx2);cursor:pointer;box-shadow:var(--shadow-card);transition:transform .4s var(--ease)}

/* ═══ TREND CHART ═══ */
.chart-box{padding:6px 10px;flex:1;min-height:0;position:relative;display:flex;flex-direction:column}
.chart-canvas-wrap{flex:1;min-height:0;position:relative}
.chart-legend{display:flex;gap:10px;font-family:var(--mono);font-size:8px;color:var(--tx2);justify-content:center;padding-top:4px;border-top:1px solid var(--bd);margin-top:4px}
.cl-row{display:flex;align-items:center;gap:4px}
.cl-dot{width:8px;height:8px;border-radius:2px}

/* ═══ REKOMENDASI ═══ */
.rec-item{display:flex;gap:7px;padding:6px 4px;border-bottom:1px solid var(--bd);border-radius:3px;cursor:pointer}
.rec-item:last-child{border-bottom:none}
.rec-item:hover{background:rgba(26,110,255,.06)}
.rec-item:hover .rec-icon{transform:scale(1.15) rotate(-6deg)}
.rec-icon{width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px;transition:transform .3s var(--ease)}
.rec-icon.ri-r{background:var(--rb);color:var(--r);border:1px solid var(--rb2)}
.rec-icon.ri-o{background:var(--ob);color:var(--o);border:1px solid var(--ob2)}
.rec-icon.ri-y{background:var(--yb);color:#a16207;border:1px solid var(--yb2)}
.rec-icon.ri-g{background:var(--gb);color:var(--g);border:1px solid var(--gb2)}
.rec-num{font-family:var(--mono);font-size:9px;color:var(--tx3);margin-right:2px}
.rec-text{font-size:9px;color:var(--tx2);line-height:1.5;flex:1}
.rec-text b{color:var(--tx);font-weight:600}

/* ═══ INSTRUMENT STATUS — compact icon chip + hover tooltip ═══ */
.inst-bar{display:flex;align-items:center;gap:8px;height:100%;width:100%}
.inst-bar-title{font-family:var(--head);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--tx2);padding-right:10px;border-right:1px solid var(--bd);height:26px;display:flex;align-items:center}
.inst-chips{display:flex;align-items:center;gap:6px;flex:1}
.inst-pill{position:relative;width:36px;height:36px;border-radius:50%;background:var(--bg2);border:1.5px solid var(--bd);display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:var(--shadow-card)}
.inst-pill:hover{transform:translateY(-2px) scale(1.08);border-color:var(--bd2);box-shadow:var(--shadow-glow);z-index:50}
.inst-pill.s-ok{border-color:var(--g);box-shadow:0 0 0 1px var(--gb2),0 2px 8px -2px rgba(22,163,74,.35)}
.inst-pill.s-bad{border-color:var(--r);box-shadow:0 0 0 1px var(--rb2),0 2px 8px -2px rgba(220,38,38,.45);animation:dotPulseR 1.6s ease-in-out infinite}
.inst-pill .ip-svg{transition:transform .35s var(--ease)}
.inst-pill:hover .ip-svg{transform:rotate(10deg) scale(1.12)}
/* tiny corner status dot */
.ip-dot{position:absolute;bottom:-2px;right:-2px;width:11px;height:11px;border-radius:50%;border:2px solid var(--bg2)}
.ip-dot.ok{background:var(--g)}
.ip-dot.bad{background:var(--r);animation:dotPulseR 1.4s ease-in-out infinite}
@keyframes dotPulseG{0%,100%{box-shadow:0 0 0 0 rgba(22,163,74,.4)}50%{box-shadow:0 0 0 4px rgba(22,163,74,0)}}
@keyframes dotPulseR{0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,.5)}50%{box-shadow:0 0 0 5px rgba(220,38,38,0)}}
/* Tooltip popup */
.ip-tip{position:absolute;bottom:calc(100% + 10px);left:50%;transform:translateX(-50%) translateY(6px);background:var(--bg2);border:1px solid var(--bd2);border-radius:6px;padding:10px 12px;min-width:220px;max-width:280px;box-shadow:0 10px 30px -5px rgba(15,23,42,.25),0 0 0 1px rgba(15,23,42,.04);opacity:0;pointer-events:none;transition:all .25s var(--ease);z-index:200}
.inst-pill:hover .ip-tip{opacity:1;transform:translateX(-50%) translateY(0)}
.ip-tip::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:var(--bg2);filter:drop-shadow(0 1px 0 var(--bd2))}
.tip-title{font-family:var(--head);font-size:11px;font-weight:700;color:var(--tx);margin-bottom:6px;padding-bottom:5px;border-bottom:1px solid var(--bd);display:flex;align-items:center;gap:6px;text-transform:uppercase;letter-spacing:.05em}
.tip-row{display:flex;justify-content:space-between;gap:10px;font-family:var(--mono);font-size:9px;padding:2px 0}
.tip-key{color:var(--tx3)}
.tip-val{color:var(--tx);font-weight:600}
.tip-status-line{margin-top:6px;padding-top:5px;border-top:1px dashed var(--bd);font-family:var(--mono);font-size:8px;color:var(--tx3);line-height:1.4}

/* ═══ SCROLLBAR ═══ */

// ═══ UTM → LAT/LON (Zone 51S) ═══
function utmToLatLon(e, n) {
  const a=6378137, eccSq=0.00669438, k0=0.9996;
  const x=e-500000, y=n-10000000;
  const M=y/k0;
  const mu=M/(a*(1-eccSq/4-3*eccSq*eccSq/64));
  const e1=(1-Math.sqrt(1-eccSq))/(1+Math.sqrt(1-eccSq));
  const phi1=mu+(3*e1/2-27*e1**3/32)*Math.sin(2*mu)+(21*e1**2/16-55*e1**4/32)*Math.sin(4*mu);
  const N1=a/Math.sqrt(1-eccSq*Math.sin(phi1)**2);
  const T1=Math.tan(phi1)**2;
  const C1=eccSq*Math.cos(phi1)**2/(1-eccSq);
  const R1=a*(1-eccSq)/(1-eccSq*Math.sin(phi1)**2)**1.5;
  const D=x/(N1*k0);
  const lat=phi1-(N1*Math.tan(phi1)/R1)*(D**2/2-(5+3*T1+10*C1-4*C1**2-9*eccSq)*D**4/24);
  const lon=(123*Math.PI/180)+(D-(1+2*T1+C1)*D**3/6)/Math.cos(phi1);
  return [lat*180/Math.PI, lon*180/Math.PI];
}

function renderMapInstruments(points, inspArr, locs) {
  Object.values(instMarkers).flat().forEach(m => leafletMap.removeLayer(m));
  riskCircles.forEach(c => leafletMap.removeLayer(c));
  instMarkers = {}; riskCircles = [];

  // Build location-risk map for coloring nearby instruments
  const latestByLoc = {};
  inspArr.forEach(d => { if (!latestByLoc[d.location_id] || new Date(d.inspection_date) > new Date(latestByLoc[d.location_id].inspection_date)) latestByLoc[d.location_id] = d; });

  points.forEach(pt => {
    const [lat, lon] = utmToLatLon(pt.easting, pt.northing);
    if (isNaN(lat) || isNaN(lon)) return;
    // Color = TARP level color (risk aligned). Fallback green.
    const lvl = pt.tarp_lv || 0;
    const col = TC[lvl] || TC[0];
    const m = L.marker([lat, lon], { icon: makeInstIcon(pt.remark, col), riseOnHover: true });
    m.bindPopup(`
      <div class="popup-title">${pt.inst_id}</div>
      <div class="popup-row"><span class="popup-key">Tipe</span><span class="popup-val">${pt.remark}</span></div>
      <div class="popup-row"><span class="popup-key">Easting</span><span class="popup-val">${Number(pt.easting).toFixed(2)}</span></div>
      <div class="popup-row"><span class="popup-key">Northing</span><span class="popup-val">${Number(pt.northing).toFixed(2)}</span></div>
      <div class="popup-row"><span class="popup-key">Status</span><span class="popup-val" style="color:var(--g)">${pt.status||'Online'}</span></div>
      <div class="popup-row"><span class="popup-key">TARP</span><span class="popup-val" style="color:${col}">LV${lvl} · ${TN[lvl]}</span></div>
    `, { closeButton: false, autoPan: false });
    m.on('mouseover', function(){ this.openPopup(); });
    m.on('mouseout',  function(){ this.closePopup(); });
    if (!instMarkers[pt.remark]) instMarkers[pt.remark] = [];
    instMarkers[pt.remark].push(m);
    if (layerVisible[pt.remark]) m.addTo(leafletMap);
  });

  // Risk halos per location
  const latest = {};
  inspArr.forEach(d => { if (!latest[d.location_id] || new Date(d.inspection_date) > new Date(latest[d.location_id].inspection_date)) latest[d.location_id] = d; });
  const locMap = {}; locs.forEach(l=>locMap[l.id]=l);
  Object.values(latest).forEach(ins => {
    const loc = locMap[ins.location_id]; if (!loc) return;
    const [lat, lon] = utmToLatLon(parseFloat(loc.easting), parseFloat(loc.northing));
    if (isNaN(lat) || isNaN(lon)) return;
    const col = RC[ins.risk_level] || '#5a6f96';
    const c = L.circle([lat, lon], { radius: 70, color: col, fillColor: col, fillOpacity: .15, weight: 1.5, dashArray: '4,3' });
    c.bindPopup(`
      <div class="popup-title">${loc.name}</div>
      <div class="popup-row"><span class="popup-key">Area</span><span class="popup-val">${loc.area_code||'—'}</span></div>

      <div class="popup-row"><span class="popup-key">Score</span><span class="popup-val">${ins.total_score}</span></div>
      <div class="popup-row"><span class="popup-key">TARP</span><span class="popup-val" style="color:${TC[ins.tarp_level||0]}">LV${ins.tarp_level||0}</span></div>
      <div class="popup-row"><span class="popup-key">Inspeksi</span><span class="popup-val">${fmtD(ins.inspection_date)}</span></div>

    if (layerVisible['risk-halos']) c.addTo(leafletMap);
  });
}

// ═══ PGA DONOVAN 1972 ═══
function gcDist(la1,lo1,la2,lo2){const R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));}
function donovan(M, Rkm, hkm) {const Rh = Math.sqrt(Rkm**2 + hkm**2);return Math.exp(-2.611 + 1.1*M - Math.log(Rh + Math.exp(0.5*M)));}
const SITE_LAT = -2.58, SITE_LON = 121.63;

async function loadPGA() {
  try {
    const rows = await dbEEWS('earthquakes?select=*&order=tanggal.desc&limit=1');
    if (!rows.length) return;
    const eq = rows[0];
    const M = eq.magnitude || 0;
    let lat=0, lon=0;
    try {
      const ls=String(eq.lintang||'0').replace(/[^\d.]/g,'');
      const bs=String(eq.bujur||'0').replace(/[^\d.]/g,'');
      lat=(eq.lintang||'').includes('LS')?-parseFloat(ls):parseFloat(ls);
      lon=parseFloat(bs);
    } catch(e){}
    const h = parseFloat(String(eq.kedalaman||'10').replace(/[^\d]/g,'')) || 10;
    const distKm = gcDist(SITE_LAT, SITE_LON, lat, lon);
    const pgaCms = donovan(M, distKm, h);
    const pgaG = pgaCms / 981;
    let col = '#16a34a';
    if (pgaG >= 0.3) col = '#dc2626';
    else if (pgaG >= 0.1) col = '#f97316';
    else if (pgaG >= 0.05) col = '#eab308';
    else if (pgaG >= 0.01) col = '#84cc16';
    document.getElementById('bs-pga').innerHTML = `<span style="color:${col}">${pgaG.toFixed(2)}</span><span style="font-size:14px;font-weight:400;color:${col}"> g</span>`;
    document.getElementById('bs-pga-sub').textContent = `${pgaCms.toFixed(2)} cm/s² · ${M} Mw @ ${distKm.toFixed(0)} km`;
  } catch(e) { console.warn('PGA', e); }
}

async function loadAll() {
  try {
    const [locs, inspRaw, pts, sr, crit] = await Promise.all([
      db('locations?select=*').catch(()=>[]),
      db('inspections?select=*&approval_status=eq.approved&order=inspection_date.desc').catch(()=>[]),
      db('instrument_points?select=*').catch(()=>[]),   // belum ada -> []
      db('shift_reports?select=*&order=submitted_at.desc&limit=1').catch(()=>[]),
      db('scoring_criteria?select=parameter_code,condition_label,score').catch(()=>[]),
    ]);
    // peta skor untuk deteksi temuan (display-only: skor hanya menandai ADA/TIDAK temuan)
    const scoreMap = {}; (crit||[]).forEach(r => { scoreMap[r.parameter_code+'||'+r.condition_label] = r.score; });
    // Normalisasi skema governing (f1..f8 + risk_final) -> field yang diharapkan dashboard
    const insp = (inspRaw||[]).map(d => ({
      ...d,
      risk_level: d.risk_level || d.risk_final,
      ground_failure_condition:       d.ground_failure_condition       || d.f2_condition,
      slope_geometry_condition:       d.slope_geometry_condition       || d.f1_condition,
      drainage_condition:             d.drainage_condition             || d.f8_condition,
      elevation_restriction_condition:d.elevation_restriction_condition|| d.f5_condition,
    }));

    const latest = {};
    insp.forEach(d => { if (!latest[d.location_id] || new Date(d.inspection_date) > new Date(latest[d.location_id].inspection_date)) latest[d.location_id] = d; });
    const inspArr = Object.values(latest);

    // TARP master (top bar)
    const tShift = sr[0]?.tarp_level || 0;
    const tInsp  = inspArr.reduce((a,b)=>Math.max(a,b.tarp_level||0),0);
    const master = Math.max(tShift, tInsp);
    const tb = document.getElementById('master-tarp');
    tb.className = 'tarp-master ' + LVC[master];
    tb.textContent = 'TARP · LV ' + master;

    // STATS
    const cnt = { Low:0, Medium:0, High:0, 'Very High':0 };
    inspArr.forEach(d=>{ if(d.risk_level) cnt[d.risk_level]++; });
    const total = locs.length;
    const totalScored = inspArr.length;
    const hi = (cnt.High||0)+(cnt['Very High']||0);

    document.getElementById('bs-total').textContent = total;
    document.getElementById('bs-high').textContent  = hi;
    document.getElementById('bs-med').textContent   = cnt.Medium||0;
    document.getElementById('bs-low').textContent   = cnt.Low||0;
    document.getElementById('bs-inst').textContent  = pts.length;
    const typesCnt = new Set(pts.map(p=>p.remark)).size;
    document.getElementById('bs-inst-sub').textContent = typesCnt+' jenis instrumen';
    document.getElementById('bs-high-pct').textContent = totalScored ? Math.round(hi/totalScored*100)+'% dari total' : '—';
    document.getElementById('bs-med-pct').textContent  = totalScored ? Math.round((cnt.Medium||0)/totalScored*100)+'% dari total' : '—';
    document.getElementById('bs-low-pct').textContent  = totalScored ? Math.round((cnt.Low||0)/totalScored*100)+'% dari total' : '—';

    // DONUT
    buildDonut([
      { l:'Risiko Rendah', v: cnt.Low||0,          c:'#16a34a' },
      { l:'Risiko Sedang', v: cnt.Medium||0,       c:'#eab308' },
      { l:'Risiko Tinggi', v: cnt.High||0,         c:'#f97316' },
      { l:'Sangat Tinggi', v: cnt['Very High']||0, c:'#dc2626' },
    ]);

    // HAZARD TABLE
    renderHazardList(inspArr, scoreMap);

    // TOP 7
    renderTop7(inspArr, locs, scoreMap);

    // INSTRUMENT BAR
    renderInstBar(pts, sr[0]);

    // MAP
    renderMapInstruments(pts, inspArr, locs);

    // TREND CHART
    buildTrendChart(locs, insp);

    // PGA
    await loadPGA();

    // RECOMMENDATIONS
    renderRecs(inspArr, locs, master);

    // Last update
    document.getElementById('last-update').textContent = 'Update: ' + new Date().toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit'});

  } catch(e) { console.error('loadAll', e); }
}

function renderHazardList(inspArr, scoreMap) {
  const ord = ['Low','Medium','High','Very High'];
  const has = (d, pc) => (scoreMap[pc+'||'+(d[pc+'_condition']||'')] || 0) > 0;
  const rows = HZ_CATS.map(cat => {
    let count = 0, maxRisk = 'Low';
    inspArr.forEach(d => {
      if (cat.params.some(pc => has(d, pc))) {
        count++;
        const rl = d.risk_level || 'Low';                 // risk = yang disubmit checklist
        if (ord.indexOf(rl) > ord.indexOf(maxRisk)) maxRisk = rl;
      }
    });
    return { cat, count, maxRisk };
  });
  document.getElementById('hazard-list').innerHTML = rows.map(({cat,count,maxRisk}) => `
      <div class="hzr-row">
        <div class="hzr-icon">${cat.ic}</div>
        <div>
          <div class="hzr-name">${cat.label}</div>
          <div class="hzr-sub">${cat.sub}</div>
        </div>
        <div class="hzr-cnt">${count}</div>
        <span class="bdg ${RBG[maxRisk]||'bd'}">${(maxRisk||'—').toUpperCase()}</span>
      </div>`).join('');
}

function renderTop7(inspArr, locs, scoreMap) {
  const locMap = {}; locs.forEach(l=>locMap[l.id]=l);
  const sorted = [...inspArr].sort((a,b)=>(b.total_score||0)-(a.total_score||0)).slice(0,7);
  if (sorted.length) document.getElementById('top7-date').textContent = fmtD(sorted[0].inspection_date);
  document.getElementById('top7-table').innerHTML = sorted.map((d,i) => {
    const loc = locMap[d.location_id]||{};
    const has = (pc) => (scoreMap[pc+'||'+(d[pc+'_condition']||'')] || 0) > 0;
    const hazard = has('f2') ? 'Ground Failure' : (has('mv1')||has('mv2')||has('mv3')||has('crack')) ? 'Pergerakan' : has('f1') ? 'Geometri' : (has('piezo')||has('f8')) ? 'Air/Seepage' : has('f7') ? 'Ret. Wall' : (has('f3')||has('f4')) ? 'Timbunan' : (has('f5')||has('f6')) ? 'Elev/Dump' : 'Visual';
    const trend = d.total_score>30 ? ['↑','trend-up'] : d.total_score>15 ? ['→','trend-st'] : ['↓','trend-dn'];
    return `<tr>
      <td class="no-cell">${i+1}</td>
      <td style="font-family:var(--head);font-weight:600;color:var(--tx)">${(loc.name||'—').substring(0,15)}</td>
      <td style="color:var(--tx3);font-size:9px">${hazard}</td>
      <td><span class="bdg ${RBG[d.risk_level]||'bd'}">${(d.risk_level||'—').toUpperCase()}</span></td>
      <td class="${trend[1]}" style="font-size:14px;text-align:center">${trend[0]}</td>
    </tr>`;
  }).join('');
}

function renderInstBar(pts, lastShift) {
  const byType = {};
  pts.forEach(p => { if (!byType[p.remark]) byType[p.remark] = []; byType[p.remark].push(p); });
  const order = ['Prism','Sensor','Incl','Main Unit','AWD','PWP','RTS'];
  const bar = document.getElementById('inst-bar');
  bar.innerHTML = '';
  const shiftDate = lastShift?.submitted_at ? fmtD(lastShift.submitted_at) : '—';
  const shiftBy   = lastShift?.submitted_by || lastShift?.shift || '—';
  order.forEach(type => {
    if (!byType[type]) return;
    const arr = byType[type];
    const online = arr.filter(p=>p.status==='Online'||!p.status).length;
    const offline = arr.length - online;
    const cov = Math.round(online/arr.length*100);
    const ok = (cov === 100);
    const statusTxt = ok ? 'OK · Semua Online' : `${offline} alat perlu pengecekan`;
    const shape = INST_SHAPES[type] || INST_SHAPES.Prism;
    const dotCls = ok ? 'ok' : 'bad';
    const pillCls = ok ? 's-ok' : 's-bad';
    const dotColor = ok ? 'var(--g)' : 'var(--r)';
    const iconCol = ok ? '#475569' : 'var(--r)';
    bar.innerHTML += `
      <div class="inst-pill ${pillCls}" title="${type}">
        <div class="ip-svg"><svg width="20" height="20" viewBox="0 0 28 28">${shape(iconCol)}</svg></div>
        <div class="ip-dot ${dotCls}"></div>
        <div class="ip-tip">
          <div class="tip-title">
            <span style="display:inline-block;width:10px;height:10px;border-radius:50%;background:${dotColor}"></span>
            ${type} · Status
          </div>
          <div class="tip-row"><span class="tip-key">Total Titik</span><span class="tip-val">${arr.length}</span></div>
          <div class="tip-row"><span class="tip-key">Online</span><span class="tip-val" style="color:var(--g)">${online}</span></div>
          <div class="tip-row"><span class="tip-key">Offline / Check</span><span class="tip-val" style="color:${offline?'var(--r)':'var(--tx3)'}">${offline}</span></div>
          <div class="tip-row"><span class="tip-key">Coverage</span><span class="tip-val">${cov}%</span></div>
          <div class="tip-row"><span class="tip-key">Status</span><span class="tip-val" style="color:${dotColor}">${ok?'NORMAL':'PERHATIAN'}</span></div>
          <div class="tip-status-line">
            ${statusTxt}<br>
            Checklist akhir shift: <b style="color:var(--tx2)">${shiftDate}</b> · ${shiftBy}
          </div>
        </div>
      </div>`;
  });
}

function renderRecs(inspArr, locs, master) {
  const locMap = {}; locs.forEach(l=>locMap[l.id]=l);
  const sorted = [...inspArr].sort((a,b)=>(b.total_score||0)-(a.total_score||0));
  const recs = [];
  if (sorted[0]) {
    const l = locMap[sorted[0].location_id];
    recs.push({ ic:'⚠', cls:'ri-r', text: `Perkuat monitoring lereng <b>${l?.name||'—'}</b> yang menunjukkan tren peningkatan risiko (score: ${sorted[0].total_score}).` });
  }
  if (inspArr.some(d=>d.drainage_condition?.includes('Critical'))) {
    recs.push({ ic:'🔧', cls:'ri-o', text: 'Lakukan <b>scaling dan pembersihan</b> batu lepas pada area dengan critical drainage failure.' });
  }
  if (inspArr.some(d=>d.drainage_condition?.includes('Major')||d.drainage_condition?.includes('Moderate'))) {
    recs.push({ ic:'💧', cls:'ri-y', text: 'Perbaiki <b>sistem drainase</b> dan kontrol erosi pada lokasi dengan water/drainage issue.' });
  }
  recs.push({ ic:'✓', cls:'ri-g', text: 'Lanjutkan monitoring rutin dan validasi model stabilitas lereng secara berkala (ICMM/GISTM).' });

  document.getElementById('rec-panel').innerHTML = recs.slice(0,4).map((r,i) => `
    <div class="rec-item">
      <div class="rec-icon ${r.cls}">${r.ic}</div>
      <div class="rec-text"><span class="rec-num">${i+1}.</span>${r.text}</div>
    </div>`).join('');
}

// ═══ CLOCK ═══
function tick() {
  const n = new Date();
  document.getElementById('clock').innerHTML =
    n.toLocaleDateString('id-ID',{weekday:'short',day:'2-digit',month:'short'}) + '<br>' +
    n.toLocaleTimeString('id-ID',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}

// ═══ INIT ═══
document.addEventListener('DOMContentLoaded', () => {
  initMap();
  setInterval(tick, 1000); tick();
  loadAll();
  setInterval(loadAll, 60000);
});
</script>

function pgaDonovan(M,R){ return 1.096*Math.exp(0.664*M)*Math.pow(R+25,-1.55) }
function haversine(la1,lo1,la2,lo2){
  const R=6371,dL=(la2-la1)*Math.PI/180,dO=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.asin(Math.sqrt(a));
}
function hypoDist(e,d){ return Math.sqrt(e*e+d*d) }
function parseCoord(s,neg){ const n=parseFloat(s.replace(/[^0-9.]/g,'')); return s.includes(neg)?-n:n }
function tarpFromPga(p){ if(p<0.02)return'LV1'; if(p<0.05)return'LV2'; if(p<0.10)return'LV3'; return'LV4' }
function calcPGA(eq){
  const lat=parseCoord(eq.lintang,'LS'), lon=parseCoord(eq.bujur,'BB');
  const depth=parseFloat((eq.kedalaman||'10').replace(/[^0-9.]/g,''))||10;
  const M=parseFloat(eq.magnitude)||0;
  return SITES.map(s=>{ const re=haversine(lat,lon,s.lat,s.lon); return pgaDonovan(M,hypoDist(re,depth)) });
}

// ── WebSocket Realtime ────────────────────────────────────────────────────────
let wsHeartbeatTimer = null;

function wsSend(obj){
  if(ws && ws.readyState === WebSocket.OPEN){
    ws.send(JSON.stringify(obj));
  }
}

function connectWebSocket(){
  setBadge('connecting');
  if(wsReconnectTimer){ clearTimeout(wsReconnectTimer); wsReconnectTimer=null; }
  if(wsHeartbeatTimer){ clearInterval(wsHeartbeatTimer); wsHeartbeatTimer=null; }
  if(ws){ try{ ws.close() }catch(e){} ws=null; }

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    setBadge('live');
    wsRef = 1;

    // 1. Join channel realtime:*  (format Supabase Realtime v2)
    wsSend({
      topic: 'realtime:*',
      event: 'phx_join',
      payload: {
        config: {
          broadcast: { self: false },
          presence: { key: '' },
          postgres_changes: [
            { event: 'INSERT', schema: 'public', table: 'earthquakes' }
          ]
        },
        access_token: ANON_KEY
      },
      ref: String(wsRef++)
    });

    // 2. Heartbeat setiap 25 detik — client yang kirim, bukan reply
    wsHeartbeatTimer = setInterval(()=>{
      wsSend({ topic:'phoenix', event:'heartbeat', payload:{}, ref:String(wsRef++) });
    }, 25000);
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      console.log('WS MSG:', JSON.stringify(msg).slice(0, 300));

      // Server kirim phx_reply untuk heartbeat → abaikan saja (jangan kirim balik)
      if (msg.event === 'phx_reply') {
        if (msg.payload?.status === 'ok') {
          console.log('✅ Channel OK, ref:', msg.ref);
        }
        return;
      }

      // Server minta kita tutup → reconnect
      if (msg.event === 'phx_close' || msg.event === 'phx_error') {
        console.warn('Channel closed by server, reconnecting...');
        ws.close();
        return;
      }

      // Event postgres_changes INSERT dari Supabase Realtime v2
      // Struktur: msg.payload.data.record  ATAU  msg.payload.record (fallback)
      if (msg.event === 'postgres_changes' || msg.event === 'INSERT') {
        const record =
          msg.payload?.data?.record    ??  // format v2 standar
          msg.payload?.record          ??  // fallback beberapa versi
          msg.payload?.new             ??  // format lama
          null;

        if (record && record.magnitude) {
          console.log('🆕 New earthquake record:', record);
          const pgas = calcPGA(record);
          const tarp = tarpFromPga(Math.max(...pgas));
          const mag   = parseFloat(record.magnitude) || 0;
          const lokasi = (record.wilayah || '').slice(0, 35);
          showToast(`🌏 New Earthquake! M${mag} — ${lokasi} · TARP: ${tarp}`);
          flashStats();
          // Tandai baris baru di tabel setelah reload
          window._pendingNewEqId = record.id || null;
          window._isRealtimeUpdate = true;
          loadData();
        }
        return;
      }

      // Fallback: format lama Supabase (event = 'phx_reply' dengan type INSERT)
      const changes = msg.payload?.data;
      if (changes && changes.type === 'INSERT' && changes.record?.magnitude) {
        const record = changes.record;
        console.log('🆕 New earthquake (fallback):', record);
        const pgas = calcPGA(record);
        const tarp = tarpFromPga(Math.max(...pgas));
        showToast(`🌏 New Earthquake! M${record.magnitude} — ${(record.wilayah||'').slice(0,35)} · TARP: ${tarp}`);
        flashStats();
        loadData();
      }

    } catch(err){ console.warn('WS parse error:', err); }
  };

  ws.onclose = (ev) => {
    setBadge('offline');
    if(wsHeartbeatTimer){ clearInterval(wsHeartbeatTimer); wsHeartbeatTimer=null; }
    console.log(`WS closed (code ${ev.code}), reconnect in 5s…`);
    wsReconnectTimer = setTimeout(connectWebSocket, 5000);
  };

  ws.onerror = (err) => {
    console.warn('WS error:', err);
    setBadge('offline');
    ws.close(); // akan trigger onclose → reconnect
  };
}

// ── Format waktu WITA (UTC+8) ───────────────────────────────────────────────
// Kolom `tanggal` di DB bertipe timestamp tanpa timezone, isinya UTC.
// String dari Supabase: "2026-05-30T16:24:41" — browser salah anggap ini waktu lokal.
// Maka kita paksa baca sebagai UTC dulu, baru konversi ke WITA (UTC+8).
function toWITA(isoString, withSeconds=true){
  let s = String(isoString).trim();
  // Kalau tidak ada penanda timezone (Z atau +xx), tambahkan Z agar diparse sebagai UTC
  if(!/[zZ]|[+\-]\d{2}:?\d{2}$/.test(s)){
    s = s.replace(' ', 'T') + 'Z';
  }
  const dt = new Date(s);
  // Konversi ke WITA dengan menambah 8 jam pada nilai UTC
  const wita = new Date(dt.getTime() + 8*60*60*1000);
  const yy = wita.getUTCFullYear();
  const mm = String(wita.getUTCMonth()+1).padStart(2,'0');
  const dd = String(wita.getUTCDate()).padStart(2,'0');
  const hh = String(wita.getUTCHours()).padStart(2,'0');
  const mi = String(wita.getUTCMinutes()).padStart(2,'0');
  const ss = String(wita.getUTCSeconds()).padStart(2,'0');
  return withSeconds
    ? `${yy}-${mm}-${dd} ${hh}:${mi}:${ss} WITA`
    : `${yy}-${mm}-${dd} ${hh}:${mi} WITA`;
}

async function loadData(){

      fetch(`${SUPABASE_URL}/rest/v1/earthquakes?select=*&order=tanggal.desc&limit=50`,{headers:H}),
      fetch(`${SUPABASE_URL}/rest/v1/alert_logs?select=*&status=eq.pending`,{headers:H}),
      fetch(`${SUPABASE_URL}/rest/v1/earthquakes?select=id`,{headers:{...H, Prefer:'count=exact', Range:'0-0'}}),
    ]);
    const eqs=await eqRes.json();
    const logs=await logRes.json();
    // Ambil total count dari header Content-Range: "0-0/217"
    let totalCount = eqs.length;
    const cr = countRes.headers.get('content-range');
    if(cr && cr.includes('/')){ totalCount = parseInt(cr.split('/')[1]) || eqs.length; }

    markersLayer.forEach(m=>map.removeLayer(m)); markersLayer=[];

    let maxMag=0,maxMagLoc='',maxTarpOrder=0,maxTarpStr='LV1';

    const rows=[], eqData=[];

      if((tarpOrder[tarp]||0)>maxTarpOrder){maxTarpOrder=tarpOrder[tarp]; maxTarpStr=tarp}

            <tr><td style="color:#333;font-weight:600;padding:3px 8px 3px 0;white-space:nowrap">Time</td><td style="color:#111;font-weight:500">${dtPop}</td></tr>
            <tr><td style="color:#333;font-weight:600;padding:3px 8px 3px 0;white-space:nowrap">Region</td><td style="color:#111;font-weight:500">${eq.wilayah||'—'}</td></tr>

    // Highlight baris baru jika ada event realtime masuk
    if(window._pendingNewEqId){
      const newIdx = eqData.findIndex(d => d.eq.id === window._pendingNewEqId);
      if(newIdx >= 0){
        const newRow = document.querySelector(`#eq-tbody tr[data-idx="${newIdx}"]`);
        if(newRow) newRow.classList.add('new-row');
      } else {
        // fallback: baris pertama (paling baru)
        document.querySelector('#eq-tbody tr')?.classList.add('new-row');
      }
      window._pendingNewEqId = null;
    }
    document.getElementById('last-update').textContent='Updated: '+toWITA(new Date().toISOString()).split(' ').slice(1).join(' ');

    if(eqData.length>0){
      const f=eqData[0];
      showDetail(f.eq,f.pgaA,f.pgaB,f.tarp);
      document.querySelector('#eq-tbody tr')?.classList.add('active');

      // Auto-zoom ke event terbaru
      const lat=parseCoord(f.eq.lintang,'LS'), lon=parseCoord(f.eq.bujur,'BB');
      const zoomLevel = window._isRealtimeUpdate ? 8 : 6;
      map.setView([lat,lon], zoomLevel, {animate:true, duration:1.2});

      // Isi panel "Latest Earthquake" tetap di kiri-bawah (tidak lagi popup mengikuti dot)
      fillLatestPanel(f.eq, f.pgaA, f.pgaB, f.tarp);
      window._isRealtimeUpdate = false;
    }
  } catch(e){
    document.getElementById('eq-tbody').innerHTML=`<tr class="loading-row"><td colspan="10">Error: ${e.message}</td></tr>`;
  }
}

function onRowClick(idx){
  const d=window._eqData?.[idx]; if(!d)return;
  showDetail(d.eq,d.pgaA,d.pgaB,d.tarp);
  document.querySelectorAll('#eq-tbody tr').forEach((r,j)=>r.classList.toggle('active',j===idx));
  const lat=parseCoord(d.eq.lintang,'LS'), lon=parseCoord(d.eq.bujur,'BB');
  map.setView([lat,lon],7,{animate:true});
}

// ── Digital Clock ────────────────────────────────────────────────────────────
const HARI = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const BULAN = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
function updateClock(){
  // Selalu tampilkan WITA (UTC+8) terlepas dari timezone device
  const now = new Date();
  const wita = new Date(now.getTime() + (now.getTimezoneOffset()*60000) + 8*60*60*1000);
  const hh = String(wita.getHours()).padStart(2,'0');
  const mm = String(wita.getMinutes()).padStart(2,'0');
  const ss = String(wita.getSeconds()).padStart(2,'0');
  const hari = HARI[wita.getDay()];
  const tgl = wita.getDate();
  const bln = BULAN[wita.getMonth()];
  const thn = wita.getFullYear();
  document.getElementById('clock-time').textContent = `${hh}:${mm}:${ss} WITA`;
  document.getElementById('clock-day').textContent  = `${hari}, ${tgl} ${bln} ${thn}`;
}

// ── Start ─────────────────────────────────────────────────────────────────────
function startApp(){
  if(typeof L==='undefined'){ setTimeout(startApp,100); return; }
  initMap();
  initLatestToggle();
  loadData();
  connectWebSocket();
  updateClock();
  setInterval(updateClock, 1000);
  // Fallback polling setiap 60 detik kalau WebSocket mati
  setInterval(()=>{ if(!ws||ws.readyState!==1){ loadData(); } }, 60000);
}
document.addEventListener('DOMContentLoaded', startApp);
</script>

// ========================= HAVERSINE =========================
function utmToLatLng(e,n){
  const a=6378137, eccSq=0.00669438, k0=0.9996;
  const x=e-500000, y=n-10000000, M=y/k0;
  const mu=M/(a*(1-eccSq/4-3*eccSq*eccSq/64));
  const e1=(1-Math.sqrt(1-eccSq))/(1+Math.sqrt(1-eccSq));
  const phi1=mu+(3*e1/2-27*e1**3/32)*Math.sin(2*mu)+(21*e1**2/16-55*e1**4/32)*Math.sin(4*mu)+(151*e1**3/96)*Math.sin(6*mu);
  const N1=a/Math.sqrt(1-eccSq*Math.sin(phi1)**2), T1=Math.tan(phi1)**2;
  const C1=(eccSq/(1-eccSq))*Math.cos(phi1)**2;
  const R1=a*(1-eccSq)/(1-eccSq*Math.sin(phi1)**2)**1.5, D=x/(N1*k0);
  const lat=phi1-(N1*Math.tan(phi1)/R1)*(D*D/2-(5+3*T1+10*C1-4*C1*C1-9*eccSq)*D**4/24+(61+90*T1+298*C1+45*T1*T1-252*eccSq-3*C1*C1)*D**6/720);
  const lng=(123*Math.PI/180)+(D-(1+2*T1+C1)*D**3/6+(5-2*C1+28*T1-3*C1*C1+8*eccSq+24*T1*T1)*D**5/120)/Math.cos(phi1);
  return {lat:lat*180/Math.PI, lng:lng*180/Math.PI};
}
function haversineM(lat1,lng1,lat2,lng2){
  const R=6371000,r=d=>d*Math.PI/180,dLat=r(lat2-lat1),dLng=r(lng2-lng1);
  const a=Math.sin(dLat/2)**2+Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLng/2)**2;
  return 2*R*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function geoStatus(dist,onR,nearR){
  if(dist<=onR) return {s:"On Location",c:"#34d399"};
  if(dist<=nearR) return {s:"Near Location",c:"#fbbf24"};
  return {s:"Off Location",c:"#f87171"};
}

function Validate({ sb, params, criteria, pending, loading, reload, afterAction }){
  const [sel, setSel] = useState(null);
  const [note, setNote] = useState("");
  const [busy, setBusy] = useState(false);
  const colOf = (code)=> code+"_condition";
  const isInstr = (code)=> /^(mv|piezo|crack|accel)/.test(code);
  const open = (row)=>{ setSel({...row}); setNote(row.review_note||""); };
  const close = ()=>{ setSel(null); setNote(""); };
  const refetch = async (id)=>{ const { data } = await sb.from("inspections").select("*, locations(name,area_code)").eq("id",id).single(); if(data) setSel(s=>({ ...s, ...data })); };
  const conditionsBody = ()=>{ const b={}; params.forEach(p=>{ b[colOf(p.code)]=sel[colOf(p.code)]||"-"; }); return b; };
  const overrideBody = ()=>({ risk_override: sel.risk_override||null, override_reason: sel.risk_override ? (sel.override_reason||null) : null });
  const saveOnly = async ()=>{ setBusy(true);
    try{ const { error } = await sb.from("inspections").update({...conditionsBody(), ...overrideBody()}).eq("id",sel.id); if(error) throw error; await refetch(sel.id); }
    catch(e){ alert(e.message); } finally{ setBusy(false); } };
  const decide = async (status)=>{
    if(status==="approved" && sel.risk_override && !((sel.override_reason||"").trim())){ alert("Alasan override wajib diisi sebelum approve."); return; }
    setBusy(true);
    try{ const body = status==="approved" ? {...conditionsBody(), ...overrideBody(), approval_status:"approved", review_note:note||null} : { approval_status:"rejected", review_note:note||null };
      const { error } = await sb.from("inspections").update(body).eq("id",sel.id); if(error) throw error; close(); await afterAction(); }
    catch(e){ alert(e.message); } finally{ setBusy(false); } };

  return (
    <div style={{ maxWidth:1080, margin:"0 auto", padding:"24px 22px" }}>
      <div className="row" style={{ justifyContent:"space-between", marginBottom:16 }}>
        <div>
          <div className="disp" style={{ fontSize:20, fontWeight:800, color:"#f1f5f9" }}>Validasi Inspeksi</div>
          <div className="mono" style={{ fontSize:11, color:"var(--mut)" }}>Checklist menunggu verifikasi · approve agar tampil di dashboard</div>
        </div>
        <button className="btn" onClick={reload}><Icon name="layers" size={14}/> Refresh</button>
      </div>
      {loading ? <Center><div className="spin"/></Center> :
        pending.length===0 ? (
          <div className="panel" style={{ padding:40, textAlign:"center" }}>
            <div className="disp" style={{ fontSize:16, color:"var(--txt2)", marginBottom:6 }}>Tidak ada yang menunggu validasi</div>
            <div className="mono" style={{ fontSize:12, color:"var(--mut)" }}>Semua inspeksi sudah diproses.</div>
          </div>
        ) : (
        <div style={{ display:"flex", flexDirection:"column", gap:8 }}>
          {pending.map(r=>{ const bd=RISK[r.risk_final]||RISK.Low; return (
            <button key={r.id} className="panel" onClick={()=>open(r)}
              style={{ textAlign:"left", padding:"12px 14px", display:"flex", alignItems:"center", gap:12, cursor:"pointer", color:"inherit" }}>
              <div style={{ width:4, height:40, background:bd.c, borderRadius:4 }}/>
              <div style={{ flex:1, minWidth:0 }}>
                <div className="row" style={{ gap:8 }}>
                  <span style={{ color:"#f1f5f9", fontWeight:600 }}>{r.locations?.name||"—"}</span>
                  <span className="mono" style={{ fontSize:10, color:"var(--mut)" }}>{r.locations?.area_code||""}</span>
                </div>
                <div className="mono" style={{ fontSize:11, color:"var(--mut)", marginTop:2 }}>{r.inspection_date} · {r.inspector||"—"}</div>
              </div>
              <span className="pill" style={{ color:"#fbbf24", background:"rgba(251,191,36,.12)", border:"1px solid rgba(251,191,36,.4)" }}>PENDING</span>
              <Pill level={r.risk_final}/>
              <Tarp n={r.tarp_level}/>
              <Icon name="chev" size={16} color="#475569"/>
            </button> ); })}
        </div>
      )}
      {sel && <ValidateDrawer sel={sel} setSel={setSel} note={note} setNote={setNote} busy={busy}
        params={params} criteria={criteria} isInstr={isInstr} colOf={colOf}
        onClose={close} onSave={saveOnly} onDecide={decide} />}
    </div>
  );
}

function ValidateDrawer({ sel, setSel, note, setNote, busy, params, criteria, isInstr, colOf, onClose, onSave, onDecide }){
  const bd = RISK[sel.risk_final]||RISK.Low;
  const optsFor = (code)=>{ const list=["-"].concat((criteria[code]||[]).map(c=>c.condition_label)); const cur=sel[colOf(code)]; if(cur&&list.indexOf(cur)<0) list.push(cur); return list; };
  const setCond = (code,val)=> setSel(s=>({ ...s, [colOf(code)]:val }));
  const group = (instr)=> params.filter(p=> isInstr(p.code)===instr);
  const Box = ({label,level})=> { const r=RISK[level]||RISK.Low; return (
    <div style={{ flex:1, background:"var(--panel)", border:`1px solid ${r.b}`, borderRadius:9, padding:"9px 8px", textAlign:"center" }}>
      <div className="mono" style={{ fontSize:9, color:"var(--mut)", letterSpacing:".08em" }}>{label}</div>
      <div className="disp" style={{ fontSize:13, fontWeight:700, color:r.c, marginTop:4 }}>{level}</div></div>); };
  return (
    <div onClick={onClose} style={{ position:"fixed", inset:0, zIndex:40, background:"rgba(3,6,12,.65)", display:"flex", justifyContent:"flex-end" }}>
      <div onClick={e=>e.stopPropagation()} style={{ width:480, maxWidth:"100%", height:"100%", overflowY:"auto", background:"#0c121d", borderLeft:`1px solid ${bd.b}` }}>
        <div style={{ padding:"18px 20px", borderBottom:"1px solid var(--line)", position:"sticky", top:0, background:"#0c121d", zIndex:2 }}>
          <div className="row" style={{ justifyContent:"space-between", alignItems:"flex-start" }}>
            <div>
              <div className="mono" style={{ fontSize:10, color:"var(--mut)" }}>INSPEKSI #{sel.id} · {sel.inspection_date}</div>
              <div className="disp" style={{ fontSize:18, fontWeight:800, color:"#f1f5f9" }}>{sel.locations?.name||"—"}</div>
              <div className="mono" style={{ fontSize:11, color:"var(--mut)" }}>{sel.locations?.area_code||""} · {sel.inspector||"—"}</div>
            </div>
            <button onClick={onClose} className="btn" style={{ padding:8 }}><Icon name="x" size={18}/></button>
          </div>
        </div>
        <div style={{ padding:"16px 20px 30px" }}>
          <div className="row" style={{ gap:6, alignItems:"stretch" }}>
            <Box label="COMPOSITE" level={sel.risk_composite}/>
            <div style={{ display:"flex", alignItems:"center", color:"var(--mut)" }}>⊔</div>
            <Box label="FLOOR · T1" level={sel.risk_floor}/>
            <div style={{ display:"flex", alignItems:"center", color:"var(--mut)" }}>→</div>
            <Box label="MODEL" level={sel.risk_model||sel.risk_final}/>
          </div>
          <div className="mono" style={{ fontSize:11, color:"var(--mut)", marginTop:8 }}>Skor {sel.total_score} · model = MAX(composite, floor){sel.risk_corroboration?" + koroborasi":""}</div>

          <div style={{ marginTop:14, padding:"12px", borderRadius:9, border:`1px dashed ${(RISK[sel.risk_override||sel.risk_model||sel.risk_final]||RISK.Low).b}`, background:"rgba(255,255,255,.02)" }}>
            <label>Override risk akhir · penilaian engineer</label>
            <div className="row" style={{ gap:8 }}>
              <select value={sel.risk_override||""} onChange={e=>setSel(s=>({...s, risk_override:e.target.value}))} style={{ flex:1 }}>
                <option value="">Ikuti model ({sel.risk_model||sel.risk_final})</option>
                <option value="Low">Low</option>
                <option value="Medium">Medium</option>
                <option value="High">High</option>
                <option value="Very High">Very High</option>
              </select>
              <span style={{ whiteSpace:"nowrap", display:"inline-flex", alignItems:"center", gap:6 }}>→ <Pill level={sel.risk_override||sel.risk_model||sel.risk_final}/></span>
            </div>
            {sel.risk_override ? (
              <div style={{ marginTop:10 }}>
                <label>Alasan override (wajib)</label>
                <textarea value={sel.override_reason||""} onChange={e=>setSel(s=>({...s, override_reason:e.target.value}))} rows={2}
                  style={{ width:"100%", background:"var(--panel)", border:"1px solid var(--line2)", color:"var(--txt)", borderRadius:7, padding:"8px 10px", fontFamily:"inherit", fontSize:13 }}
                  placeholder="mis. crack lama sudah stabil, monitoring tidak menunjukkan pergerakan…"/>
              </div>
            ) : null}
            <div className="mono" style={{ fontSize:10, color:"var(--mut)", marginTop:8 }}>Nilai yang dikirim ke dashboard = override (jika diisi), kalau tidak = model.</div>
          </div>

          <div className="mono" style={{ fontSize:10, color:"var(--mut)", letterSpacing:".12em", margin:"20px 0 8px" }}>PARAMETER VISUAL</div>
          {group(false).map(p=>(
            <div key={p.code} style={{ marginBottom:10 }}>
              <label>{p.label} {Number(p.tier)===1?<span style={{color:"#f87171"}}>· T1</span>:null}</label>
              <select value={sel[colOf(p.code)]||"-"} onChange={e=>setCond(p.code,e.target.value)}>
                {optsFor(p.code).map(o=><option key={o} value={o}>{o}</option>)}
              </select>
            </div>
          ))}
          <div className="mono" style={{ fontSize:10, color:"var(--mut)", letterSpacing:".12em", margin:"18px 0 8px" }}>INSTRUMENTASI</div>
          {group(true).map(p=>(
            <div key={p.code} style={{ marginBottom:10 }}>
              <label>{p.label} {Number(p.tier)===1?<span style={{color:"#f87171"}}>· T1</span>:null}</label>
              <select value={sel[colOf(p.code)]||"-"} onChange={e=>setCond(p.code,e.target.value)}>
                {optsFor(p.code).map(o=><option key={o} value={o}>{o}</option>)}
              </select>
            </div>
          ))}

          <label style={{ marginTop:16 }}>Catatan validasi (opsional)</label>
          <textarea value={note} onChange={e=>setNote(e.target.value)} rows={3}
            style={{ width:"100%", background:"var(--panel)", border:"1px solid var(--line2)", color:"var(--txt)", borderRadius:7, padding:"9px 10px", fontFamily:"inherit", fontSize:13 }}
            placeholder="mis. verifikasi lapangan OK / minta re-inspeksi…"/>

          <div style={{ display:"flex", gap:8, marginTop:16 }}>
            <button className="btn" disabled={busy} onClick={onSave} title="Simpan perubahan kondisi & hitung ulang (tetap pending)">Simpan</button>
            <button className="btn" disabled={busy} onClick={()=>onDecide("rejected")} style={{ color:"#f87171", borderColor:"rgba(248,113,113,.5)" }}>Reject</button>
            <button className="btn primary" disabled={busy} onClick={()=>onDecide("approved")} style={{ flex:1, justifyContent:"center", background:"#0d9488", borderColor:"#0d9488", color:"#04201d" }}>{busy?"…":"Approve"}</button>
          </div>
        </div>
      </div>
    </div>
  );
}

function Inspect({ params, criteria, bands, locations, onSave, sb }){
  const [locId, setLocId] = useState("");
  const [inspector, setInspector] = useState("");
  const [status, setStatus] = useState("OPEN");
  const init = useMemo(() => {
    const o = {}; params.forEach(p => { o[p.code] = (criteria[p.code]?.[0]||{}).condition_label || null; }); return o;
  }, [params, criteria]);
  const [cond, setCond] = useState(init);
  useEffect(()=>setCond(init), [init]);
  const [busy, setBusy] = useState(false);

  // GPS state
  const [geo, setGeo] = useState(null);   // {lat,lng,accuracy,time}
  const [geoMsg, setGeoMsg] = useState("");
  const [geoLoading, setGeoLoading] = useState(false);

  // Photo state
  const [photos, setPhotos] = useState([]);  // [{file,url}]
  const [uploading, setUploading] = useState(false);
  const fileRef = React.useRef();

  // Current location config
  const locConfig = useMemo(()=>locations.find(l=>String(l.id)===String(locId)), [locations,locId]);

  // Geo validation
  const target = useMemo(()=>{
    if(!locConfig) return null;
    if(locConfig.lat && locConfig.lng) return {lat:+locConfig.lat, lng:+locConfig.lng};
    if(locConfig.easting && locConfig.northing) return utmToLatLng(+locConfig.easting, +locConfig.northing);
    return null;
  },[locConfig]);
  const geoVal = useMemo(()=>{
    if(!geo||!target) return null;
    const dist=haversineM(geo.lat,geo.lng,target.lat,target.lng);
    return {...geoStatus(dist, locConfig.on_radius_m||50, locConfig.near_radius_m||150), dist:Math.round(dist)};
  },[geo,target,locConfig]);

  const [manual, setManual] = useState(false);
  const [mLat, setMLat] = useState("");
  const [mLng, setMLng] = useState("");

  const onPos = (pos) => {
    setGeo({ lat:pos.coords.latitude, lng:pos.coords.longitude,
             accuracy:Math.round(pos.coords.accuracy||0), time:new Date(pos.timestamp).toISOString() });
    setGeoMsg(""); setGeoLoading(false);
  };
  const errText = (err) => {
    if(err.code===1) return "Izin lokasi ditolak. iPhone: Settings → Privacy & Security → Location Services → ON, lalu cari Safari → 'While Using'. Lalu reload halaman.";
    if(err.code===2) return "Lokasi tidak tersedia. Pastikan GPS/Location Services aktif & sinyal cukup (coba di luar ruangan).";
    if(err.code===3) return "Waktu habis mencari sinyal GPS. Coba lagi, atau gunakan 'Input manual'.";
    return "Gagal mengambil lokasi: " + (err.message||"unknown");
  };
  const getGeo = () => {
    if(!locId){ setGeoMsg("Pilih lokasi target dulu."); return; }
    if(!navigator.geolocation || !window.isSecureContext){
      setGeoMsg("Geolocation butuh HTTPS / browser pendukung. Gunakan 'Input manual'."); setManual(true); return;
    }
    setGeoLoading(true); setGeoMsg("Mencari sinyal GPS… (iPhone bisa 10–20 detik, mohon tunggu)");
    // Tahap 1: akurasi tinggi
    navigator.geolocation.getCurrentPosition(onPos, (e1)=>{
      if(e1.code===1){ setGeoMsg(errText(e1)); setGeoLoading(false); return; }   // ditolak: tak perlu retry
      // Tahap 2: fallback akurasi rendah + boleh cache 60 dtk (lebih andal di iOS)
      setGeoMsg("Mencoba ulang dengan akurasi standar…");
      navigator.geolocation.getCurrentPosition(onPos, (e2)=>{
        setGeoMsg(errText(e2)); setGeoLoading(false); setManual(true);
      }, { enableHighAccuracy:false, timeout:20000, maximumAge:60000 });
    }, { enableHighAccuracy:true, timeout:12000, maximumAge:0 });
  };
  const useManual = () => {
    const la=parseFloat(mLat), ln=parseFloat(mLng);
    if(isNaN(la)||isNaN(ln)||la< -90||la>90||ln< -180||ln>180){ setGeoMsg("Koordinat manual tidak valid."); return; }
    setGeo({ lat:la, lng:ln, accuracy:null, time:new Date().toISOString(), manual:true }); setGeoMsg("");
  };

  // Photo handlers
  const addPhotos = (files) => {
    const newP = Array.from(files).map(f=>({file:f, url:URL.createObjectURL(f)}));
    setPhotos(p=>[...p, ...newP]);
  };
  const removePhoto = (idx) => setPhotos(p=>p.filter((_,i)=>i!==idx));

  // Governing score helpers (mirrors SQL trigger logic in browser)
  const TIER1 = {mv1:true,mv2:true,mv3:true,piezo:true,crack:true,f2:true,f7:true};
  const WATER = "f8";
  const FLOORS = {Low:1,Medium:2,High:3,"Very High":4};
  const FLOOR_REV = {1:"Low",2:"Medium",3:"High",4:"Very High"};
  const scoreOf = (code,label) => (criteria[code]||[]).find(x=>x.condition_label===label)?.score || 0;
  const floorOf = (code,label) => { const o=(criteria[code]||[]).find(x=>x.condition_label===label); return FLOORS[o?.tier1_floor]||1; };

  const computed = useMemo(()=>{
    let total=0, floor=1;
    params.forEach(p=>{ total+=scoreOf(p.code,cond[p.code]); });
    Object.keys(TIER1).forEach(c=>{ floor=Math.max(floor,floorOf(c,cond[c])); });
    // f8 water: cap at Medium (2)
    floor=Math.max(floor, Math.min(2, floorOf(WATER, cond[WATER])));
    const composite = total<=10?1:total<=30?2:total<=60?3:4;
    let finalOrd = Math.max(composite,floor);
    // corroboration
    const instrT1 = Math.max(...["mv1","mv2","mv3","piezo","crack"].map(c=>floorOf(c,cond[c])))>=2;
    const visT1 = floorOf("f2",cond["f2"])>=2;
    const corr = instrT1&&visT1;
    if(corr) finalOrd=Math.min(4,finalOrd+1);
    const level=FLOOR_REV[finalOrd];
    const bd=bandOf(bands,total);
    return {total,level,tarp:finalOrd,corr,composite:FLOOR_REV[composite],floor:FLOOR_REV[floor],bd};
  },[cond,params,criteria,bands]);

  const rcolor = RISK[computed.level] || RISK.Low;
  const active = params.map(p=>({p,score:scoreOf(p.code,cond[p.code])})).filter(x=>x.score>0);
  const offLoc = !!(geoVal && geoVal.s === "Off Location");
  const valid = locId && inspector.trim() && geo && !offLoc;

  const save = async () => {
    setBusy(true);
    const payload = {
      location_id:Number(locId),
      inspection_date:new Date().toISOString().slice(0,10),
      inspector:inspector.trim(), status,
      inspector_lat:geo?.lat, inspector_lng:geo?.lng,
      inspector_accuracy_m:geo?.accuracy,
      geo_validation:(geo?.manual ? ((geoVal?.s||"Manual")+" (manual)") : (geoVal?.s||"Tidak tervalidasi")),
      geo_time:geo?.time||null,
    };
    params.forEach(p => payload[`${p.code}_condition`] = cond[p.code]);

    // upload photos to Supabase Storage then save inspection
    let photoUrls=[];
    if(photos.length>0 && sb){
      setUploading(true);
      for(const ph of photos){
        const ext=ph.file.name.split(".").pop();
        const path=`inspections/${Date.now()}_${Math.random().toString(36).slice(2)}.${ext}`;
        const {error:ue}=await sb.storage.from("inspection-photos").upload(path,ph.file,{upsert:false});
        if(!ue) photoUrls.push(path);
      }
      setUploading(false);
    }

    const ok = await onSave(payload);
    if(ok && photoUrls.length>0 && sb){
      const {data:ins}=await sb.from("inspections").select("id").eq("location_id",payload.location_id).order("id",{ascending:false}).limit(1).single();
      if(ins) for(const p of photoUrls) await sb.from("inspection_photos").insert({inspection_id:ins.id,storage_path:p});
    }
    setBusy(false);
  };

  const instr = params.filter(p=>p.category==="instrumentation");
  const vis = params.filter(p=>p.category==="visual");
  const Field = ({ p }) => (
    <div>
      <label>{p.label}{p.tier===1&&<span style={{color:"#fb923c",fontSize:10,marginLeft:4}}>T1</span>}</label>
      <select value={cond[p.code]||""} onChange={e=>setCond(c=>({...c,[p.code]:e.target.value}))}>
        {(criteria[p.code]||[]).map(o => <option key={o.condition_label} value={o.condition_label}>{o.condition_label}{o.score?`  (+${o.score})`:""}</option>)}
      </select>
    </div>
  );

  return (
    <div className="inspect-grid" style={{ maxWidth:1080, margin:"0 auto", padding:"24px 22px" }}>
      <div style={{ display:"flex", flexDirection:"column", gap:18 }}>

        {/* SITE */}
        <section className="panel" style={{ padding:18 }}>
          <div className="mono" style={{ fontSize:11, color:"var(--mut)", letterSpacing:".12em", marginBottom:14 }}>SITE &amp; INSPECTION</div>
          <div className="grid2">
            <div><label>Location</label>
              <select value={locId} onChange={e=>{setLocId(e.target.value);setGeo(null);setGeoMsg("");setManual(false);setMLat("");setMLng("");}}>
                <option value="">— select —</option>
                {locations.map(l => <option key={l.id} value={l.id}>{l.name}</option>)}
              </select></div>
            <div><label>Inspector</label><input value={inspector} onChange={e=>setInspector(e.target.value)} placeholder="Name…" /></div>
            <div><label>Status</label>
              <select value={status} onChange={e=>setStatus(e.target.value)}>{["OPEN","IN PROGRESS","CLOSED"].map(s=><option key={s}>{s}</option>)}</select></div>
          </div>
        </section>

        {/* GPS VALIDATION */}
        <section className="panel" style={{ padding:18 }}>
          <div className="mono" style={{ fontSize:11, color:"var(--mut)", letterSpacing:".12em", marginBottom:12 }}>VALIDASI LOKASI GPS</div>
          <div className="row" style={{ gap:10, flexWrap:"wrap" }}>
            <button className="btn" onClick={getGeo} disabled={geoLoading} style={{ flex:"0 0 auto" }}>
              {geoLoading?"Mengambil…":"📍 Ambil Koordinat"}
            </button>
            <button className="btn" onClick={()=>setManual(m=>!m)} style={{ flex:"0 0 auto" }}>
              {manual?"Tutup manual":"⌨ Input manual"}
            </button>
            {geo && <div className="mono" style={{ fontSize:11, color:"var(--txt2)" }}>
              {geo.lat.toFixed(5)}, {geo.lng.toFixed(5)}{geo.accuracy!=null?` ±${geo.accuracy}m`:""}{geo.manual?" (manual)":""}
            </div>}
            {geoVal && <span className="mono" style={{ fontSize:12, fontWeight:700, color:geoVal.c }}>
              {geoVal.s} ({geoVal.dist}m)
            </span>}
            {!geo && !geoLoading && <span className="mono" style={{ fontSize:11, color:"#f87171" }}>
              ⚠ GPS wajib diisi sebelum simpan
            </span>}
          </div>
          {manual && <div className="row" style={{ gap:8, marginTop:10, flexWrap:"wrap", alignItems:"flex-end" }}>
            <div><label style={{fontSize:11}}>Latitude</label><input value={mLat} onChange={e=>setMLat(e.target.value)} placeholder="-2.7xxxx" inputMode="decimal" style={{width:130}}/></div>
            <div><label style={{fontSize:11}}>Longitude</label><input value={mLng} onChange={e=>setMLng(e.target.value)} placeholder="122.0xxxx" inputMode="decimal" style={{width:130}}/></div>
            <button className="btn" onClick={useManual}>Pakai koordinat ini</button>
          </div>}
          {geoMsg && <div className="mono" style={{ fontSize:11, color:"#f87171", marginTop:6 }}>{geoMsg}</div>}
          {geo && target===null && <div className="mono" style={{ fontSize:11, color:"var(--mut)", marginTop:6 }}>
            ℹ Koordinat lokasi target belum diset di tabel locations — validasi jarak tidak tersedia.
          </div>}
          {geo && <a href={`https://maps.google.com/?q=${geo.lat},${geo.lng}`} target="_blank" rel="noreferrer"
            style={{ fontSize:11, marginTop:6, display:"inline-block" }}>Buka di Google Maps ↗</a>}
        </section>

        {/* PHOTOS */}
        <section className="panel" style={{ padding:18 }}>
          <div className="mono" style={{ fontSize:11, color:"var(--mut)", letterSpacing:".12em", marginBottom:12 }}>FOTO TEMUAN</div>
          <div className="row" style={{ gap:10, flexWrap:"wrap", marginBottom:10 }}>
            <button className="btn" onClick={()=>fileRef.current?.click()}>📷 Ambil / Pilih Foto</button>
            <input ref={fileRef} type="file" accept="image/*" multiple capture="environment"
              style={{ display:"none" }} onChange={e=>addPhotos(e.target.files)} />
            <span className="mono" style={{ fontSize:11, color:"var(--mut)" }}>{photos.length} foto terpilih</span>
          </div>
          {photos.length>0 && <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
            {photos.map((ph,i)=>(
              <div key={i} style={{ position:"relative", width:80, height:80 }}>
                <img src={ph.url} alt="foto" style={{ width:80, height:80, objectFit:"cover", borderRadius:6, border:"1px solid var(--line2)" }}/>
                <button onClick={()=>removePhoto(i)}
                  style={{ position:"absolute", top:2, right:2, background:"rgba(0,0,0,.7)", border:"none", borderRadius:"50%", width:18, height:18, color:"#fff", fontSize:12, cursor:"pointer", lineHeight:1, display:"flex", alignItems:"center", justifyContent:"center" }}>×</button>
              </div>
            ))}
          </div>}
          {uploading && <div className="mono" style={{ fontSize:11, color:"var(--mut)", marginTop:6 }}>Mengupload foto…</div>}
        </section>

        {/* INSTRUMENT */}
        <section className="panel" style={{ padding:18 }}>
          <div className="mono" style={{ fontSize:11, color:"var(--mut)", letterSpacing:".12em", marginBottom:14 }}>INSTRUMENTATION SCORING</div>
          <div className="grid2">{instr.map(p=><Field key={p.code} p={p}/>)}</div>
        </section>

        {/* VISUAL */}
        <section className="panel" style={{ padding:18 }}>
          <div className="mono" style={{ fontSize:11, color:"var(--mut)", letterSpacing:".12em", marginBottom:14 }}>VISUAL INSPECTION</div>
          <div className="grid2">{vis.map(p=><Field key={p.code} p={p}/>)}</div>
        </section>
      </div>

      {/* LIVE SCORE PANEL */}
      <div style={{ position:"sticky", top:90, height:"fit-content" }}>
        <div className="panel" style={{ padding:18, background:rcolor.bg, borderColor:rcolor.b }}>
          <div className="mono" style={{ fontSize:11, color:"var(--txt2)", letterSpacing:".12em", marginBottom:8 }}>LIVE RISK SCORE</div>
          <div className="row" style={{ alignItems:"flex-end", gap:12 }}>
            <span className="disp" style={{ fontSize:56, fontWeight:800, color:rcolor.c, lineHeight:.9 }}>{computed.total}</span>
            <div style={{ marginBottom:4 }}><Pill level={computed.level}/><div className="row mono" style={{ gap:5, fontSize:11, color:"var(--mut)", marginTop:5 }}>TARP <Tarp n={computed.tarp}/></div></div>
          </div>
          {computed.corr && <div className="mono" style={{ fontSize:10, color:"#fbbf24", marginTop:6 }}>⚡ Corroboration +1: visual + instrument Tier 1 aktif</div>}
          <div className="mono" style={{ fontSize:10, color:"var(--mut)", marginTop:4 }}>Floor: {computed.floor} · Composite: {computed.composite}</div>
          <p style={{ color:rcolor.c, fontSize:12, marginTop:10, lineHeight:1.5 }}>{computed.bd?.action}</p>
        </div>
        <div className="panel" style={{ padding:14, marginTop:12 }}>
          <div className="mono" style={{ fontSize:10, color:"var(--mut)", letterSpacing:".12em", marginBottom:6 }}>FINDINGS · {active.length}</div>
          {active.map(a => (
            <div key={a.p.code} className="row" style={{ justifyContent:"space-between", padding:"3px 0", fontSize:12 }}>
              <span style={{ color:"var(--txt2)", overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap", paddingRight:8 }}>{a.p.label}</span>
              <span className="mono" style={{ color:rcolor.c, fontWeight:700 }}>+{a.score}</span>
            </div>
          ))}
          {active.length===0 && <div style={{ color:"var(--mut)", fontSize:12 }}>No contributing findings.</div>}
        </div>
        {!geo && <div style={{ background:"rgba(248,113,113,.1)", border:"1px solid rgba(248,113,113,.4)", borderRadius:8, padding:"8px 12px", marginTop:12 }}>
          <span className="mono" style={{ fontSize:11, color:"#f87171" }}>⚠ GPS belum diambil — wajib sebelum simpan</span>
        </div>}
        {offLoc && <div style={{ background:"rgba(248,113,113,.1)", border:"1px solid rgba(248,113,113,.4)", borderRadius:8, padding:"8px 12px", marginTop:12 }}>
          <span className="mono" style={{ fontSize:11, color:"#f87171" }}>⛔ Off Location ({geoVal.dist}m dari titik) — terlalu jauh, inspeksi tidak bisa disimpan. Pastikan kamu berada di lokasi.</span>
        </div>}
        <button className="btn primary" style={{ width:"100%", justifyContent:"center", marginTop:12 }}
          disabled={!valid||busy||uploading} onClick={save}>
          <Icon name="plus" size={15}/>{busy?"Saving…":uploading?"Uploading…":"Save Inspection"}
        </button>
        <p className="mono" style={{ fontSize:10, color:"var(--mut)", marginTop:8, textAlign:"center", lineHeight:1.5 }}>
          GPS wajib · Governing-trigger scoring · T1 = Tier 1
        </p>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
