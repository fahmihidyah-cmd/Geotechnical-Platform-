<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050b16">
<link rel="manifest" href="manifest.json">
<title>Geotech Monitoring — Bahodopi</title>
<link rel="stylesheet" href="common.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="common.js"></script>
<style>
  :root{
    --d0:#050b16; --d1:#0a1832; --d2:#0e2147;
    --blue:#2563eb; --cyan:#38bdf8; --orange:#fb923c; --orange2:#ea580c;
    --txtL:#e9f0fb; --mutL:#8fa6c8; --line-d:rgba(125,160,220,.16);
    --glass:rgba(12,26,52,.55);
  }
  /* ===== immersive auth scene ===== */
  .scene{position:fixed;inset:0;overflow:hidden;background:var(--d0);}
  .bg-grad{position:absolute;inset:0;
    background:
      radial-gradient(1000px 600px at 82% 6%, rgba(56,189,248,.10), transparent 60%),
      radial-gradient(900px 560px at 16% 102%, rgba(37,99,235,.16), transparent 62%),
      linear-gradient(180deg,#13294e 0%,#102648 55%,#0c1e3c 100%);}
  .bg-mine{position:absolute;inset:0;width:100%;height:100%;opacity:.85;}
  .vign{position:absolute;inset:0;box-shadow:inset 0 0 200px 30px rgba(5,12,26,.42);pointer-events:none;}
  .scan{position:absolute;left:78%;top:74%;width:760px;height:760px;transform:translate(-50%,-50%);border-radius:50%;
    background:conic-gradient(from 0deg, rgba(56,189,248,.14), transparent 18%, transparent 100%);
    mask:radial-gradient(closest-side, transparent 58%, #000 59%, #000 62%, transparent 64%);
    animation:spin 14s linear infinite;opacity:.3;}
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}

  .auth-wrap{position:relative;z-index:5;min-height:100svh;display:flex;align-items:center;justify-content:center;gap:46px;
    padding:28px 18px;max-width:1120px;margin:0 auto;}
  /* hero (left, desktop) */
  .hero{flex:1;max-width:440px;color:var(--txtL);display:none;padding-right:20px;}
  @media(min-width:1024px){ .hero{display:block;} }
  .hero .mk{display:inline-flex;align-items:center;gap:11px;margin-bottom:22px;}
  .hero .tri{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;
    background:linear-gradient(150deg,rgba(251,146,60,.22),rgba(37,99,235,.14));border:1px solid rgba(251,146,60,.4);color:var(--orange);
    box-shadow:0 8px 30px rgba(251,146,60,.18);}
  .hero h1{font-size:clamp(26px,3vw,38px);line-height:1.08;margin:0 0 14px;font-weight:800;letter-spacing:-.5px;padding-right:10px;
    background:linear-gradient(120deg,#fff,#bcd2f5 60%,#8fb4ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .hero p{color:var(--mutL);font-size:15px;line-height:1.65;margin:0 0 24px;max-width:420px;}
  .chips{display:flex;flex-wrap:wrap;gap:9px;}
  .chip{font-size:12px;color:#cfe0fb;background:rgba(56,189,248,.08);border:1px solid var(--line-d);padding:7px 12px;border-radius:99px;
    display:inline-flex;gap:7px;align-items:center;backdrop-filter:blur(4px);}
  .chip .d{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);}

  /* glass card */
  .card-3d{flex:0 0 auto;width:400px;max-width:100%;perspective:1200px;}
  .auth-card{position:relative;background:linear-gradient(165deg,rgba(18,34,64,.78),rgba(8,18,38,.72));
    border:1px solid var(--line-d);border-radius:22px;padding:26px 24px 22px;color:var(--txtL);
    box-shadow:0 30px 80px rgba(2,8,20,.6),inset 0 1px 0 rgba(255,255,255,.05);backdrop-filter:blur(16px);
    transition:transform .12s ease-out;transform-style:preserve-3d;}
  .auth-card::before{content:"";position:absolute;inset:-1px;border-radius:22px;padding:1px;pointer-events:none;
    background:linear-gradient(140deg,rgba(56,189,248,.5),transparent 35%,transparent 65%,rgba(251,146,60,.45));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.55;}
  .cbrand{display:flex;align-items:center;gap:11px;margin-bottom:6px;}
  .cbrand .tri{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;
    background:linear-gradient(150deg,rgba(251,146,60,.2),rgba(37,99,235,.16));border:1px solid rgba(251,146,60,.4);color:var(--orange);}
  .cbrand b{font-size:18px;font-weight:800;letter-spacing:.2px;}
  .cbrand small{display:block;font-size:9.5px;letter-spacing:.18em;color:var(--mutL);font-family:ui-monospace,Menlo,monospace;margin-top:2px;}
  .ctitle{font-size:19px;font-weight:800;margin:18px 0 2px;}
  .csub{font-size:12.5px;color:var(--mutL);margin-bottom:16px;}

  .atabs{display:flex;background:rgba(8,18,38,.6);border:1px solid var(--line-d);border-radius:12px;padding:4px;margin-bottom:16px;}
  .atab{flex:1;border:0;background:none;color:var(--mutL);font-weight:700;font-size:13.5px;padding:9px;border-radius:9px;cursor:pointer;transition:.18s;}
  .atab.on{background:linear-gradient(120deg,var(--blue),#1e40af);color:#fff;box-shadow:0 6px 18px rgba(37,99,235,.4);}

  .al{display:block;font-size:11.5px;font-weight:600;color:#b9cbe8;margin:13px 0 5px;}
  .al .rq{color:var(--orange);}
  .auth-card input,.auth-card select{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--line-d);border-radius:11px;
    padding:12px 13px;font:inherit;font-size:14px;color:var(--txtL);transition:.16s;}
  .auth-card input::placeholder{color:rgba(143,166,200,.55);}
  .auth-card input:focus,.auth-card select:focus{outline:none;border-color:var(--cyan);background:rgba(56,189,248,.08);box-shadow:0 0 0 3px rgba(56,189,248,.13);}
  .auth-card select option{background:#0e2147;color:#fff;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px;}
  @media(max-width:460px){ .grid2{grid-template-columns:1fr;} .card-3d{width:100%;} }
  .span2{grid-column:1/-1;}

  .abtn{width:100%;border:0;border-radius:12px;padding:13px;font-size:14.5px;font-weight:800;cursor:pointer;margin-top:18px;
    color:#fff;background:linear-gradient(120deg,var(--blue),#1d4ed8);box-shadow:0 12px 30px rgba(37,99,235,.42);transition:.16s;letter-spacing:.2px;}
  .abtn:hover{filter:brightness(1.07);transform:translateY(-1px);}
  .abtn:disabled{opacity:.55;cursor:not-allowed;transform:none;}
  .abtn.ghost{background:rgba(255,255,255,.06);border:1px solid var(--line-d);box-shadow:none;margin-top:8px;}
  .alink{background:none;border:0;color:var(--cyan);font-size:12px;cursor:pointer;padding:0;}
  .anote{font-size:10.5px;color:var(--mutL);margin-top:13px;line-height:1.55;font-family:ui-monospace,Menlo,monospace;}
  .abanner{padding:10px 12px;border-radius:10px;font-size:12.5px;margin-top:12px;line-height:1.45;}
  .abanner.err{background:rgba(220,38,38,.14);border:1px solid rgba(248,113,113,.4);color:#fecaca;}
  .abanner.ok{background:rgba(22,163,74,.14);border:1px solid rgba(74,222,128,.4);color:#bbf7d0;}
  .foot{position:fixed;bottom:12px;left:0;right:0;text-align:center;z-index:5;font-size:10px;color:rgba(143,166,200,.7);
    font-family:ui-monospace,Menlo,monospace;letter-spacing:.05em;}

  /* ===== HOME (after login) ===== */
  .home-wrap{position:relative;z-index:5;max-width:1000px;margin:0 auto;padding:22px 18px 90px;}
  .htop{display:flex;align-items:center;gap:12px;margin-bottom:30px;}
  .htop .tri{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;
    background:linear-gradient(150deg,rgba(251,146,60,.22),rgba(37,99,235,.16));border:1px solid rgba(251,146,60,.42);color:var(--orange);}
  .htop .bt b{font-size:15px;font-weight:800;color:var(--txtL);letter-spacing:.2px;}
  .htop .bt small{display:block;font-size:9.5px;letter-spacing:.18em;color:var(--mutL);font-family:ui-monospace,Menlo,monospace;}
  .hquit{margin-left:auto;display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid var(--line-d);
    color:#dbe6f7;border-radius:11px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer;transition:.16s;}
  .hquit:hover{background:rgba(248,113,113,.14);border-color:rgba(248,113,113,.45);color:#fecaca;}

  .hello-row{display:flex;align-items:center;gap:16px;margin-bottom:6px;}
  .hava{width:58px;height:58px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;
    color:#fff;background:linear-gradient(150deg,var(--blue),#1e3a8a);border:1px solid rgba(120,170,255,.4);box-shadow:0 10px 30px rgba(37,99,235,.4);}
  .hello{font-size:clamp(25px,4.6vw,38px);font-weight:850;letter-spacing:-.5px;line-height:1.05;margin:0;
    background:linear-gradient(120deg,#fff,#bcd2f5 55%,#8fb4ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .wave{display:inline-block;transform-origin:70% 70%;animation:wave 2.6s ease-in-out infinite;}
  @keyframes wave{0%,60%,100%{transform:rotate(0)}10%{transform:rotate(16deg)}20%{transform:rotate(-10deg)}30%{transform:rotate(16deg)}40%{transform:rotate(-6deg)}50%{transform:rotate(10deg)}}
  .hsub{color:var(--mutL);font-size:13.5px;margin:7px 0 0;}
  .hsub .rolechip{display:inline-block;margin-left:6px;font-size:10.5px;font-weight:700;letter-spacing:.05em;color:#a7f3d0;
    background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.32);border-radius:99px;padding:2px 9px;font-family:ui-monospace,Menlo,monospace;}
  .heyebrow{font-size:11px;color:var(--mutL);letter-spacing:.18em;text-transform:uppercase;margin:30px 2px 14px;font-family:ui-monospace,Menlo,monospace;}
  .htiles{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  @media(max-width:820px){ .htiles{grid-template-columns:repeat(2,1fr);} }
  @media(max-width:520px){ .htiles{grid-template-columns:1fr;} }
  .htile{position:relative;overflow:hidden;display:flex;flex-direction:column;gap:12px;min-height:128px;padding:17px;border-radius:18px;
    text-decoration:none;color:var(--txtL);background:linear-gradient(165deg,rgba(18,34,64,.72),rgba(8,18,38,.6));
    border:1px solid var(--line-d);backdrop-filter:blur(12px);transition:.16s;}
  .htile::before{content:"";position:absolute;left:0;top:0;right:0;height:3px;background:var(--c,#38bdf8);opacity:.9;}
  .htile::after{content:"";position:absolute;right:-30px;top:-30px;width:90px;height:90px;border-radius:50%;background:var(--c,#38bdf8);opacity:.07;filter:blur(6px);}
  .htile:hover{transform:translateY(-3px);border-color:color-mix(in srgb,var(--c) 50%,transparent);box-shadow:0 18px 42px rgba(2,8,20,.55);}
  .htile .ic{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;
    color:var(--c,#38bdf8);background:var(--cb,rgba(56,189,248,.14));border:1px solid color-mix(in srgb,var(--c) 35%,transparent);}
  .htile .lab{font-weight:800;font-size:15.5px;}
  .htile .sub{font-size:11.5px;color:var(--mutL);line-height:1.4;}
  .hfoot{text-align:center;margin-top:34px;font-size:10px;color:rgba(143,166,200,.6);font-family:ui-monospace,Menlo,monospace;letter-spacing:.06em;}

  /* ===== NDA modal ===== */
  .nda-ov{position:fixed;inset:0;z-index:80;background:rgba(3,8,18,.72);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:18px;}
  .nda-card{width:680px;max-width:100%;max-height:90svh;display:flex;flex-direction:column;background:linear-gradient(165deg,#0f2147,#0a1730);
    border:1px solid var(--line-d);border-radius:18px;box-shadow:0 40px 90px rgba(2,8,20,.7);color:var(--txtL);overflow:hidden;}
  .nda-hd{padding:18px 22px;border-bottom:1px solid var(--line-d);}
  .nda-hd .k{font-size:10px;letter-spacing:.2em;color:var(--orange);font-family:ui-monospace,Menlo,monospace;}
  .nda-hd h2{margin:5px 0 0;font-size:18px;font-weight:800;}
  .nda-hd p{margin:4px 0 0;font-size:12px;color:var(--mutL);}
  .nda-body{padding:18px 22px;overflow-y:auto;font-size:13px;line-height:1.7;color:#d6e2f5;}
  .nda-body h3{font-size:13.5px;color:#fff;margin:16px 0 5px;}
  .nda-body p{margin:0 0 9px;}
  .nda-body ol{margin:0 0 9px;padding-left:20px;} .nda-body li{margin-bottom:6px;}
  .nda-body .muted{color:var(--mutL);font-size:11.5px;}
  .nda-ft{padding:14px 22px 18px;border-top:1px solid var(--line-d);background:rgba(6,14,30,.5);}
  .agree{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;color:#cfe0fb;margin-bottom:12px;cursor:pointer;}
  .agree input{width:18px;height:18px;flex:0 0 auto;margin-top:1px;accent-color:var(--cyan);}
  .nda-actions{display:flex;gap:10px;}
  .nda-actions .abtn{margin-top:0;}

  /* ===== home (dark, same nuance as login) ===== */
  .home-wrap{position:relative;z-index:5;min-height:100svh;display:flex;flex-direction:column;padding:18px 20px 22px;max-width:1180px;margin:0 auto;}
  .home-main{flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px;}
  /* blinking survey nodes — only in side margins, hidden on small screens */
  .sideblips{position:fixed;inset:0;z-index:2;pointer-events:none;}
  .sideblips i{position:absolute;width:6px;height:6px;border-radius:50%;background:#fb923c;box-shadow:0 0 10px 2px rgba(251,146,60,.7);}
  .sideblips i::after{content:"";position:absolute;inset:-3px;border-radius:50%;border:1px solid rgba(253,230,138,.8);animation:blip 2.8s ease-out infinite;}
  @keyframes blip{0%{transform:scale(1);opacity:.85}70%{transform:scale(4.5);opacity:0}100%{opacity:0}}
  @media(max-width:1180px){ .sideblips{display:none;} }
  .topbar-d{display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:rgba(12,26,52,.55);border:1px solid var(--line-d);border-radius:16px;padding:12px 16px;backdrop-filter:blur(14px);box-shadow:0 12px 34px rgba(2,8,20,.4);}
  .topbar-d .brand{display:flex;align-items:center;gap:11px;color:var(--txtL);}
  .topbar-d .tri{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;
    background:linear-gradient(150deg,rgba(251,146,60,.2),rgba(37,99,235,.16));border:1px solid rgba(251,146,60,.4);color:var(--orange);}
  .topbar-d .brand b{font-size:18px;font-weight:800;} .topbar-d .brand small{display:block;font-size:9.5px;letter-spacing:.18em;color:var(--mutL);font-family:ui-monospace,Menlo,monospace;}
  .exit{display:inline-flex;align-items:center;gap:7px;background:rgba(220,38,38,.14);border:1px solid rgba(248,113,113,.34);color:#fecaca;border-radius:11px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:.16s;}
  .exit:hover{background:rgba(220,38,38,.24);transform:translateY(-1px);} .exit span{font-size:15px;}
  .greet{margin:30px 2px 22px;color:var(--txtL);}
  .greet .hi{font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--cyan);font-family:ui-monospace,Menlo,monospace;margin-bottom:4px;}
  .greet h1{font-family:'Space Grotesk',system-ui,sans-serif;font-size:38px;line-height:1.05;margin:0;font-weight:700;letter-spacing:-.5px;
    background:linear-gradient(110deg,#fff 10%,#a9c6f5 60%,#6ea8ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .greet .wave{display:inline-block;-webkit-text-fill-color:initial;animation:wv 2.4s ease-in-out infinite;transform-origin:70% 70%;}
  @keyframes wv{0%,60%,100%{transform:rotate(0)}10%{transform:rotate(16deg)}20%{transform:rotate(-8deg)}30%{transform:rotate(16deg)}40%{transform:rotate(-4deg)}50%{transform:rotate(10deg)}}
  .greet p{margin:9px 0 0;color:var(--mutL);font-size:13.5px;}
  .eyebrow-d{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mutL);margin:6px 2px 12px;}
  .tiles-d{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;}
  @media(min-width:720px){ .tiles-d{grid-template-columns:repeat(3,1fr);} }
  .tile-d{position:relative;display:block;text-decoration:none;color:var(--txtL);overflow:hidden;
    background:linear-gradient(165deg,rgba(30,52,92,.55),rgba(20,38,70,.46));border:1px solid rgba(125,160,220,.2);border-radius:18px;padding:17px 16px 16px;
    min-height:124px;backdrop-filter:blur(12px);transition:.18s;box-shadow:0 12px 26px rgba(4,12,28,.28);}
  .tile-d::before{content:"";position:absolute;left:0;top:0;height:3px;width:100%;background:var(--c,#3b82f6);opacity:.9;}
  .tile-d::after{content:"";position:absolute;right:-40px;top:-40px;width:110px;height:110px;border-radius:50%;background:radial-gradient(circle,var(--c,#3b82f6),transparent 70%);opacity:.14;}
  .tile-d:hover{transform:translateY(-3px);border-color:rgba(120,170,240,.4);box-shadow:0 22px 46px rgba(2,8,20,.5);}
  .tile-d:active{transform:scale(.98);}
  .tile-d .ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:12px;
    color:var(--c,#fff);background:color-mix(in srgb, var(--c,#3b82f6) 18%, transparent);border:1px solid color-mix(in srgb, var(--c,#3b82f6) 40%, transparent);}
  .tile-d .lab{font-weight:800;font-size:15.5px;} .tile-d .sub{font-size:11.5px;color:var(--mutL);line-height:1.4;margin-top:3px;}
  .tile-d .go{position:absolute;right:14px;bottom:13px;color:var(--mutL);font-size:17px;transition:.18s;}
  .tile-d:hover .go{color:#fff;transform:translateX(3px);}
  .foot-d{text-align:center;color:rgba(143,166,200,.6);font-size:10px;letter-spacing:.08em;font-family:ui-monospace,Menlo,monospace;margin-top:30px;}

  /* ===== APP SHELL ===== */
  .shell{display:grid;grid-template-columns:248px 1fr;height:100svh;overflow:hidden;
    background:radial-gradient(900px 600px at 88% -8%,rgba(56,189,248,.07),transparent 60%),linear-gradient(180deg,#0c1d39,#0a1830 60%,#081428);}
  .s-side{border-right:1px solid var(--line-d);padding:16px 12px;display:flex;flex-direction:column;gap:3px;background:rgba(7,15,30,.55);overflow-y:auto;}
  .s-brand{display:flex;align-items:center;gap:10px;padding:6px 8px 14px;}
  .s-brand .tri{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;background:linear-gradient(150deg,rgba(251,146,60,.2),rgba(37,99,235,.16));border:1px solid rgba(251,146,60,.4);color:var(--orange);}
  .s-brand b{font-size:15px;font-weight:800;} .s-brand small{display:block;font-size:8.5px;letter-spacing:.16em;color:var(--mutL);font-family:ui-monospace,Menlo,monospace;}
  .s-navlbl{font-size:9.5px;letter-spacing:.18em;color:var(--mutL);text-transform:uppercase;margin:12px 8px 6px;}
  .s-nav button{width:100%;display:flex;align-items:center;gap:11px;padding:10px 11px;border:0;border-radius:10px;color:var(--mutL);background:none;font-size:13.5px;font-weight:600;cursor:pointer;transition:.15s;text-align:left;}
  .s-nav button .i{width:18px;text-align:center;font-size:15px;}
  .s-nav button:hover{background:rgba(56,189,248,.07);color:var(--txtL);}
  .s-nav button.on{background:linear-gradient(120deg,rgba(59,130,246,.92),rgba(30,64,175,.82));color:#fff;box-shadow:0 6px 16px rgba(37,99,235,.3);}
  .s-user{margin-top:auto;display:flex;align-items:center;gap:10px;background:rgba(14,30,56,.6);border:1px solid var(--line-d);border-radius:12px;padding:10px;}
  .s-user .av{width:34px;height:34px;border-radius:50%;background:#1e3a6b;color:#9fc2ff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex:0 0 auto;}
  .s-user b{font-size:12.5px;} .s-user small{font-size:10.5px;color:var(--mutL);}
  .s-main{display:flex;flex-direction:column;height:100svh;overflow:hidden;min-width:0;}
  .s-top{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 22px;border-bottom:1px solid var(--line-d);background:rgba(8,18,36,.4);}
  .s-top .hb{display:none;background:none;border:1px solid var(--line-d);color:var(--txtL);border-radius:9px;padding:6px 11px;font-size:16px;cursor:pointer;}

<script>

const sb = GMS.sb, $ = GMS.$, esc = GMS.esc;

/* ===================== HOME (after login) ===================== */
const TILES = [

  { key:"eews",     href:"eews.html",     label:"EEWS",           sub:"Earthquake early warning", ic:"&#9883;", c:"#f87171", access:"admin" },
  { key:"dashboard",href:"exec_dashboard.html",label:"Dashboard", sub:"Risk map, list & reports", ic:"&#9636;", c:"#3b82f6", access:"admin" },
  { key:"validasi", href:"validasi.html", label:"Validation",     sub:"Verify & approve inspections", ic:"&#9745;", c:"#2dd4bf", access:"admin" },
  { key:"database", href:"database.html", label:"Database",       sub:"Checklist · Users · Reporting · PERA audit", ic:"&#9638;", c:"#a78bfa", access:"admin" },
];
const NAV = [
  { key:"overview",  label:"Overview",       ic:"&#8962;",  access:"member" },
  { key:"inspeksi",  label:"New Inspection",  ic:"&#9633;",  href:"inspeksi.html",      access:"member" },
  { key:"pera",      label:"PERA",            ic:"&#9888;",  href:"pera.html",          access:"member" },
  { key:"monitoring",label:"Monitoring",      ic:"&#9707;",  href:"monitoring.html",    access:"admin" },
  { key:"eews",      label:"EEWS",            ic:"&#9883;",  href:"eews.html",          access:"admin" },
  { key:"dashboard", label:"Dashboard",       ic:"&#9636;",  href:"exec_dashboard.html",access:"admin" },
  { key:"validasi",  label:"Validation",      ic:"&#9745;",  href:"validasi.html",      access:"admin" },
  { key:"database",  label:"Database",        ic:"&#9638;",  href:"database.html",      access:"admin" },
];
let SHELL = {};
function daypart(){ const h=new Date().getHours(); return h<11?"morning":h<18?"afternoon":"evening"; }
function nowClock(){ return new Date().toLocaleTimeString("en-GB"); }
function weekStartISO(){ const d=new Date(); const day=(d.getDay()+6)%7; d.setDate(d.getDate()-day); return d.toISOString().slice(0,10); }
function toggleSide(open){ const s=$("shell"); if(s) s.classList.toggle("open",!!open); }
window.toggleSide=toggleSide;

function renderShell(p){
  SHELL.p=p;

    .map(n=>'<button data-k="'+n.key+'" onclick="navTo(\''+n.key+'\')"><span class="i">'+n.ic+'</span> '+esc(n.label)+'</button>').join("");
  $("root").innerHTML =

      '<div class="s-backdrop" onclick="toggleSide(false)"></div>'+
      '<aside class="s-side">'+

        '<div class="s-navlbl">Workspace</div>'+
        '<div class="s-nav" id="snav">'+nav+'</div>'+
        '<div class="s-user"><div class="av">'+esc((nm||"?").slice(0,2).toUpperCase())+'</div><div><b>'+esc(nm)+'</b><small>'+esc(roleLbl)+'</small></div></div>'+
      '</aside>'+
      '<div class="s-main">'+
        '<div class="s-top">'+
          '<div style="display:flex;align-items:center;gap:12px;min-width:0">'+
            '<button class="hb" onclick="toggleSide(true)">&#9776;</button>'+
            '<div class="s-greet"><h1>Good '+daypart()+', '+esc(nm.split(" ")[0]||nm)+' &#128075;</h1><p>'+esc(posdep)+'</p></div>'+
          '</div>'+
          '<div class="s-tools">'+
            '<div class="it"><span class="dot"></span>System<b>Operational</b></div>'+

        '</div>'+
        '<div class="s-view" id="view"></div>'+
      '</div>'+
    '</div>';

function navTo(key){
  const item=NAV.find(n=>n.key===key); if(!item) return;

  $("view").innerHTML='<iframe class="modframe" src="'+item.href+'"></iframe>';

window.navTo=navTo;

function kpi(c,ic,n,l,s){ return '<div class="ov-kpi" style="--c:'+c+'"><div class="ic">'+ic+'</div><div class="n">'+n+'</div><div class="l">'+l+'</div><div class="s2">'+esc(s)+'</div></div>'; }

function renderOverview(){
  const p=SHELL.p, member=!p.canValidate, view=$("view");
  if(member){
    view.innerHTML='<div class="ov">'+
      '<div class="big2">'+
        '<div class="bigtile" style="--c:#fb923c" onclick="navTo(\'inspeksi\')"><div class="ic">&#9633;</div><div><b>New Inspection</b><br><small style="color:var(--mutL)">Checklist · GPS · photos (offline)</small></div><span style="color:var(--mutL)">Start &#8594;</span></div>'+
        '<div class="bigtile" style="--c:#22d3ee" onclick="navTo(\'pera\')"><div class="ic">&#9888;</div><div><b>PERA</b><br><small style="color:var(--mutL)">Rapid post-earthquake assessment</small></div><span style="color:var(--mutL)">Open &#8594;</span></div>'+
      '</div>'+
      '<div class="s-navlbl" style="margin-left:2px">My Activity</div>'+
      '<div class="ov-kpis" id="ovk" style="grid-template-columns:repeat(3,1fr)"></div>'+
    '</div>';
  } else {
    view.innerHTML='<div class="ov">'+
      '<div class="ov-kpis" id="ovk"></div>'+
      '<div class="ov-qa">'+
        '<button onclick="navTo(\'validasi\')">&#9745; Validate Inspections</button>'+
        '<button onclick="navTo(\'dashboard\')">&#9636; Open Dashboard</button>'+
        '<button onclick="navTo(\'inspeksi\')">&#9633; New Inspection</button>'+
        '<button onclick="navTo(\'monitoring\')">&#9707; Monitoring</button>'+
      '</div>'+
      '<div class="ov-panel"><h3>Recent Inspections</h3><div id="ovrecent" style="color:var(--mutL);font-size:12px">Loading…</div></div>'+
    '</div>';
  }
  loadOverview(member);
}

async function loadOverview(member){
  const ovk=$("ovk");
  try{
    if(member){
      const u=await sb.auth.getUser(); const uid=u&&u.data&&u.data.user?u.data.user.id:null;
      const ms=(()=>{const d=new Date();d.setDate(1);return d.toISOString().slice(0,10);})();
      const [open,month]=await Promise.all([
        sb.from("inspections").select("id",{count:"exact",head:true}).eq("created_by",uid).neq("status","CLOSED"),
        sb.from("inspections").select("id",{count:"exact",head:true}).eq("created_by",uid).gte("inspection_date",ms)
      ]);
      if(ovk) ovk.innerHTML=
        kpi("#fb923c","&#9633;",open.count||0,"My Open Findings","status not closed")+
        kpi("#eab308","&#9201;",month.count||0,"This Month","inspections created")+
        kpi("#22c55e","&#10003;","OK","Sync","offline queue");
    } else {
      const ws=weekStartISO();
      const [pend,openf,highf,wk]=await Promise.all([
        sb.from("inspections").select("id",{count:"exact",head:true}).eq("approval_status","pending"),
        sb.from("inspections").select("id",{count:"exact",head:true}).neq("status","CLOSED"),
        sb.from("inspections").select("id",{count:"exact",head:true}).neq("status","CLOSED").in("risk_final",["High","Very High"]),
        sb.from("inspections").select("id",{count:"exact",head:true}).gte("inspection_date",ws)
      ]);
      if(ovk) ovk.innerHTML=
        kpi("#eab308","&#9636;",pend.count||0,"Pending Validation","awaiting engineer")+
        kpi("#fb923c","&#9670;",openf.count||0,"Open Findings","not yet closed")+
        kpi("#ef4444","&#9888;",highf.count||0,"High / Very High","open, elevated risk")+
        kpi("#22c55e","&#9201;",wk.count||0,"This Week","inspections logged");
      const { data:rec }=await sb.from("inspections").select("id,inspection_date,risk_final,risk_override,locations(name)").order("inspection_date",{ascending:false}).limit(6);
      const el=$("ovrecent");
      if(el) el.innerHTML=((rec||[]).map(r=>{
        const risk=(r.risk_override&&String(r.risk_override).trim())||r.risk_final||"—"; const c=RC[risk]||"#64748b";
        return '<div class="ov-act"><span class="t">'+esc(String(r.inspection_date||"").slice(0,10))+'</span>'+
          '<span>'+esc((r.locations&&r.locations.name)||"—")+'</span>'+
          '<span class="rk" style="background:'+c+'22;color:'+c+'">'+esc(risk)+'</span></div>';
      }).join("")) || '<span style="color:var(--mutL)">No data.</span>';
    }
  }catch(e){ if(ovk) ovk.innerHTML='<div style="color:var(--mutL);font-size:12px">Failed to load overview.</div>'; }
}

let abusy=false, aerr="", amsg="";

function sceneBg(){
  return '<div class="scene">'+
    '<div class="bg-grad"></div>'+
    mineSVG()+
    '<div class="scan"></div>'+
    '<div class="vign"></div>'+
  '</div>'+
  '<div class="sideblips">'+
    '<i style="left:4%;top:30%"></i><i style="left:7%;top:68%"></i>'+
    '<i style="right:5%;top:24%;background:#38bdf8;box-shadow:0 0 10px 2px rgba(56,189,248,.7)"></i>'+
    '<i style="right:8%;top:72%"></i>'+
  '</div>';
}
function mineSVG(){
  // --- topographic hill: nested closed contour loops (left side) ---
  const WB=[1.00,0.90,1.07,0.93,1.05,0.88,1.06,0.95];
  function loop(cx,cy,r,sq){ const N=8,p=[];
    for(let i=0;i<N;i++){ const a=(i/N)*Math.PI*2; const rr=r*WB[i%8];
      p.push([cx+Math.cos(a)*rr, cy+Math.sin(a)*rr*sq]); }
    let d='M '+((p[0][0]+p[N-1][0])/2).toFixed(0)+' '+((p[0][1]+p[N-1][1])/2).toFixed(0);
    for(let i=0;i<N;i++){ const cur=p[i], nx=p[(i+1)%N]; const mx=(cur[0]+nx[0])/2, my=(cur[1]+nx[1])/2;
      d+=' Q '+cur[0].toFixed(0)+' '+cur[1].toFixed(0)+' '+mx.toFixed(0)+' '+my.toFixed(0); }
    return d+' Z'; }
  let hill=''; for(let k=0;k<6;k++){ hill+='<path d="'+loop(-330,-40,46+k*40,0.82)+'"/>'; }
  // a couple of free contour lines flowing off the hill
  let lines=''; [-150,-235,40].forEach((b,i)=>{ let d='M -600 '+b;
    for(let x=-480;x<=600;x+=120){ d+=' Q '+(x-60)+' '+(b-26+i*8)+' '+x+' '+(b+ (x/60%2?14:-14)); }
    lines+='<path d="'+d+'"/>'; });
  // --- open pit: stepped benches w/ depth + haul ramp (right-bottom) ---
  const pcx=320, pcy=150;
  let pit=''; for(let k=0;k<6;k++){ const rx=210-k*30, ry=74-k*10, cy=pcy+k*7;
    pit+='<ellipse cx="'+pcx+'" cy="'+cy+'" rx="'+rx+'" ry="'+ry+'" class="pit"/>'; }
  // haul ramp: zig-zag down the benches
  let ramp='M '+(pcx-200)+' '+pcy; const RX=[-150,140,-110,90,-50,40,0];
  RX.forEach((dx,i)=> ramp+=' L '+(pcx+dx)+' '+(pcy+i*7.5));
  return '<svg class="bg-mine" viewBox="-600 -360 1200 720" preserveAspectRatio="xMidYMid slice">'+
    '<defs>'+
      '<linearGradient id="cl" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#5b9bf0" stop-opacity=".34"/><stop offset="1" stop-color="#2563eb" stop-opacity=".05"/></linearGradient>'+
      '<radialGradient id="depth" cx="50%" cy="42%" r="60%"><stop offset="0" stop-color="#040b18" stop-opacity=".55"/><stop offset="100%" stop-color="#040b18" stop-opacity="0"/></radialGradient>'+
    '</defs>'+
    '<style>.bg-mine path{fill:none;stroke:url(#cl);stroke-width:1.1;}'+
      '.bg-mine .pit{fill:none;stroke:rgba(251,146,60,.20);stroke-width:1.1;}'+
      '.bg-mine .ramp{fill:none;stroke:rgba(251,146,60,.28);stroke-width:1.4;stroke-dasharray:3 4;}</style>'+
    '<ellipse cx="'+pcx+'" cy="'+(pcy+18)+'" rx="170" ry="60" fill="url(#depth)" stroke="none"/>'+
    '<g>'+hill+'</g><g style="opacity:.6">'+lines+'</g>'+
    '<g>'+pit+'<path class="ramp" d="'+ramp+'"/></g>'+
  '</svg>';
}

function fields(f){
  if(mode==="forgot")
    return '<label class="al">Email</label><input id="email" type="email" placeholder="name@valeindonesia.com" value="'+esc(f.email)+'">';
  if(mode==="newpass")
    return '<label class="al">New Password <span class="rq">*</span></label><input id="pass" type="password" placeholder="min. 6 characters" onkeydown="if(event.key===\'Enter\')doPrimary()">';

    return '<label class="al">Email</label><input id="email" type="email" placeholder="name@valeindonesia.com" value="'+esc(f.email)+'">'+
           '<label class="al">Password</label><input id="pass" type="password" placeholder="••••••••" onkeydown="if(event.key===\'Enter\')doPrimary()">'+
           '<div style="margin-top:9px"><button class="alink" onclick="setMode(\'forgot\')">Forgot password?</button></div>';
  // signup
  return '<div class="grid2">'+

    '<div class="span2"><label class="al">Work Email <span class="rq">*</span></label><input id="email" type="email" placeholder="name@valeindonesia.com" value="'+esc(f.email)+'"></div>'+
    '<div><label class="al">Badge / ID <span class="rq">*</span></label><input id="sf_badge" placeholder="e.g. 0676733" value="'+esc(f.badge)+'"></div>'+
    '<div><label class="al">Position <span class="rq">*</span></label><input id="sf_pos" placeholder="e.g. Geotech Engineer" value="'+esc(f.pos)+'"></div>'+
    '<div><label class="al">Department <span class="rq">*</span></label><select id="sf_dept">'+
      ['','Geotechnical & Hydrology','Geotechnical','Hydrology','Mine Operations','Mine Planning','Survey','Mine Geology','OHS / Safety','Other']
        .map(o=>'<option value="'+esc(o)+'"'+(f.dept===o?' selected':'')+'>'+(o===''?'— select —':esc(o))+'</option>').join("")+
    '</select></div>'+
    '<div><label class="al">Work Phone</label><input id="sf_phone" placeholder="optional" value="'+esc(f.phone)+'"></div>'+
    '<div><label class="al">Password <span class="rq">*</span></label><input id="pass" type="password" placeholder="min. 6"></div>'+
    '<div><label class="al">Repeat Password <span class="rq">*</span></label><input id="sf_pass2" type="password" placeholder="repeat"></div>'+
  '</div>';
}
function btns(){
  const label = abusy?"Processing…":mode==="signup"?"Continue to Agreement (NDA)":mode==="forgot"?"Send Reset Link":mode==="newpass"?"Save Password":"Sign In";
  let h='<button class="abtn" '+(abusy?'disabled':'')+' onclick="doPrimary()">'+label+'</button>';
  if(mode==="forgot") h+='<button class="abtn ghost" onclick="setMode(\'signin\')">Back</button>';
  return h;
}
function noteText(){
  return mode==="signup" ? "Only @vale.com / @valeindonesia.com / @gmail.com emails. New accounts await Super Admin approval after the confidentiality agreement is accepted."
    : mode==="forgot" ? "Enter your account email; a reset link will be sent (check inbox/spam)."
    : mode==="newpass" ? "Save your new password, then you will be redirected automatically."
    : "Sign in with a registered account. Your account must be activated by a Super Admin.";
}
function setMode(m){ mode=m; aerr=""; amsg=""; ndaOpen=false; renderAuth(); }
window.setMode=setMode;

/* ---- 3D tilt ---- */
function initAuthFX(){
  const card=$("authCard"); const wrap=document.querySelector(".auth-wrap");
  if(card && wrap && !('ontouchstart' in window)){
    wrap.onmousemove=e=>{ const r=card.getBoundingClientRect(); const cx=r.left+r.width/2, cy=r.top+r.height/2;
      const dx=(e.clientX-cx)/r.width, dy=(e.clientY-cy)/r.height;
      card.style.transform='rotateY('+(dx*6).toFixed(2)+'deg) rotateX('+(-dy*6).toFixed(2)+'deg)'; };
    wrap.onmouseleave=()=>{ card.style.transform='rotateY(0) rotateX(0)'; };
  }
}

/* ---- primary action ---- */
async function doPrimary(){
  aerr=""; amsg="";
  if(mode==="signup"){ return startSignup(); }
  const f=getF();
  abusy=true; renderAuth();
  try{
    if(mode==="forgot"){
      const { error } = await sb.auth.resetPasswordForEmail(f.email, { redirectTo: location.origin });
      if(error) throw error;
      amsg="Jika email terdaftar, link reset sudah dikirim."; abusy=false; renderAuth();
    } else if(mode==="newpass"){
      const { error } = await sb.auth.updateUser({ password:f.pass });
      if(error) throw error;
      amsg="Password diperbarui. Mengarahkan…"; renderAuth(); setTimeout(boot,800);
    } else {
      const { error } = await sb.auth.signInWithPassword({ email:f.email, password:f.pass });
      if(error) throw error;
      return boot();
    }
  }catch(e){ aerr=e.message||String(e); abusy=false; renderAuth(); }
}
window.doPrimary=doPrimary;

function startSignup(){
  const f=getF();
  const allowed=["gmail.com","vale.com","valeindonesia.com"];
  const dom=(f.email.split("@")[1]||"").toLowerCase();
  if(!f.name||!f.email||!f.badge||!f.pos||!f.dept||!f.pass){ aerr="Please complete all fields marked *."; renderAuth(); return; }
  if(!allowed.includes(dom)){ aerr="Only @vale.com, @valeindonesia.com, or @gmail.com emails are allowed."; renderAuth(); return; }
  if(f.pass.length<6){ aerr="Password must be at least 6 characters."; renderAuth(); return; }
  if(f.pass!==f.pass2){ aerr="Password confirmation does not match."; renderAuth(); return; }
  pendingSignup=f; ndaChecked=false; ndaOpen=true; aerr=""; renderAuth();
}

/* ---- NDA ---- */
function ndaModal(){
  return '<div class="nda-ov" onclick="closeNda()"><div class="nda-card" onclick="event.stopPropagation()">'+
    '<div class="nda-hd"><div class="k">PERJANJIAN KERAHASIAAN</div>'+
      '<h2>Non-Disclosure Agreement (NDA)</h2>'+
      '<p>Wajib disetujui sebelum akun dibuat · PT Vale Indonesia — IGP Morowali Bahodopi</p></div>'+
    '<div class="nda-body">'+ndaText()+'</div>'+
    '<div class="nda-ft">'+
      '<label class="agree"><input type="checkbox" id="ndaChk" '+(ndaChecked?'checked':'')+' onchange="ndaChecked=this.checked;document.getElementById(\'ndaGo\').disabled=!this.checked;">'+
        '<span>Saya telah membaca, memahami, dan menyetujui seluruh isi Perjanjian Kerahasiaan ini, serta menyatakan data yang saya isikan benar.</span></label>'+
      '<div class="nda-actions">'+
        '<button class="abtn ghost" style="flex:1" onclick="closeNda()">Batal</button>'+
        '<button class="abtn" id="ndaGo" style="flex:1.4" '+(ndaChecked?'':'disabled')+' onclick="createAccount()">Setuju &amp; Buat Akun</button>'+
      '</div></div>'+
  '</div></div>';
}
function closeNda(){ ndaOpen=false; renderAuth(); }
window.closeNda=closeNda;

  return ''+
  '<p class="muted">Perjanjian ini dibuat dan berlaku efektif pada tanggal '+today+' antara <b>PT Vale Indonesia Tbk</b> (selanjutnya disebut "Perusahaan") dan pengguna terdaftar sistem Geotechnical Monitoring System ("Penerima Informasi").</p>'+
  '<h3>1. Definisi Informasi Rahasia</h3>'+

    '<li>Tidak menyalin, mengunduh, menyebarkan, mempublikasikan, atau memindahkan Informasi Rahasia kepada pihak ketiga mana pun tanpa izin tertulis dari Perusahaan.</li>'+
    '<li>Tidak menggunakan Informasi Rahasia untuk kepentingan pribadi maupun pihak lain yang dapat merugikan Perusahaan.</li>'+
  '</ol>'+
  '<h3>3. Keamanan Akun</h3>'+
  '<p>Penerima Informasi bertanggung jawab penuh atas kerahasiaan kredensial akunnya. Setiap aktivitas yang terjadi melalui akun dianggap sebagai tindakan pemilik akun. Dugaan penyalahgunaan wajib segera dilaporkan kepada administrator sistem.</p>'+
  '<h3>4. Kepemilikan Data</h3>'+
  '<p>Seluruh Informasi Rahasia merupakan dan tetap menjadi milik eksklusif Perusahaan. Perjanjian ini tidak mengalihkan hak kepemilikan, hak cipta, maupun hak kekayaan intelektual apa pun kepada Penerima Informasi.</p>'+
  '<h3>5. Jangka Waktu</h3>'+
  '<p>Kewajiban kerahasiaan ini berlaku selama Penerima Informasi memiliki akses ke sistem dan tetap berlanjut tanpa batas waktu setelah akses berakhir atau hubungan kerja berakhir.</p>'+

  '<p class="muted">Dengan menandai persetujuan di bawah ini, Penerima Informasi menyatakan telah membaca, memahami, dan terikat secara hukum pada seluruh ketentuan Perjanjian Kerahasiaan ini.</p>';
}

async function createAccount(){
  if(!ndaChecked || !pendingSignup) return;
  const f=pendingSignup; abusy=true; ndaOpen=false; renderAuth();
  try{
    const { data, error } = await sb.auth.signUp({ email:f.email, password:f.pass,
      options:{ emailRedirectTo: location.origin, data:{
        full_name:f.name, badge_number:f.badge, position:f.pos, department:f.dept, phone:f.phone, nda_accepted:true }}});
    if(error) throw error;
    if(data.session){ return boot(); }
    const { error:e2 } = await sb.auth.signInWithPassword({ email:f.email, password:f.pass });
    if(!e2){ return boot(); }
    mode="signin"; amsg="Account created & NDA recorded. Awaiting Super Admin approval."; abusy=false; pendingSignup=null; renderAuth();
  }catch(e){ aerr=e.message||String(e); abusy=false; renderAuth(); }
}
window.createAccount=createAccount;

/* ===================== BOOT ===================== */
async function boot(){
  $("root").innerHTML='<div class="center"><div class="spin"></div></div>';
  const session = await GMS.getSession();
  if(!session){
    if((location.hash||"").includes("type=recovery")) mode="newpass";
    abusy=false; renderAuth(); return;
  }
  const p = await GMS.getProfile();
  if(!p){ abusy=false; renderAuth(); return; }
  if(p.status!=="active"){
    $("root").innerHTML = GMS.header("Geotech Monitoring","Bahodopi",{back:false}) +
      '<div class="center">'+
        '<div style="width:56px;height:56px;border-radius:50%;background:#fef3c7;color:#d97706;display:flex;align-items:center;justify-content:center;font-size:26px">&#9888;</div>'+
        '<div style="font-size:17px;font-weight:700">'+(p.status==="disabled"?"Account disabled":"Awaiting approval")+'</div>'+
        '<div style="font-size:13px;max-width:340px">'+(p.status==="disabled"?"This account has been disabled by an admin.":"Your account is awaiting Super Admin approval before it can be used.")+'</div>'+
        '<button class="btn" style="max-width:180px" onclick="GMS.logout()">Sign out</button>'+
      '</div>';
    return;
  }
  renderShell(p);
}
sb.auth.onAuthStateChange((ev)=>{ if(ev==="PASSWORD_RECOVERY"){ mode="newpass"; ndaOpen=false; renderAuth(); } });
if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
boot();
</script>
