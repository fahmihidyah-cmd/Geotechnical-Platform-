<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#050b16">
<link rel="manifest" href="manifest.json">
<title>Geotech Monitoring — Bahodopi</title>
<link rel="stylesheet" href="common.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="common.js"></script>
<style>
  :root{
    --d0:#050b16; --d1:#0a1832; --d2:#0e2147;
    --blue:#2563eb; --cyan:#38bdf8; --orange:#fb923c; --orange2:#ea580c;
    --txtL:#e9f0fb; --mutL:#8fa6c8; --line-d:rgba(125,160,220,.16);
    --glass:rgba(12,26,52,.55);
  }
  /* ===== immersive auth scene ===== */
  .scene{position:fixed;inset:0;overflow:hidden;background:var(--d0);}
  .bg-grad{position:absolute;inset:0;
    background:
      radial-gradient(1000px 620px at 80% 112%, rgba(37,99,235,.20), transparent 60%),
      radial-gradient(760px 480px at 14% 8%, rgba(56,189,248,.09), transparent 55%),
      radial-gradient(900px 520px at 50% 60%, rgba(251,146,60,.05), transparent 60%),
      linear-gradient(180deg,#08111f 0%,#0a1830 58%,#060d18 100%);}
  .bg-mine{position:absolute;inset:0;width:100%;height:100%;opacity:.92;}
  .bg-grid{position:absolute;inset:-2px;
    background-image:linear-gradient(rgba(120,160,220,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(120,160,220,.05) 1px,transparent 1px);
    background-size:54px 54px;mask-image:radial-gradient(80% 70% at 50% 55%,#000 30%,transparent 82%);animation:gridpan 26s linear infinite;}
  @keyframes gridpan{to{background-position:54px 54px;}}
  .vign{position:absolute;inset:0;box-shadow:inset 0 0 260px 70px rgba(2,6,14,.88);pointer-events:none;}
  .scan{position:absolute;left:50%;top:58%;width:1150px;height:1150px;transform:translate(-50%,-50%);border-radius:50%;
    background:conic-gradient(from 0deg, rgba(56,189,248,.16), transparent 16%, transparent 100%);
    mask:radial-gradient(closest-side, transparent 60%, #000 61%, #000 63%, transparent 65%);
    animation:spin 11s linear infinite;opacity:.4;}
  @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg);}}

  .auth-wrap{position:relative;z-index:5;min-height:100svh;display:flex;align-items:center;justify-content:center;gap:46px;
    padding:28px 18px;max-width:1120px;margin:0 auto;}
  /* hero (left, desktop) */
  .hero{flex:1;max-width:460px;color:var(--txtL);display:none;}
  @media(min-width:940px){ .hero{display:block;} }
  .hero .mk{display:inline-flex;align-items:center;gap:11px;margin-bottom:22px;}
  .hero .tri{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;
    background:linear-gradient(150deg,rgba(251,146,60,.22),rgba(37,99,235,.14));border:1px solid rgba(251,146,60,.4);color:var(--orange);
    box-shadow:0 8px 30px rgba(251,146,60,.18);}
  .hero h1{font-size:40px;line-height:1.05;margin:0 0 14px;font-weight:850;letter-spacing:-.5px;
    background:linear-gradient(120deg,#fff,#bcd2f5 60%,#8fb4ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .hero p{color:var(--mutL);font-size:15px;line-height:1.65;margin:0 0 24px;max-width:420px;}
  .chips{display:flex;flex-wrap:wrap;gap:9px;}
  .chip{font-size:12px;color:#cfe0fb;background:rgba(56,189,248,.08);border:1px solid var(--line-d);padding:7px 12px;border-radius:99px;
    display:inline-flex;gap:7px;align-items:center;backdrop-filter:blur(4px);}
  .chip .d{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 8px var(--cyan);}

  /* glass card */
  .card-3d{flex:0 0 auto;width:400px;max-width:100%;perspective:1200px;}
  .auth-card{position:relative;background:linear-gradient(165deg,rgba(18,34,64,.78),rgba(8,18,38,.72));
    border:1px solid var(--line-d);border-radius:22px;padding:26px 24px 22px;color:var(--txtL);
    box-shadow:0 30px 80px rgba(2,8,20,.6),inset 0 1px 0 rgba(255,255,255,.05);backdrop-filter:blur(16px);
    transition:transform .12s ease-out;transform-style:preserve-3d;}
  .auth-card::before{content:"";position:absolute;inset:-1px;border-radius:22px;padding:1px;pointer-events:none;
    background:linear-gradient(140deg,rgba(56,189,248,.5),transparent 35%,transparent 65%,rgba(251,146,60,.45));
    -webkit-mask:linear-gradient(#000 0 0) content-box,linear-gradient(#000 0 0);-webkit-mask-composite:xor;mask-composite:exclude;opacity:.55;}
  .cbrand{display:flex;align-items:center;gap:11px;margin-bottom:6px;}
  .cbrand .tri{width:40px;height:40px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:19px;
    background:linear-gradient(150deg,rgba(251,146,60,.2),rgba(37,99,235,.16));border:1px solid rgba(251,146,60,.4);color:var(--orange);}
  .cbrand b{font-size:16px;font-weight:800;letter-spacing:.2px;}
  .cbrand small{display:block;font-size:9.5px;letter-spacing:.18em;color:var(--mutL);font-family:ui-monospace,Menlo,monospace;margin-top:2px;}
  .ctitle{font-size:19px;font-weight:800;margin:18px 0 2px;}
  .csub{font-size:12.5px;color:var(--mutL);margin-bottom:16px;}

  .atabs{display:flex;background:rgba(8,18,38,.6);border:1px solid var(--line-d);border-radius:12px;padding:4px;margin-bottom:16px;}
  .atab{flex:1;border:0;background:none;color:var(--mutL);font-weight:700;font-size:13.5px;padding:9px;border-radius:9px;cursor:pointer;transition:.18s;}
  .atab.on{background:linear-gradient(120deg,var(--blue),#1e40af);color:#fff;box-shadow:0 6px 18px rgba(37,99,235,.4);}

  .al{display:block;font-size:11.5px;font-weight:600;color:#b9cbe8;margin:13px 0 5px;}
  .al .rq{color:var(--orange);}
  .auth-card input,.auth-card select{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--line-d);border-radius:11px;
    padding:12px 13px;font:inherit;font-size:14px;color:var(--txtL);transition:.16s;}
  .auth-card input::placeholder{color:rgba(143,166,200,.55);}
  .auth-card input:focus,.auth-card select:focus{outline:none;border-color:var(--cyan);background:rgba(56,189,248,.08);box-shadow:0 0 0 3px rgba(56,189,248,.13);}
  .auth-card select option{background:#0e2147;color:#fff;}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 12px;}
  @media(max-width:460px){ .grid2{grid-template-columns:1fr;} .card-3d{width:100%;} }
  .span2{grid-column:1/-1;}

  .abtn{width:100%;border:0;border-radius:12px;padding:13px;font-size:14.5px;font-weight:800;cursor:pointer;margin-top:18px;
    color:#fff;background:linear-gradient(120deg,var(--blue),#1d4ed8);box-shadow:0 12px 30px rgba(37,99,235,.42);transition:.16s;letter-spacing:.2px;}
  .abtn:hover{filter:brightness(1.07);transform:translateY(-1px);}
  .abtn:disabled{opacity:.55;cursor:not-allowed;transform:none;}
  .abtn.ghost{background:rgba(255,255,255,.06);border:1px solid var(--line-d);box-shadow:none;margin-top:8px;}
  .alink{background:none;border:0;color:var(--cyan);font-size:12px;cursor:pointer;padding:0;}
  .anote{font-size:10.5px;color:var(--mutL);margin-top:13px;line-height:1.55;font-family:ui-monospace,Menlo,monospace;}
  .abanner{padding:10px 12px;border-radius:10px;font-size:12.5px;margin-top:12px;line-height:1.45;}
  .abanner.err{background:rgba(220,38,38,.14);border:1px solid rgba(248,113,113,.4);color:#fecaca;}
  .abanner.ok{background:rgba(22,163,74,.14);border:1px solid rgba(74,222,128,.4);color:#bbf7d0;}
  .foot{position:fixed;bottom:12px;left:0;right:0;text-align:center;z-index:5;font-size:10px;color:rgba(143,166,200,.7);
    font-family:ui-monospace,Menlo,monospace;letter-spacing:.05em;}

  /* ===== HOME (after login) ===== */
  .home-wrap{position:relative;z-index:5;max-width:1000px;margin:0 auto;padding:22px 18px 90px;}
  .htop{display:flex;align-items:center;gap:12px;margin-bottom:30px;}
  .htop .tri{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px;
    background:linear-gradient(150deg,rgba(251,146,60,.22),rgba(37,99,235,.16));border:1px solid rgba(251,146,60,.42);color:var(--orange);}
  .htop .bt b{font-size:15px;font-weight:800;color:var(--txtL);letter-spacing:.2px;}
  .htop .bt small{display:block;font-size:9.5px;letter-spacing:.18em;color:var(--mutL);font-family:ui-monospace,Menlo,monospace;}
  .hquit{margin-left:auto;display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.05);border:1px solid var(--line-d);
    color:#dbe6f7;border-radius:11px;padding:9px 15px;font-size:13px;font-weight:700;cursor:pointer;transition:.16s;}
  .hquit:hover{background:rgba(248,113,113,.14);border-color:rgba(248,113,113,.45);color:#fecaca;}

  .hello-row{display:flex;align-items:center;gap:16px;margin-bottom:6px;}
  .hava{width:58px;height:58px;border-radius:50%;flex:0 0 auto;display:flex;align-items:center;justify-content:center;font-size:24px;font-weight:800;
    color:#fff;background:linear-gradient(150deg,var(--blue),#1e3a8a);border:1px solid rgba(120,170,255,.4);box-shadow:0 10px 30px rgba(37,99,235,.4);}
  .hello{font-size:clamp(25px,4.6vw,38px);font-weight:850;letter-spacing:-.5px;line-height:1.05;margin:0;
    background:linear-gradient(120deg,#fff,#bcd2f5 55%,#8fb4ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .wave{display:inline-block;transform-origin:70% 70%;animation:wave 2.6s ease-in-out infinite;}
  @keyframes wave{0%,60%,100%{transform:rotate(0)}10%{transform:rotate(16deg)}20%{transform:rotate(-10deg)}30%{transform:rotate(16deg)}40%{transform:rotate(-6deg)}50%{transform:rotate(10deg)}}
  .hsub{color:var(--mutL);font-size:13.5px;margin:7px 0 0;}
  .hsub .rolechip{display:inline-block;margin-left:6px;font-size:10.5px;font-weight:700;letter-spacing:.05em;color:#a7f3d0;
    background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.32);border-radius:99px;padding:2px 9px;font-family:ui-monospace,Menlo,monospace;}
  .heyebrow{font-size:11px;color:var(--mutL);letter-spacing:.18em;text-transform:uppercase;margin:30px 2px 14px;font-family:ui-monospace,Menlo,monospace;}
  .htiles{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
  @media(max-width:820px){ .htiles{grid-template-columns:repeat(2,1fr);} }
  @media(max-width:520px){ .htiles{grid-template-columns:1fr;} }
  .htile{position:relative;overflow:hidden;display:flex;flex-direction:column;gap:12px;min-height:128px;padding:17px;border-radius:18px;
    text-decoration:none;color:var(--txtL);background:linear-gradient(165deg,rgba(18,34,64,.72),rgba(8,18,38,.6));
    border:1px solid var(--line-d);backdrop-filter:blur(12px);transition:.16s;}
  .htile::before{content:"";position:absolute;left:0;top:0;right:0;height:3px;background:var(--c,#38bdf8);opacity:.9;}
  .htile::after{content:"";position:absolute;right:-30px;top:-30px;width:90px;height:90px;border-radius:50%;background:var(--c,#38bdf8);opacity:.07;filter:blur(6px);}
  .htile:hover{transform:translateY(-3px);border-color:color-mix(in srgb,var(--c) 50%,transparent);box-shadow:0 18px 42px rgba(2,8,20,.55);}
  .htile .ic{width:46px;height:46px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:22px;
    color:var(--c,#38bdf8);background:var(--cb,rgba(56,189,248,.14));border:1px solid color-mix(in srgb,var(--c) 35%,transparent);}
  .htile .lab{font-weight:800;font-size:15.5px;}
  .htile .sub{font-size:11.5px;color:var(--mutL);line-height:1.4;}
  .hfoot{text-align:center;margin-top:34px;font-size:10px;color:rgba(143,166,200,.6);font-family:ui-monospace,Menlo,monospace;letter-spacing:.06em;}

  /* ===== NDA modal ===== */
  .nda-ov{position:fixed;inset:0;z-index:80;background:rgba(3,8,18,.72);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;padding:18px;}
  .nda-card{width:680px;max-width:100%;max-height:90svh;display:flex;flex-direction:column;background:linear-gradient(165deg,#0f2147,#0a1730);
    border:1px solid var(--line-d);border-radius:18px;box-shadow:0 40px 90px rgba(2,8,20,.7);color:var(--txtL);overflow:hidden;}
  .nda-hd{padding:18px 22px;border-bottom:1px solid var(--line-d);}
  .nda-hd .k{font-size:10px;letter-spacing:.2em;color:var(--orange);font-family:ui-monospace,Menlo,monospace;}
  .nda-hd h2{margin:5px 0 0;font-size:18px;font-weight:800;}
  .nda-hd p{margin:4px 0 0;font-size:12px;color:var(--mutL);}
  .nda-body{padding:18px 22px;overflow-y:auto;font-size:13px;line-height:1.7;color:#d6e2f5;}
  .nda-body h3{font-size:13.5px;color:#fff;margin:16px 0 5px;}
  .nda-body p{margin:0 0 9px;}
  .nda-body ol{margin:0 0 9px;padding-left:20px;} .nda-body li{margin-bottom:6px;}
  .nda-body .muted{color:var(--mutL);font-size:11.5px;}
  .nda-ft{padding:14px 22px 18px;border-top:1px solid var(--line-d);background:rgba(6,14,30,.5);}
  .agree{display:flex;gap:10px;align-items:flex-start;font-size:12.5px;color:#cfe0fb;margin-bottom:12px;cursor:pointer;}
  .agree input{width:18px;height:18px;flex:0 0 auto;margin-top:1px;accent-color:var(--cyan);}
  .nda-actions{display:flex;gap:10px;}
  .nda-actions .abtn{margin-top:0;}

  /* ===== home (dark, same nuance as login) ===== */
  .home-wrap{position:relative;z-index:5;max-width:1080px;margin:0 auto;padding:20px 18px 80px;min-height:100svh;}
  .topbar-d{display:flex;align-items:center;justify-content:space-between;gap:12px;
    background:rgba(12,26,52,.55);border:1px solid var(--line-d);border-radius:16px;padding:12px 16px;backdrop-filter:blur(14px);box-shadow:0 12px 34px rgba(2,8,20,.4);}
  .topbar-d .brand{display:flex;align-items:center;gap:11px;color:var(--txtL);}
  .topbar-d .tri{width:38px;height:38px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:18px;
    background:linear-gradient(150deg,rgba(251,146,60,.2),rgba(37,99,235,.16));border:1px solid rgba(251,146,60,.4);color:var(--orange);}
  .topbar-d .brand b{font-size:15px;font-weight:800;} .topbar-d .brand small{display:block;font-size:9px;letter-spacing:.18em;color:var(--mutL);font-family:ui-monospace,Menlo,monospace;}
  .exit{display:inline-flex;align-items:center;gap:7px;background:rgba(220,38,38,.14);border:1px solid rgba(248,113,113,.34);color:#fecaca;border-radius:11px;padding:9px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:.16s;}
  .exit:hover{background:rgba(220,38,38,.24);transform:translateY(-1px);} .exit span{font-size:15px;}
  .greet{margin:30px 2px 22px;color:var(--txtL);}
  .greet .hi{font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--cyan);font-family:ui-monospace,Menlo,monospace;margin-bottom:4px;}
  .greet h1{font-family:'Space Grotesk',system-ui,sans-serif;font-size:38px;line-height:1.05;margin:0;font-weight:700;letter-spacing:-.5px;
    background:linear-gradient(110deg,#fff 10%,#a9c6f5 60%,#6ea8ff);-webkit-background-clip:text;background-clip:text;color:transparent;}
  .greet .wave{display:inline-block;-webkit-text-fill-color:initial;animation:wv 2.4s ease-in-out infinite;transform-origin:70% 70%;}
  @keyframes wv{0%,60%,100%{transform:rotate(0)}10%{transform:rotate(16deg)}20%{transform:rotate(-8deg)}30%{transform:rotate(16deg)}40%{transform:rotate(-4deg)}50%{transform:rotate(10deg)}}
  .greet p{margin:9px 0 0;color:var(--mutL);font-size:13.5px;}
  .eyebrow-d{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--mutL);margin:6px 2px 12px;}
  .tiles-d{display:grid;grid-template-columns:repeat(2,1fr);gap:13px;}
  @media(min-width:720px){ .tiles-d{grid-template-columns:repeat(3,1fr);} }
  .tile-d{position:relative;display:block;text-decoration:none;color:var(--txtL);overflow:hidden;
    background:linear-gradient(165deg,rgba(18,34,64,.66),rgba(8,18,38,.6));border:1px solid var(--line-d);border-radius:18px;padding:17px 16px 16px;
    min-height:128px;backdrop-filter:blur(12px);transition:.18s;box-shadow:0 14px 34px rgba(2,8,20,.35);}
  .tile-d::before{content:"";position:absolute;left:0;top:0;height:3px;width:100%;background:var(--c,#3b82f6);opacity:.9;}
  .tile-d::after{content:"";position:absolute;right:-40px;top:-40px;width:110px;height:110px;border-radius:50%;background:radial-gradient(circle,var(--c,#3b82f6),transparent 70%);opacity:.14;}
  .tile-d:hover{transform:translateY(-3px);border-color:rgba(120,170,240,.4);box-shadow:0 22px 46px rgba(2,8,20,.5);}
  .tile-d:active{transform:scale(.98);}
  .tile-d .ic{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:21px;margin-bottom:12px;
    color:var(--c,#fff);background:color-mix(in srgb, var(--c,#3b82f6) 18%, transparent);border:1px solid color-mix(in srgb, var(--c,#3b82f6) 40%, transparent);}
  .tile-d .lab{font-weight:800;font-size:15.5px;} .tile-d .sub{font-size:11.5px;color:var(--mutL);line-height:1.4;margin-top:3px;}
  .tile-d .go{position:absolute;right:14px;bottom:13px;color:var(--mutL);font-size:17px;transition:.18s;}
  .tile-d:hover .go{color:#fff;transform:translateX(3px);}
  .foot-d{text-align:center;color:rgba(143,166,200,.6);font-size:10px;letter-spacing:.08em;font-family:ui-monospace,Menlo,monospace;margin-top:30px;}
</style>
</head>
<body>
<div id="root"><div class="center"><div class="spin"></div></div></div>

<script>
"use strict";
const sb = GMS.sb, $ = GMS.$, esc = GMS.esc;

/* ===================== HOME (after login) ===================== */
const TILES = [
  { key:"inspeksi", href:"inspeksi.html", label:"Inspeksi Baru", sub:"Checklist · GPS · foto (offline)", ic:"&#9633;", c:"#fb923c", access:"member" },
  { key:"pera",     href:"pera.html",     label:"PERA",          sub:"Penilaian cepat pasca gempa (offline)", ic:"&#9888;", c:"#22d3ee", access:"member" },
  { key:"monitoring",href:"monitoring.html",label:"Monitoring", sub:"Dashboard terintegrasi (EEWS · risiko · instrumen)", ic:"&#9707;", c:"#60a5fa", access:"admin" },
  { key:"eews",     href:"eews.html",     label:"EEWS",          sub:"Peringatan dini gempa", ic:"&#9883;", c:"#f87171", access:"admin" },
  { key:"dashboard",href:"exec_dashboard.html",label:"Dashboard",sub:"Peta & daftar risiko + laporan", ic:"&#9636;", c:"#3b82f6", access:"admin" },
  { key:"validasi", href:"validasi.html", label:"Validasi",      sub:"Verifikasi & approve inspeksi", ic:"&#9745;", c:"#2dd4bf", access:"admin" },
  { key:"database", href:"database.html", label:"Database",      sub:"Checklist · User · Reporting · Audit PERA", ic:"&#9638;", c:"#a78bfa", access:"admin" },
];
function renderHome(p){
  const canV = p.canValidate;                              // admin/super only
  const tiles = TILES.filter(t => t.access==="member" || canV);
  const nm = (p.profile&&p.profile.full_name) || (p.email||"").split("@")[0] || "";
  const sub = [(p.profile&&p.profile.position), (p.profile&&p.profile.department)].filter(Boolean).join(" · ");
  const roleLbl = p.role==="super_admin"?"Super Admin":p.role==="admin"?"Admin":"Member";
  const tileHtml = tiles.map(t =>
    '<a class="tile-d" href="'+t.href+'" style="--c:'+t.c+'">'+
      '<div class="ic" style="--c:'+t.c+'">'+t.ic+'</div>'+
      '<div class="lab">'+esc(t.label)+'</div><div class="sub">'+esc(t.sub)+'</div>'+
      '<span class="go">&#8594;</span></a>').join("");
  $("root").innerHTML = sceneBg()+
    '<div class="home-wrap">'+
      '<div class="topbar-d">'+
        '<div class="brand"><div class="tri">&#9650;</div><div><b>Geotech Monitoring</b><small>BAHODOPI BLOCK 2 &amp; 3</small></div></div>'+
        '<button class="exit" onclick="GMS.logout()"><span>&#9211;</span> Keluar</button>'+
      '</div>'+
      '<div class="greet"><div class="hi">Selamat datang</div>'+
        '<h1>Hello, '+esc(nm)+' <span class="wave">&#128075;</span></h1>'+
        '<p>'+(sub?esc(sub)+' · ':'')+'<span class="mono" style="opacity:.85">'+esc(roleLbl)+'</span></p></div>'+
      '<div class="eyebrow-d">Menu Aplikasi</div>'+
      '<div class="tiles-d">'+tileHtml+'</div>'+
      '<div class="foot-d">IGP MOROWALI · PT VALE INDONESIA · INTERNAL USE ONLY</div>'+
    '</div>';
}

/* ===================== AUTH ===================== */
let mode = "signin";            // signin | signup | forgot | newpass
let abusy=false, aerr="", amsg="";
let ndaOpen=false, ndaChecked=false, pendingSignup=null;

function sceneBg(){
  return '<div class="scene">'+
    '<div class="bg-grad"></div>'+
    mineSVG()+
    '<div class="bg-grid"></div>'+
    '<div class="scan"></div>'+
    '<div class="vign"></div>'+
  '</div>';
}
function mineSVG(){
  const x0=-600,x1=600,seg=6,step=(x1-x0)/seg;
  function wave(base,amp,ph){ let d='M '+x0+' '+(base+Math.sin(ph)*amp).toFixed(0);
    for(let i=0;i<seg;i++){ const x=x0+step*(i+1), cx1=x0+step*i+step/3, cx2=x0+step*i+2*step/3;
      const y1=base+Math.sin(i+ph)*amp, y2=base+Math.sin(i+0.6+ph)*amp, yE=base+Math.sin(i+1+ph)*amp;
      d+=' C '+cx1.toFixed(0)+' '+y1.toFixed(0)+' '+cx2.toFixed(0)+' '+y2.toFixed(0)+' '+x.toFixed(0)+' '+yE.toFixed(0); }
    return d; }
  let contours=''; for(let i=0;i<9;i++){ contours+='<path d="'+wave(-300+i*60,16+(i%3)*9,i*0.7)+'"/>'; }
  let pit=''; for(let i=0;i<6;i++){ pit+='<ellipse cx="120" cy="252" rx="'+(380-i*58)+'" ry="'+(122-i*18)+'" class="pit"/>'; }
  const B=[[-300,-180],[120,-232],[300,-88],[-150,-40],[262,28],[-360,60],[44,-120],[420,-160]];
  let blips=''; B.forEach((b,i)=> blips+='<g transform="translate('+b[0]+','+b[1]+')"><circle r="2.6" class="bp"/><circle r="2.6" class="bpr" style="animation-delay:'+(i*0.45).toFixed(2)+'s"/></g>');
  return '<svg class="bg-mine" viewBox="-600 -360 1200 720" preserveAspectRatio="xMidYMid slice">'+
    '<defs><linearGradient id="cl" x1="0" y1="0" x2="0" y2="1">'+
      '<stop offset="0" stop-color="#38bdf8" stop-opacity=".4"/><stop offset="1" stop-color="#1d4ed8" stop-opacity=".04"/></linearGradient></defs>'+
    '<style>.bg-mine path{fill:none;stroke:url(#cl);stroke-width:1;}'+
      '.bg-mine .pit{fill:none;stroke:rgba(251,146,60,.16);stroke-width:1;}'+
      '.bg-mine .bp{fill:#fb923c;}'+
      '.bg-mine .bpr{fill:none;stroke:#fde68a;stroke-width:1.2;transform-box:fill-box;transform-origin:center;animation:blip 2.8s ease-out infinite;}'+
      '@keyframes blip{0%{r:2.6;opacity:.9}70%{r:15;opacity:0}100%{opacity:0}}</style>'+
    '<g>'+contours+'</g><g>'+pit+'</g><g>'+blips+'</g>'+
  '</svg>';
}

function getF(){
  const g=id=>($(id)&&$(id).value)||"";
  return { email:g("email").trim(), pass:g("pass"), name:g("sf_name"), badge:g("sf_badge"),
           pos:g("sf_pos"), dept:g("sf_dept"), phone:g("sf_phone"), pass2:g("sf_pass2") };
}

function renderAuth(){
  const f = getF();
  const card =
    '<div class="card-3d"><div class="auth-card" id="authCard">'+
      '<div class="cbrand"><div class="tri">&#9650;</div><div><b>Geotech Monitoring</b><small>BAHODOPI BLOCK 2 &amp; 3</small></div></div>'+
      ( mode==="newpass"
        ? '<div class="ctitle">Password Baru</div><div class="csub">Buat password baru untuk akunmu.</div>'
        : mode==="forgot"
        ? '<div class="ctitle">Reset Password</div><div class="csub">Kami kirim link reset ke emailmu.</div>'
        : '<div class="atabs"><button class="atab '+(mode==="signin"?"on":"")+'" onclick="setMode(\'signin\')">Masuk</button>'+
          '<button class="atab '+(mode==="signup"?"on":"")+'" onclick="setMode(\'signup\')">Daftar</button></div>' )+
      fields(f)+
      (aerr?'<div class="abanner err">'+esc(aerr)+'</div>':'')+
      (amsg?'<div class="abanner ok">'+esc(amsg)+'</div>':'')+
      btns()+
      '<div class="anote">'+noteText()+'</div>'+
    '</div></div>';
  const hero =
    '<div class="hero">'+
      '<div class="mk"><div class="tri">&#9650;</div><b style="font-size:15px;letter-spacing:.18em;font-family:ui-monospace,Menlo,monospace;color:#bcd2f5">PT VALE · IGP MOROWALI</b></div>'+
      '<h1>Geotechnical Monitoring System</h1>'+
      '<p>Platform pemantauan kestabilan lereng, hidrologi, instrumentasi & peringatan dini gempa untuk Bahodopi Block 2 &amp; 3 — terintegrasi, real-time, dan berbasis data.</p>'+
      '<div class="chips">'+
        '<span class="chip"><span class="d"></span>Slope Stability</span>'+
        '<span class="chip"><span class="d"></span>EEWS</span>'+
        '<span class="chip"><span class="d"></span>Hydrology / AWS</span>'+

      '</div>'+
    '</div>';
  $("root").innerHTML = sceneBg() +
    '<div class="auth-wrap">'+hero+card+'</div>'+
    '<div class="foot">PT VALE INDONESIA · IGP MOROWALI BAHODOPI · INTERNAL USE ONLY</div>'+
    (ndaOpen?ndaModal():"");

}

function fields(f){
  if(mode==="forgot")
    return '<label class="al">Email</label><input id="email" type="email" placeholder="nama@valeindonesia.com" value="'+esc(f.email)+'">';
  if(mode==="newpass")
    return '<label class="al">Password Baru <span class="rq">*</span></label><input id="pass" type="password" placeholder="min. 6 karakter" onkeydown="if(event.key===\'Enter\')doPrimary()">';
  if(mode==="signin")
    return '<label class="al">Email</label><input id="email" type="email" placeholder="nama@valeindonesia.com" value="'+esc(f.email)+'">'+
           '<label class="al">Password</label><input id="pass" type="password" placeholder="••••••••" onkeydown="if(event.key===\'Enter\')doPrimary()">'+
           '<div style="margin-top:9px"><button class="alink" onclick="setMode(\'forgot\')">Lupa password?</button></div>';
  // signup
  return '<div class="grid2">'+
    '<div class="span2"><label class="al">Nama Lengkap <span class="rq">*</span></label><input id="sf_name" placeholder="mis. Fahmi Hidayah" value="'+esc(f.name)+'"></div>'+
    '<div class="span2"><label class="al">Email Kerja <span class="rq">*</span></label><input id="email" type="email" placeholder="nama@valeindonesia.com" value="'+esc(f.email)+'"></div>'+
    '<div><label class="al">Badge / NIK <span class="rq">*</span></label><input id="sf_badge" placeholder="mis. 0676733" value="'+esc(f.badge)+'"></div>'+
    '<div><label class="al">Jabatan <span class="rq">*</span></label><input id="sf_pos" placeholder="mis. Geotech Engineer" value="'+esc(f.pos)+'"></div>'+
    '<div><label class="al">Departemen <span class="rq">*</span></label><select id="sf_dept">'+
      ['','Geotechnical & Hydrology','Geotechnical','Hydrology','Mine Operations','Mine Planning','Survey','Mine Geology','OHS / Safety','Lainnya']
        .map(o=>'<option value="'+esc(o)+'"'+(f.dept===o?' selected':'')+'>'+(o===''?'— pilih —':esc(o))+'</option>').join("")+
    '</select></div>'+
    '<div><label class="al">No. HP Kerja</label><input id="sf_phone" placeholder="opsional" value="'+esc(f.phone)+'"></div>'+
    '<div><label class="al">Password <span class="rq">*</span></label><input id="pass" type="password" placeholder="min. 6"></div>'+
    '<div><label class="al">Ulangi Password <span class="rq">*</span></label><input id="sf_pass2" type="password" placeholder="ulangi"></div>'+
  '</div>';
}
function btns(){
  const label = abusy?"Memproses…":mode==="signup"?"Lanjut ke Perjanjian (NDA)":mode==="forgot"?"Kirim Link Reset":mode==="newpass"?"Simpan Password":"Masuk";
  let h='<button class="abtn" '+(abusy?'disabled':'')+' onclick="doPrimary()">'+label+'</button>';
  if(mode==="forgot") h+='<button class="abtn ghost" onclick="setMode(\'signin\')">Kembali</button>';
  return h;
}
function noteText(){
  return mode==="signup" ? "Hanya email @vale.com / @valeindonesia.com / @gmail.com. Akun baru menunggu persetujuan Super Admin setelah perjanjian kerahasiaan disetujui."
    : mode==="forgot" ? "Masukkan email akunmu; link reset dikirim ke email (cek inbox/spam)."
    : mode==="newpass" ? "Simpan password baru, lalu kamu otomatis diarahkan."
    : "Masuk dengan akun terdaftar. Akun harus sudah diaktifkan Super Admin.";
}
function setMode(m){ mode=m; aerr=""; amsg=""; ndaOpen=false; renderAuth(); }
window.setMode=setMode;

/* ---- 3D tilt ---- */
function initAuthFX(){
  const card=$("authCard"); const wrap=document.querySelector(".auth-wrap");
  if(card && wrap && !('ontouchstart' in window)){
    wrap.onmousemove=e=>{ const r=card.getBoundingClientRect(); const cx=r.left+r.width/2, cy=r.top+r.height/2;
      const dx=(e.clientX-cx)/r.width, dy=(e.clientY-cy)/r.height;
      card.style.transform='rotateY('+(dx*6).toFixed(2)+'deg) rotateX('+(-dy*6).toFixed(2)+'deg)'; };
    wrap.onmouseleave=()=>{ card.style.transform='rotateY(0) rotateX(0)'; };
  }
}

/* ---- primary action ---- */
async function doPrimary(){
  aerr=""; amsg="";
  if(mode==="signup"){ return startSignup(); }
  const f=getF();
  abusy=true; renderAuth();
  try{
    if(mode==="forgot"){
      const { error } = await sb.auth.resetPasswordForEmail(f.email, { redirectTo: location.origin });
      if(error) throw error;
      amsg="Jika email terdaftar, link reset sudah dikirim."; abusy=false; renderAuth();
    } else if(mode==="newpass"){
      const { error } = await sb.auth.updateUser({ password:f.pass });
      if(error) throw error;
      amsg="Password diperbarui. Mengarahkan…"; renderAuth(); setTimeout(boot,800);
    } else {
      const { error } = await sb.auth.signInWithPassword({ email:f.email, password:f.pass });
      if(error) throw error;
      return boot();
    }
  }catch(e){ aerr=e.message||String(e); abusy=false; renderAuth(); }
}
window.doPrimary=doPrimary;

function startSignup(){
  const f=getF();
  const allowed=["gmail.com","vale.com","valeindonesia.com"];
  const dom=(f.email.split("@")[1]||"").toLowerCase();
  if(!f.name||!f.email||!f.badge||!f.pos||!f.dept||!f.pass){ aerr="Lengkapi semua kolom bertanda *."; renderAuth(); return; }
  if(!allowed.includes(dom)){ aerr="Hanya email @vale.com, @valeindonesia.com, atau @gmail.com."; renderAuth(); return; }
  if(f.pass.length<6){ aerr="Password minimal 6 karakter."; renderAuth(); return; }
  if(f.pass!==f.pass2){ aerr="Konfirmasi password tidak cocok."; renderAuth(); return; }
  pendingSignup=f; ndaChecked=false; ndaOpen=true; aerr=""; renderAuth();
}

      '<h2>Non-Disclosure Agreement (NDA)</h2>'+

        '<span>Saya telah membaca, memahami, dan menyetujui seluruh isi Perjanjian Kerahasiaan ini, serta menyatakan data yang saya isikan benar.</span></label>'+

function closeNda(){ ndaOpen=false; renderAuth(); }
window.closeNda=closeNda;

async function createAccount(){
  if(!ndaChecked || !pendingSignup) return;
  const f=pendingSignup; abusy=true; ndaOpen=false; renderAuth();
  try{
    const { data, error } = await sb.auth.signUp({ email:f.email, password:f.pass,
      options:{ emailRedirectTo: location.origin, data:{
        full_name:f.name, badge_number:f.badge, position:f.pos, department:f.dept, phone:f.phone, nda_accepted:true }}});
    if(error) throw error;
    if(data.session){ return boot(); }
    const { error:e2 } = await sb.auth.signInWithPassword({ email:f.email, password:f.pass });
    if(!e2){ return boot(); }
    mode="signin"; amsg="Akun dibuat & NDA tercatat. Menunggu persetujuan Super Admin."; abusy=false; pendingSignup=null; renderAuth();
  }catch(e){ aerr=e.message||String(e); abusy=false; renderAuth(); }
}
window.createAccount=createAccount;

/* ===================== BOOT ===================== */
async function boot(){
  $("root").innerHTML='<div class="center"><div class="spin"></div></div>';
  const session = await GMS.getSession();
  if(!session){
    if((location.hash||"").includes("type=recovery")) mode="newpass";
    abusy=false; renderAuth(); return;
  }
  const p = await GMS.getProfile();
  if(!p){ abusy=false; renderAuth(); return; }
  if(p.status!=="active"){
    $("root").innerHTML = GMS.header("Geotech Monitoring","Bahodopi",{back:false}) +
      '<div class="center">'+
        '<div style="width:56px;height:56px;border-radius:50%;background:#fef3c7;color:#d97706;display:flex;align-items:center;justify-content:center;font-size:26px">&#9888;</div>'+
        '<div style="font-size:17px;font-weight:700">'+(p.status==="disabled"?"Akun dinonaktifkan":"Menunggu persetujuan")+'</div>'+
        '<div style="font-size:13px;max-width:340px">'+(p.status==="disabled"?"Akun ini dinonaktifkan oleh admin.":"Akun kamu menunggu persetujuan Super Admin sebelum bisa dipakai.")+'</div>'+
        '<button class="btn" style="max-width:180px" onclick="GMS.logout()">Keluar</button>'+
      '</div>';
    return;
  }
  renderHome(p);
}
sb.auth.onAuthStateChange((ev)=>{ if(ev==="PASSWORD_RECOVERY"){ mode="newpass"; ndaOpen=false; renderAuth(); } });
if("serviceWorker" in navigator){ navigator.serviceWorker.register("sw.js").catch(()=>{}); }
boot();
