name: Deploy to Cloudflare

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # allows a manual "Run workflow" button in the Actions tab

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Cloudflare Workers (gcmp)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: 931bec06ad7b1a086605a4271eb22d0f
          wranglerVersion: '4.107.0'   # v3.90 can't deploy an assets-only Worker (needs v4)
          command: deploy
