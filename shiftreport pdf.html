<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shift Report — PDF</title>
<link rel="stylesheet" href="common.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="common.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  body{background:#eef2f7;}
  .topbar{position:sticky;top:0;z-index:10;background:#0b1f3a;color:#fff;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 16px;}
  .topbar .t{font-size:13px;font-weight:700;}
  .topbar .btn{background:#fff;color:#0b1f3a;border:none;font-weight:700;}
  .sheet{max-width:820px;margin:18px auto;background:#fff;border:1px solid #d7dee8;border-radius:6px;padding:30px 34px;}
  .rhead{display:flex;justify-content:space-between;align-items:flex-start;border-bottom:2px solid #0b1f3a;padding-bottom:12px;margin-bottom:16px;}
  .rhead .ttl{font-size:20px;font-weight:800;color:#0b1f3a;} .rhead .ttl small{display:block;font-size:11px;font-weight:500;color:#64748b;}
  .rhead .rid{text-align:right;font-size:11px;color:#475569;font-family:ui-monospace,Menlo,monospace;}
  .tarpchip{display:inline-block;font-weight:800;font-size:12px;padding:4px 12px;border-radius:7px;border:1px solid;margin-top:4px;}
  .meta{display:grid;grid-template-columns:repeat(4,1fr);gap:10px 16px;margin-bottom:18px;}
  @media(max-width:620px){.meta{grid-template-columns:1fr 1fr;}}
  .meta .k{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;font-weight:700;}
  .meta .v{font-size:13px;font-weight:600;color:#0f172a;}
  h3.sh{font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:#64748b;font-weight:800;margin:18px 0 8px;border-bottom:1px solid #e2e8f0;padding-bottom:5px;}
  table{width:100%;border-collapse:collapse;font-size:11.5px;}
  th{background:#f1f5f9;text-align:left;padding:7px 8px;font-size:9px;text-transform:uppercase;letter-spacing:.05em;color:#475569;border-bottom:1px solid #cbd5e1;}
  td{padding:6px 8px;border-bottom:1px solid #eef2f7;}
  .tind{font-size:10px;font-weight:800;padding:1px 7px;border-radius:5px;border:1px solid;}
  .cl{display:flex;justify-content:space-between;gap:10px;padding:5px 0;border-bottom:1px solid #f1f5f9;font-size:12px;}
  .ans{font-weight:700;padding:1px 9px;border-radius:5px;font-size:11px;}
  .ans.Ya{background:#f0fdf4;color:#16a34a;} .ans.Tidak{background:#fef2f2;color:#dc2626;} .ans.NA{background:#f1f5f9;color:#64748b;}
  .sig{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px;margin-top:8px;}
  @media(max-width:620px){.sig{grid-template-columns:1fr;}}
  .sigb{border:1px solid #e2e8f0;border-radius:8px;padding:10px;}
  .sigb .r{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:#94a3b8;font-weight:700;margin-bottom:18px;}
  .sigb .n{border-top:1px solid #cbd5e1;padding-top:6px;font-size:12px;text-align:center;}
  .note-box{font-size:12.5px;color:#1e293b;line-height:1.6;white-space:pre-wrap;border:1px solid #e2e8f0;border-radius:8px;padding:12px;background:#fafcff;}
  #map{height:420px;border:1px solid #cbd5e1;border-radius:6px;margin-top:6px;}
  .lbltip{font-size:9px;font-weight:800;background:rgba(255,255,255,.88);border:none;box-shadow:none;padding:0 4px;color:#0f172a;}
  .lbltip::before{display:none;}
  .maplegend{display:flex;gap:14px;flex-wrap:wrap;margin-top:10px;font-size:11px;color:#475569;}
  .maplegend i{display:inline-flex;align-items:center;gap:5px;font-style:normal;}
  .lgd{width:11px;height:11px;border-radius:3px;display:inline-block;}
  .lgd.tri{width:0;height:0;border-radius:0;border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:11px solid #16a34a;}
  .foot{margin-top:20px;border-top:1px solid #e2e8f0;padding-top:8px;font-size:10px;color:#94a3b8;display:flex;justify-content:space-between;}
  @media print{
    @page{size:A4;margin:11mm;}
    *{-webkit-print-color-adjust:exact;print-color-adjust:exact;}
    body{background:#fff;} .topbar{display:none!important;}
    .sheet{max-width:none;margin:0;border:none;border-radius:0;padding:0;}
    .leaflet-control-layers,.leaflet-control-zoom,.leaflet-control-attribution{display:none!important;}
    .page2{page-break-before:always;break-before:page;}
    #map{height:232mm!important;border:none;border-radius:0;}
  }
</style>
</head>
<body>
<div class="topbar"><span class="t">Shift Report — Pratinjau PDF</span><button class="btn" onclick="window.print()">&#11015; Download PDF</button></div>
<div id="app"><div class="center" style="padding:60px"><div class="spin"></div><div>Memuat laporan…</div></div></div>

<script>
const $=GMS.$, sb=GMS.sb, esc=GMS.esc;
const RISK={0:{lab:'Normal',c:'#64748b',bg:'#f1f5f9'},1:{lab:'Low',c:'#16a34a',bg:'#f0fdf4'},2:{lab:'Medium',c:'#eab308',bg:'#fefce8'},3:{lab:'High',c:'#f97316',bg:'#fff7ed'},4:{lab:'High Risk',c:'#dc2626',bg:'#fef2f2'}};
function qs(k){ return new URLSearchParams(location.search).get(k); }
function fmt(v){ if(!v)return'—'; try{return new Date(v).toLocaleString('id-ID',{day:'2-digit',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'});}catch(e){return v;} }
function fmtd(v){ if(!v)return'—'; try{return new Date(v).toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'});}catch(e){return v;} }

async function buildMap(view){
  const el=$("map"); if(!el||typeof L==="undefined") return;
  const map=L.map("map",{scrollWheelZoom:false});
  const base={
    esri:L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19,attribution:"Esri"}),
    aerial:L.tileLayer("https://young-mouse-1ee2.fahmihidyah.workers.dev/{z}/{x}/{y}.jpg",{minNativeZoom:14,maxNativeZoom:19,maxZoom:19,tms:false}),
    osm:L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OSM"})
  };
  const bk=(view&&base[view.base])?view.base:'esri'; base[bk].addTo(map);
  L.control.layers({"Satelit (Esri)":base.esri,"Aerial PTVI":base.aerial,"Peta (OSM)":base.osm},null,{position:"topright"}).addTo(map);
  const showRisk=!view||view.risk!==false, showInst=!view||view.inst!==false;
  const all=[];
  if(showRisk) try{
    const rp=await sb.from("v_inspection_risk_areas").select("polygon_geojson,risk_color,risk_level,location_name").limit(300);
    ((rp&&!rp.error&&rp.data)?rp.data:[]).forEach(a=>{ if(!a.polygon_geojson)return;
      try{ const gj=(typeof a.polygon_geojson==="string")?JSON.parse(a.polygon_geojson):a.polygon_geojson; const col=a.risk_color||"#dc2626";
        const lyr=L.geoJSON(gj,{style:{color:col,weight:2,fillColor:col,fillOpacity:.22}}).addTo(map);
        lyr.bindPopup("<b>"+esc(a.location_name||"Area")+"</b><br>Risk "+esc(a.risk_level||""));
        const b=lyr.getBounds(); if(b.isValid()){ all.push([b.getNorth(),b.getEast()],[b.getSouth(),b.getWest()]); }
      }catch(e){}
    });
  }catch(e){}
  if(showInst) try{
    const rs=await sb.from("v_instrument_sensors").select("external_device_id,sensor_name,kind,lat,lng,manual_state,latest_ts").eq("kind","extensometer");
    const seen={};
    ((rs&&!rs.error&&rs.data)?rs.data:[]).forEach(s=>{ if(s.lat==null||s.lng==null)return; const key=s.external_device_id||s.sensor_name; if(seen[key])return; seen[key]=1;
      const off=(s.manual_state==="offline")||!s.latest_ts||((Date.now()-new Date(s.latest_ts).getTime())/3600000>3); const col=off?"#dc2626":"#16a34a";
      L.marker([+s.lat,+s.lng],{icon:L.divIcon({className:"",html:'<div style="width:0;height:0;border-left:7px solid transparent;border-right:7px solid transparent;border-bottom:13px solid '+col+';filter:drop-shadow(0 1px 1px rgba(0,0,0,.4))"></div>',iconSize:[14,13],iconAnchor:[7,13]})}).addTo(map)
        .bindTooltip(String(key),{permanent:true,direction:"right",className:"lbltip",offset:[8,-6]});
      all.push([+s.lat,+s.lng]);
    });
  }catch(e){}
  if(view&&view.center&&view.zoom!=null){ map.setView(view.center,view.zoom); }
  else if(all.length){ try{ map.fitBounds(L.latLngBounds(all).pad(0.25)); }catch(e){ map.setView([-2.74,122.01],13);} }
  else map.setView([-2.74,122.01],12);
  setTimeout(()=>{ try{map.invalidateSize();}catch(e){} },300);
}

function instTable(items){
  if(!items||!items.length) return '<div style="font-size:12px;color:#94a3b8;padding:8px 0">Tidak ada data instrumen.</div>';
  return '<table><thead><tr>'+["ID","Tipe","Area","Lokasi","Status","Nilai","Unit","TARP","Catatan"].map(h=>'<th>'+h+'</th>').join("")+'</tr></thead><tbody>'+
    items.map(d=>{ const rk=RISK[d.tarp_lv||0];
      return '<tr><td style="font-weight:700">'+esc(d.instrument_id||"")+'</td><td>'+esc(d.type||"")+'</td><td>'+esc(d.area||"")+'</td>'+
      '<td>'+esc(d.lokasi||"")+'</td><td>'+esc(d.status||"")+'</td><td style="font-weight:700">'+(d.nilai!=null?esc(String(d.nilai)):"—")+'</td><td style="color:#64748b">'+esc(d.unit||"")+'</td>'+
      '<td><span class="tind" style="color:'+rk.c+';background:'+rk.bg+';border-color:'+rk.c+'">'+rk.lab+'</span></td>'+
      '<td style="color:#64748b">'+esc(d.catatan||"—")+'</td></tr>';
    }).join("")+'</tbody></table>';
}
function checklistHtml(cl){
  if(!cl||!cl.length) return '<div style="font-size:12px;color:#94a3b8">—</div>';
  return cl.map(c=>'<div class="cl"><span>'+esc(c.q||"")+'</span><span class="ans '+(c.answer||"NA")+'">'+esc(c.answer||"—")+'</span></div>').join("");
}

async function load(){
  const id=qs("id");
  if(!id){ $("app").innerHTML='<div class="center" style="padding:60px">ID laporan tidak ada.</div>'; return; }
  const session=await GMS.getSession();
  if(!session){ $("app").innerHTML='<div class="center" style="padding:60px">Perlu login. <a href="index.html">Masuk</a></div>'; return; }
  const r=await sb.from("shift_reports").select("*").eq("id",id).single();
  if(r.error||!r.data){ $("app").innerHTML='<div class="center" style="padding:60px">Laporan tidak ditemukan.</div>'; return; }
  const d=r.data;
  const ri=await sb.from("shift_report_instruments").select("*").eq("report_uuid",id).order("type");
  const items=(ri&&!ri.error&&ri.data)?ri.data:[];
  const rk=RISK[d.tarp_level||0];
  const ho=d.handover||{};
  $("app").innerHTML=`
  <div class="sheet">
    <div class="rhead">
      <div class="ttl">Shift Report<small>Geotechnical Monitoring — Bahodopi Block 2 &amp; 3</small></div>
      <div class="rid">${esc(d.report_id||d.id)}<br>Dibuat: ${fmt(d.created_at)}<br>
        <span class="tarpchip" style="color:${rk.c};background:${rk.bg};border-color:${rk.c}">TARP · ${rk.lab}</span></div>
    </div>
    <div class="meta">
      <div><div class="k">Tanggal</div><div class="v">${fmtd(d.tanggal)}</div></div>
      <div><div class="k">Shift</div><div class="v">${esc(d.shift||"—")}</div></div>
      <div><div class="k">Operator</div><div class="v">${esc(d.operator||"—")}</div></div>
      <div><div class="k">Cuaca</div><div class="v">${esc(d.cuaca||"—")}</div></div>
      <div><div class="k">Curah Hujan</div><div class="v">${d.curah_hujan!=null?esc(String(d.curah_hujan))+" mm":"—"}</div></div>
      <div><div class="k">Jam Hujan</div><div class="v">${esc(d.jam_hujan_mulai||"—")}–${esc(d.jam_hujan_berhenti||"—")}</div></div>
      <div><div class="k">Instrumen</div><div class="v">${d.online_instruments||0}/${d.total_instruments||0} online</div></div>
      <div><div class="k">Coverage</div><div class="v">${d.coverage_pct||0}%</div></div>
    </div>

    <h3 class="sh">Data Instrumen</h3>
    ${instTable(items)}

    <h3 class="sh">Checklist Validasi Shift</h3>
    ${checklistHtml(d.checklist)}

    <h3 class="sh">Catatan &amp; Observasi</h3>
    <div class="note-box">${esc(d.catatan||"—")}</div>

    <h3 class="sh">Serah Terima</h3>
    <div class="sig">
      <div class="sigb"><div class="r">Operator Shift Keluar</div><div class="n">${esc(ho.out||"—")}</div></div>
      <div class="sigb"><div class="r">Operator Shift Masuk</div><div class="n">${esc(ho.in||"—")}</div></div>
      <div class="sigb"><div class="r">Geotechnical Engineer</div><div class="n">${esc(ho.eng||"—")}</div></div>
    </div>

    <div class="foot"><span>GMS · Geotechnical Monitoring System</span><span>${esc(d.report_id||"")}</span></div>

    <div class="page2">
      <h3 class="sh">Site Base Map</h3>
      <div id="map"></div>
      <div class="maplegend">
        <i><span class="lgd tri"></span> Instrumen (extensometer)</i>
        <i><span class="lgd" style="background:#16a34a"></span> Low</i>
        <i><span class="lgd" style="background:#eab308"></span> Medium</i>
        <i><span class="lgd" style="background:#f97316"></span> High</i>
        <i><span class="lgd" style="background:#dc2626"></span> High Risk</i>
        <i style="color:#94a3b8">Poligon = boundary area risiko · warna = level risiko</i>
      </div>
    </div>
  </div>`;
  buildMap(d.map_view||null);
}
load();
</script>
</body>
</html>
