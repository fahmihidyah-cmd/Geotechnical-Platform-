<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0b1f3a">
<link rel="manifest" href="manifest.json">
<title>Dashboard Risiko — Bahodopi</title>
<link rel="stylesheet" href="common.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="common.js"></script>
<style>
  .hero{display:flex;align-items:center;gap:16px;border-radius:14px;padding:16px 18px;color:#fff;margin-bottom:14px;}
  .hero .n{font-size:46px;font-weight:800;line-height:1;}
  .hero .lab{font-size:12px;opacity:.9;}
  .counts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px;}
  .cc{background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px;text-align:center;border-top:3px solid var(--c);}
  .cc .v{font-size:22px;font-weight:800;color:var(--c);} .cc .l{font-size:10px;color:var(--mut);}
  #map{height:330px;border-radius:14px;border:1px solid var(--line);overflow:hidden;margin-bottom:14px;z-index:0;}
  .lrow{display:flex;align-items:center;gap:10px;padding:11px;border:1px solid var(--line);border-radius:11px;background:#fff;margin-bottom:8px;text-decoration:none;color:var(--txt);}
  .lrow .bar{width:5px;height:36px;border-radius:3px;background:var(--c);flex:0 0 auto;}
  .lrow .nm{font-weight:700;font-size:14px;} .lrow .sub{font-size:11px;color:var(--mut);}
  .lrow .sc{margin-left:auto;text-align:right;} .lrow .sc .s{font-size:18px;font-weight:800;color:var(--c);}
</style>
</head>
<body>
<div id="hdr"></div>
<div id="app" class="wrap"><div class="center"><div class="spin"></div></div></div>
<script>
"use strict";
const sb=GMS.sb,$=GMS.$;
const RC={Low:'#16a34a',Medium:'#d97706',High:'#ea580c','Very High':'#dc2626'};
const TARP_LV={1:"Low",2:"Medium",3:"High",4:"Very High"};
let map=null, layer=null;

function utmToLatLng(e,n){const a=6378137,ec=0.00669438,k0=0.9996,x=e-500000,y=n-10000000,M=y/k0;
  const mu=M/(a*(1-ec/4-3*ec*ec/64)),e1=(1-Math.sqrt(1-ec))/(1+Math.sqrt(1-ec));
  const phi=mu+(3*e1/2-27*e1**3/32)*Math.sin(2*mu)+(21*e1**2/16-55*e1**4/32)*Math.sin(4*mu)+(151*e1**3/96)*Math.sin(6*mu);
  const N=a/Math.sqrt(1-ec*Math.sin(phi)**2),T=Math.tan(phi)**2,C=(ec/(1-ec))*Math.cos(phi)**2,R=a*(1-ec)/(1-ec*Math.sin(phi)**2)**1.5,D=x/(N*k0);
  const lat=phi-(N*Math.tan(phi)/R)*(D*D/2-(5+3*T+10*C-4*C*C-9*ec)*D**4/24);
  const lng=(123*Math.PI/180)+(D-(1+2*T+C)*D**3/6)/Math.cos(phi);
  return {lat:lat*180/Math.PI,lng:lng*180/Math.PI};}
function target(l){if(!l)return null;if(l.lat&&l.lng)return{lat:+l.lat,lng:+l.lng};if(l.easting&&l.northing)return utmToLatLng(+l.easting,+l.northing);return null;}

async function load(){
  const [{data:insp},{data:locs}]=await Promise.all([
    sb.from("inspections").select("id,location_id,inspection_date,inspector,risk_final,tarp_level,total_score,approval_status").order("inspection_date",{ascending:false}),
    sb.from("locations").select("*"),
  ]);
  const locMap={}; (locs||[]).forEach(l=>locMap[l.id]=l);
  const latest={}; (insp||[]).forEach(d=>{ if(!latest[d.location_id]) latest[d.location_id]=d; }); // already desc
  const rows=Object.values(latest);
  const cnt={Low:0,Medium:0,High:0,"Very High":0};
  let maxT=0;
  rows.forEach(r=>{ cnt[r.risk_final]=(cnt[r.risk_final]||0)+1; maxT=Math.max(maxT,r.tarp_level||0); });
  const heroLv=TARP_LV[maxT]||"Low", heroCol=RC[heroLv]||RC.Low;

  $("app").innerHTML=
    '<div class="hero" style="background:'+heroCol+'"><div><div class="n">'+(maxT||"–")+'</div></div>'+
      '<div><div style="font-size:17px;font-weight:800">TARP '+heroLv.toUpperCase()+'</div>'+
      '<div class="lab">Level tertinggi aktif dari '+rows.length+' lokasi terpantau</div></div></div>'+
    '<div class="counts">'+
      ['Low','Medium','High','Very High'].map(k=>'<div class="cc" style="--c:'+RC[k]+'"><div class="v">'+(cnt[k]||0)+'</div><div class="l">'+k+'</div></div>').join("")+
    '</div>'+
    '<div id="map"></div>'+
    '<div class="eyebrow">Lokasi (inspeksi terbaru)</div><div id="list"></div>'+
    '<p class="mono" style="font-size:10px;color:var(--mut2);text-align:center;margin-top:16px">Auto-refresh 60 dtk &middot; <span id="rt"></span></p>';

  // list sorted by score desc
  const sorted=rows.slice().sort((a,b)=>(b.total_score||0)-(a.total_score||0));
  $("list").innerHTML = sorted.length? sorted.map(r=>{ const l=locMap[r.location_id]||{}; const col=RC[r.risk_final]||RC.Low;
    return '<a class="lrow" style="--c:'+col+'" href="report.html?type=inspeksi&id='+r.id+'"><div class="bar"></div>'+
      '<div><div class="nm">'+GMS.esc(l.name||("#"+r.location_id))+'</div>'+
      '<div class="sub">'+GMS.esc(r.inspector||"-")+' · '+(r.inspection_date||"").slice(0,10)+' · '+GMS.esc(r.approval_status||"")+'</div></div>'+
      '<div class="sc"><div class="s">'+(r.total_score||0)+'</div><div class="sub">'+GMS.esc(r.risk_final||"")+' · TARP'+(r.tarp_level||0)+'</div></div></a>';
    }).join("") : '<div style="color:var(--mut);font-size:13px;padding:8px">Belum ada inspeksi.</div>';

  // map
  const pts=rows.map(r=>({r,t:target(locMap[r.location_id])})).filter(x=>x.t);
  if(!map){ const c=pts.length?[pts.reduce((s,p)=>s+p.t.lat,0)/pts.length,pts.reduce((s,p)=>s+p.t.lng,0)/pts.length]:[-2.74,122.01];
    map=L.map("map",{scrollWheelZoom:false}).setView(c, pts.length?14:11);
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OSM"}).addTo(map); }
  if(layer) layer.remove(); layer=L.layerGroup().addTo(map);
  pts.forEach(({r,t})=>{ const col=RC[r.risk_final]||RC.Low; const l=locMap[r.location_id]||{};
    L.circleMarker([t.lat,t.lng],{radius:9,color:"#fff",weight:2,fillColor:col,fillOpacity:.95})
      .bindPopup('<b>'+GMS.esc(l.name||r.location_id)+'</b><br>'+GMS.esc(r.risk_final||"")+' · TARP'+(r.tarp_level||0)+' · skor '+(r.total_score||0)+'<br><a href="report.html?type=inspeksi&id='+r.id+'">Lihat laporan PDF →</a>')
      .addTo(layer); });
  if(pts.length>1){ try{ map.fitBounds(L.latLngBounds(pts.map(p=>[p.t.lat,p.t.lng])).pad(0.2)); }catch(e){} }
  $("rt").textContent="diperbarui "+new Date().toLocaleTimeString("id-ID");
}

(async()=>{
  $("hdr").innerHTML=GMS.header("Dashboard Risiko","Bahodopi Block 2 & 3");
  const p=await GMS.guard({requireAdmin:true,mount:"#app"});
  if(!p) return;
  await load();
  setInterval(()=>{ if(GMS.isOnline()) load().catch(()=>{}); }, 60000);
})();
</script>
</body>
</html>
