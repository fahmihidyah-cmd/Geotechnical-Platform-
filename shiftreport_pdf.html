<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shift Monitoring Report — Geotech Monitoring</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="common.js"></script>
<style>
  :root{--ink:#111827;--mut:#6b7280;--line:#d1d5db;--navy:#0b1f3a;--blue:#1d4ed8;
    --green:#16a34a;--amber:#d97706;--orange:#ea580c;--red:#dc2626;}
  *{box-sizing:border-box;}
  body{margin:0;background:#e9edf2;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Arial,sans-serif;color:var(--ink);}
  .toolbar{position:sticky;top:0;background:var(--navy);color:#fff;padding:10px 16px;display:flex;gap:10px;align-items:center;z-index:10;}
  .toolbar .sp{flex:1;font-size:14px;font-weight:600;}
  .toolbar button,.toolbar a{background:#fff;color:var(--navy);border:none;border-radius:8px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;text-decoration:none;}
  .toolbar a.ghost{background:rgba(255,255,255,.14);color:#fff;}
  .page{background:#fff;width:210mm;min-height:297mm;margin:18px auto;padding:16mm 15mm;box-shadow:0 2px 16px rgba(0,0,0,.18);}
  .rh{display:flex;align-items:flex-start;gap:14px;border-bottom:3px solid var(--navy);padding-bottom:12px;}
  .rh .logo{width:46px;height:46px;border-radius:9px;background:var(--navy);color:#fb923c;display:flex;align-items:center;justify-content:center;font-size:24px;flex:0 0 auto;}
  .rh h1{margin:0;font-size:18px;letter-spacing:.01em;}
  .rh .co{font-size:11px;color:var(--mut);margin-top:2px;}
  .rh .meta{margin-left:auto;text-align:right;font-size:10.5px;color:var(--mut);line-height:1.7;}
  .rh .meta b{color:var(--ink);}
  h2.sec{font-size:11px;text-transform:uppercase;letter-spacing:.1em;color:var(--blue);margin:18px 0 8px;border-bottom:1px solid var(--line);padding-bottom:5px;}
  .kv{display:grid;grid-template-columns:1fr 1fr;gap:4px 24px;font-size:12px;}
  .kv .r{display:flex;justify-content:space-between;gap:10px;padding:3px 0;border-bottom:1px dotted #e5e7eb;}
  .kv .r .k{color:var(--mut);} .kv .r .v{font-weight:600;text-align:right;}
  .hero{display:flex;align-items:center;gap:18px;border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-top:4px;}
  .hero .big{font-size:40px;font-weight:800;line-height:1;}
  .hero .lv{font-size:18px;font-weight:800;}
  .hero .tarp{font-size:11px;color:var(--mut);}
  .hero .act{flex:1;font-size:11.5px;color:var(--ink);line-height:1.5;border-left:1px solid var(--line);padding-left:16px;}
  table{width:100%;border-collapse:collapse;font-size:11px;}
  th,td{border:1px solid var(--line);padding:6px 8px;text-align:left;vertical-align:top;}
  th{background:#f3f4f6;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--mut);}
  td.c{text-align:center;}
  tr.hit td{background:#fff7ed;}
  .badge{display:inline-block;padding:1px 8px;border-radius:99px;font-size:10px;font-weight:700;}
  .yn-y{color:var(--red);font-weight:800;} .yn-n{color:var(--green);font-weight:700;}
  .note{font-size:10px;color:#374151;line-height:1.4;}
  .foot{margin-top:26px;display:flex;justify-content:space-between;align-items:flex-end;font-size:10px;color:var(--mut);}
  .sign{text-align:center;}
  .sign .line{width:170px;border-top:1px solid var(--ink);margin-top:42px;padding-top:4px;color:var(--ink);font-weight:600;}
  .loading{padding:60px;text-align:center;color:var(--mut);}
  /* round-check resume */
  .rcsum{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin:4px 0 10px;}
  .rcsum .c{border:1px solid var(--line);border-radius:8px;padding:8px 10px;text-align:center;}
  .rcsum .c .n{font-size:20px;font-weight:800;line-height:1;}
  .rcsum .c .l{font-size:9px;text-transform:uppercase;letter-spacing:.06em;color:var(--mut);margin-top:3px;}
  .resp{font-size:10.5px;line-height:1.5;}
  .resp .ri{display:flex;gap:8px;padding:3px 0;border-bottom:1px dotted #e5e7eb;}
  .resp .ri .t{flex:0 0 46px;font-weight:700;color:var(--ink);}
  /* full-page map sheet — landscape */
  .mappage{display:flex;flex-direction:column;width:297mm;min-height:210mm;}
  #repmap{flex:1 1 auto;min-height:158mm;border:1px solid var(--line);border-radius:8px;overflow:hidden;}
  .maplgd{font-size:9.5px;color:var(--mut);margin-top:6px;display:flex;flex-wrap:wrap;gap:4px 14px;}
  .maplgd b{color:var(--ink);}
  .leaflet-control-attribution{font-size:8px;}
  @media print{
    body{background:#fff;} .toolbar{display:none;}
    .page{margin:0;box-shadow:none;width:auto;min-height:auto;padding:0;}
    @page{size:A4 portrait;margin:14mm;}
    @page mapLand{size:A4 landscape;margin:12mm;}
    /* Last sheet rotates to landscape A4 (content area ≈ 273 × 186 mm). */
    .mappage{page:mapLand;page-break-before:always;width:auto;min-height:auto;height:186mm;}
    #repmap{min-height:0;height:150mm;}
    .avoid{break-inside:avoid;}
    .leaflet-control-zoom{display:none;}
  }
</style>
</head>
<body>
<div class="toolbar">
  <span class="sp" id="tt">Shift Monitoring Report</span>
  <a class="ghost" href="database.html">&#8592; Database</a>
  <button onclick="window.print()">&#128424; Simpan / Cetak PDF</button>
</div>
<div id="out"><div class="loading">Memuat laporan…</div></div>

<script>
"use strict";
const sb = GMS.sb, esc = GMS.esc, fmt = GMS.fmtDate;
const qs = new URLSearchParams(location.search);
const ID = qs.get("id");
const TARP_C = {0:'#64748b',1:'#16a34a',2:'#eab308',3:'#ea580c',4:'#dc2626'};
const TARP_ACTION = {
  0:'Monitoring rutin — semua dalam batas normal.',
  1:'Monitoring rutin. Lanjutkan inspeksi terjadwal.',
  2:'Monitoring harian; siapkan tindakan korektif & review engineering.',
  3:'Batasi operasi; monitoring per shift; terapkan mitigasi.',
  4:'STOP operasi segera; aktifkan TARP/ERP; respons darurat geoteknik.'
};
const out=document.getElementById("out"), tt=document.getElementById("tt");

function headerHTML(title, docid, dateStr, shift){
  return '<div class="rh"><div class="logo">&#9650;</div>'+
    '<div><h1>'+title+'</h1><div class="co">PT Vale Indonesia &middot; IGP Morowali &middot; Bahodopi Block 2 &amp; 3</div></div>'+
    '<div class="meta"><div>No. Dok: <b>'+esc(docid)+'</b></div><div>Tanggal: <b>'+esc(dateStr)+'</b></div>'+
    '<div>Shift: <b>'+esc(shift||'-')+'</b></div><div>Dicetak: '+new Date().toLocaleDateString("id-ID")+'</div></div></div>';
}
function footHTML(name){
  return '<div class="foot avoid"><div>Dokumen ini dihasilkan otomatis oleh Geotech Monitoring System.<br>Sah tanpa tanda tangan basah bila diverifikasi di sistem.</div>'+
    '<div class="sign"><div>Operator / Dispatcher,</div><div class="line">'+esc(name||"________________")+'</div></div></div>';
}
function kv(k,v){ return '<div class="r"><span class="k">'+esc(k)+'</span><span class="v">'+esc(v)+'</span></div>'; }
function yn(v){ return v ? '<span class="yn-y">Ya</span>' : '<span class="yn-n">Tidak</span>'; }
function hhmm(iso){ try{ return new Date(iso).toLocaleTimeString("id-ID",{hour:"2-digit",minute:"2-digit"}); }catch(e){ return "—"; } }

async function render(){
  const { data:r, error } = await sb.from("shift_reports").select("*").eq("id",ID).single();
  if(error||!r){ out.innerHTML='<div class="loading">Shift report tidak ditemukan / tidak punya akses.</div>'; return; }

  // instruments for this report + round checks for this report's actual shift WINDOW
  // (DB RPC, WITA-aware — Malam shift crosses midnight, so a single-date match misses checks)
  const [insR, rcR] = await Promise.all([
    sb.from("shift_report_instruments").select("*").eq("report_uuid", r.id).order("area").order("instrument_id"),
    sb.rpc("shift_round_checks_for_report", {p_tanggal:r.tanggal, p_shift:r.shift})
  ]);
  const insts = insR.data||[];
  const checks = Array.isArray(rcR.data)?rcR.data:(rcR.data?JSON.parse(rcR.data):[]);

  const lv = r.tarp_level||0, col = TARP_C[lv]||TARP_C[0];
  const docid = r.report_id || ("SHIFT-"+String(r.id).slice(0,8));

  // ── Instrument status table ──
  const instTable = insts.length ? (
    '<table class="avoid"><thead><tr><th>ID</th><th>Tipe</th><th>Area</th><th>Lokasi</th><th>Status</th><th>Nilai</th><th class="c">TARP</th><th>Catatan</th></tr></thead><tbody>'+
    insts.map(it=>{ const ic=TARP_C[it.tarp_lv||0]||TARP_C[0];
      return '<tr class="'+((it.tarp_lv||0)>=2?'hit':'')+'"><td>'+esc(it.instrument_id||'—')+'</td><td>'+esc(it.type||'—')+'</td>'+
        '<td>'+esc(it.area||'—')+'</td><td>'+esc(it.lokasi||'—')+'</td>'+
        '<td>'+esc(it.status||'—')+'</td><td>'+(it.nilai!=null?esc(it.nilai)+' '+esc(it.unit||''):'—')+'</td>'+
        '<td class="c" style="font-weight:700;color:'+ic+'">'+esc(it.tarp_label||('LV'+(it.tarp_lv||0)))+'</td>'+
        '<td class="note">'+esc(it.catatan||'')+'</td></tr>'; }).join('')+
    '</tbody></table>'
  ) : '<div class="note" style="padding:8px 0">Tidak ada data instrumen pada laporan ini.</div>';

  // ── Hourly cycle round-check resume ──
  const rcTable = checks.length ? (
    '<table class="avoid"><thead><tr><th>Jam</th><th>Status</th><th class="c">Trigger</th><th class="c">Anomali</th><th class="c">Hujan</th><th class="c">Gempa</th><th>Catatan &amp; Follow-up</th></tr></thead><tbody>'+
    checks.map(c=>{
      const stc = /abnormal/i.test(c.overall_state)?'#dc2626':/watch/i.test(c.overall_state)?'#d97706':'#16a34a';
      const notes=[];
      if(c.connectivity_note) notes.push('Alat: '+c.connectivity_note);
      if(c.has_trigger&&c.trigger_note) notes.push('Trigger: '+c.trigger_note);
      if(c.has_anomaly&&c.anomaly_note) notes.push('Anomali: '+c.anomaly_note);
      if(c.issue_followup) notes.push('Follow-up: '+c.issue_followup);
      if(c.has_rain&&c.rain_note) notes.push('Hujan: '+c.rain_note);
      if(c.has_quake&&c.quake_note) notes.push('Gempa: '+c.quake_note);
      if(c.quake_para_followup) notes.push('PARA: '+c.quake_para_followup);
      if(c.general_note) notes.push(c.general_note);
      return '<tr class="'+((c.has_trigger||c.has_anomaly)?'hit':'')+'">'+
        '<td class="c" style="font-weight:700">'+hhmm(c.checked_at)+'</td>'+
        '<td style="font-weight:700;color:'+stc+'">'+esc(c.overall_state||'—')+'</td>'+
        '<td class="c">'+yn(c.has_trigger)+'</td><td class="c">'+yn(c.has_anomaly)+'</td>'+
        '<td class="c">'+yn(c.has_rain)+'</td><td class="c">'+yn(c.has_quake)+'</td>'+
        '<td class="note">'+esc(notes.join(' · '))+'</td></tr>';
    }).join('')+
    '</tbody></table>'
  ) : '<div class="note" style="padding:8px 0">Belum ada cycle round check tercatat untuk shift ini.</div>';

  // round-check rollup flags + counts
  const anyTrig = checks.some(c=>c.has_trigger), anyAnom = checks.some(c=>c.has_anomaly),
        anyRain = checks.some(c=>c.has_rain),    anyQuake= checks.some(c=>c.has_quake);
  const worst = checks.reduce((m,c)=> /abnormal/i.test(c.overall_state)?'Abnormal':(m==='Abnormal'?m:(/watch/i.test(c.overall_state)?'Watch':m)),'Normal');
  const cnt = (f)=>checks.filter(f).length;
  const nTrig=cnt(c=>c.has_trigger), nAnom=cnt(c=>c.has_anomaly), nRain=cnt(c=>c.has_rain), nQuake=cnt(c=>c.has_quake);
  const nAbn=cnt(c=>/abnormal/i.test(c.overall_state)), nWatch=cnt(c=>/watch/i.test(c.overall_state));
  // consolidated response / follow-up timeline (only rows that carry an action/finding)
  const responses=[];
  checks.forEach(c=>{ const hh=hhmm(c.checked_at); const parts=[];
    if(c.has_trigger&&c.trigger_note) parts.push('Trigger — '+c.trigger_note);
    if(c.has_anomaly&&c.anomaly_note) parts.push('Anomali — '+c.anomaly_note);
    if(c.issue_followup) parts.push('Tindak lanjut — '+c.issue_followup);
    if(c.has_quake&&c.quake_para_followup) parts.push('PARA pasca-gempa — '+c.quake_para_followup);
    if(c.connectivity_note) parts.push('Konektivitas — '+c.connectivity_note);
    if(parts.length) responses.push({hh, text:parts.join(' · ')});
  });
  const respHTML = responses.length
    ? '<div class="resp avoid">'+responses.map(x=>'<div class="ri"><span class="t">'+esc(x.hh)+'</span><span>'+esc(x.text)+'</span></div>').join('')+'</div>'
    : '<div class="note" style="padding:6px 0">Tidak ada respons/tindak lanjut khusus — kondisi normal sepanjang shift.</div>';
  const rcCards =
    '<div class="rcsum avoid">'+
      '<div class="c"><div class="n">'+checks.length+'</div><div class="l">Round Check</div></div>'+
      '<div class="c"><div class="n" style="color:'+(nAbn?'#dc2626':nWatch?'#d97706':'#16a34a')+'">'+(nAbn?nAbn:nWatch?nWatch:checks.length)+'</div><div class="l">'+(nAbn?'Abnormal':nWatch?'Watch':'Normal')+'</div></div>'+
      '<div class="c"><div class="n" style="color:'+(nTrig?'#dc2626':'#16a34a')+'">'+nTrig+'</div><div class="l">Trigger</div></div>'+
      '<div class="c"><div class="n" style="color:'+(nAnom?'#ea580c':'#16a34a')+'">'+nAnom+'</div><div class="l">Anomali</div></div>'+
    '</div>';

  // handover (jsonb) → readable
  let handoverHTML='';
  if(r.handover && typeof r.handover==='object'){
    const ho=Object.entries(r.handover).filter(([,v])=>v!=null&&String(v).trim()!=='');
    if(ho.length) handoverHTML='<h2 class="sec">Serah Terima (Handover)</h2><div class="kv">'+ho.map(([k,v])=>kv(k, String(v))).join('')+'</div>';
  }

  out.innerHTML='<div class="page">'+
    headerHTML("Monitoring Shift Report", docid, r.tanggal||'-', r.shift)+

    '<h2 class="sec">Ringkasan Shift</h2>'+
    '<div class="hero avoid">'+
      '<div><div class="big" style="color:'+col+'">'+(lv?('LV'+lv):'—')+'</div><div class="tarp">TARP</div></div>'+
      '<div><div class="lv" style="color:'+col+'">'+esc(r.tarp_label||'Normal')+'</div>'+
        '<div class="tarp">Instrumen online '+(r.online_instruments||0)+'/'+(r.total_instruments||0)+
        (r.coverage_pct!=null?(' &middot; coverage '+r.coverage_pct+'%'):'')+'</div>'+
        '<div class="tarp">Alert: '+(r.alert_count||0)+' &middot; Round check: '+(checks.length||r.round_check_count||0)+'×</div></div>'+
      '<div class="act"><b>Rekomendasi Tindakan:</b><br>'+esc(TARP_ACTION[lv]||TARP_ACTION[0])+'</div>'+
    '</div>'+

    '<h2 class="sec">Informasi Shift</h2>'+
    '<div class="kv">'+
      kv("No. Laporan", docid)+
      kv("Tanggal", r.tanggal||'-')+
      kv("Shift", r.shift||'-')+
      kv("Operator", r.operator||'-')+
      kv("Cuaca", r.cuaca||'-')+
      kv("Curah hujan", r.curah_hujan!=null?(r.curah_hujan+' mm'):'-')+
      kv("Hujan mulai / berhenti", (r.jam_hujan_mulai||'-')+' / '+(r.jam_hujan_berhenti||'-'))+
      kv("Status round check shift", worst)+
    '</div>'+

    '<h2 class="sec">Status Instrumen (Submit Form Monitoring)</h2>'+ instTable +

    '<h2 class="sec">Resume Respons Round Check (per jam)</h2>'+
    rcCards +
    '<div class="note" style="margin:2px 0 8px">Hujan: '+(anyRain?nRain+'× tercatat':'tidak')+' &middot; Gempa: '+(anyQuake?nQuake+'× tercatat':'tidak')+' &middot; Status terburuk shift: <b>'+worst+'</b></div>'+
    '<div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);font-weight:700;margin:6px 0 4px">Respons &amp; Tindak Lanjut</div>'+
    respHTML +
    '<div style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--mut);font-weight:700;margin:12px 0 4px">Rincian per Jam</div>'+
    rcTable +

    ((r.catatan&&r.catatan.trim())?('<h2 class="sec">Kesimpulan / Catatan Shift</h2><div class="note" style="font-size:11.5px;line-height:1.6">'+esc(r.catatan)+'</div>'):'')+
    handoverHTML+
    footHTML(r.operator)+
  '</div>'+

  // ── Last sheet: full-page site map captured from the shift report ──
  '<div class="page mappage">'+
    headerHTML("Shift Report Map", docid, r.tanggal||'-', r.shift)+
    '<h2 class="sec">Site Base Map — Area Laporan</h2>'+
    '<div id="repmap"></div>'+
    '<div class="maplgd">'+
      '<span><b>Risk:</b></span><span style="color:#dc2626">&#9632; Very High</span><span style="color:#ea580c">&#9632; High</span><span style="color:#eab308">&#9632; Medium</span><span style="color:#16a34a">&#9632; Low</span>'+
      '<span><b>Instrumen:</b></span><span>&#10148; Inklinometer</span><span>&#9670; Extensometer</span><span>&#11107; VWP</span><span>&#9650; Prism</span><span>&#9733; RTS</span>'+
    '</div>'+
  '</div>';

  tt.textContent="Shift Monitoring · "+docid;
  document.title=docid+" — Shift Monitoring Report";
  buildReportMap(r.map_view);
}

async function buildReportMap(mv){
  const el=document.getElementById("repmap");
  if(!el || typeof L==="undefined") return;
  mv = mv || {base:"esri", inst:true, risk:true, zoom:14, center:[-2.740815,122.006525]};
  const center = (Array.isArray(mv.center)&&mv.center.length===2)?mv.center:[-2.740815,122.006525];
  const zoom = mv.zoom||14;
  const map = L.map("repmap",{zoomControl:false,attributionControl:true,scrollWheelZoom:false,dragging:true});
  const bases={
    esri:L.tileLayer("https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",{maxZoom:19,attribution:"Esri"}),
    aerial:L.tileLayer("https://young-mouse-1ee2.fahmihidyah.workers.dev/{z}/{x}/{y}.jpg",{minNativeZoom:16,maxNativeZoom:19,maxZoom:19,attribution:"PTVI"}),
    osm:L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OSM"})
  };
  (bases[mv.base]||bases.esri).addTo(map);
  map.setView(center, zoom);
  // Risk boundaries
  if(mv.risk!==false){
    try{
      const rp=await sb.from("v_inspection_risk_areas").select("polygon_geojson,risk_color,risk_level,location_name").limit(300);
      ((rp&&!rp.error&&rp.data)?rp.data:[]).forEach(a=>{ if(!a.polygon_geojson)return;
        try{ const gj=(typeof a.polygon_geojson==="string")?JSON.parse(a.polygon_geojson):a.polygon_geojson; const col=a.risk_color||"#dc2626";
          L.geoJSON(gj,{style:{color:col,weight:2,fillColor:col,fillOpacity:.22}}).addTo(map);
        }catch(e){}
      });
    }catch(e){}
  }
  // Instrument points (same symbology as the form & dashboard)
  if(mv.inst!==false){
    try{
      const SYMB={inclinometer:{g:'➤',s:18},extensometer:{g:'◆',s:15},piezometer:{g:'⬣',s:15},prism:{g:'▲',s:12},rts:{g:'★',s:15}};
      const CC={inclinometer:'#f59e0b',extensometer:'#a78bfa',piezometer:'#22d3ee',prism:'#94a3b8',rts:'#eab308'};
      const rs=await sb.from("v_instrument_points").select("name,category,lat,lng");
      ((rs&&!rs.error&&rs.data)?rs.data:[]).forEach(p=>{ if(p.lat==null||p.lng==null)return;
        const sy=SYMB[p.category]||{g:'●',s:13}; const col=CC[p.category]||'#94a3b8';
        L.marker([+p.lat,+p.lng],{icon:L.divIcon({className:"",html:'<div style="color:'+col+';font-size:'+sy.s+'px;line-height:1;text-shadow:0 0 2px #000,0 1px 2px #000;font-weight:900">'+sy.g+'</div>',iconSize:[sy.s,sy.s],iconAnchor:[sy.s/2,sy.s/2]})})
          .addTo(map);
      });
    }catch(e){}
  }
  // re-measure once the sheet has laid out so tiles fill the page before printing
  [120,400,900].forEach(d=>setTimeout(()=>{ try{ map.invalidateSize(); map.setView(center,zoom); }catch(e){} },d));
}

(async()=>{
  const s=await GMS.getSession();
  if(!s){ out.innerHTML='<div class="loading">Perlu login. <a href="index.html">Masuk dulu</a> lalu buka ulang link laporan.</div>'; return; }
  if(!ID){ out.innerHTML='<div class="loading">Parameter ?id= tidak ada.</div>'; return; }
  try{ await render(); }
  catch(e){ out.innerHTML='<div class="loading">Gagal memuat: '+esc(e.message||String(e))+'</div>'; }
})();
</script>
</body>
</html>
